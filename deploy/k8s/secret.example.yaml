apiVersion: v1
kind: Secret
metadata:
  name: saegim-env
  namespace: apps
type: Opaque
stringData:
  POSTGRES_PASSWORD: replace-with-a-long-random-password
  DATABASE_URL: postgresql://saegim:replace-with-a-long-random-password@saegim-postgres:5432/saegim
  SAEGIM_SESSION_SECRET: replace-with-a-long-random-session-secret
  GOOGLE_OAUTH_CLIENT_ID: ""
  GOOGLE_OAUTH_CLIENT_SECRET: ""
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: saegim-cloudflared
  namespace: apps
type: Opaque
stringData:
  token: replace-with-cloudflare-tunnel-token
