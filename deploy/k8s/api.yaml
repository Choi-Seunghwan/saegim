apiVersion: v1
kind: Service
metadata:
  name: saegim-api
  labels:
    app.kubernetes.io/name: saegim-api
    app.kubernetes.io/part-of: saegim
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: saegim-api
  ports:
    - name: http
      port: 4000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: saegim-api
  labels:
    app.kubernetes.io/name: saegim-api
    app.kubernetes.io/part-of: saegim
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: saegim-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: saegim-api
        app.kubernetes.io/part-of: saegim
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      initContainers:
        - name: db-push
          image: ghcr.io/choi-seunghwan/saegim-api:main
          imagePullPolicy: Always
          command:
            - node
            - apps/api/node_modules/prisma/build/index.js
            - db
            - push
            - --schema
            - apps/api/prisma/schema.prisma
          envFrom:
            - configMapRef:
                name: saegim-config
            - secretRef:
                name: saegim-env
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 400m
              memory: 1Gi
      containers:
        - name: api
          image: ghcr.io/choi-seunghwan/saegim-api:main
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 4000
          envFrom:
            - configMapRef:
                name: saegim-config
            - secretRef:
                name: saegim-env
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 800m
              memory: 768Mi
