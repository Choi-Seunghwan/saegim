apiVersion: v1
kind: Service
metadata:
  name: saegim-postgres
  labels:
    app.kubernetes.io/name: saegim-postgres
    app.kubernetes.io/part-of: saegim
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: saegim-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: saegim-postgres
  labels:
    app.kubernetes.io/name: saegim-postgres
    app.kubernetes.io/part-of: saegim
spec:
  serviceName: saegim-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: saegim-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: saegim-postgres
        app.kubernetes.io/part-of: saegim
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: saegim
            - name: POSTGRES_USER
              value: saegim
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: saegim-env
                  key: POSTGRES_PASSWORD
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - saegim
                - -d
                - saegim
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - saegim
                - -d
                - saegim
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
