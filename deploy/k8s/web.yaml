apiVersion: v1
kind: Service
metadata:
  name: saegim-web
  labels:
    app.kubernetes.io/name: saegim-web
    app.kubernetes.io/part-of: saegim
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: saegim-web
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: saegim-web
  labels:
    app.kubernetes.io/name: saegim-web
    app.kubernetes.io/part-of: saegim
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: saegim-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: saegim-web
        app.kubernetes.io/part-of: saegim
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: web
          image: ghcr.io/choi-seunghwan/saegim-web:main
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: HOSTNAME
              value: 0.0.0.0
            - name: PORT
              value: "3000"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 800m
              memory: 768Mi
