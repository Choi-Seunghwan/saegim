services:
  postgres:
    image: postgres:16-alpine
    container_name: saegim-postgres
    environment:
      POSTGRES_DB: saegim
      POSTGRES_USER: saegim
      POSTGRES_PASSWORD: saegim
    ports:
      - "55432:5432"
    volumes:
      - saegim-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saegim -d saegim"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  saegim-postgres-data:
