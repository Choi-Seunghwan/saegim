<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>문장 연구소 · Sentence Lab</title>
<!-- 한글 친화 모던 산세리프 (실패 시 system-ui로 폴백) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css" />
<style>
  /* ===== 디자인 토큰 (모던 미니멀) ===== */
  :root{
    --bg:#fbfbfa;          /* 살짝 따뜻한 화이트 배경 */
    --surface:#ffffff;     /* 카드/패널 표면 */
    --ink:#1b1816;         /* 잉크 블랙 (따뜻한 톤) */
    --ink-2:#57514b;       /* 보조 텍스트 */
    --ink-3:#938d85;       /* 약한 텍스트 */
    --line:#eae6df;        /* 얇은 경계선 */
    --accent:#2f5d4f;      /* 딥 세이지 그린 포인트 */
    --accent-soft:#e8f0ec; /* 포인트 연한 배경 */
    --cream:#f5f0e7;       /* 톤 카드 - 크림 */
    --sage:#e9efe9;        /* 톤 카드 - 세이지 */
    --ink-card:#211d1a;    /* 톤 카드 - 다크 */
    --sepia:#efe6d6;       /* 고전 뱃지 */
    --radius:15px;
    --shadow:0 1px 2px rgba(28,24,20,.04), 0 8px 24px rgba(28,24,20,.06);
    --shadow-lg:0 12px 40px rgba(28,24,20,.16);
    --font:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,system-ui,"Segoe UI",Roboto,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:var(--font);
    background:var(--bg);
    color:var(--ink);
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  ::selection{background:var(--accent);color:#fff}

  /* ===== 헤더 ===== */
  header{
    position:sticky;top:0;z-index:40;
    background:rgba(251,251,250,.82);
    backdrop-filter:saturate(180%) blur(12px);
    border-bottom:1px solid var(--line);
  }
  .head-inner{max-width:1200px;margin:0 auto;padding:18px 24px 0}
  .head-top{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
  .brand{display:flex;flex-direction:column;line-height:1.1;flex-shrink:0}
  .brand .ko{font-size:1.32rem;font-weight:800;letter-spacing:-.02em}
  .brand .en{font-size:.62rem;font-weight:600;letter-spacing:.34em;color:var(--ink-3);margin-top:3px;text-transform:uppercase}
  .search{
    flex:1;min-width:200px;position:relative;max-width:460px;
  }
  .search input{
    width:100%;padding:11px 16px 11px 40px;
    border:1px solid var(--line);border-radius:999px;
    background:var(--surface);font-size:.92rem;color:var(--ink);
    transition:border-color .18s, box-shadow .18s;
  }
  .search input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
  .search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--ink-3)}
  .lib-btn{
    display:flex;align-items:center;gap:7px;flex-shrink:0;
    padding:10px 16px;border:1px solid var(--line);border-radius:999px;
    background:var(--surface);font-size:.86rem;font-weight:600;color:var(--ink-2);
    transition:all .18s;
  }
  .lib-btn:hover{border-color:var(--ink-3)}
  .lib-btn.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .lib-btn .cnt{font-size:.74rem;opacity:.7}

  .head-bottom{display:flex;align-items:center;gap:8px;padding:14px 0 16px;overflow-x:auto;scrollbar-width:none}
  .head-bottom::-webkit-scrollbar{display:none}
  .chip{
    flex-shrink:0;padding:7px 15px;border-radius:999px;border:1px solid var(--line);
    background:var(--surface);font-size:.84rem;font-weight:600;color:var(--ink-2);
    transition:all .16s;white-space:nowrap;
  }
  .chip:hover{border-color:var(--ink-3);color:var(--ink)}
  .chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}

  /* ===== 그리드 (마소너리) ===== */
  main{max-width:1200px;margin:0 auto;padding:28px 24px 80px}
  .lead{margin-bottom:24px}
  .lead h1{font-size:1.04rem;font-weight:700;letter-spacing:-.01em}
  .lead p{font-size:.9rem;color:var(--ink-2);margin-top:4px}
  .grid{column-count:4;column-gap:18px}
  @media(max-width:1100px){.grid{column-count:3}}
  @media(max-width:760px){.grid{column-count:2}}
  @media(max-width:480px){.grid{column-count:1}}

  .card{
    break-inside:avoid;margin-bottom:18px;
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:22px 20px 16px;position:relative;cursor:pointer;
    transition:transform .2s cubic-bezier(.2,.7,.3,1), box-shadow .2s, border-color .2s;
  }
  .card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:#ded8cf}
  .card.t-cream{background:var(--cream);border-color:#ece4d6}
  .card.t-sage{background:var(--sage);border-color:#dde6dd}
  .card.t-ink{background:var(--ink-card);border-color:#322d28}
  .card.t-ink .q,.card.t-ink .c-author{color:#f3efe9}
  .card.t-ink .c-src{color:#a59d92}

  .c-badge{
    display:inline-block;font-size:.66rem;font-weight:700;letter-spacing:.02em;
    padding:4px 9px;border-radius:6px;margin-bottom:13px;
  }
  .b-pd{background:var(--sage);color:#2f5d4f}
  .b-house{background:var(--accent);color:#fff}
  .b-classic{background:var(--sepia);color:#7a5b2e}
  .card.t-ink .b-pd{background:#33463f;color:#bfe0d3}

  .q{font-size:1.06rem;line-height:1.62;font-weight:500;white-space:pre-line;letter-spacing:-.01em;word-break:keep-all}
  .card .meta{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin-top:15px}
  .c-author{font-size:.84rem;font-weight:700;color:var(--ink)}
  .c-src{font-size:.76rem;color:var(--ink-3);margin-top:2px}
  .heart{
    flex-shrink:0;width:32px;height:32px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;color:var(--ink-3);
    transition:all .16s;
  }
  .heart:hover{background:rgba(0,0,0,.05);color:var(--accent)}
  .card.t-ink .heart:hover{background:rgba(255,255,255,.1)}
  .heart.on{color:#d6455d}
  .heart.on svg{fill:#d6455d}

  .empty{text-align:center;padding:80px 20px;color:var(--ink-3)}
  .empty b{display:block;font-size:1.1rem;color:var(--ink-2);margin-bottom:6px}

  /* ===== 모달 ===== */
  .overlay{
    position:fixed;inset:0;z-index:60;background:rgba(27,24,22,.5);
    backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;
    padding:24px;opacity:0;pointer-events:none;transition:opacity .22s;
  }
  .overlay.open{opacity:1;pointer-events:auto}
  .modal{
    background:var(--surface);border-radius:20px;width:100%;max-width:620px;
    max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-lg);
    transform:translateY(14px) scale(.99);transition:transform .26s cubic-bezier(.2,.8,.25,1);
  }
  .overlay.open .modal{transform:none}
  .modal::-webkit-scrollbar{width:8px}
  .modal::-webkit-scrollbar-thumb{background:#e0dad1;border-radius:4px}
  .m-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 0}
  .m-close{width:36px;height:36px;border-radius:50%;color:var(--ink-2);display:flex;align-items:center;justify-content:center;transition:background .16s}
  .m-close:hover{background:#f0ece5}
  .m-body{padding:14px 32px 24px}
  .m-quote{font-size:1.5rem;line-height:1.55;font-weight:600;white-space:pre-line;letter-spacing:-.02em;word-break:keep-all;margin:10px 0 22px}
  .m-meta{display:flex;flex-wrap:wrap;gap:6px 14px;align-items:baseline;padding-bottom:18px;border-bottom:1px solid var(--line)}
  .m-author{font-size:.98rem;font-weight:800}
  .m-src{font-size:.86rem;color:var(--ink-2)}
  .m-src a{color:var(--accent);text-decoration:none;border-bottom:1px solid transparent;transition:border-color .15s}
  .m-src a:hover{border-color:var(--accent)}
  .m-actions{display:flex;gap:10px;padding:16px 0 4px}
  .act{
    display:flex;align-items:center;gap:7px;padding:10px 16px;border-radius:10px;
    border:1px solid var(--line);font-size:.86rem;font-weight:600;color:var(--ink-2);transition:all .16s;
  }
  .act:hover{border-color:var(--ink-3);color:var(--ink)}
  .act.saved{background:#fdeef1;border-color:#f6cdd6;color:#d6455d}

  /* 탭 */
  .tabs{display:flex;gap:4px;margin-top:22px;border-bottom:1px solid var(--line)}
  .tab{padding:11px 4px;margin-right:18px;font-size:.9rem;font-weight:600;color:var(--ink-3);position:relative;transition:color .16s}
  .tab:hover{color:var(--ink-2)}
  .tab.active{color:var(--ink)}
  .tab.active::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--accent);border-radius:2px}
  .panel{padding-top:22px;min-height:170px}
  .panel[hidden]{display:none}

  /* 로딩 */
  .loading{display:flex;align-items:center;gap:11px;color:var(--ink-3);font-size:.88rem;padding:20px 0}
  .spin{width:17px;height:17px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* AI 분석 패널 */
  .an-row{margin-bottom:20px}
  .an-label{font-size:.72rem;font-weight:700;letter-spacing:.08em;color:var(--ink-3);text-transform:uppercase;margin-bottom:9px}
  .an-style{font-size:1rem;font-weight:600;color:var(--ink)}
  .bar{display:flex;align-items:center;gap:11px;margin-bottom:9px}
  .bar .bn{font-size:.82rem;color:var(--ink-2);width:60px;flex-shrink:0}
  .bar .bt{flex:1;height:8px;background:#efeae2;border-radius:5px;overflow:hidden}
  .bar .bf{height:100%;background:var(--accent);border-radius:5px;width:0;transition:width .9s cubic-bezier(.2,.8,.2,1)}
  .bar .bv{font-size:.78rem;color:var(--ink-3);width:36px;text-align:right;flex-shrink:0}
  .kw{display:flex;flex-wrap:wrap;gap:7px}
  .kw span{font-size:.82rem;padding:6px 12px;background:var(--accent-soft);color:var(--accent);border-radius:999px;font-weight:600}
  .interp{font-size:.94rem;line-height:1.7;color:var(--ink-2);background:#faf8f4;border-left:3px solid var(--accent);padding:14px 16px;border-radius:0 10px 10px 0}

  /* 유사 문장 */
  .sim{display:flex;flex-direction:column;gap:11px}
  .sim-card{display:flex;gap:14px;align-items:flex-start;padding:15px 16px;border:1px solid var(--line);border-radius:12px;cursor:pointer;transition:all .16s;background:var(--surface)}
  .sim-card:hover{border-color:#ddd6cc;background:#fcfbf9;transform:translateX(2px)}
  .sim-score{flex-shrink:0;text-align:center}
  .sim-score .pct{font-size:1.02rem;font-weight:800;color:var(--accent);line-height:1}
  .sim-score .lb{font-size:.6rem;color:var(--ink-3);letter-spacing:.05em;margin-top:3px}
  .sim-q{font-size:.9rem;line-height:1.5;color:var(--ink);word-break:keep-all}
  .sim-a{font-size:.76rem;color:var(--ink-3);margin-top:5px}

  /* 표지 생성 */
  .cov-intro{font-size:.9rem;color:var(--ink-2);margin-bottom:16px}
  .gen-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;background:var(--ink);color:#fff;border-radius:11px;font-size:.9rem;font-weight:700;transition:transform .14s,background .16s}
  .gen-btn:hover{background:#000;transform:translateY(-1px)}
  .gen-btn:active{transform:none}
  .covers{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:6px}
  @media(max-width:540px){.covers{grid-template-columns:repeat(2,1fr)}}
  .cover{aspect-ratio:3/4;border-radius:8px;padding:16px 14px;display:flex;flex-direction:column;box-shadow:var(--shadow);overflow:hidden;position:relative;word-break:keep-all}
  .cv-lab{font-size:.5rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;opacity:.6}
  .cv-q{font-weight:600;line-height:1.4;letter-spacing:-.01em;margin-top:auto}
  .cv-a{font-size:.6rem;margin-top:10px;opacity:.75}
  .cov-a{background:var(--cream);color:#3a322a}
  .cov-a .cv-q{font-size:.82rem;text-align:center;margin:auto 0}
  .cov-a .cv-lab{text-align:center}
  .cov-a .cv-a{text-align:center}
  .cov-b{background:var(--ink-card);color:#f3efe9}
  .cov-b .cv-q{font-size:.86rem}
  .cov-b .cv-lab{color:#9ec3b4}
  .cov-c{background:var(--surface);color:#23463c;border:1px solid var(--line)}
  .cov-c::before{content:"";position:absolute;top:0;left:0;right:0;height:34%;background:var(--accent)}
  .cov-c .cv-lab{color:#fff;position:relative;z-index:1}
  .cov-c .cv-q{font-size:.8rem;position:relative}
  .cov-c .cv-a{color:var(--accent)}
  .cov-tools{display:flex;gap:10px;margin-top:16px}
  .cov-tools button{font-size:.82rem;font-weight:600;color:var(--ink-2);padding:9px 15px;border:1px solid var(--line);border-radius:9px;transition:all .15s}
  .cov-tools button:hover{border-color:var(--ink-3);color:var(--ink)}

  /* 토스트 */
  .toast{
    position:fixed;left:50%;bottom:34px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:13px 22px;border-radius:11px;font-size:.86rem;font-weight:500;
    box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:all .26s;z-index:80;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  footer{text-align:center;padding:30px 20px 50px;color:var(--ink-3);font-size:.78rem;border-top:1px solid var(--line);max-width:1200px;margin:0 auto}
  footer b{color:var(--ink-2);font-weight:700}
</style>
</head>
<body>
  <header>
    <div class="head-inner">
      <div class="head-top">
        <div class="brand">
          <span class="ko">문장 연구소</span>
          <span class="en">Sentence Lab</span>
        </div>
        <div class="search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="search" type="text" placeholder="문장 · 작가 · 출처 검색" autocomplete="off" />
        </div>
        <button class="lib-btn" id="libBtn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          내 서재 <span class="cnt" id="libCnt">0</span>
        </button>
      </div>
      <div class="head-bottom" id="chips">
        <button class="chip active" data-filter="all">전체</button>
        <button class="chip" data-filter="pd">공유저작물</button>
        <button class="chip" data-filter="house">자체출판 · 에디터 픽</button>
        <button class="chip" data-filter="classic">고전 · 명언</button>
      </div>
    </div>
  </header>

  <main>
    <div class="lead">
      <h1 id="leadTitle">오늘의 문장</h1>
      <p id="leadDesc">출판사가 직접 큐레이션한 문장들. 저작권이 깨끗한 시드부터 차곡차곡 쌓아 올립니다.</p>
    </div>
    <div class="grid" id="grid"></div>
  </main>

  <!-- 상세 모달 -->
  <div class="overlay" id="overlay">
    <div class="modal" id="modal" role="dialog" aria-modal="true">
      <div class="m-head">
        <span id="mBadge"></span>
        <button class="m-close" id="mClose" aria-label="닫기">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="m-body" id="mBody"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <footer>
    <b>문장 연구소</b> · 새김(SAEGIM) 독립 프로젝트 데모 — 모든 문장은 공유저작물 또는 자체 창작 시드입니다.
  </footer>

<script>
/* ============================================================
   문장 연구소 (Sentence Lab) — MVP 동작 데모
   - 시드: 공유저작물(근대문학) + 고전·명언 + 가상 자체출판(에디터 픽)
   - 기능: 마소너리 그리드 / 상세·출처·저장 / AI 다각도 분석 / 유사 추천 / 표지 생성
   ============================================================ */

/* ---------- 시드 데이터 (저작권 안전) ----------
   type: pd(공유저작물) | classic(고전·명언) | house(자체출판·창작)
   tone: 카드 배경 리듬용 (plain | cream | sage | ink) */
const DATA = [
  { id:1, type:"pd", tone:"plain", theme:"성찰·부끄러움", style:"정갈한 고백체",
    text:`죽는 날까지 하늘을 우러러\n한 점 부끄럼이 없기를`,
    author:"윤동주", work:"하늘과 바람과 별과 시", year:"1948",
    keywords:["부끄러움","양심","바람","순결"],
    reading:"한 점의 부끄러움조차 견디지 못하는 결벽한 양심을, 바람이라는 가장 여린 떨림으로 보여준다." },
  { id:2, type:"pd", tone:"cream", theme:"이별·그리움", style:"민요적 율격",
    text:`나 보기가 역겨워\n가실 때에는\n말없이 고이 보내 드리오리다`,
    author:"김소월", work:"진달래꽃", year:"1925",
    keywords:["이별","체념","헌신","한"],
    reading:"떠나는 이를 붙잡지 않겠다는 말 속에, 가장 붙잡고 싶은 마음이 숨어 있다." },
  { id:3, type:"pd", tone:"plain", theme:"이별·그리움", style:"역설의 산문시",
    text:`우리는 만날 때에 떠날 것을 염려하는 것과 같이,\n떠날 때에 다시 만날 것을 믿습니다`,
    author:"한용운", work:"님의 침묵", year:"1926",
    keywords:["만남","이별","믿음","순환"],
    reading:"이별을 끝이 아니라 다음 만남의 예고로 뒤집는, 역설의 위로." },
  { id:4, type:"pd", tone:"ink", theme:"의지·초인", style:"비장한 예언조",
    text:`다시 천고(千古)의 뒤에\n백마 타고 오는 초인이 있어\n이 광야에서 목 놓아 부르게 하리라`,
    author:"이육사", work:"광야", year:"1945",
    keywords:["초인","광야","미래","희생"],
    reading:"당장 오지 않을 구원을 위해 지금의 황무지에 씨를 뿌리는 자의 비장함." },
  { id:5, type:"pd", tone:"plain", theme:"시간·생애", style:"도발적 독백",
    text:`박제가 되어 버린 천재를 아시오?`,

/* ---------- 상태 ---------- */
const SAVED_KEY = "sentlab_saved";
let state = {
  filter: "all",
  q: "",
  view: "all",      // all | library
  saved: new Set(loadSaved())
};
let currentId = null;
let currentTab = "analysis";

function loadSaved(){
  try{ return JSON.parse(localStorage.getItem(SAVED_KEY)) || []; }
  catch(e){ return []; }
}
function persistSaved(){
  try{ localStorage.setItem(SAVED_KEY, JSON.stringify([...state.saved])); }catch(e){}
}

/* ---------- 유틸 ---------- */
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function byId(id){ return DATA.find(d => d.id === id); }
function trimQuote(t, n){ const flat = t.replace(/\n/g,' '); return flat.length > n ? flat.slice(0,n).trim()+'…' : flat; }

/* ---------- 그리드 렌더 ---------- */
const grid = document.getElementById("grid");

function getFiltered(){
  const q = state.q.trim().toLowerCase();
  return DATA.filter(d => {
    if(state.view === "library" && !state.saved.has(d.id)) return false;
    if(state.filter !== "all" && d.type !== state.filter) return false;
    if(q){
      const hay = (d.text + " " + d.author + " " + d.work + " " + d.keywords.join(" ")).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
}

function cardHTML(d){
  const t = TYPE[d.type];
  const on = state.saved.has(d.id) ? "on" : "";
  return `<article class="card t-${d.tone}" data-id="${d.id}">
    <span class="c-badge ${t.cls}">${t.label}</span>
    <div class="q">${esc(d.text)}</div>
    <div class="meta">
      <div>
        <div class="c-author">${esc(d.author)}</div>
        <div class="c-src">${esc(d.work)}${d.year ? " · " + esc(d.year) : ""}</div>
      </div>
      <button class="heart ${on}" data-heart="${d.id}" aria-label="저장">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
      </button>
    </div>
  </article>`;
}

function render(){
  const list = getFiltered();
  if(list.length === 0){
    grid.style.columnCount = "1";
    grid.innerHTML = `<div class="empty"><b>아직 문장이 없어요</b>${state.view==="library" ? "마음에 드는 문장의 하트를 눌러 서재에 담아보세요." : "검색어나 필터를 바꿔보세요."}</div>`;
  } else {
    grid.style.columnCount = "";
    grid.innerHTML = list.map(cardHTML).join("");
  }
  // 헤더 카운트/리드 갱신
  document.getElementById("libCnt").textContent = state.saved.size;
  const lead = document.getElementById("leadTitle"), desc = document.getElementById("leadDesc");
  if(state.view === "library"){
    lead.textContent = "내 서재";
    desc.textContent = `담아 둔 문장 ${state.saved.size}개`;
  } else {
    lead.textContent = "오늘의 문장";
    desc.textContent = "출판사가 직접 큐레이션한 문장들. 저작권이 깨끗한 시드부터 차곡차곡 쌓아 올립니다.";
  }
}

/* ---------- 저장 토글 ---------- */
function toggleSave(id, silent){
  if(state.saved.has(id)){ state.saved.delete(id); if(!silent) toast("서재에서 뺐어요"); }
  else { state.saved.add(id); if(!silent) toast("내 서재에 담았어요"); }
  persistSaved();
  render();
  if(currentId === id) syncModalSaveBtn();
}

const overlay = document.getElementById("overlay");
const mBody = document.getElementById("mBody");
const mBadge = document.getElementById("mBadge");

function openModal(id){

function closeModal(){
  overlay.classList.remove("open");
  document.body.style.overflow = "";

function syncModalSaveBtn(){
  const btn = document.getElementById("saveAct");
  if(!btn) return;
  const on = state.saved.has(currentId);
  btn.className = "act" + (on ? " saved" : "");
  btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="${on ? "currentColor":"none"}" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>${on ? "저장됨" : "저장"}`;

/* ---------- 탭 전환 ---------- */
function switchTab(tab){
  currentTab = tab;
  mBody.querySelectorAll(".tab").forEach(tb => tb.classList.toggle("active", tb.dataset.tab === tab));
  const panel = document.getElementById("panel");
  if(tab === "analysis") renderAnalysis(panel);
  else if(tab === "similar") renderSimilar(panel);
  else renderCover(panel);
}

  const d = byId(currentId);
  panel.innerHTML = `<div class="loading"><span class="spin"></span>문장을 여러 각도로 분석하는 중…</div>`;
  setTimeout(() => {

    const emo = EMOTION[d.theme] || [["서정",60],["사색",25],["여운",15]];
    panel.innerHTML = `

        <div class="an-label">감정 톤</div>

        <div class="kw">${d.keywords.map(k => `<span>${esc(k)}</span>`).join("")}</div>

/* ---------- 유사 문장 추천 (테마·키워드 유사도) ---------- */
function simScore(a, b){
  let s = 0;
  if(a.theme === b.theme) s += 55;
  const ov = a.keywords.filter(k => b.keywords.includes(k)).length;
  s += ov * 12;
  if(a.type === b.type) s += 6;
  s += ((a.id * 7 + b.id * 13) % 9);        // 안정적인 미세 변주
  return Math.min(98, Math.max(41, s + 24));
}
function renderSimilar(panel){
  const d = byId(currentId);
  panel.innerHTML = `<div class="loading"><span class="spin"></span>의미가 가까운 문장을 찾는 중…</div>`;
  setTimeout(() => {
    if(currentId !== d.id || currentTab !== "similar") return;
    const ranked = DATA.filter(x => x.id !== d.id)
      .map(x => ({ x, s: simScore(d, x) }))
      .sort((a,b) => b.s - a.s).slice(0,4);
    panel.innerHTML = `<div class="sim">${ranked.map(({x,s}) => `
      <div class="sim-card" data-go="${x.id}">
        <div class="sim-score"><div class="pct">${s}<span style="font-size:.7rem">%</span></div><div class="lb">유사도</div></div>
        <div>
          <div class="sim-q">${esc(trimQuote(x.text, 42))}</div>
          <div class="sim-a">${esc(x.author)} · ${esc(x.work)}</div>
        </div>
      </div>`).join("")}</div>`;
    panel.querySelectorAll("[data-go]").forEach(el =>
      el.addEventListener("click", () => openModal(parseInt(el.dataset.go))));
  }, 520);
}

/* ---------- 책 표지 생성 (3종 실시간) ---------- */
function renderCover(panel){
  const d = byId(currentId);
  panel.innerHTML = `
    <p class="cov-intro">이 문장을 표제로 한 책 표지 시안을 만들어 드려요. 출판사의 새 기획 출발점이 됩니다.</p>
    <button class="gen-btn" id="genBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v3m0 12v3M5.6 5.6l2.1 2.1m8.6 8.6 2.1 2.1M3 12h3m12 0h3M5.6 18.4l2.1-2.1m8.6-8.6 2.1-2.1"/></svg>
      표지 생성하기
    </button>
    <div id="covWrap"></div>`;
  document.getElementById("genBtn").addEventListener("click", () => generateCovers(d));
}
function generateCovers(d){
  const wrap = document.getElementById("covWrap");
  wrap.innerHTML = `<div class="loading"><span class="spin"></span>타이포그래피를 입히는 중…</div>`;
  setTimeout(() => {
    if(currentId !== d.id || currentTab !== "cover") return;
    const title = trimQuote(d.text, 24);
    const lab = "Sentence Lab";
    wrap.innerHTML = `
      <div class="covers">
        <div class="cover cov-a"><div class="cv-lab">${lab}</div><div class="cv-q">${esc(title)}</div><div class="cv-a">${esc(d.author)}</div></div>
        <div class="cover cov-b"><div class="cv-lab">${lab}</div><div class="cv-q">${esc(title)}</div><div class="cv-a">${esc(d.author)}</div></div>
        <div class="cover cov-c"><div class="cv-lab">${lab}</div><div class="cv-q">${esc(title)}</div><div class="cv-a">${esc(d.author)}</div></div>
      </div>
      <div class="cov-tools">
        <button id="reGen">다른 버전</button>
        <button id="saveImg">이미지로 저장</button>
      </div>`;
    document.getElementById("reGen").addEventListener("click", () => { shuffleCovers(); });
    document.getElementById("saveImg").addEventListener("click", () => toast("데모에서는 미리보기만 제공돼요"));
  }, 640);
}
/* 다른 버전: 표지 색/레이아웃 클래스를 순환 */
const COV_CLASSES = ["cov-a","cov-b","cov-c"];
function shuffleCovers(){
  const covers = document.querySelectorAll("#covWrap .cover");
  covers.forEach((c,i) => {
    const cls = COV_CLASSES[(i + 1 + Math.floor(Math.random()*2)) % 3];
    c.className = "cover " + cls;
  });
  toast("새 시안을 뽑았어요");
}

/* ---------- 공유 ---------- */
function share(d){
  const txt = `“${d.text.replace(/\n/g,' ')}” — ${d.author}, 『${d.work}』`;
  if(navigator.share){
    navigator.share({ title:"문장 연구소", text:txt }).catch(()=>{});
  } else if(navigator.clipboard){
    navigator.clipboard.writeText(txt).then(() => toast("문장을 클립보드에 복사했어요")).catch(() => toast("복사에 실패했어요"));
  } else {
    toast("공유를 지원하지 않는 브라우저예요");
  }
}

/* ---------- 토스트 ---------- */
let toastTimer;
function toast(msg){
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2000);
}

/* ---------- 이벤트 바인딩 ---------- */
// 카드 클릭 / 하트
grid.addEventListener("click", e => {
  const heart = e.target.closest("[data-heart]");
  if(heart){ e.stopPropagation(); toggleSave(parseInt(heart.dataset.heart)); return; }
  const card = e.target.closest(".card");
  if(card) openModal(parseInt(card.dataset.id));
});
// 검색
document.getElementById("search").addEventListener("input", e => { state.q = e.target.value; render(); });
// 필터 칩
document.getElementById("chips").addEventListener("click", e => {
  const chip = e.target.closest(".chip");
  if(!chip) return;
  state.filter = chip.dataset.filter;
  document.querySelectorAll(".chip").forEach(c => c.classList.toggle("active", c === chip));
  render();
});
// 내 서재 토글
document.getElementById("libBtn").addEventListener("click", () => {
  state.view = state.view === "library" ? "all" : "library";
  document.getElementById("libBtn").classList.toggle("active", state.view === "library");
  render();
});
// 모달 닫기
document.getElementById("mClose").addEventListener("click", closeModal);
overlay.addEventListener("click", e => { if(e.target === overlay) closeModal(); });
document.addEventListener("keydown", e => { if(e.key === "Escape" && overlay.classList.contains("open")) closeModal(); });

/* ---------- 초기 렌더 ---------- */
render();
</script>
