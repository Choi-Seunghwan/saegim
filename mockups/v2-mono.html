<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>문장 연구소 · Sentence Lab</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css" rel="stylesheet">
<style>
/* ===== V2 · 미니멀 모노 (Quiet Mono) 디자인 토큰 ===== */
:root{
  /* 색 — 무채색 기반 + 단 하나의 절제된 포인트(잉크 블랙) */
  --bg:#ffffff;            /* 화이트 배경 */
  --ink:#111113;           /* 가장 진한 잉크 (제목/문장) */
  --ink-2:#3a3a3d;         /* 본문 보조 */
  --ink-3:#6b6b70;         /* 라벨/메타 */
  --ink-4:#9a9aa0;         /* 더 옅은 힌트 */
  --line:#ececec;          /* 헤어라인 경계 1px */
  --line-2:#e2e2e2;        /* 살짝 강한 경계 */
  --surface:#fafafa;       /* 아주 옅은 면 */
  --surface-2:#f4f4f4;     /* 칩/입력 배경 */
  --accent:#111113;        /* 단 하나의 포인트 = 잉크 블랙(필요 시 활성색) */
  --accent-soft:#f0f0f0;   /* 포인트의 옅은 배경 */
  --heart:#1a1a1d;         /* 저장 활성(채워진 하트) */
  --frame-bg:#e9e9ea;      /* 데스크톱 폰 프레임 바깥 톤 */
  /* 치수 */
  --r-sm:8px;
  --r-md:12px;
  --r-lg:16px;
  --r-pill:999px;
  --tabbar-h:64px;
  --safe-b:env(safe-area-inset-bottom, 0px);
  --ease:cubic-bezier(.22,.61,.36,1);
  --ease-out:cubic-bezier(.16,1,.3,1);
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:'Pretendard',Pretendard,system-ui,-apple-system,sans-serif;
  background:var(--frame-bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  word-break:keep-all;
  overflow-wrap:break-word;
  line-height:1.5;
  display:flex;align-items:center;justify-content:center;
  min-height:100dvh;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,textarea{font-family:inherit;}
:focus-visible{outline:2px solid var(--ink);outline-offset:2px;}
::selection{background:#dcdcdc;}

/* ===== 데스크톱: 폰 프레임 ===== */
.phone{
  position:relative;
  width:390px;height:844px;max-height:100dvh;
  background:var(--bg);
  border-radius:46px;
  box-shadow:0 0 0 11px #111113, 0 30px 70px -20px rgba(0,0,0,.45), 0 8px 24px -10px rgba(0,0,0,.3);
  overflow:hidden;
  display:flex;flex-direction:column;
}
/* 상단 노치/상태바 */
.statusbar{
  flex:0 0 auto;height:50px;
  display:flex;align-items:flex-end;justify-content:space-between;
  padding:0 26px 6px;
  font-size:14px;font-weight:600;color:var(--ink);
  letter-spacing:-.01em;position:relative;z-index:6;
  background:var(--bg);
}
.statusbar .sb-right{display:flex;gap:6px;align-items:center;font-size:13px;}
.statusbar .sb-right .ic{width:17px;height:11px;}
.notch{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:118px;height:30px;background:#111113;border-radius:18px;z-index:5;}

/* ===== 무대(뷰포트) ===== */
.viewport{
  position:relative;flex:1 1 auto;overflow:hidden;background:var(--bg);
}
.screens{position:absolute;inset:0;}
.screen{
  position:absolute;inset:0;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:8px 22px calc(var(--tabbar-h) + 36px + var(--safe-b));
  opacity:0;visibility:hidden;transform:translateY(8px);
  transition:opacity .26s var(--ease), transform .3s var(--ease), visibility .26s;
  scrollbar-width:none;
}
.screen::-webkit-scrollbar{display:none;}
.screen.active{opacity:1;visibility:visible;transform:none;z-index:2;}

/* ===== 공통 타이포 위계 ===== */
.eyebrow{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-4);}
.h-title{font-size:26px;font-weight:700;letter-spacing:-.03em;line-height:1.15;color:var(--ink);}
.label-sm{font-size:12px;font-weight:600;letter-spacing:.02em;color:var(--ink-3);}
.meta{font-size:13px;color:var(--ink-3);letter-spacing:-.01em;}

/* ===== 상단 헤더 영역 ===== */
.head{padding:18px 2px 14px;}
.head .row{display:flex;align-items:baseline;justify-content:space-between;}
.head .date{font-size:12px;font-weight:600;letter-spacing:.06em;color:var(--ink-4);text-transform:uppercase;}

/* ===== 빠른 포착 바 ===== */
.quick-capture{
  width:100%;display:flex;align-items:center;gap:11px;
  background:var(--surface-2);
  border:1px solid var(--line);
  border-radius:var(--r-md);
  padding:14px 16px;margin-top:18px;
  text-align:left;color:var(--ink-3);
  transition:background .18s var(--ease), border-color .18s var(--ease), transform .08s var(--ease);
}
.quick-capture:active{transform:scale(.985);background:#eee;}
.quick-capture .qc-ic{flex:0 0 auto;width:22px;height:22px;color:var(--ink-2);}
.quick-capture .qc-text{font-size:14.5px;font-weight:500;letter-spacing:-.01em;flex:1;}
.quick-capture .qc-kbd{
  font-size:11px;color:var(--ink-4);border:1px solid var(--line-2);
  border-radius:6px;padding:2px 7px;font-weight:600;letter-spacing:.02em;flex:0 0 auto;
}

/* ===== 섹션 타이틀 ===== */
.section{margin-top:30px;}
.section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:13px;}
.section-head h2{font-size:15px;font-weight:600;letter-spacing:-.02em;color:var(--ink);margin:0;}
.section-head .more{font-size:12.5px;color:var(--ink-3);font-weight:500;}

/* ===== 재발견 큰 카드 ===== */
.rediscover{
  border:1px solid var(--line);border-radius:var(--r-lg);
  padding:24px 22px 20px;background:var(--bg);
  position:relative;overflow:hidden;
  transition:transform .12s var(--ease), border-color .2s;
}
.rediscover:active{transform:scale(.99);}
.rediscover .rd-tag{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--ink-3);margin-bottom:18px;
}
.rediscover .rd-tag .dot{width:5px;height:5px;border-radius:50%;background:var(--ink);}
.rediscover .rd-quote{
  font-size:23px;font-weight:600;line-height:1.5;letter-spacing:-.025em;
  color:var(--ink);white-space:pre-line;margin:0 0 20px;
}
.rediscover .rd-foot{display:flex;align-items:center;justify-content:space-between;padding-top:16px;border-top:1px solid var(--line);}
.rediscover .rd-src{font-size:13px;color:var(--ink-3);letter-spacing:-.01em;}
.rediscover .rd-src b{color:var(--ink-2);font-weight:600;}

/* 미니 라인 액션(아이콘 버튼) */
.icon-btn{
  width:38px;height:38px;display:inline-flex;align-items:center;justify-content:center;
  border-radius:var(--r-pill);color:var(--ink-3);
  transition:background .16s var(--ease), color .16s, transform .12s var(--ease);
}
.icon-btn:active{transform:scale(.9);}
.icon-btn svg{width:21px;height:21px;}
.icon-btn.on{color:var(--heart);}

/* ===== 최근 담은 미니 리스트 ===== */
.mini-list{display:flex;flex-direction:column;}
.mini-item{
  display:flex;align-items:flex-start;gap:13px;padding:15px 2px;
  border-top:1px solid var(--line);
  transition:opacity .15s;
}
.mini-item:first-child{border-top:none;}
.mini-item:active{opacity:.6;}
.mini-item .mi-bar{flex:0 0 auto;width:2px;align-self:stretch;background:var(--line-2);border-radius:2px;margin-top:2px;}
.mini-item .mi-body{flex:1;min-width:0;}
.mini-item .mi-text{font-size:14.5px;font-weight:500;line-height:1.45;letter-spacing:-.015em;color:var(--ink);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.mini-item .mi-meta{font-size:12px;color:var(--ink-4);margin-top:5px;letter-spacing:-.01em;}
.mini-item .mi-chev{flex:0 0 auto;color:var(--ink-4);width:16px;height:16px;margin-top:3px;}

/* ===== 발견: 풀 카드 슬라이드 ===== */
.discover-stage{
  position:absolute;inset:0;padding:0;
  scroll-snap-type:y mandatory;overflow-y:auto;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.discover-stage::-webkit-scrollbar{display:none;}
.dcard{
  scroll-snap-align:start;scroll-snap-stop:always;
  height:100%;min-height:100%;
  display:flex;flex-direction:column;justify-content:center;
  padding:64px 32px calc(var(--tabbar-h) + 48px + var(--safe-b));
  position:relative;
}
.dcard .d-theme{
  align-self:flex-start;
  font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
  color:var(--ink-4);border:1px solid var(--line-2);border-radius:var(--r-pill);
  padding:5px 12px;margin-bottom:30px;
}
.dcard .d-quote{
  font-size:30px;font-weight:600;line-height:1.46;letter-spacing:-.03em;
  color:var(--ink);white-space:pre-line;margin:0 0 28px;
}
.dcard .d-meta{display:flex;flex-direction:column;gap:3px;}
.dcard .d-author{font-size:15px;font-weight:600;letter-spacing:-.01em;color:var(--ink-2);}
.dcard .d-work{font-size:13.5px;color:var(--ink-3);letter-spacing:-.01em;}
.dcard .d-actions{
  position:absolute;right:30px;bottom:calc(var(--tabbar-h) + 60px + var(--safe-b));
  display:flex;flex-direction:column;gap:10px;align-items:center;
}
.dcard .d-save{
  width:52px;height:52px;border-radius:var(--r-pill);
  border:1px solid var(--line-2);background:var(--bg);
  display:flex;align-items:center;justify-content:center;color:var(--ink-3);
  transition:transform .14s var(--ease), color .16s, border-color .16s, background .16s;
}
.dcard .d-save svg{width:24px;height:24px;}
.dcard .d-save.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.dcard .d-save:active{transform:scale(.86);}
.dcard .d-count{font-size:11px;font-weight:600;color:var(--ink-4);}
/* 발견 진행 도트 */
.d-progress{
  position:absolute;left:24px;top:0;bottom:0;z-index:4;
  display:flex;flex-direction:column;gap:7px;align-items:center;justify-content:center;
  pointer-events:none;
}
.d-progress .pd{width:5px;height:5px;border-radius:50%;background:var(--line-2);transition:all .3s var(--ease);}
.d-progress .pd.on{background:var(--ink);height:18px;border-radius:3px;}
/* 발견 스크롤 힌트 */
.d-hint{
  position:absolute;left:50%;bottom:calc(var(--tabbar-h) + 56px + var(--safe-b));transform:translateX(-50%);
  font-size:11px;color:var(--ink-4);letter-spacing:.04em;display:flex;flex-direction:column;align-items:center;gap:4px;
  animation:bob 1.8s var(--ease) infinite;pointer-events:none;
}
@keyframes bob{0%,100%{transform:translate(-50%,0);opacity:.55;}50%{transform:translate(-50%,5px);opacity:1;}}

/* ===== 서랍 ===== */
.search-bar{
  display:flex;align-items:center;gap:9px;
  background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-md);
  padding:11px 14px;margin-top:16px;
}
.search-bar svg{width:18px;height:18px;color:var(--ink-4);flex:0 0 auto;}
.search-bar input{
  border:none;background:none;flex:1;font-size:14.5px;color:var(--ink);letter-spacing:-.01em;
}
.search-bar input::placeholder{color:var(--ink-4);}
.search-bar .clr{display:none;color:var(--ink-4);}
.search-bar .clr.show{display:inline-flex;}

.chips{display:flex;gap:8px;margin-top:14px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.chips::-webkit-scrollbar{display:none;}
.chip{
  flex:0 0 auto;font-size:13px;font-weight:600;letter-spacing:-.01em;
  padding:8px 15px;border-radius:var(--r-pill);
  border:1px solid var(--line-2);color:var(--ink-3);background:var(--bg);
  transition:all .16s var(--ease);
}
.chip .ct{font-weight:500;opacity:.65;margin-left:4px;}
.chip:active{transform:scale(.95);}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.chip.on .ct{opacity:.7;}

.drawer-count{font-size:12.5px;color:var(--ink-4);margin:18px 2px 12px;letter-spacing:-.01em;}
.drawer-list{display:flex;flex-direction:column;gap:11px;}
.scard{
  border:1px solid var(--line);border-radius:var(--r-md);
  padding:18px 18px 16px;background:var(--bg);
  transition:transform .12s var(--ease), border-color .18s;
}
.scard:active{transform:scale(.99);border-color:var(--line-2);}
.scard .sc-quote{font-size:16.5px;font-weight:600;line-height:1.5;letter-spacing:-.02em;color:var(--ink);
  white-space:pre-line;margin:0 0 14px;}
.scard .sc-foot{display:flex;align-items:center;justify-content:space-between;}
.scard .sc-src{font-size:12.5px;color:var(--ink-3);letter-spacing:-.01em;min-width:0;}
.scard .sc-src b{color:var(--ink-2);font-weight:600;}
.scard .sc-badge{
  flex:0 0 auto;font-size:10.5px;font-weight:600;letter-spacing:.03em;
  padding:3px 9px;border-radius:var(--r-pill);background:var(--surface-2);color:var(--ink-3);
}
.scard .sc-badge.cap{background:#111113;color:#fff;}

/* 서랍 빈 상태 */
.empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  padding:64px 30px;color:var(--ink-4);
}
.empty svg{width:34px;height:34px;margin-bottom:14px;color:var(--line-2);}
.empty .e-title{font-size:14.5px;font-weight:600;color:var(--ink-3);margin-bottom:5px;letter-spacing:-.01em;}
.empty .e-sub{font-size:13px;color:var(--ink-4);letter-spacing:-.01em;}

/* ===== 하단 탭바 ===== */
.tabbar{
  position:absolute;left:0;right:0;bottom:0;z-index:20;
  height:calc(var(--tabbar-h) + var(--safe-b));
  padding-bottom:var(--safe-b);
  background:rgba(255,255,255,.86);
  backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:1px solid var(--line);
  display:flex;align-items:stretch;
}
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  color:var(--ink-4);transition:color .16s var(--ease);position:relative;
}
.tab svg{width:23px;height:23px;transition:transform .18s var(--ease);}
.tab .tl{font-size:10px;font-weight:600;letter-spacing:.01em;}
.tab.active{color:var(--ink);}
.tab.active svg{transform:translateY(-1px);}
.tab:active svg{transform:scale(.88);}
.tab.spacer{flex:0 0 76px;pointer-events:none;}

/* FAB — 떠 있는 포착 버튼 */
.fab{
  position:absolute;left:50%;transform:translateX(-50%);
  bottom:calc(var(--tabbar-h) - 26px + var(--safe-b));
  z-index:25;width:58px;height:58px;border-radius:var(--r-pill);
  background:var(--ink);color:#fff;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 18px -6px rgba(0,0,0,.5), 0 2px 6px -2px rgba(0,0,0,.4);
  transition:transform .16s var(--ease-out);
}
.fab svg{width:26px;height:26px;}
.fab:active{transform:translateX(-50%) scale(.9);}

/* ===== 바텀시트 (포착 / 상세 공용 메커니즘) ===== */
.scrim{
  position:absolute;inset:0;z-index:40;background:rgba(17,17,19,.32);
  opacity:0;visibility:hidden;transition:opacity .3s var(--ease), visibility .3s;
  -webkit-backdrop-filter:blur(1px);backdrop-filter:blur(1px);
}
.scrim.show{opacity:1;visibility:visible;}
.sheet{
  position:absolute;left:0;right:0;bottom:0;z-index:50;
  background:var(--bg);
  border-radius:22px 22px 0 0;
  box-shadow:0 -12px 40px -12px rgba(0,0,0,.28);
  transform:translateY(100%);
  transition:transform .4s var(--ease-out);
  max-height:92%;display:flex;flex-direction:column;
  padding-bottom:var(--safe-b);
}
.sheet.show{transform:translateY(0);}
.sheet .grabber{width:38px;height:4px;border-radius:2px;background:var(--line-2);margin:10px auto 4px;flex:0 0 auto;}
.sheet-scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:6px 22px 22px;scrollbar-width:none;}
.sheet-scroll::-webkit-scrollbar{display:none;}
.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:8px 0 18px;}
.sheet-head h3{font-size:17px;font-weight:700;letter-spacing:-.02em;margin:0;color:var(--ink);}
.sheet-head .x{width:34px;height:34px;border-radius:var(--r-pill);display:flex;align-items:center;justify-content:center;color:var(--ink-3);background:var(--surface-2);}
.sheet-head .x svg{width:18px;height:18px;}

/* 포착 폼 */
.field{margin-bottom:18px;}
.field > .field-label{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;letter-spacing:.02em;color:var(--ink-3);margin-bottom:9px;}
.field > .field-label .opt{font-weight:500;color:var(--ink-4);}
textarea.cap-text{
  width:100%;min-height:128px;resize:none;
  border:1px solid var(--line-2);border-radius:var(--r-md);
  padding:15px 16px;font-size:18px;font-weight:500;line-height:1.55;letter-spacing:-.02em;
  color:var(--ink);background:var(--bg);transition:border-color .18s var(--ease);
}
textarea.cap-text::placeholder{color:var(--ink-4);font-weight:400;}
textarea.cap-text:focus{outline:none;border-color:var(--ink);}
.src-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.src-grid .src-full{grid-column:1 / -1;}
input.cap-input{
  width:100%;border:1px solid var(--line-2);border-radius:var(--r-md);
  padding:12px 14px;font-size:14.5px;letter-spacing:-.01em;color:var(--ink);background:var(--bg);
  transition:border-color .18s var(--ease);
}
input.cap-input::placeholder{color:var(--ink-4);}
input.cap-input:focus{outline:none;border-color:var(--ink);}
/* 출처 자동 인식 힌트 */
.src-detect{
  display:none;align-items:center;gap:8px;margin-top:10px;
  font-size:12px;color:var(--ink-2);background:var(--surface-2);
  border:1px solid var(--line);border-radius:var(--r-sm);padding:9px 12px;
  animation:fadeUp .35s var(--ease);
}
.src-detect.show{display:flex;}
.src-detect svg{width:15px;height:15px;flex:0 0 auto;color:var(--ink);}
.src-detect b{font-weight:600;color:var(--ink);}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

/* 태그 칩 입력 */
.tag-input-wrap{
  display:flex;flex-wrap:wrap;gap:7px;align-items:center;
  border:1px solid var(--line-2);border-radius:var(--r-md);padding:9px 10px;min-height:46px;
  transition:border-color .18s var(--ease);
}
.tag-input-wrap:focus-within{border-color:var(--ink);}
.tag-chip{
  display:inline-flex;align-items:center;gap:5px;
  font-size:12.5px;font-weight:500;letter-spacing:-.01em;
  background:var(--ink);color:#fff;border-radius:var(--r-pill);padding:5px 7px 5px 11px;
  animation:pop .2s var(--ease-out);
}
@keyframes pop{from{transform:scale(.8);opacity:0;}to{transform:scale(1);opacity:1;}}
.tag-chip .tx{display:flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;background:rgba(255,255,255,.2);}
.tag-chip .tx svg{width:9px;height:9px;}
.tag-input-wrap input{border:none;background:none;flex:1;min-width:80px;font-size:14px;color:var(--ink);letter-spacing:-.01em;padding:4px 2px;}
.tag-input-wrap input::placeholder{color:var(--ink-4);}
.tag-suggest{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px;}
.tag-suggest .ts-chip{font-size:12px;font-weight:500;color:var(--ink-3);border:1px solid var(--line-2);border-radius:var(--r-pill);padding:5px 11px;transition:all .14s var(--ease);}
.tag-suggest .ts-chip:active{background:var(--surface-2);}

/* 시트 하단 버튼 */
.sheet-foot{padding:14px 22px calc(16px + var(--safe-b));border-top:1px solid var(--line);background:var(--bg);}
.btn-primary{
  width:100%;height:52px;border-radius:var(--r-md);
  background:var(--ink);color:#fff;font-size:15.5px;font-weight:600;letter-spacing:-.01em;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:transform .12s var(--ease), opacity .18s;
}
.btn-primary svg{width:18px;height:18px;}
.btn-primary:active{transform:scale(.985);}
.btn-primary:disabled{opacity:.4;}

/* ===== 문장 상세 시트 ===== */
.detail .sheet-scroll{padding-top:14px;}
.detail-theme{
  display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;
  letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);margin-bottom:22px;
}
.detail-theme .dot{width:5px;height:5px;border-radius:50%;background:var(--ink);}
.detail-quote{
  font-size:27px;font-weight:600;line-height:1.5;letter-spacing:-.03em;color:var(--ink);
  white-space:pre-line;margin:0 0 26px;
}
.detail-src{padding:18px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);}
.detail-src .ds-row{display:flex;align-items:baseline;gap:12px;padding:5px 0;}
.detail-src .ds-k{flex:0 0 56px;font-size:12px;font-weight:600;color:var(--ink-4);letter-spacing:.02em;}
.detail-src .ds-v{font-size:14px;color:var(--ink-2);letter-spacing:-.01em;font-weight:500;}
.detail-tags{display:flex;gap:7px;flex-wrap:wrap;margin-top:16px;}
.detail-tags .dt{font-size:12px;font-weight:500;color:var(--ink-3);background:var(--surface-2);border-radius:var(--r-pill);padding:5px 12px;letter-spacing:-.01em;}

/* AI 유사 추천 */
.sim-block{margin-top:28px;}
.sim-head{display:flex;align-items:center;gap:7px;margin-bottom:13px;}
.sim-head svg{width:15px;height:15px;color:var(--ink-2);}
.sim-head h4{font-size:13px;font-weight:600;letter-spacing:-.01em;color:var(--ink);margin:0;}
.sim-head .sim-tag{font-size:10.5px;font-weight:600;letter-spacing:.04em;color:var(--ink-4);border:1px solid var(--line-2);border-radius:var(--r-pill);padding:2px 8px;}
.sim-list{display:flex;flex-direction:column;gap:10px;}
.sim-card{
  border:1px solid var(--line);border-radius:var(--r-md);padding:15px 16px;background:var(--surface);
  transition:transform .12s var(--ease), background .16s;
}
.sim-card:active{transform:scale(.99);background:#f1f1f1;}
.sim-card .sm-quote{font-size:14.5px;font-weight:500;line-height:1.5;letter-spacing:-.015em;color:var(--ink-2);
  white-space:pre-line;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin:0 0 8px;}
.sim-card .sm-meta{display:flex;align-items:center;justify-content:space-between;}
.sim-card .sm-src{font-size:11.5px;color:var(--ink-4);letter-spacing:-.01em;}
.sim-card .sm-arrow{color:var(--ink-4);width:15px;height:15px;}

/* 상세 하단 액션바 */
.detail-foot{
  padding:12px 22px calc(14px + var(--safe-b));border-top:1px solid var(--line);
  display:flex;gap:10px;background:var(--bg);
}
.detail-foot .act{
  flex:1;height:50px;border-radius:var(--r-md);border:1px solid var(--line-2);
  display:flex;align-items:center;justify-content:center;gap:8px;
  font-size:14px;font-weight:600;letter-spacing:-.01em;color:var(--ink-2);
  transition:transform .12s var(--ease), background .16s, color .16s, border-color .16s;
}
.detail-foot .act svg{width:18px;height:18px;}
.detail-foot .act:active{transform:scale(.98);}
.detail-foot .act.save.on{background:var(--ink);color:#fff;border-color:var(--ink);}

/* ===== 토스트 ===== */
.toast-wrap{
  position:absolute;left:0;right:0;bottom:calc(var(--tabbar-h) + 22px + var(--safe-b));
  z-index:60;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;padding:0 22px;
}
.toast{
  display:flex;align-items:center;gap:10px;
  background:var(--ink);color:#fff;border-radius:var(--r-pill);
  padding:12px 18px;font-size:13.5px;font-weight:500;letter-spacing:-.01em;
  box-shadow:0 8px 24px -8px rgba(0,0,0,.5);
  transform:translateY(16px) scale(.96);opacity:0;
  transition:transform .34s var(--ease-out), opacity .3s;max-width:100%;
}
.toast.show{transform:none;opacity:1;}
.toast svg{width:17px;height:17px;flex:0 0 auto;}

/* ===== 모바일: 프레임 제거, 풀스크린 ===== */
@media (max-width:430px){
  body{background:var(--bg);align-items:stretch;}

  }

  .viewport{padding-top:env(safe-area-inset-top,0px);}
}

@media (min-width:431px){
  .viewport{border-top:1px solid var(--line);}
}

<script>
/* ============================================================
   문장 연구소 V2 — 미니멀 모노 프로토타입 로직
   ============================================================ */

/* ---------- 시드 데이터 (큐레이션 10개) ---------- */
const SEED = [
  {id:1,text:"죽는 날까지 하늘을 우러러\n한 점 부끄럼이 없기를",author:"윤동주",work:"하늘과 바람과 별과 시",year:"1948",theme:"성찰",keywords:["부끄러움","양심","바람"]},
  {id:2,text:"나 보기가 역겨워 가실 때에는\n말없이 고이 보내 드리오리다",author:"김소월",work:"진달래꽃",year:"1925",theme:"이별",keywords:["이별","체념","헌신"]},
  {id:3,text:"우리는 만날 때에 떠날 것을 염려하는 것과 같이,\n떠날 때에 다시 만날 것을 믿습니다",author:"한용운",work:"님의 침묵",year:"1926",theme:"이별",keywords:["만남","이별","믿음"]},
  {id:4,text:"다시 천고의 뒤에\n백마 타고 오는 초인이 있어",author:"이육사",work:"광야",year:"1945",theme:"의지",keywords:["초인","미래","희생"]},
  {id:5,text:"박제가 되어 버린 천재를 아시오?",author:"이상",work:"날개",year:"1936",theme:"자의식",keywords:["천재","권태","근대"]},
  {id:6,text:"계절이 지나가는 하늘에는\n가을로 가득 차 있습니다",author:"윤동주",work:"하늘과 바람과 별과 시",year:"1948",theme:"자연",keywords:["가을","하늘","그리움"]},
  {id:7,text:"하루라도 책을 읽지 않으면\n입안에 가시가 돋는다",author:"안중근",work:"유묵",year:"1910",theme:"배움",keywords:["독서","수양","단련"]},
  {id:8,text:"천 리 길도\n한 걸음에서 시작된다",author:"노자",work:"도덕경",year:"고전",theme:"배움",keywords:["시작","한걸음","축적"]},
  {id:9,text:"문장은 끝내기 위해서가 아니라,\n멈추는 법을 배우기 위해 쓴다",author:"새김 편집부",work:"쉼표의 자리",year:"2024",theme:"쓰기",keywords:["문장","멈춤","여백"]},
  {id:10,text:"모든 책은 첫 문장에서 한 번,\n마지막 문장에서 다시 태어난다",author:"새김 편집부",work:"첫 문장의 무게",year:"2025",theme:"쓰기",keywords:["첫문장","끝문장","탄생"]}
];

/* ---------- 상태(서랍) — localStorage 영속 ---------- */
const LS_KEY = 'sentence-lab-v2-drawer';
/* 서랍 아이템 구조: {uid, srcId(시드면 id, 직접이면 null), text, author, work, year, theme, keywords[], origin:'discover'|'capture', addedAt} */

// 처음 시작: 샘플 3개 (발견에서 저장한 것처럼)
function defaultDrawer(){
  const pick = [2, 7, 10]; // 진달래꽃 · 안중근 · 첫 문장의 무게
  return pick.map((sid, i)=>{
    const s = SEED.find(x=>x.id===sid);
    return seedToItem(s, 'discover', Date.now() - (i+2)*86400000);
  });
}
function seedToItem(s, origin, ts){
  return {uid:'s'+s.id+'-'+Math.random().toString(36).slice(2,6), srcId:s.id, text:s.text, author:s.author, work:s.work, year:s.year, theme:s.theme, keywords:[...s.keywords], origin, addedAt:ts||Date.now()};
}
let drawer = loadDrawer();
function loadDrawer(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw){const d = JSON.parse(raw); if(Array.isArray(d) && d.length) return d;}
  }catch(e){}
  const d = defaultDrawer();
  saveDrawer(d);
  return d;
}
function saveDrawer(d){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(d||drawer)); }catch(e){}
}
// 시드가 서랍에 저장돼 있는지(발견 하트 상태용)
function isSeedSaved(seedId){ return drawer.some(it=>it.srcId===seedId); }

/* ---------- 화면 전환 ---------- */
let currentScreen = 'home';
function go(name){
  if(name === currentScreen && name !== 'discover'){ return; }
  document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('active', s.dataset.screen===name));
  document.querySelectorAll('.tab[data-tab]').forEach(t=>t.classList.toggle('active', t.dataset.tab===name));

  if(name==='drawer') renderDrawer();
  if(name==='discover') ensureDiscover();

/* ---------- 토스트 ---------- */
let toastTimer = null;
function toast(msg, icon){
  const wrap = document.getElementById('toast-wrap');
  wrap.innerHTML = '';
  const t = document.createElement('div');
  t.className = 'toast';
  const ic = icon || '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';
  t.innerHTML = ic + '<span>'+msg+'</span>';
  wrap.appendChild(t);
  requestAnimationFrame(()=> requestAnimationFrame(()=> t.classList.add('show')));
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ t.classList.remove('show'); setTimeout(()=>t.remove(), 350); }, 2100);
}

/* ---------- 유틸 ---------- */
function esc(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function srcLine(it){
  // "저자 · 작품" 형태 (있는 것만)
  const parts = [];
  if(it.author) parts.push('<b>'+esc(it.author)+'</b>');
  if(it.work) parts.push(esc(it.work));
  return parts.join(' · ') || '직접 기록';
}
function originBadge(origin){
  return origin==='capture'
    ? '<span class="sc-badge cap">직접</span>'
    : '<span class="sc-badge">발견</span>';
}

/* ============================================================
   2) 발견 — 풀스크린 세로 스냅
   ============================================================ */
let discoverBuilt = false;
let discoverObserver = null;
function ensureDiscover(){
  if(discoverBuilt){ refreshDiscoverHearts(); return; }
  const host = document.getElementById('screen-discover');
  host.style.padding = '0';
  host.style.overflow = 'hidden';

  const stage = document.createElement('div');
  stage.className = 'discover-stage';
  stage.id = 'discover-stage';

  // 진행 도트
  const prog = document.createElement('div');
  prog.className = 'd-progress';
  prog.id = 'd-progress';
  prog.innerHTML = SEED.map((_,i)=>'<span class="pd'+(i===0?' on':'')+'"></span>').join('');

  stage.innerHTML = SEED.map((s, i)=>{
    const saved = isSeedSaved(s.id);
    return '<article class="dcard" data-seed="'+s.id+'" data-idx="'+i+'">'
      + '<span class="d-theme">'+esc(s.theme)+'</span>'
      + '<p class="d-quote">'+esc(s.text)+'</p>'
      + '<div class="d-meta"><span class="d-author">'+esc(s.author)+'</span>'
      + '<span class="d-work">'+esc(s.work)+' · '+esc(s.year)+'</span></div>'
      + '<div class="d-actions">'
      +   '<button class="d-save'+(saved?' on':'')+'" data-seed="'+s.id+'" aria-label="저장">'
      +     '<svg viewBox="0 0 24 24" fill="'+(saved?'currentColor':'none')+'" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7.5-4.6-10-9.2C.3 8.4 1.8 4.5 5.4 4.5c2 0 3.4 1.1 4.6 2.6 1.2-1.5 2.6-2.6 4.6-2.6 3.6 0 5.1 3.9 3.4 7.3C19.5 16.4 12 21 12 21z"/></svg>'
      +   '</button>'
      + '</div>'
      + (i===0 ? '<div class="d-hint">위로 넘겨보세요<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="m6 15 6-6 6 6"/></svg></div>' : '')
      + '</article>';
  }).join('');

  host.appendChild(prog);
  host.appendChild(stage);

  // 카드 탭 → 상세 / 저장 버튼
  stage.querySelectorAll('.dcard').forEach(card=>{
    card.addEventListener('click', (e)=>{
      if(e.target.closest('.d-save')) return;
      const s = SEED.find(x=>x.id===+card.dataset.seed);
      openDetail(seedToItem(s,'discover'), {fromDrawer:false, seedId:s.id});
    });
  });
  stage.querySelectorAll('.d-save').forEach(btn=>{
    btn.addEventListener('click', (e)=>{ e.stopPropagation(); toggleSeedSave(+btn.dataset.seed, btn); });
  });

  // 진행 도트 동기화 (IntersectionObserver)
  const dots = prog.querySelectorAll('.pd');
  discoverObserver = new IntersectionObserver((entries)=>{
    entries.forEach(en=>{
      if(en.isIntersecting && en.intersectionRatio>0.6){
        const idx = +en.target.dataset.idx;
        dots.forEach((d,i)=>d.classList.toggle('on', i===idx));
        // 첫 카드 벗어나면 힌트 숨김
        const hint = stage.querySelector('.d-hint');
        if(hint && idx>0) hint.style.opacity='0';
      }
    });
  }, {root:stage, threshold:[0.6]});
  stage.querySelectorAll('.dcard').forEach(c=>discoverObserver.observe(c));

  discoverBuilt = true;
}
function refreshDiscoverHearts(){
  document.querySelectorAll('.d-save').forEach(btn=>{
    const saved = isSeedSaved(+btn.dataset.seed);
    btn.classList.toggle('on', saved);
    const path = btn.querySelector('path');
    if(path) path.setAttribute('fill', saved?'currentColor':'none');
    btn.querySelector('svg').setAttribute('fill', saved?'currentColor':'none');
  });
}
function toggleSeedSave(seedId, btn){
  const existing = drawer.find(it=>it.srcId===seedId);
  if(existing){
    // 저장 해제
    drawer = drawer.filter(it=>it.uid!==existing.uid);
    saveDrawer();
    setHeartBtn(btn, false);
    toast('서랍에서 뺐어요', '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/></svg>');
  }else{
    const s = SEED.find(x=>x.id===seedId);
    drawer.unshift(seedToItem(s,'discover'));
    saveDrawer();
    setHeartBtn(btn, true);
    if(btn){ btn.animate([{transform:'scale(1)'},{transform:'scale(1.25)'},{transform:'scale(1)'}], {duration:300, easing:'cubic-bezier(.16,1,.3,1)'}); }
    toast('서랍에 담았어요');
  }
  updateCounts();
}
function setHeartBtn(btn, on){
  if(!btn) return;
  btn.classList.toggle('on', on);
  const svg = btn.querySelector('svg');
  svg.setAttribute('fill', on?'currentColor':'none');
}

   3) 서랍 렌더 + 검색/필터

let drawerFilter = 'all';
let drawerQuery = '';
function renderDrawer(){
  updateCounts();
  const list = document.getElementById('drawer-list');
  let items = [...drawer].sort((a,b)=>b.addedAt-a.addedAt);
  if(drawerFilter!=='all') items = items.filter(it=>it.origin===drawerFilter);
  if(drawerQuery){
    const q = drawerQuery.toLowerCase();
    items = items.filter(it=>{
      return (it.text+it.author+it.work+(it.keywords||[]).join('')).toLowerCase().includes(q);
    });
  }
  document.getElementById('drawer-count').textContent = '문장 '+items.length+'개';

  if(!items.length){
    list.innerHTML = '<div class="empty">'
      + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 10h18"/><path d="M10 7h4"/></svg>'
      + '<div class="e-title">'+(drawerQuery?'검색 결과가 없어요':'서랍이 비어 있어요')+'</div>'
      + '<div class="e-sub">'+(drawerQuery?'다른 단어로 찾아보세요':'발견에서 마음에 드는 문장을 담아보세요')+'</div>'
      + '</div>';

  }
  list.innerHTML = items.map(it=>{
    return '<article class="scard" data-uid="'+it.uid+'">'
      + '<p class="sc-quote">'+esc(it.text)+'</p>'
      + '<div class="sc-foot"><span class="sc-src">'+srcLine(it)+'</span>'+originBadge(it.origin)+'</div>'
      + '</article>';

    el.onclick = ()=>{

}
function updateCounts(){
  document.getElementById('ct-all').textContent = drawer.length;
  document.getElementById('ct-capture').textContent = drawer.filter(it=>it.origin==='capture').length;
  document.getElementById('ct-discover').textContent = drawer.filter(it=>it.origin==='discover').length;
}

document.getElementById('drawer-chips').addEventListener('click', (e)=>{

const captureSheet = document.getElementById('capture-sheet');
const captureScrim = document.getElementById('capture-scrim');
let captureTags = [];

function openCapture(){
  // 초기화
  document.getElementById('cap-text').value='';

  document.getElementById('cap-url').value='';

// 출처 자동 인식 (URL 입력 시 도메인 → 그럴듯한 출처 추정 시뮬레이션)
const KNOWN_SRC = {
  'wikisource':'위키문헌', 'wikipedia':'위키백과', 'brunch':'브런치',
  'blog.naver':'네이버 블로그', 'naver':'네이버', 'medium':'Medium',
  'tistory':'티스토리', 'velog':'velog', 'youtube':'YouTube', 'youtu.be':'YouTube',
  'gutenberg':'Project Gutenberg', 'ridibooks':'리디북스', 'millie':'밀리의 서재'
};
const capUrl = document.getElementById('cap-url');
capUrl.addEventListener('input', ()=>{
  const v = capUrl.value.trim().toLowerCase();
  const detect = document.getElementById('src-detect');
  if(!v || !/[a-z]/.test(v)){ detect.classList.remove('show'); return; }
  let label = null;
  for(const k in KNOWN_SRC){ if(v.includes(k)){ label = KNOWN_SRC[k]; break; } }
  if(!label){
    // 도메인 추출
    const m = v.replace(/^https?:\/\//,'').match(/^([^\/]+)/);
    if(m){ label = m[1].replace(/^www\./,''); }
  }
  if(label){
    document.getElementById('src-detect-text').innerHTML = '출처를 인식했어요 · <b>'+esc(label)+'</b>';
    detect.classList.add('show');
    // 작품 칸이 비어 있으면 자동 채움 느낌
    const workEl = document.getElementById('cap-work');
    if(!workEl.value){ workEl.value = label; }
  }else{
    detect.classList.remove('show');
  }
});

// 태그 입력
const tagInput = document.getElementById('tag-input');
const tagWrap = document.getElementById('tag-wrap');
tagInput.addEventListener('keydown', (e)=>{
  if(e.key==='Enter' || e.key===',' ){
    e.preventDefault();
    addTag(tagInput.value);
    tagInput.value='';
  }else if(e.key==='Backspace' && !tagInput.value && captureTags.length){
    captureTags.pop(); renderTagChips(); renderTagSuggest();
  }
});
tagWrap.addEventListener('click', ()=>tagInput.focus());
function addTag(raw){
  const t = (raw||'').trim().replace(/^#/,'');
  if(!t || captureTags.includes(t) || captureTags.length>=6) return;
  captureTags.push(t);
  renderTagChips(); renderTagSuggest();
}
function renderTagChips(){
  // 입력 칸 앞에 칩들 삽입
  tagWrap.querySelectorAll('.tag-chip').forEach(c=>c.remove());
  captureTags.forEach((t, i)=>{
    const chip = document.createElement('span');
    chip.className='tag-chip';
    chip.innerHTML = esc(t)+'<span class="tx" data-i="'+i+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></span>';
    tagWrap.insertBefore(chip, tagInput);
    chip.querySelector('.tx').onclick = (e)=>{ e.stopPropagation(); captureTags.splice(i,1); renderTagChips(); renderTagSuggest(); };
  });
}
const TAG_POOL = ['성찰','이별','자연','배움','쓰기','의지','위로','문장','오늘','책'];
function renderTagSuggest(){
  const box = document.getElementById('tag-suggest');
  const avail = TAG_POOL.filter(t=>!captureTags.includes(t)).slice(0,6);
  box.innerHTML = avail.map(t=>'<button class="ts-chip" data-t="'+esc(t)+'"># '+esc(t)+'</button>').join('');
  box.querySelectorAll('.ts-chip').forEach(b=>b.onclick=()=>{ addTag(b.dataset.t); });
}

const capText = document.getElementById('cap-text');
capText.addEventListener('input', updateCaptureSubmit);
function updateCaptureSubmit(){

}
// 담기 실행
document.getElementById('cap-submit').addEventListener('click', ()=>{

/* ============================================================
   5) 문장 상세 시트 + AI 유사 추천
   ============================================================ */
const detailSheet = document.getElementById('detail-sheet');
const detailScrim = document.getElementById('detail-scrim');
let detailCtx = null; // {item, fromDrawer, seedId}

function openDetail(item, ctx){
  detailCtx = Object.assign({item, fromDrawer:false, seedId:item.srcId||null}, ctx||{});
  document.getElementById('detail-theme-label').textContent = item.theme || '문장';
  document.getElementById('detail-quote').textContent = item.text;

  // 출처 표
  const rows = [];
  if(item.author) rows.push(['저자', item.author]);
  if(item.work) rows.push(['출처', item.work + (item.year?' ('+item.year+')':'')]);
  if(!item.author && !item.work) rows.push(['출처', item.origin==='capture'?'직접 기록':'큐레이션']);
  document.getElementById('detail-src').innerHTML = rows.map(r=>
    '<div class="ds-row"><span class="ds-k">'+esc(r[0])+'</span><span class="ds-v">'+esc(r[1])+'</span></div>'
  ).join('');

  // 태그
  const tags = (item.keywords && item.keywords.length) ? item.keywords : (item.theme?[item.theme]:[]);
  const tagBox = document.getElementById('detail-tags');
  tagBox.innerHTML = tags.map(t=>'<span class="dt"># '+esc(t)+'</span>').join('');
  tagBox.style.display = tags.length?'flex':'none';

  // 저장 버튼 상태
  syncDetailSave();

  // AI 유사 추천 — 같은 theme 우선, 부족하면 keyword 겹침
  renderSimilar(item);

  openSheet(detailSheet, detailScrim);
}
function closeDetail(){ closeSheet(detailSheet, detailScrim); }

function syncDetailSave(){
  const it = detailCtx.item;
  // 서랍 안의 항목이거나, 같은 시드가 저장돼 있으면 on
  const saved = it.srcId!=null ? isSeedSaved(it.srcId) : drawer.some(x=>x.uid===it.uid);
  const btn = document.getElementById('detail-save');
  btn.classList.toggle('on', saved);
  document.getElementById('detail-save-label').textContent = saved ? '서랍에 저장됨' : '서랍에 저장';
  const path = btn.querySelector('path');
  path.setAttribute('fill', saved?'currentColor':'none');
}

function renderSimilar(item){
  const baseId = item.srcId;
  // 후보: 자기 자신 제외
  let pool = SEED.filter(s=>s.id!==baseId);
  // 점수: 같은 theme = +3, keyword 겹침 = +1 each
  const kw = new Set(item.keywords||[]);
  const scored = pool.map(s=>{
    let sc = 0;
    if(s.theme===item.theme) sc += 3;
    s.keywords.forEach(k=>{ if(kw.has(k)) sc += 1; });
    return {s, sc};
  }).sort((a,b)=> b.sc-a.sc || Math.random()-0.5);
  const picks = scored.slice(0,2).map(x=>x.s);

  const box = document.getElementById('sim-list');
  box.innerHTML = picks.map(s=>{
    const oneline = s.text.replace(/\n/g,' ');
    return '<article class="sim-card" data-seed="'+s.id+'">'
      + '<p class="sm-quote">'+esc(oneline)+'</p>'
      + '<div class="sm-meta"><span class="sm-src">'+esc(s.author)+' · '+esc(s.work)+'</span>'
      + '<svg class="sm-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M9 7h8v8"/></svg></div>'
      + '</article>';
  }).join('');
  box.querySelectorAll('.sim-card').forEach(el=>{
    el.onclick = ()=>{
      const s = SEED.find(x=>x.id===+el.dataset.seed);
      // 현재 상세를 새 문장으로 교체 (살짝 전환)
      const scrollEl = detailSheet.querySelector('.sheet-scroll');
      scrollEl.style.transition='opacity .16s';
      scrollEl.style.opacity='0';
      setTimeout(()=>{
        openDetail(seedToItem(s,'discover'), {fromDrawer:false, seedId:s.id});
        scrollEl.scrollTop=0;
        scrollEl.style.opacity='1';
      }, 160);
    };
  });
}

// 상세 저장 토글
document.getElementById('detail-save').addEventListener('click', ()=>{
  const it = detailCtx.item;
  if(it.srcId!=null){
    // 시드 기반
    const existing = drawer.find(x=>x.srcId===it.srcId);
    if(existing){
      drawer = drawer.filter(x=>x.uid!==existing.uid);
      toast('서랍에서 뺐어요','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14"/></svg>');
    }else{
      const s = SEED.find(x=>x.id===it.srcId);
      drawer.unshift(seedToItem(s,'discover'));
      toast('서랍에 담았어요');
    }
  }else{
    // 직접 기록 항목(이미 서랍에 있음) — 토글로 제거/복원
    const existing = drawer.find(x=>x.uid===it.uid);
    if(existing){
      drawer = drawer.filter(x=>x.uid!==it.uid);
      toast('서랍에서 뺐어요','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14"/></svg>');
    }else{
      drawer.unshift(it);
      toast('서랍에 담았어요');
    }
  }
  saveDrawer();
  updateCounts();
  syncDetailSave();
  refreshDiscoverHearts();
  if(currentScreen==='drawer') renderDrawer();
  if(currentScreen==='home') renderHome();
  const btn = document.getElementById('detail-save');
  btn.animate([{transform:'scale(1)'},{transform:'scale(1.04)'},{transform:'scale(1)'}],{duration:240,easing:'cubic-bezier(.16,1,.3,1)'});
});
// 공유 (목업)

});

/* ============================================================
   시트 공용 열기/닫기 + 드래그 닫기
   ============================================================ */
function openSheet(sheet, scrim){
  scrim.classList.add('show');
  requestAnimationFrame(()=> sheet.classList.add('show'));
}
function closeSheet(sheet, scrim){
  sheet.classList.remove('show');
  scrim.classList.remove('show');
  // 드래그 변환 초기화
  sheet.style.transform='';
}
// 스크림/닫기 버튼 바인딩
document.getElementById('capture-scrim').addEventListener('click', closeCapture);
document.getElementById('capture-close').addEventListener('click', closeCapture);
document.getElementById('detail-scrim').addEventListener('click', closeDetail);
document.getElementById('detail-close').addEventListener('click', closeDetail);

// 그래버 드래그로 닫기
function enableDragClose(sheet, scrim, onClose){
  const grabber = sheet.querySelector('.grabber');
  let startY=0, cur=0, dragging=false;
  const onDown = (y)=>{ startY=y; dragging=true; sheet.style.transition='none'; };
  const onMove = (y)=>{
    if(!dragging) return;
    cur = Math.max(0, y-startY);
    sheet.style.transform = 'translateY('+cur+'px)';
    scrim.style.opacity = String(Math.max(0, 1 - cur/400));
  };
  const onUp = ()=>{
    if(!dragging) return; dragging=false;
    sheet.style.transition='';
    scrim.style.opacity='';
    if(cur>110){ onClose(); } else { sheet.style.transform=''; }
    cur=0;
  };
  grabber.addEventListener('touchstart', e=>onDown(e.touches[0].clientY), {passive:true});
  grabber.addEventListener('touchmove', e=>onMove(e.touches[0].clientY), {passive:true});
  grabber.addEventListener('touchend', onUp);
  grabber.addEventListener('mousedown', e=>{ onDown(e.clientY);
    const mm=ev=>onMove(ev.clientY); const mu=()=>{onUp();document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};
    document.addEventListener('mousemove',mm); document.addEventListener('mouseup',mu);
  });
}
enableDragClose(captureSheet, captureScrim, closeCapture);
enableDragClose(detailSheet, detailScrim, closeDetail);

(function clock(){
  const el = document.getElementById('clock');
  function tick(){
    const n = new Date();
    el.textContent = n.getHours()+':'+String(n.getMinutes()).padStart(2,'0');
  }
  tick(); setInterval(tick, 10000);
})();
