<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<title>문장 연구소 — 다크 무대</title>
<!-- 폰트는 Pretendard 하나만 외부 의존 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css" />
<style>
/* =========================================================
   문장 연구소 (Sentence Lab) — V3 "다크 무대 · 몰입(Dark Stage)"
   밤에 펼치는 문장 극장. 단일 HTML, 바닐라 JS, 모바일 우선.
   ========================================================= */

/* ===== 리셋 ===== */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  /* --- 다크 무대 팔레트 --- */
  --bg-0:#0e0e10;          /* 가장 깊은 배경 */
  --bg-1:#16161a;          /* 카드/표면 */
  --bg-2:#1d1d22;          /* 떠 있는 표면 */
  --bg-3:#26262d;          /* 입력/칩 */
  --line:rgba(244,239,230,0.09);   /* 보더 */
  --line-soft:rgba(244,239,230,0.055);

  /* --- 잉크(글씨) --- */
  --ink:#f4efe6;
  --ink-soft:rgba(244,239,230,0.66);
  --ink-faint:rgba(244,239,230,0.40);
  --ink-ghost:rgba(244,239,230,0.18);

  /* --- 포인트: 은은한 금빛 --- */
  --gold:#e9c789;
  --gold-soft:rgba(233,199,137,0.72);
  --gold-glow:rgba(233,199,137,0.16);
  --gold-line:rgba(233,199,137,0.28);

  /* --- 저장(♥) --- */
  --heart:#ffd0c2;

  /* --- 이징: 시네마틱 --- */
  --ease-out:cubic-bezier(0.16,1,0.3,1);
  --ease-soft:cubic-bezier(0.22,0.61,0.36,1);

  /* 안전영역 */
  --safe-b:env(safe-area-inset-bottom, 0px);
}

html { -webkit-text-size-adjust:100%; }

body {
  font-family:'Pretendard', system-ui, sans-serif;
  color:var(--ink);
  /* 폰 프레임 바깥(데스크톱) 배경: 무대 톤의 깊은 어둠 + 미묘한 무대 조명 */
  background:
    radial-gradient(120% 80% at 50% -10%, #1a1a20 0%, transparent 55%),
    radial-gradient(100% 60% at 50% 120%, #141418 0%, transparent 50%),
    #08080a;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow:hidden;
  word-break:keep-all;
}

/* =========================================================
   폰 프레임 (데스크톱: 중앙 390px 베젤 / 모바일: 풀스크린)
   ========================================================= */
.device {
  position:relative;
  width:390px;
  height:844px;
  max-height:100vh;
  margin:0 auto;
  background:var(--bg-0);
  border-radius:46px;
  overflow:hidden;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.04),
    0 2px 6px rgba(0,0,0,0.5),
    0 40px 80px -20px rgba(0,0,0,0.85),
    0 0 120px -30px rgba(233,199,137,0.08);  /* 미묘한 금빛 무대 글로우 */
  /* 베젤 느낌 — 안쪽 어두운 링 */
  border:1px solid rgba(0,0,0,0.6);
}
/* 데스크톱에서 프레임 위아래 여백 + 수직 중앙 */
.stage-wrap {
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:24px;
}

/* 노치(상태바 영역의 다이나믹 아일랜드 느낌) */
.notch {
  position:absolute;
  top:9px; left:50%;
  transform:translateX(-50%);
  width:104px; height:26px;
  background:#000;
  border-radius:16px;
  z-index:200;
  pointer-events:none;
}

/* 상태바 (시계/배터리 — 분위기용) */
.statusbar {
  position:absolute; top:0; left:0; right:0;
  height:46px;
  display:flex; align-items:center;
  justify-content:space-between;
  padding:0 26px;
  font-size:13px; font-weight:600;
  color:var(--ink);
  letter-spacing:0.02em;
  z-index:150;
  pointer-events:none;
}
.statusbar__right { display:flex; align-items:center; gap:6px; }
.statusbar__right svg { display:block; }

/* 모바일: 프레임 제거, 풀스크린 */
@media (max-width:430px) {
  body { overflow:auto; }
  .stage-wrap { padding:0; min-height:100dvh; }
  .device {
    width:100vw; height:100dvh; max-height:none;
    border-radius:0; border:none; box-shadow:none;
  }
  .notch { display:none; }
}

/* =========================================================
   앱 셸 (화면 컨테이너 + 탭바)
   ========================================================= */
.app {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  overflow:hidden;
}

/* 화면 스택 — 각 .screen 을 show/hide */
.screens {
  position:relative;
  flex:1 1 auto;
  overflow:hidden;
}
.screen {
  position:absolute; inset:0;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  /* 진입 전 상태 */
  opacity:0;
  visibility:hidden;
  transform:translateY(8px);
  transition:opacity 0.42s var(--ease-out), transform 0.5s var(--ease-out), visibility 0s linear 0.42s;
  /* 탭바 높이만큼 하단 패딩 */
  padding-bottom:108px;
}
.screen::-webkit-scrollbar { display:none; }
.screen.is-active {
  opacity:1;
  visibility:visible;
  transform:translateY(0);
  transition:opacity 0.5s var(--ease-out), transform 0.6s var(--ease-out), visibility 0s linear 0s;
  z-index:2;
}
/* 발견 탭은 자체 스냅 스크롤이라 패딩 제거 */
#screen-discover { padding-bottom:0; background:var(--bg-0); }

/* =========================================================
   공통: 헤더 / 타이포 위계
   ========================================================= */
.head {
  padding:62px 24px 14px;
}
.head__eyebrow {
  font-size:12px;
  letter-spacing:0.22em;
  text-transform:uppercase;
  color:var(--gold-soft);
  font-weight:600;
  margin-bottom:10px;
}
.head__title {
  font-size:27px;
  font-weight:700;
  letter-spacing:-0.02em;
  line-height:1.25;
  color:var(--ink);
}
.head__sub {
  margin-top:7px;
  font-size:13.5px;
  color:var(--ink-faint);
  letter-spacing:0.01em;
}

.section-label {
  display:flex; align-items:center; gap:9px;
  padding:0 24px;
  margin:30px 0 14px;
}
.section-label__dot {
  width:5px; height:5px; border-radius:50%;
  background:var(--gold);
  box-shadow:0 0 8px var(--gold-glow);
}
.section-label__text {
  font-size:13px; font-weight:600;
  letter-spacing:0.04em;
  color:var(--ink-soft);
}
.section-label__more {
  margin-left:auto;
  font-size:12px; color:var(--ink-faint);
  font-weight:500;
}

/* =========================================================
   화면 1 · 홈
   ========================================================= */
/* 빠른 포착 바 */
.qcapture {
  margin:6px 24px 0;
  display:flex; align-items:center; gap:12px;
  padding:16px 18px;
  background:linear-gradient(135deg, var(--bg-2), var(--bg-1));
  border:1px solid var(--line);
  border-radius:18px;
  cursor:pointer;
  position:relative; overflow:hidden;
  transition:transform 0.4s var(--ease-out), border-color 0.4s ease;
}
.qcapture::after {
  /* 미묘한 상단 광택 */
  content:""; position:absolute; inset:0;
  background:linear-gradient(180deg, rgba(255,255,255,0.03), transparent 40%);
  pointer-events:none;
}
.qcapture:active { transform:scale(0.985); }
.qcapture:hover { border-color:var(--gold-line); }
.qcapture__icon {
  flex:0 0 auto;
  width:38px; height:38px; border-radius:12px;
  background:radial-gradient(circle at 35% 30%, rgba(233,199,137,0.22), rgba(233,199,137,0.05));
  border:1px solid var(--gold-line);
  display:grid; place-items:center;
  color:var(--gold);
}
.qcapture__text { font-size:14.5px; color:var(--ink-soft); letter-spacing:0.01em; }
.qcapture__hint { font-size:11px; color:var(--ink-faint); margin-top:2px; }

/* 재발견 큰 카드 */
.rediscover {
  margin:14px 24px 0;
  position:relative;
  border-radius:24px;
  padding:28px 26px 24px;
  overflow:hidden;
  background:
    radial-gradient(120% 90% at 70% 0%, rgba(233,199,137,0.10), transparent 55%),
    linear-gradient(165deg, #1c1c22 0%, #141417 100%);
  border:1px solid var(--line);
  box-shadow:0 18px 40px -22px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.03);
  cursor:pointer;
  transition:transform 0.5s var(--ease-out);
}
.rediscover:active { transform:scale(0.99); }
.rediscover__tag {
  display:inline-flex; align-items:center; gap:6px;
  font-size:11px; letter-spacing:0.16em; font-weight:600;
  color:var(--gold);
  text-transform:uppercase;
  margin-bottom:18px;
}
.rediscover__tag svg { width:13px; height:13px; }
.rediscover__quote {
  font-size:22px; font-weight:600; line-height:1.5;
  letter-spacing:-0.015em;
  color:var(--ink);
  /* 글자가 어둠 속에서 은은히 */
  text-shadow:0 0 30px rgba(244,239,230,0.06);
}
.rediscover__quote .ln { display:block; }
.rediscover__meta {
  margin-top:20px;
  display:flex; align-items:center; gap:9px;
  font-size:12.5px; color:var(--ink-faint);
}
.rediscover__author { color:var(--ink-soft); font-weight:600; }
.dot-sep { width:3px; height:3px; border-radius:50%; background:var(--ink-ghost); }
.rediscover__glow {
  /* 카드 모서리 미묘한 보더 글로우 */
  position:absolute; inset:-1px; border-radius:24px;
  pointer-events:none;
  background:linear-gradient(140deg, var(--gold-glow), transparent 35%);
  opacity:0.5; mix-blend-mode:screen;
}

/* 최근 담은 문장 미니 리스트 */
.minilist { padding:0 24px; display:flex; flex-direction:column; gap:10px; }
.mini {
  display:flex; align-items:flex-start; gap:13px;
  padding:15px 16px;
  background:var(--bg-1);
  border:1px solid var(--line-soft);
  border-radius:15px;
  cursor:pointer;
  transition:transform 0.35s var(--ease-out), background-color 0.35s ease, border-color 0.35s ease;
}
.mini:active { transform:scale(0.985); }
.mini:hover { background:var(--bg-2); border-color:var(--line); }
.mini__bar {
  flex:0 0 auto; width:3px; align-self:stretch; min-height:34px;
  border-radius:3px;
  background:linear-gradient(var(--gold-soft), rgba(233,199,137,0.15));
  opacity:0.7;
}
.mini__body { flex:1 1 auto; min-width:0; }
.mini__text {
  font-size:14.5px; line-height:1.5; color:var(--ink);
  font-weight:500;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
  overflow:hidden;
}
.mini__meta { margin-top:6px; font-size:11.5px; color:var(--ink-faint); }
.mini__src { color:var(--gold-soft); }

/* =========================================================
   화면 2 · 발견 (풀스크린 몰입)
   ========================================================= */
.discover-scroll {
  height:100%;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
  scrollbar-width:none;
}
.discover-scroll::-webkit-scrollbar { display:none; }

.dscene {
  position:relative;
  height:100%;
  min-height:100%;
  scroll-snap-align:start;
  scroll-snap-stop:always;
  display:grid;
  place-items:center;
  padding:96px 30px 132px;
  overflow:hidden;
}
/* 무대별 깊은 무드 — JS가 inline 배경 적용. 비네팅은 여기서 */
.dscene::after {
  content:""; position:absolute; inset:0; pointer-events:none;
  background:radial-gradient(ellipse 120% 92% at 50% 40%, transparent 36%, rgba(0,0,0,0.42) 100%);
  opacity:0; transition:opacity 1.2s var(--ease-soft);
}
.dscene.is-active::after { opacity:1; }

.dquote { max-width:15em; text-align:center; z-index:2; }
.dquote__mark {
  display:block; font-size:54px; line-height:0.3;
  color:var(--ink-ghost); margin-bottom:24px; font-weight:600; user-select:none;
  opacity:0; transform:translateY(18px) scale(0.92);
  transition:opacity 1s var(--ease-out), transform 1s var(--ease-out);
}
.dscene.is-active .dquote__mark { opacity:1; transform:none; transition-delay:0.05s; }
.dquote__line {
  display:block;
  font-size:30px; line-height:1.42; font-weight:600;
  letter-spacing:-0.018em; word-break:keep-all;
  text-shadow:0 0 36px rgba(244,239,230,0.08);
  opacity:0; transform:translateY(34px); filter:blur(7px);
  transition:opacity 1.05s var(--ease-out), transform 1.15s var(--ease-out), filter 1.05s var(--ease-out);
}
.dscene.is-active .dquote__line {
  opacity:1; transform:none; filter:blur(0);
  transition-delay:var(--line-delay,0s);
}
.dscene.is-past .dquote__line {
  opacity:0; transform:translateY(-22px); filter:blur(5px);
  transition-duration:0.7s; transition-delay:0s;
}

/* 발견 카드 하단 크레딧 */
.dcredit {
  position:absolute; left:30px; bottom:120px; z-index:3; text-align:left;
  opacity:0; transform:translateY(14px);
  transition:opacity 1s var(--ease-out), transform 1s var(--ease-out);
}
.dscene.is-active .dcredit { opacity:1; transform:none; transition-delay:0.6s; }
.dscene.is-past .dcredit { opacity:0; transition-duration:0.5s; transition-delay:0s; }
.dcredit__author { font-size:15px; font-weight:600; color:var(--ink); }
.dcredit__meta {
  margin-top:5px; font-size:12px; color:var(--ink-soft);
  display:flex; align-items:center; gap:8px; flex-wrap:wrap;
}
.dcredit__theme {
  margin-top:13px; display:inline-flex; align-items:center;
  font-size:10.5px; letter-spacing:0.16em; color:var(--gold-soft);
  border:1px solid var(--gold-line); padding:5px 12px; border-radius:100px;
}

/* 발견 카드 우하단 액션(저장 + 상세) */
.dactions {
  position:absolute; right:26px; bottom:118px; z-index:4;
  display:flex; flex-direction:column; gap:13px;
  opacity:0; transform:translateY(14px);
  transition:opacity 1s var(--ease-out), transform 1s var(--ease-out);
}
.dscene.is-active .dactions { opacity:1; transform:none; transition-delay:0.7s; }
.circle-btn {
  width:52px; height:52px; border-radius:50%;
  border:1px solid var(--ink-ghost);
  background:rgba(244,239,230,0.025);
  color:var(--ink-soft);
  display:grid; place-items:center; cursor:pointer;
  backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
  transition:transform 0.4s var(--ease-out), border-color 0.35s ease, background-color 0.35s ease, color 0.35s ease;
}
.circle-btn:active { transform:scale(0.92); }
.circle-btn:hover { border-color:var(--ink-faint); color:var(--ink); }
.circle-btn svg { width:23px; height:23px; }
/* 저장 하트 */
.heart-btn .heart-fill {
  fill:currentColor; opacity:0; transform-origin:center; transform:scale(0.4);
  transition:opacity 0.3s ease, transform 0.45s var(--ease-out);
}
.heart-btn .heart-stroke { fill:none; stroke:currentColor; stroke-width:1.7; transition:opacity 0.3s ease; }
.heart-btn.is-saved {
  color:var(--heart);
  border-color:rgba(255,208,194,0.42);
  background:rgba(255,208,194,0.08);
}
.heart-btn.is-saved .heart-fill { opacity:1; transform:scale(1); }
.heart-btn.is-saved .heart-stroke { opacity:0; }
.heart-btn.is-pulse { animation:pulse 0.5s var(--ease-out); }
@keyframes pulse { 0%{transform:scale(1);} 35%{transform:scale(1.22);} 100%{transform:scale(1);} }

/* 발견 상단 미니 헤더 + 진행 도트 */
.discover-top {
  position:absolute; top:54px; left:0; right:0; z-index:20;
  display:flex; align-items:center; justify-content:center;
  pointer-events:none;
}
.discover-top__label {
  font-size:11px; letter-spacing:0.24em; text-transform:uppercase;
  color:var(--ink-faint); font-weight:600;
}
.dprogress {
  position:absolute; right:14px; top:50%; transform:translateY(-50%);
  z-index:20; display:flex; flex-direction:column; gap:7px;
}
.dprogress__dot {
  width:6px; height:6px; border-radius:50%; border:none; padding:0;
  background:var(--ink-ghost); cursor:pointer; position:relative;
  transition:background-color 0.5s var(--ease-soft), transform 0.5s var(--ease-out);
}
.dprogress__dot::before { content:""; position:absolute; inset:-7px; }
.dprogress__dot.is-current { background:var(--gold); transform:scale(1.25); }
.dprogress__dot.is-saved { background:var(--heart); }

/* 첫 진입 스와이프 힌트 */
.dhint {
  position:absolute; left:50%; bottom:128px; transform:translateX(-50%);
  z-index:15; display:flex; flex-direction:column; align-items:center; gap:7px;
  color:var(--ink-faint); font-size:11.5px; letter-spacing:0.06em;
  pointer-events:none; transition:opacity 0.6s ease;
}
.dhint.is-hidden { opacity:0; }
.dhint__arrow {
  width:1px; height:22px;
  background:linear-gradient(transparent, var(--ink-faint));
  animation:arrowPulse 2.2s var(--ease-soft) infinite;
}
@keyframes arrowPulse { 0%,100%{opacity:0.4; transform:translateY(0);} 50%{opacity:1; transform:translateY(4px);} }

/* =========================================================
   화면 3 · 서랍
   ========================================================= */
.searchbar {
  margin:4px 24px 0;
  display:flex; align-items:center; gap:10px;
  padding:13px 16px;
  background:var(--bg-1);
  border:1px solid var(--line);
  border-radius:14px;
}
.searchbar svg { flex:0 0 auto; color:var(--ink-faint); width:18px; height:18px; }
.searchbar input {
  flex:1 1 auto; background:none; border:none; outline:none;
  color:var(--ink); font-size:14.5px; font-family:inherit;
  letter-spacing:0.01em;
}
.searchbar input::placeholder { color:var(--ink-faint); }

/* 태그 칩 줄 */
.chips {
  display:flex; gap:9px; padding:16px 24px 6px;
  overflow-x:auto; scrollbar-width:none;
}
.chips::-webkit-scrollbar { display:none; }
.chip {
  flex:0 0 auto;
  padding:8px 16px; border-radius:100px;
  font-size:13px; font-weight:500; letter-spacing:0.01em;
  background:var(--bg-2); color:var(--ink-soft);
  border:1px solid var(--line); cursor:pointer;
  transition:all 0.3s var(--ease-out);
}
.chip:active { transform:scale(0.95); }
.chip.is-on {
  background:linear-gradient(135deg, rgba(233,199,137,0.18), rgba(233,199,137,0.06));
  color:var(--gold);
  border-color:var(--gold-line);
}
.chip__count { opacity:0.6; margin-left:5px; font-size:11.5px; }

/* 서랍 카드 그리드 */
.drawer-grid {
  padding:14px 24px 0;
  display:grid; grid-template-columns:1fr 1fr; gap:12px;
}
.dcard {
  position:relative;
  background:linear-gradient(168deg, var(--bg-2) 0%, var(--bg-1) 100%);
  border:1px solid var(--line);
  border-radius:18px;
  padding:18px 16px 15px;
  cursor:pointer; overflow:hidden;
  min-height:158px;
  display:flex; flex-direction:column;
  transition:transform 0.45s var(--ease-out), border-color 0.4s ease, box-shadow 0.4s ease;
  box-shadow:0 10px 26px -20px rgba(0,0,0,0.9);
}
.dcard:active { transform:scale(0.975); }
.dcard:hover { border-color:var(--gold-line); box-shadow:0 16px 32px -20px rgba(0,0,0,0.95); }
.dcard__mark {
  font-size:30px; line-height:0.4; color:var(--ink-ghost);
  font-weight:600; margin-bottom:12px; user-select:none;
}
.dcard__text {
  font-size:14.5px; line-height:1.5; color:var(--ink); font-weight:500;
  flex:1 1 auto;
  display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical; overflow:hidden;
}
.dcard__foot {
  margin-top:13px; display:flex; align-items:center; gap:7px;
  font-size:11px; color:var(--ink-faint);
}
.dcard__author { color:var(--ink-soft); font-weight:600; }
.dcard__badge {
  position:absolute; top:14px; right:14px;
  font-size:9.5px; letter-spacing:0.08em; font-weight:600;
  padding:3px 8px; border-radius:100px;
  color:var(--ink-faint); border:1px solid var(--line);
  background:var(--bg-0);
}
.dcard__badge.is-direct { color:var(--gold-soft); border-color:var(--gold-line); }

/* 빈 서랍 상태 */
.empty {
  display:none;
  flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:60px 40px; color:var(--ink-faint);
}
.empty.is-show { display:flex; }
.empty__icon { width:54px; height:54px; margin-bottom:18px; color:var(--ink-ghost); }
.empty__title { font-size:15px; color:var(--ink-soft); font-weight:600; margin-bottom:8px; }
.empty__sub { font-size:13px; line-height:1.6; }

/* 서랍 카운트 요약 */
.drawer-summary {
  margin:2px 24px 0; padding:0 2px;
  display:flex; align-items:baseline; gap:8px;
}
.drawer-summary__n { font-size:15px; font-weight:700; color:var(--gold); }
.drawer-summary__l { font-size:13px; color:var(--ink-faint); }

/* =========================================================
   하단 탭바 + FAB
   ========================================================= */
.tabbar {
  position:absolute; left:0; right:0; bottom:0;
  height:calc(78px + var(--safe-b));
  padding-bottom:var(--safe-b);
  z-index:100;
  display:flex; align-items:stretch;
  background:linear-gradient(180deg, rgba(14,14,16,0.86), rgba(14,14,16,0.97));
  backdrop-filter:blur(18px) saturate(1.2);
  -webkit-backdrop-filter:blur(18px) saturate(1.2);
  border-top:1px solid var(--line-soft);
}
.tab {
  flex:1 1 0; border:none; background:none; cursor:pointer;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:5px; padding-top:6px;
  color:var(--ink-faint);
  transition:color 0.35s var(--ease-out);
  position:relative;
}
.tab svg { width:23px; height:23px; transition:transform 0.4s var(--ease-out); }
.tab__label { font-size:10.5px; font-weight:600; letter-spacing:0.02em; }
.tab.is-active { color:var(--ink); }
.tab.is-active svg { transform:translateY(-1px); }
.tab.is-active .tab__label { color:var(--gold); }
.tab:active svg { transform:scale(0.9); }
/* 활성 인디케이터 점 */
.tab.is-active::before {
  content:""; position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:22px; height:2px; border-radius:2px;
  background:var(--gold); box-shadow:0 0 10px var(--gold-glow);
}
/* 가운데 FAB 자리 비우기 */
.tab--spacer { flex:0 0 76px; pointer-events:none; }

/* FAB: 탭바 중앙에 떠 있는 ＋ 포착 */
.fab {
  position:absolute; left:50%; bottom:calc(40px + var(--safe-b));
  transform:translateX(-50%);
  width:62px; height:62px; border-radius:50%;
  border:none; cursor:pointer; z-index:101;
  background:linear-gradient(145deg, #f0d49b, #d9b272);
  color:#1a1408;
  display:grid; place-items:center;
  box-shadow:
    0 6px 18px -2px rgba(233,199,137,0.4),
    0 10px 30px -8px rgba(0,0,0,0.7),
    inset 0 1px 1px rgba(255,255,255,0.4);
  transition:transform 0.45s var(--ease-out), box-shadow 0.4s ease;
}
.fab svg { width:27px; height:27px; }
.fab:hover { box-shadow:0 8px 24px -2px rgba(233,199,137,0.55), 0 12px 34px -8px rgba(0,0,0,0.75); }
.fab:active { transform:translateX(-50%) scale(0.9); }
/* 미묘한 후광 */
.fab::after {
  content:""; position:absolute; inset:-7px; border-radius:50%;
  border:1px solid var(--gold-line); opacity:0.5;
  animation:fabRing 3.5s var(--ease-soft) infinite;
}
@keyframes fabRing { 0%,100%{transform:scale(1); opacity:0.45;} 50%{transform:scale(1.08); opacity:0.15;} }

/* =========================================================
   바텀시트 (포착 / 상세 공통)
   ========================================================= */
.scrim {
  position:absolute; inset:0; z-index:300;
  background:rgba(6,6,8,0.62);
  backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px);
  opacity:0; visibility:hidden;
  transition:opacity 0.4s var(--ease-out), visibility 0s linear 0.4s;
}
.scrim.is-open { opacity:1; visibility:visible; transition:opacity 0.4s var(--ease-out), visibility 0s; }

.sheet {
  position:absolute; left:0; right:0; bottom:0; z-index:310;
  background:linear-gradient(180deg, var(--bg-2), var(--bg-1));
  border-top:1px solid var(--line);
  border-radius:28px 28px 0 0;
  box-shadow:0 -20px 60px -16px rgba(0,0,0,0.85);
  transform:translateY(102%);
  transition:transform 0.52s var(--ease-out);
  max-height:92%;
  display:flex; flex-direction:column;
  padding-bottom:calc(20px + var(--safe-b));
}
.sheet.is-open { transform:translateY(0); }
.sheet__grip {
  width:40px; height:4px; border-radius:4px;
  background:var(--ink-ghost);
  margin:11px auto 4px; flex:0 0 auto;
}
.sheet__scroll { overflow-y:auto; scrollbar-width:none; flex:1 1 auto; }
.sheet__scroll::-webkit-scrollbar { display:none; }

/* 포착 시트 내부 */
.capture-head {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 22px 4px;
}
.capture-head__title { font-size:18px; font-weight:700; letter-spacing:-0.01em; }
.capture-head__x {
  width:32px; height:32px; border-radius:50%;
  background:var(--bg-3); border:1px solid var(--line);
  color:var(--ink-soft); cursor:pointer; display:grid; place-items:center;
  transition:transform 0.3s var(--ease-out), color 0.3s ease;
}
.capture-head__x:active { transform:scale(0.9); }
.capture-head__x svg { width:15px; height:15px; }

.field { padding:16px 22px 0; }
.field__label {
  font-size:11.5px; letter-spacing:0.06em; font-weight:600;
  color:var(--ink-faint); text-transform:uppercase; margin-bottom:9px;
  display:flex; align-items:center; gap:7px;
}
.field__label .auto {
  font-size:10px; letter-spacing:0.04em; color:var(--gold-soft);
  border:1px solid var(--gold-line); padding:2px 7px; border-radius:100px;
  text-transform:none;
}
.ta {
  width:100%; min-height:118px; resize:none;
  background:var(--bg-0); border:1px solid var(--line); border-radius:16px;
  padding:16px; color:var(--ink); font-size:17px; line-height:1.55;
  font-family:inherit; letter-spacing:-0.01em; outline:none;
  transition:border-color 0.3s ease, box-shadow 0.3s ease;
}
.ta:focus { border-color:var(--gold-line); box-shadow:0 0 0 3px var(--gold-glow); }
.ta::placeholder { color:var(--ink-faint); }

.src-row { display:flex; gap:10px; }
.inp {
  width:100%;
  background:var(--bg-0); border:1px solid var(--line); border-radius:13px;
  padding:13px 14px; color:var(--ink); font-size:14.5px;
  font-family:inherit; outline:none;
  transition:border-color 0.3s ease, box-shadow 0.3s ease;
}
.inp:focus { border-color:var(--gold-line); box-shadow:0 0 0 3px var(--gold-glow); }
.inp::placeholder { color:var(--ink-faint); }

/* 자동 인식 감지 배너 */
.detected {
  margin:11px 22px 0; padding:11px 14px;
  display:none; align-items:center; gap:10px;
  background:linear-gradient(135deg, rgba(233,199,137,0.10), rgba(233,199,137,0.03));
  border:1px solid var(--gold-line); border-radius:13px;
  font-size:12.5px; color:var(--gold-soft);
}
.detected.is-show { display:flex; animation:slideDown 0.4s var(--ease-out); }
@keyframes slideDown { from{opacity:0; transform:translateY(-6px);} to{opacity:1; transform:none;} }
.detected svg { width:16px; height:16px; flex:0 0 auto; }

/* 태그 입력 + 칩 */
.tag-input-wrap {
  display:flex; flex-wrap:wrap; gap:8px; align-items:center;
  background:var(--bg-0); border:1px solid var(--line); border-radius:13px;
  padding:10px 12px; min-height:48px;
}
.tag-pill {
  display:inline-flex; align-items:center; gap:6px;
  background:rgba(233,199,137,0.12); color:var(--gold);
  border:1px solid var(--gold-line);
  font-size:12.5px; font-weight:500; padding:5px 8px 5px 11px; border-radius:100px;
  animation:popIn 0.3s var(--ease-out);
}
@keyframes popIn { from{opacity:0; transform:scale(0.8);} to{opacity:1; transform:none;} }
.tag-pill button {
  border:none; background:none; color:var(--gold-soft); cursor:pointer;
  width:16px; height:16px; display:grid; place-items:center; padding:0;
  font-size:14px; line-height:1; border-radius:50%;
}
.tag-pill button:hover { color:var(--gold); }
.tag-input {
  flex:1 1 60px; min-width:60px; background:none; border:none; outline:none;
  color:var(--ink); font-size:14px; font-family:inherit; padding:4px 0;
}
.tag-input::placeholder { color:var(--ink-faint); }
/* 추천 태그 */
.tag-suggest { display:flex; gap:8px; flex-wrap:wrap; padding:12px 22px 0; }
.tag-suggest__item {
  font-size:12px; padding:6px 12px; border-radius:100px;
  background:var(--bg-3); color:var(--ink-faint); border:1px solid var(--line);
  cursor:pointer; transition:all 0.25s ease;
}
.tag-suggest__item:active { transform:scale(0.94); }
.tag-suggest__item:hover { color:var(--ink-soft); border-color:var(--ink-ghost); }

/* 시트 하단 액션 */
.sheet-actions { padding:20px 22px 4px; }
.btn-primary {
  width:100%; padding:16px; border:none; border-radius:16px; cursor:pointer;
  background:linear-gradient(135deg, #f0d49b, #d9b272);
  color:#1a1408; font-size:15.5px; font-weight:700; font-family:inherit;
  letter-spacing:0.01em;
  box-shadow:0 10px 26px -8px rgba(233,199,137,0.45);
  transition:transform 0.4s var(--ease-out), box-shadow 0.4s ease, opacity 0.3s ease;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.btn-primary:active { transform:scale(0.985); }
.btn-primary:disabled {
  background:var(--bg-3); color:var(--ink-faint); cursor:not-allowed;
  box-shadow:none;
}
.btn-primary svg { width:18px; height:18px; }

/* =========================================================
   문장 상세 (바텀시트)
   ========================================================= */
.detail-sheet { max-height:94%; }
.detail__top {
  display:flex; align-items:center; justify-content:flex-end;
  padding:6px 18px 0; gap:8px;
}
.detail__hero {
  padding:30px 26px 26px; text-align:center;
  position:relative;
  background:radial-gradient(120% 80% at 50% 0%, rgba(233,199,137,0.07), transparent 60%);
}
.detail__mark {
  font-size:50px; line-height:0.3; color:var(--ink-ghost);
  font-weight:600; margin-bottom:22px; user-select:none;
}
.detail__quote {
  font-size:25px; line-height:1.55; font-weight:600; letter-spacing:-0.018em;
  color:var(--ink); word-break:keep-all;
  text-shadow:0 0 34px rgba(244,239,230,0.07);
}
.detail__quote .ln { display:block; }
.detail__meta {
  margin-top:26px; display:flex; flex-direction:column; align-items:center; gap:7px;
}
.detail__author { font-size:15px; font-weight:600; color:var(--ink); }
.detail__src {
  font-size:12.5px; color:var(--ink-faint);
  display:flex; align-items:center; gap:8px;
}
.detail__theme {
  margin-top:12px; font-size:10.5px; letter-spacing:0.16em; color:var(--gold-soft);
  border:1px solid var(--gold-line); padding:5px 13px; border-radius:100px;
}

/* 상세 액션 바 */
.detail__actions {
  display:flex; gap:11px; padding:6px 26px 22px;
}
.action-btn {
  flex:1 1 0; padding:13px; border-radius:14px; cursor:pointer;
  background:var(--bg-3); border:1px solid var(--line); color:var(--ink-soft);
  font-size:13.5px; font-weight:600; font-family:inherit;
  display:flex; align-items:center; justify-content:center; gap:8px;
  transition:all 0.35s var(--ease-out);
}
.action-btn:active { transform:scale(0.97); }
.action-btn svg { width:18px; height:18px; }
.action-btn.is-saved {
  color:var(--heart); border-color:rgba(255,208,194,0.4);
  background:rgba(255,208,194,0.07);
}
.action-btn.is-saved .heart-fill { opacity:1; }
.action-btn .heart-fill { fill:currentColor; opacity:0; transition:opacity 0.3s ease; }
.action-btn .heart-stroke { fill:none; stroke:currentColor; stroke-width:1.7; }

/* AI 유사 추천 */
.simrec { padding:8px 26px 8px; border-top:1px solid var(--line-soft); }
.simrec__head {
  display:flex; align-items:center; gap:8px;
  font-size:12.5px; font-weight:600; color:var(--ink-soft);
  letter-spacing:0.02em; margin:18px 0 14px;
}
.simrec__head .ai-badge {
  display:inline-flex; align-items:center; gap:5px;
  font-size:10px; letter-spacing:0.1em; color:var(--gold);
  border:1px solid var(--gold-line); padding:3px 8px; border-radius:100px;
}
.simrec__head .ai-badge svg { width:11px; height:11px; }
.simcard {
  display:flex; align-items:flex-start; gap:13px;
  padding:15px 16px; margin-bottom:10px;
  background:var(--bg-2); border:1px solid var(--line-soft); border-radius:15px;
  cursor:pointer;
  transition:transform 0.4s var(--ease-out), background-color 0.35s ease, border-color 0.35s ease;
}
.simcard:active { transform:scale(0.985); }
.simcard:hover { background:var(--bg-3); border-color:var(--gold-line); }
.simcard__bar {
  flex:0 0 auto; width:3px; align-self:stretch; min-height:30px; border-radius:3px;
  background:linear-gradient(var(--gold-soft), rgba(233,199,137,0.12)); opacity:0.65;
}
.simcard__body { flex:1 1 auto; min-width:0; }
.simcard__text {
  font-size:14px; line-height:1.5; color:var(--ink); font-weight:500;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}
.simcard__meta { margin-top:6px; font-size:11px; color:var(--ink-faint); }
.simcard__meta .a { color:var(--gold-soft); }
.simcard__arrow { flex:0 0 auto; color:var(--ink-ghost); align-self:center; }

/* =========================================================
   토스트
   ========================================================= */
.toast {
  position:absolute; left:50%; bottom:calc(100px + var(--safe-b));
  transform:translateX(-50%) translateY(20px);
  z-index:400;
  background:rgba(28,28,33,0.92);
  border:1px solid var(--gold-line);
  color:var(--ink);
  font-size:13.5px; font-weight:500; letter-spacing:0.01em;
  padding:12px 20px; border-radius:100px;
  backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  box-shadow:0 12px 30px -10px rgba(0,0,0,0.7);
  opacity:0; pointer-events:none;
  display:flex; align-items:center; gap:9px;
  transition:opacity 0.4s var(--ease-out), transform 0.5s var(--ease-out);
  white-space:nowrap;
}
.toast.is-show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast svg { width:16px; height:16px; color:var(--gold); flex:0 0 auto; }

/* =========================================================
   접근성: 모션 줄이기
   ========================================================= */
@media (prefers-reduced-motion:reduce) {
  *, *::before, *::after { transition-duration:0.01ms !important; animation-duration:0.01ms !important; animation-iteration-count:1 !important; }
  .dquote__line, .dquote__mark, .dcredit, .dactions { opacity:1 !important; transform:none !important; filter:none !important; }
}
</style>
</head>
<body>

<div class="stage-wrap">
  <div class="device">
    <!-- 노치 + 상태바 -->
    <div class="notch"></div>
    <div class="statusbar">
      <span id="clock">9:41</span>
      <span class="statusbar__right">
        <!-- 신호 -->
        <svg width="17" height="12" viewBox="0 0 17 12" fill="currentColor"><rect x="0" y="8" width="3" height="4" rx="0.7"/><rect x="4.5" y="5.5" width="3" height="6.5" rx="0.7"/><rect x="9" y="3" width="3" height="9" rx="0.7"/><rect x="13.5" y="0.5" width="3" height="11.5" rx="0.7" opacity="0.4"/></svg>
        <!-- 배터리 -->
        <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="currentColor" opacity="0.4"/><rect x="2" y="2" width="16" height="8" rx="1.6" fill="currentColor"/><rect x="23" y="4" width="1.6" height="4" rx="0.8" fill="currentColor" opacity="0.4"/></svg>
      </span>
    </div>

    <!-- ===================== 앱 ===================== -->
    <div class="app">
      <div class="screens" id="screens">

        <!-- ============ 화면 1 · 홈 ============ -->
        <section class="screen is-active" id="screen-home" aria-label="홈">
          <div class="head">
            <div class="head__eyebrow" id="home-greeting">좋은 밤이에요</div>
            <h1 class="head__title">오늘의 문장 서랍</h1>
            <p class="head__sub" id="home-date">— 날짜 —</p>
          </div>

          <!-- 빠른 포착 바 -->
          <button class="qcapture" id="quickCapture" type="button" aria-label="문장 포착하기">
            <span class="qcapture__icon" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
            </span>
            <span>
              <span class="qcapture__text">지금 떠오른 문장을 담아보세요</span>
              <span class="qcapture__hint">붙여넣거나 직접 입력 · 3초면 충분해요</span>
            </span>
          </button>

          <!-- 오늘 다시 보는 문장 (재발견) -->
          <div class="section-label">
            <span class="section-label__dot"></span>
            <span class="section-label__text">오늘 다시 보는 문장</span>
          </div>
          <article class="rediscover" id="rediscoverCard" role="button" tabindex="0" aria-label="오늘 다시 보는 문장 상세 보기">
            <span class="rediscover__glow" aria-hidden="true"></span>
            <span class="rediscover__tag">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.9 5.8H20l-4.9 3.6 1.9 5.8L12 14.6 7 18.2l1.9-5.8L4 8.8h6.1z"/></svg>
              재발견
            </span>
            <blockquote class="rediscover__quote" id="rediscoverQuote"></blockquote>
            <div class="rediscover__meta" id="rediscoverMeta"></div>
          </article>

          <!-- 최근 담은 문장 -->
          <div class="section-label">
            <span class="section-label__dot"></span>
            <span class="section-label__text">최근 담은 문장</span>
            <span class="section-label__more" id="homeRecentCount"></span>
          </div>
          <div class="minilist" id="homeRecent"></div>
        </section>

        <!-- ============ 화면 2 · 발견 ============ -->
        <section class="screen" id="screen-discover" aria-label="발견">
          <div class="discover-top">
            <span class="discover-top__label">큐레이션 · 발견</span>
          </div>
          <nav class="dprogress" id="dprogress" aria-label="문장 이동"></nav>
          <div class="dhint" id="dhint" aria-hidden="true">
            <span>스크롤하여 음미하기</span>
            <span class="dhint__arrow"></span>
          </div>
          <div class="discover-scroll" id="discoverScroll"></div>
        </section>

        <!-- ============ 화면 3 · 서랍 ============ -->
        <section class="screen" id="screen-drawer" aria-label="서랍">
          <div class="head">
            <div class="head__eyebrow">내 컬렉션</div>
            <h1 class="head__title">문장 서랍</h1>
          </div>
          <div class="drawer-summary">
            <span class="drawer-summary__n" id="drawerCount">0</span>
            <span class="drawer-summary__l">개의 문장을 소장 중이에요</span>
          </div>

          <!-- 검색바 -->
          <div class="searchbar" style="margin-top:16px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
            <input type="text" id="drawerSearch" placeholder="문장·저자·출처 검색" autocomplete="off" />
          </div>

          <!-- 태그 칩 -->
          <div class="chips" id="drawerChips"></div>

          <!-- 카드 그리드 -->
          <div class="drawer-grid" id="drawerGrid"></div>

          <!-- 빈 상태 -->

<script>
/* =========================================================
   문장 연구소 — V3 다크 무대 · 인터랙티브 프로토타입
   ========================================================= */

/* ----- 시드 문장 10개 ----- */
const SEEDS = [
  {id:1, text:"죽는 날까지 하늘을 우러러\n한 점 부끄럼이 없기를", author:"윤동주", work:"하늘과 바람과 별과 시", year:"1948", theme:"성찰", keywords:["부끄러움","양심","바람"]},
  {id:2, text:"나 보기가 역겨워 가실 때에는\n말없이 고이 보내 드리오리다", author:"김소월", work:"진달래꽃", year:"1925", theme:"이별", keywords:["이별","체념","헌신"]},
  {id:3, text:"우리는 만날 때에 떠날 것을 염려하는 것과 같이,\n떠날 때에 다시 만날 것을 믿습니다", author:"한용운", work:"님의 침묵", year:"1926", theme:"이별", keywords:["만남","이별","믿음"]},
  {id:4, text:"다시 천고의 뒤에\n백마 타고 오는 초인이 있어", author:"이육사", work:"광야", year:"1945", theme:"의지", keywords:["초인","미래","희생"]},
  {id:5, text:"박제가 되어 버린 천재를 아시오?", author:"이상", work:"날개", year:"1936", theme:"자의식", keywords:["천재","권태","근대"]},
  {id:6, text:"계절이 지나가는 하늘에는\n가을로 가득 차 있습니다", author:"윤동주", work:"하늘과 바람과 별과 시", year:"1948", theme:"자연", keywords:["가을","하늘","그리움"]},
  {id:7, text:"하루라도 책을 읽지 않으면\n입안에 가시가 돋는다", author:"안중근", work:"유묵", year:"1910", theme:"배움", keywords:["독서","수양","단련"]},
  {id:8, text:"천 리 길도\n한 걸음에서 시작된다", author:"노자", work:"도덕경", year:"고전", theme:"배움", keywords:["시작","한걸음","축적"]},
  {id:9, text:"문장은 끝내기 위해서가 아니라,\n멈추는 법을 배우기 위해 쓴다", author:"새김 편집부", work:"쉼표의 자리", year:"2024", theme:"쓰기", keywords:["문장","멈춤","여백"]},
  {id:10, text:"모든 책은 첫 문장에서 한 번,\n마지막 문장에서 다시 태어난다", author:"새김 편집부", work:"첫 문장의 무게", year:"2025", theme:"쓰기", keywords:["첫문장","끝문장","탄생"]}
];

/* ----- 발견 무대별 깊은 무드 컬러 (테마/분위기 매핑) ----- */
const MOODS = [
  {bg:"#0d1017", glow:"#1b2233"}, // 1 성찰 — 잉크블랙 + 청기
  {bg:"#250b13", glow:"#3d141f"}, // 2 이별(소월) — 진달래 버건디
  {bg:"#0b1322", glow:"#16243f"}, // 3 이별(만해) — 미드나잇 블루
  {bg:"#13160f", glow:"#23291a"}, // 4 의지 — 다크올리브/철
  {bg:"#121214", glow:"#1f1f23"}, // 5 자의식 — 차가운 차콜
  {bg:"#0c1610", glow:"#16271b"}, // 6 자연(가을) — 딥그린 숲
  {bg:"#19110b", glow:"#2a1d12"}, // 7 배움(독서) — 먹빛 딥브라운
  {bg:"#0d0d18", glow:"#171728"}, // 8 배움(노자) — 미드나잇 인디고
  {bg:"#091518", glow:"#102a2d"}, // 9 쓰기(멈춤) — 먹청 딥틸
  {bg:"#150f1c", glow:"#241632"}  // 10 쓰기(탄생) — 딥플럼
];

/* ----- 상태: 내 서랍(localStorage) ----- */
const LS_KEY = 'sentence-lab-v3-drawer';
// 서랍 항목 형태: {uid, seedId?, text, author, work, year, theme, keywords[], source:'discover'|'direct', savedAt}
let drawer = [];

// 초기 서랍 샘플 3개 (시드 id 1, 5, 9 — 발견에서 담은 것으로)
const INITIAL_SAMPLE_IDS = [1, 5, 9];

function loadDrawer() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) { drawer = JSON.parse(raw); return; }
  } catch(e) {}
  // 최초: 샘플 3개로 시작
  drawer = INITIAL_SAMPLE_IDS.map((id, i) => {
    const s = SEEDS.find(x => x.id === id);
    return seedToEntry(s, 'discover', Date.now() - (3 - i) * 86400000);
  });
  saveDrawer();
}
function saveDrawer() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(drawer)); } catch(e) {}
}
function seedToEntry(s, source, ts) {
  return {
    uid:'s' + s.id, seedId:s.id, text:s.text, author:s.author, work:s.work,
    year:s.year, theme:s.theme, keywords:s.keywords.slice(), source:source, savedAt:ts || Date.now()
  };
}
function isSeedSaved(seedId) { return drawer.some(d => d.seedId === seedId); }
function removeSeed(seedId) { drawer = drawer.filter(d => d.seedId !== seedId); saveDrawer(); }

/* ----- 유틸 ----- */
function esc(s) { return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function linesHTML(text, cls) {
  return text.split('\n').map(ln => `<span class="${cls}">${esc(ln)}</span>`).join('');
}
function $(sel, root) { return (root || document).querySelector(sel); }
function $$(sel, root) { return Array.from((root || document).querySelectorAll(sel)); }

/* =========================================================
   탭 전환
   ========================================================= */
const screens = { home:$('#screen-home'), discover:$('#screen-discover'), drawer:$('#screen-drawer') };
let currentScreen = 'home';

function switchScreen(name) {
  if (!screens[name] || name === currentScreen) {
    // 같은 탭 재탭 시: 발견은 맨 위로
    if (name === 'discover') $('#discoverScroll').scrollTo({top:0, behavior:'smooth'});
    return;
  }
  Object.values(screens).forEach(s => s.classList.remove('is-active'));
  screens[name].classList.add('is-active');
  // 스크롤 위치 초기화(발견 제외 — 발견은 스냅 유지)
  if (name !== 'discover') screens[name].scrollTop = 0;
  // 탭바 활성 표시
  $$('.tab').forEach(t => t.classList.toggle('is-active', t.dataset.screen === name));
  currentScreen = name;

  // 화면별 갱신
  if (name === 'drawer') renderDrawer();
  if (name === 'home') renderHome();
  if (name === 'discover') { syncDiscoverSaved(); ensureDiscoverActive(); }
}

$$('.tab[data-screen]').forEach(tab => {
  if (tab.dataset.screen === 'home-placeholder') return;
  tab.addEventListener('click', () => switchScreen(tab.dataset.screen));
});

/* =========================================================
   화면 1 · 홈 렌더
   ========================================================= */
function renderHome() {
  // 인사 + 날짜
  const now = new Date();
  const hour = now.getHours();
  let greet = '좋은 밤이에요';
  if (hour >= 5 && hour < 11) greet = '좋은 아침이에요';
  else if (hour >= 11 && hour < 17) greet = '좋은 오후예요';
  else if (hour >= 17 && hour < 21) greet = '편안한 저녁이에요';
  $('#home-greeting').textContent = greet;
  const days = ['일','월','화','수','목','금','토'];
  $('#home-date').textContent =
    `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 ${days[now.getDay()]}요일`;

  // 재발견 카드 — 날짜 기반으로 시드 하나 선택(매일 바뀌는 느낌)
  const seed = SEEDS[(now.getFullYear()*now.getMonth() + now.getDate()) % SEEDS.length];
  $('#rediscoverQuote').innerHTML = linesHTML(seed.text, 'ln');
  $('#rediscoverMeta').innerHTML =
    `<span class="rediscover__author">${esc(seed.author)}</span>` +
    `<span class="dot-sep"></span><span>${esc(seed.work)}</span>` +
    `<span class="dot-sep"></span><span>${esc(seed.year)}</span>`;
  $('#rediscoverCard').onclick = () => openDetail(seed.id);
  $('#rediscoverCard').onkeydown = (e) => { if (e.key==='Enter'||e.key===' '){ e.preventDefault(); openDetail(seed.id); } };

  // 최근 담은 문장 (최신순 3개)
  const recent = drawer.slice().sort((a,b)=>b.savedAt-a.savedAt).slice(0,3);
  $('#homeRecentCount').textContent = `총 ${drawer.length}개`;
  const wrap = $('#homeRecent');
  if (recent.length === 0) {
    wrap.innerHTML = `<div style="padding:20px 4px; color:var(--ink-faint); font-size:13.5px; line-height:1.6;">아직 담은 문장이 없어요.<br/>위의 포착 바로 첫 문장을 담아보세요.</div>`;
    return;
  }
  wrap.innerHTML = recent.map(e => `
    <div class="mini" data-uid="${esc(e.uid)}" role="button" tabindex="0">
      <span class="mini__bar"></span>
      <div class="mini__body">
        <div class="mini__text">${esc(e.text.replace(/\n/g,' '))}</div>
        <div class="mini__meta"><span class="mini__src">${esc(e.author||'직접 기록')}</span>${e.work?' · '+esc(e.work):''}</div>
      </div>
    </div>
  `).join('');
  $$('.mini', wrap).forEach(el => {
    const uid = el.dataset.uid;
    const open = () => openDetailByUid(uid);
    el.addEventListener('click', open);
    el.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' '){e.preventDefault();open();} });
  });
}

/* =========================================================
   화면 2 · 발견 (풀스크린 몰입)
   ========================================================= */
const discoverScroll = $('#discoverScroll');
const dprogressEl = $('#dprogress');
const dhintEl = $('#dhint');
let dscenes = [], dprogressDots = [], dCurrent = 0, dHintDismissed = false, dInitialized = false;

function heartSVG() {
  return `<svg viewBox="0 0 24 22" aria-hidden="true">
    <path class="heart-stroke" d="M12 20.5C12 20.5 2.5 14.8 2.5 8.3C2.5 5.4 4.8 3.2 7.5 3.2C9.4 3.2 11 4.3 12 6C13 4.3 14.6 3.2 16.5 3.2C19.2 3.2 21.5 5.4 21.5 8.3C21.5 14.8 12 20.5 12 20.5Z"/>
    <path class="heart-fill" d="M12 20.5C12 20.5 2.5 14.8 2.5 8.3C2.5 5.4 4.8 3.2 7.5 3.2C9.4 3.2 11 4.3 12 6C13 4.3 14.6 3.2 16.5 3.2C19.2 3.2 21.5 5.4 21.5 8.3C21.5 14.8 12 20.5 12 20.5Z"/>
  </svg>`;
}

function buildDiscover() {
  const frag = document.createDocumentFragment();
  SEEDS.forEach((s, i) => {
    const sec = document.createElement('section');
    sec.className = 'dscene';
    sec.dataset.index = i;
    sec.dataset.seed = s.id;
    const lines = s.text.split('\n')
      .map((ln,li)=>`<span class="dquote__line" style="--line-delay:${0.16+li*0.16}s">${esc(ln)}</span>`).join('');
    sec.innerHTML = `
      <blockquote class="dquote">
        <span class="dquote__mark" aria-hidden="true">&ldquo;</span>
        ${lines}
      </blockquote>
      <figcaption class="dcredit">
        <div class="dcredit__author">${esc(s.author)}</div>
        <div class="dcredit__meta"><span>${esc(s.work)}</span><span class="dot-sep"></span><span>${esc(s.year)}</span></div>
        <span class="dcredit__theme">${esc(s.theme)}</span>
      </figcaption>
      <div class="dactions">
        <button class="circle-btn heart-btn" type="button" aria-label="이 문장 저장" aria-pressed="false">${heartSVG()}</button>
        <button class="circle-btn detail-btn" type="button" aria-label="문장 상세 보기">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/></svg>
        </button>
      </div>`;
    // 저장 토글
    const heart = $('.heart-btn', sec);
    heart.addEventListener('click', () => toggleSeedSave(s.id, heart));
    // 상세
    $('.detail-btn', sec).addEventListener('click', () => openDetail(s.id));
    frag.appendChild(sec);
  });
  discoverScroll.appendChild(frag);
  dscenes = $$('.dscene', discoverScroll);

  // 진행 도트
  const dfrag = document.createDocumentFragment();
  SEEDS.forEach((s,i)=>{
    const b = document.createElement('button');
    b.className = 'dprogress__dot'; b.type='button';
    b.setAttribute('aria-label', `${i+1}번 문장으로`);
    b.addEventListener('click', ()=> dscenes[i].scrollIntoView({behavior:'smooth'}));
    dfrag.appendChild(b);
  });
  dprogressEl.appendChild(dfrag);
  dprogressDots = $$('.dprogress__dot', dprogressEl);

  // 관찰자
  const io = new IntersectionObserver((entries)=>{
    let best=null;
    entries.forEach(e=>{ if(e.isIntersecting && (!best||e.intersectionRatio>best.intersectionRatio)) best=e; });
    if (best) setDiscoverActive(Number(best.target.dataset.index));
  }, { root:discoverScroll, threshold:[0.4,0.6,0.75] });
  dscenes.forEach(sc=>io.observe(sc));

  // 힌트 숨김
  ['scroll','wheel','touchstart'].forEach(ev =>
    discoverScroll.addEventListener(ev, dismissDHint, {once:true, passive:true}));

  syncDiscoverSaved();
}

function applyMood(i) {
  const m = MOODS[i] || MOODS[0];
  // 발견 화면 배경에 깊은 라디얼 무드 적용
  screens.discover.style.backgroundColor = m.bg;
  screens.discover.style.backgroundImage =
    `radial-gradient(ellipse 92% 68% at 50% 38%, ${m.glow} 0%, ${m.bg} 60%)`;
  screens.discover.style.transition = 'background-color 1.0s var(--ease-soft)';
}

function setDiscoverActive(i) {
  if (i === dCurrent && dscenes[i] && dscenes[i].classList.contains('is-active')) return;
  dCurrent = i;
  dscenes.forEach((sc,idx)=>{
    sc.classList.toggle('is-active', idx===i);
    sc.classList.toggle('is-past', idx<i);
    if (idx>i) sc.classList.remove('is-past');
  });
  dprogressDots.forEach((d,idx)=>d.classList.toggle('is-current', idx===i));
  applyMood(i);
}

function dismissDHint() {
  if (dHintDismissed) return;
  dHintDismissed = true;
  dhintEl.classList.add('is-hidden');
}

// 발견 첫 진입 시 0번 활성화
function ensureDiscoverActive() {
  if (!dInitialized) {
    dInitialized = true;
    requestAnimationFrame(()=>requestAnimationFrame(()=>setDiscoverActive(0)));
  } else {
    applyMood(dCurrent);
  }
}

// 발견 카드 하트 + 진행 도트 저장 상태 동기화
function syncDiscoverSaved() {
  dscenes.forEach(sc=>{
    const id = Number(sc.dataset.seed);
    const heart = $('.heart-btn', sc);
    const on = isSeedSaved(id);
    heart.classList.toggle('is-saved', on);
    heart.setAttribute('aria-pressed', on?'true':'false');
  });
  dprogressDots.forEach((d,i)=>{
    d.classList.toggle('is-saved', isSeedSaved(SEEDS[i].id));
  });
}

/* 시드 저장 토글 (발견/상세 공용) */
function toggleSeedSave(seedId, btn) {
  const s = SEEDS.find(x=>x.id===seedId);
  if (isSeedSaved(seedId)) {
    removeSeed(seedId);
    if (btn) { btn.classList.remove('is-saved'); btn.setAttribute('aria-pressed','false'); }
    showToast('서랍에서 뺐어요', false);
  } else {
    drawer.push(seedToEntry(s, 'discover'));
    saveDrawer();
    if (btn) { btn.classList.add('is-saved'); btn.setAttribute('aria-pressed','true'); }
    showToast('서랍에 담았어요');
  }
  // 펄스
  if (btn) { btn.classList.remove('is-pulse'); void btn.offsetWidth; btn.classList.add('is-pulse'); }
  // 모든 곳 동기화
  syncDiscoverSaved();
  syncDetailSaved();
}

/* =========================================================
   화면 3 · 서랍 렌더 (검색 + 필터)
   ========================================================= */
let drawerFilter = 'all'; // all | direct | discover
let drawerQuery = '';

function renderDrawerChips() {
  const counts = {
    all: drawer.length,
    direct: drawer.filter(d=>d.source==='direct').length,
    discover: drawer.filter(d=>d.source==='discover').length
  };
  const defs = [['all','전체'],['direct','직접'],['discover','발견']];
  $('#drawerChips').innerHTML = defs.map(([k,label])=>
    `<button class="chip ${drawerFilter===k?'is-on':''}" data-filter="${k}" type="button">${label}<span class="chip__count">${counts[k]}</span></button>`
  ).join('');
  $$('.chip', $('#drawerChips')).forEach(c=>{
    c.addEventListener('click', ()=>{ drawerFilter=c.dataset.filter; renderDrawer(); });
  });
}

function renderDrawer() {
  $('#drawerCount').textContent = drawer.length;
  renderDrawerChips();

  let list = drawer.slice().sort((a,b)=>b.savedAt-a.savedAt);
  if (drawerFilter !== 'all') list = list.filter(d=>d.source===drawerFilter);
  if (drawerQuery) {
    const q = drawerQuery.toLowerCase();
    list = list.filter(d =>
      (d.text||'').toLowerCase().includes(q) ||
      (d.author||'').toLowerCase().includes(q) ||
      (d.work||'').toLowerCase().includes(q) ||
      (d.keywords||[]).some(k=>k.toLowerCase().includes(q))
    );
  }

  const grid = $('#drawerGrid');
  const empty = $('#drawerEmpty');
  if (list.length === 0) {
    grid.innerHTML = '';
    empty.classList.add('is-show');
    return;
  }
  empty.classList.remove('is-show');
  grid.innerHTML = list.map(e => {
    const badge = e.source==='direct'
      ? `<span class="dcard__badge is-direct">직접</span>`
      : `<span class="dcard__badge">발견</span>`;
    return `
      <article class="dcard" data-uid="${esc(e.uid)}" role="button" tabindex="0">
        ${badge}
        <div class="dcard__mark" aria-hidden="true">&ldquo;</div>
        <div class="dcard__text">${esc(e.text.replace(/\n/g,' '))}</div>
        <div class="dcard__foot">
          <span class="dcard__author">${esc(e.author||'직접 기록')}</span>
          ${e.work?`<span class="dot-sep"></span><span>${esc(e.work)}</span>`:''}
        </div>
      </article>`;
  }).join('');
  $$('.dcard', grid).forEach(el=>{
    const uid = el.dataset.uid;
    const open = ()=>openDetailByUid(uid);
    el.addEventListener('click', open);
    el.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){e.preventDefault();open();} });
  });
}

$('#drawerSearch').addEventListener('input', (e)=>{ drawerQuery=e.target.value.trim(); renderDrawer(); });

/* =========================================================
   포착 시트
   ========================================================= */
const captureSheet = $('#captureSheet');
const captureScrim = $('#captureScrim');
let capTags = [];

function openCapture() {
  // 초기화
  $('#capText').value=''; $('#capAuthor').value=''; $('#capWork').value=''; $('#capUrl').value='';
  $('#capTagInput').value=''; capTags=[]; renderCapTags();
  $('#capDetected').classList.remove('is-show');
  updateCapSubmit();
  renderTagSuggest();
  captureScrim.classList.add('is-open');
  captureSheet.classList.add('is-open');
  setTimeout(()=>$('#capText').focus(), 420);
}
function closeCapture() {
  captureSheet.classList.remove('is-open');
  captureScrim.classList.remove('is-open');
  $('#capText').blur();
}

$('#fab').addEventListener('click', openCapture);
$('#quickCapture').addEventListener('click', openCapture);
$('#captureClose').addEventListener('click', closeCapture);
captureScrim.addEventListener('click', closeCapture);

// 담기 버튼 활성화 — 문장이 있어야
function updateCapSubmit() {
  $('#capSubmit').disabled = $('#capText').value.trim().length === 0;
}
$('#capText').addEventListener('input', updateCapSubmit);

/* ----- 출처 자동 인식 (데모: URL 입력 시 / 따옴표 패턴 감지) ----- */
$('#capUrl').addEventListener('input', (e)=>{
  const v = e.target.value.trim();
  if (v.length > 8 && /https?:\/\//.test(v)) {
    // 데모용: URL에서 그럴듯한 출처를 '인식'한 척
    let host = '웹페이지';
    try { host = new URL(v).hostname.replace(/^www\./,''); } catch(_) {}
    $('#capWork').value = $('#capWork').value || host;
    $('#capAuthor').value = $('#capAuthor').value || '웹';
    $('#capDetectedText').textContent = `출처를 자동으로 인식했어요 · ${host}`;
    $('#capDetected').classList.add('is-show');
  }
});
// 문장에 "— 저자" 같은 패턴이 있으면 분리 제안 (간단 데모)
$('#capText').addEventListener('blur', ()=>{
  const t = $('#capText').value;
  const m = t.match(/[—\-–]\s*([가-힣A-Za-z·\s]{2,12})\s*$/);
  if (m && !$('#capAuthor').value) {
    $('#capAuthor').value = m[1].trim();
    $('#capText').value = t.replace(/[—\-–]\s*[가-힣A-Za-z·\s]{2,12}\s*$/, '').trim();
    $('#capDetectedText').textContent = `저자를 자동으로 인식했어요 · ${m[1].trim()}`;
    $('#capDetected').classList.add('is-show');
    updateCapSubmit();
  }
});

/* ----- 태그 입력 ----- */
function renderCapTags() {
  const wrap = $('#tagWrap');
  // 기존 pill 제거(인풋은 유지)
  $$('.tag-pill', wrap).forEach(p=>p.remove());
  const input = $('#capTagInput');
  capTags.forEach((t,i)=>{
    const pill = document.createElement('span');
    pill.className = 'tag-pill';
    pill.innerHTML = `${esc(t)} <button type="button" aria-label="태그 삭제">&times;</button>`;
    pill.querySelector('button').addEventListener('click', ()=>{ capTags.splice(i,1); renderCapTags(); renderTagSuggest(); });
    wrap.insertBefore(pill, input);
  });
}
function addTag(t) {
  t = t.trim().replace(/^#/,'');
  if (!t || capTags.includes(t) || capTags.length>=6) return;
  capTags.push(t); renderCapTags(); renderTagSuggest();
}
$('#capTagInput').addEventListener('keydown', (e)=>{
  if (e.key==='Enter' || e.key===',') { e.preventDefault(); addTag(e.target.value); e.target.value=''; }
  else if (e.key==='Backspace' && e.target.value==='' && capTags.length) { capTags.pop(); renderCapTags(); renderTagSuggest(); }
});
$('#tagWrap').addEventListener('click', ()=>$('#capTagInput').focus());

// 추천 태그
const SUGGEST_TAGS = ['영감','위로','문장수집','오늘','다시읽기','일','사랑','용기'];
function renderTagSuggest() {
  const avail = SUGGEST_TAGS.filter(t=>!capTags.includes(t));
  $('#tagSuggest').innerHTML = avail.slice(0,6).map(t=>
    `<button class="tag-suggest__item" type="button">＋ ${esc(t)}</button>`
  ).join('');
  $$('.tag-suggest__item', $('#tagSuggest')).forEach((el,i)=>{
    el.addEventListener('click', ()=>addTag(avail[i]));
  });
}

/* ----- 담기 ----- */
$('#capSubmit').addEventListener('click', ()=>{
  const text = $('#capText').value.trim();
  if (!text) return;
  const entry = {
    uid:'u' + Date.now() + Math.random().toString(36).slice(2,6),
    seedId:null,
    text:text,
    author:$('#capAuthor').value.trim(),
    work:$('#capWork').value.trim(),
    year:'',
    theme: capTags[0] || '직접',
    keywords: capTags.slice(),
    source:'direct',
    savedAt:Date.now()
  };
  drawer.push(entry);
  saveDrawer();
  closeCapture();
  showToast('서랍에 담았어요');
  // 화면 갱신
  if (currentScreen==='home') renderHome();
  if (currentScreen==='drawer') renderDrawer();
});

/* =========================================================
   문장 상세 시트
   ========================================================= */
const detailSheet = $('#detailSheet');
const detailScrim = $('#detailScrim');
let detailContext = null; // {kind:'seed', id} | {kind:'entry', uid}

function openDetail(seedId) {
  const s = SEEDS.find(x=>x.id===seedId);
  if (!s) return;
  detailContext = {kind:'seed', id:seedId, data:s};
  fillDetail(s);
  renderSimilar(s);
  showDetailSheet();
}
function openDetailByUid(uid) {
  const e = drawer.find(d=>d.uid===uid);
  if (!e) return;
  // 시드 기반이면 시드 상세로(추천 풍부)
  if (e.seedId) { openDetail(e.seedId); return; }
  detailContext = {kind:'entry', uid:uid, data:e};
  fillDetail(e);
  renderSimilar(e);
  showDetailSheet();
}
function showDetailSheet() {
  detailScrim.classList.add('is-open');
  detailSheet.classList.add('is-open');
  detailSheet.querySelector('.sheet__scroll').scrollTop = 0;
}
function closeDetail() {
  detailSheet.classList.remove('is-open');
  detailScrim.classList.remove('is-open');
}
$('#detailClose').addEventListener('click', closeDetail);
detailScrim.addEventListener('click', closeDetail);

function fillDetail(d) {
  $('#detailQuote').innerHTML = linesHTML(d.text, 'ln');
  $('#detailAuthor').textContent = d.author || '직접 기록';
  const parts = [];
  if (d.work) parts.push(esc(d.work));
  if (d.year) parts.push(esc(d.year));
  $('#detailSrc').innerHTML = parts.join('<span class="dot-sep"></span>');
  $('#detailTheme').textContent = d.theme || '문장';
  $('#detailTheme').style.display = (d.theme) ? '' : 'none';
  syncDetailSaved();
}

// 상세 저장 버튼 상태
function syncDetailSaved() {
  const btn = $('#detailSave');
  const label = $('#detailSaveLabel');
  if (!detailContext) return;
  let saved = false;
  if (detailContext.kind === 'seed') saved = isSeedSaved(detailContext.id);
  else saved = drawer.some(d=>d.uid===detailContext.uid); // 직접 항목은 이미 저장됨
  btn.classList.toggle('is-saved', saved);
  label.textContent = saved ? '서랍에 담김' : '서랍에 담기';
}

// 상세 저장 토글
$('#detailSave').addEventListener('click', ()=>{
  if (!detailContext) return;
  if (detailContext.kind === 'seed') {
    toggleSeedSave(detailContext.id, null);
    syncDetailSaved();
  } else {
    // 직접 항목: 이미 서랍에 있음 → 토글로 제거/복원
    const exists = drawer.some(d=>d.uid===detailContext.uid);
    if (exists) {
      drawer = drawer.filter(d=>d.uid!==detailContext.uid);
      saveDrawer();
      showToast('서랍에서 뺐어요', false);
    } else {
      drawer.push(detailContext.data);
      saveDrawer();
      showToast('서랍에 담았어요');
    }
    syncDetailSaved();
  }
  // 펄스
  const btn = $('#detailSave');
  btn.classList.remove('is-pulse'); void btn.offsetWidth; btn.classList.add('is-pulse');
  if (currentScreen==='drawer') renderDrawer();
  if (currentScreen==='home') renderHome();
});

// 공유 (데모)
$('#detailShare').addEventListener('click', ()=>{
  if (!detailContext) return;
  const d = detailContext.data;
  const shareText = `"${d.text.replace(/\n/g,' ')}" — ${d.author||''} ${d.work||''}`.trim();
  if (navigator.share) {
    navigator.share({text:shareText}).catch(()=>{});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(shareText).then(()=>showToast('문장을 복사했어요')).catch(()=>showToast('문장을 복사했어요'));
  } else {
    showToast('문장을 복사했어요');
  }
});

/* ----- AI 유사 추천 (theme 같은 문장 우선) ----- */
function renderSimilar(d) {
  const selfSeedId = d.seedId || (detailContext.kind==='seed'?detailContext.id:null);
  // 같은 theme 우선, 자기 자신 제외
  let pool = SEEDS.filter(s => s.id !== selfSeedId);
  const sameTheme = pool.filter(s => s.theme === d.theme);
  const others = pool.filter(s => s.theme !== d.theme);
  // 같은 keyword 가중치
  others.sort((a,b)=>{
    const ka = a.keywords.filter(k=>(d.keywords||[]).includes(k)).length;
    const kb = b.keywords.filter(k=>(d.keywords||[]).includes(k)).length;
    return kb-ka;
  });
  const picks = [...sameTheme, ...others].slice(0,2);

  $('#simList').innerHTML = picks.map(s=>`
    <div class="simcard" data-seed="${s.id}" role="button" tabindex="0">
      <span class="simcard__bar"></span>
      <div class="simcard__body">
        <div class="simcard__text">${esc(s.text.replace(/\n/g,' '))}</div>
        <div class="simcard__meta"><span class="a">${esc(s.author)}</span> · ${esc(s.work)} · <span style="color:var(--gold-soft)">${esc(s.theme)}</span></div>
      </div>
      <span class="simcard__arrow" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg>
      </span>
    </div>
  `).join('');
  $$('.simcard', $('#simList')).forEach(el=>{
    const id = Number(el.dataset.seed);
    const open = ()=>openDetail(id);
    el.addEventListener('click', open);
    el.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){e.preventDefault();open();} });
  });
}

/* =========================================================
   토스트
   ========================================================= */
const toastEl = $('#toast');
let toastTimer = null;
function showToast(msg, positive=true) {
  $('#toastText').textContent = msg;
  // 긍정/제거에 따라 체크 아이콘 표시
  toastEl.querySelector('svg').style.opacity = positive ? '1' : '0.45';
  toastEl.classList.add('is-show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>toastEl.classList.remove('is-show'), 1900);
}

/* =========================================================
   기타: 시계, ESC 닫기, 초기화
   ========================================================= */
function tickClock() {
  const n = new Date();
  $('#clock').textContent = `${n.getHours()}:${String(n.getMinutes()).padStart(2,'0')}`;
}

document.addEventListener('keydown', (e)=>{
  if (e.key === 'Escape') {
    if (captureSheet.classList.contains('is-open')) closeCapture();
    else if (detailSheet.classList.contains('is-open')) closeDetail();
  }
});

function init() {
  loadDrawer();
  tickClock();
  setInterval(tickClock, 30000);
  renderHome();
  buildDiscover();
  // 서랍은 첫 진입 시 렌더
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();
</script>
</body>
