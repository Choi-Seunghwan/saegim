<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>문장 연구소 · Soft Pastel</title>
<!-- 유일한 외부 의존: Pretendard 폰트 하나만 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css" />
<style>
  /* ============================================================
     문장 연구소 — V4 "소프트 컬러 · 친근(Soft Pastel)"
     좋은 문장을 줍고(포착) · 서랍에 모으고(소장) · 다시 만나는(재발견)
     모바일 웹앱 MVP. 컨셉 08 '기분'처럼 문장마다 감정의 색이 입혀진다.

     디자인 무드: 다정하고 산뜻한 일기장. 파스텔이되 텍스트는 진하게.
     ============================================================ */

  :root {
    /* ----- 모션 타이밍 ----- */
    --ease-out:  cubic-bezier(0.22, 0.61, 0.36, 1);   /* 등장 */
    --ease-soft: cubic-bezier(0.4, 0.0, 0.2, 1);       /* 일반 전환 */
    --ease-back: cubic-bezier(0.34, 1.5, 0.5, 1);      /* 살짝 튕기는 모션 */
    --t-page: 0.42s;     /* 화면 전환 */
    --t-sheet: 0.46s;    /* 시트 슬라이드 */

    /* ----- 베이스 컬러: 진한 회보라/먹색 텍스트 ----- */
    --ink:      #2f2a3d;   /* 본문(진한 회보라 먹색) */
    --ink-soft: #6a6480;   /* 약한 글자 */
    --ink-mute: #9a93ad;   /* 더 약한 글자/힌트 */
    --line:     rgba(80, 64, 120, 0.10);   /* 옅은 구분선 */
    --line-2:   rgba(80, 64, 120, 0.16);   /* 진한 구분선 */
    --paper:    #fffdfa;   /* 카드 흰 종이 */
    --paper-2:  #faf7ff;   /* 살짝 보라기 도는 흰색 */

    /* ----- 파스텔 배경 그라데이션 (크림·라벤더·민트·피치) ----- */
    --bg-cream:    #fdf6ef;
    --bg-lavender: #f3eefc;
    --bg-mint:     #ecf8f3;
    --bg-peach:    #fdeff0;

    /* ----- 강조(라벤더 코어) ----- */
    --accent:      #8b6fd6;
    --accent-soft: #b9a6ec;
    --accent-bg:   #efeafe;

    /* 안전영역(노치) */
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  /* ============================================================
     theme별 파스텔 색조 — 문장의 감정 색
     각 테마: --t-bg(카드 바탕), --t-edge(테두리/그림자색),
              --t-chip(칩 바탕), --t-ink(테마 진한 글자)
     ============================================================ */
  [data-theme="이별"]   { --t-bg:#f2ecfb; --t-edge:#c9b6ef; --t-chip:#e7dcfa; --t-ink:#6b4aa6; }
  [data-theme="자연"]   { --t-bg:#e7f6ef; --t-edge:#9fdcc0; --t-chip:#d4f0e2; --t-ink:#2f8a66; }
  [data-theme="성찰"]   { --t-bg:#e8f1f8; --t-edge:#a8cbe6; --t-chip:#d7e8f4; --t-ink:#356a99; }
  [data-theme="배움"]   { --t-bg:#fdf0e3; --t-edge:#f2c79a; --t-chip:#fbe2c9; --t-ink:#b06a26; }
  [data-theme="쓰기"]   { --t-bg:#fcf8e0; --t-edge:#ecd887; --t-chip:#f7efc4; --t-ink:#9a851f; }
  [data-theme="의지"]   { --t-bg:#fdeede; --t-edge:#f5c08c; --t-chip:#fbdcc0; --t-ink:#bb6a23; }
  [data-theme="자의식"] { --t-bg:#fceaf1; --t-edge:#f0b4cf; --t-chip:#f9d6e4; --t-ink:#a83c6c; }
  [data-theme="이별,믿음"], [data-theme="만남"] { --t-bg:#f2ecfb; --t-edge:#c9b6ef; --t-chip:#e7dcfa; --t-ink:#6b4aa6; }
  /* 직접 포착(기본) — 라벤더 톤 */
  [data-theme="직접"]   { --t-bg:#efeafe; --t-edge:#c2b0ef; --t-chip:#e2d8fb; --t-ink:#6c52c0; }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    font-family: "Pretendard", system-ui, sans-serif;
    color: var(--ink);
    word-break: keep-all;        /* 한글 단어 단위 줄바꿈 */
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overscroll-behavior: none;
  }

  /* 데스크톱: 화면 중앙에 폰 프레임, 좌우는 파스텔 톤 */
  body {
    min-height: 100%;
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(120% 90% at 15% 8%, var(--bg-lavender) 0%, transparent 55%),
      radial-gradient(110% 80% at 90% 12%, var(--bg-peach) 0%, transparent 50%),
      radial-gradient(130% 100% at 80% 95%, var(--bg-mint) 0%, transparent 55%),
      radial-gradient(120% 90% at 10% 92%, var(--bg-cream) 0%, transparent 55%),
      #f7f2fb;
    padding: 24px;
  }

  /* 폰 프레임(베젤) */
  .device {
    position: relative;
    width: 390px; height: 844px;
    max-height: calc(100vh - 36px);
    border-radius: 46px;
    background: #1c1726;
    padding: 11px;
    box-shadow:
      0 2px 6px rgba(60,40,100,0.18),
      0 30px 70px -20px rgba(70,46,120,0.42),
      0 6px 20px -6px rgba(70,46,120,0.28);
  }

  /* 화면 영역(스크린) */
  .screen {
    position: relative;
    width: 100%; height: 100%;
    border-radius: 36px;
    overflow: hidden;
    background:
      radial-gradient(130% 60% at 18% -4%, var(--bg-lavender) 0%, transparent 48%),
      radial-gradient(120% 55% at 92% 2%, var(--bg-peach) 0%, transparent 46%),
      radial-gradient(150% 70% at 80% 104%, var(--bg-mint) 0%, transparent 52%),
      radial-gradient(140% 60% at 8% 102%, var(--bg-cream) 0%, transparent 50%),
      #fbf7ff;
    isolation: isolate;
  }

  /* 모바일(≤430px): 프레임 제거, 풀스크린 */
  @media (max-width: 430px) {
    body { padding: 0; background: #fbf7ff; align-items: stretch; }
    .device {
      width: 100%; height: 100%; max-height: none;
      border-radius: 0; padding: 0; background: transparent; box-shadow: none;
    }
    .screen { border-radius: 0; }
  }

  /* 상태바(가짜) */
  .statusbar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 40;
    height: calc(44px + var(--safe-top));
    padding: calc(var(--safe-top) + 14px) 26px 0;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 14px; font-weight: 700; color: var(--ink);
    pointer-events: none;
  }
  .statusbar .dots { display: flex; gap: 5px; align-items: center; }
  .statusbar .bar { width: 4px; border-radius: 2px; background: var(--ink); }
  .statusbar .bar:nth-child(1){height:7px;opacity:.55}
  .statusbar .bar:nth-child(2){height:10px;opacity:.7}
  .statusbar .bar:nth-child(3){height:13px;opacity:.85}
  .statusbar .batt { width:24px;height:12px;border:1.6px solid var(--ink);border-radius:3px;position:relative;opacity:.85 }
  .statusbar .batt::after { content:"";position:absolute;left:2px;top:2px;bottom:2px;width:14px;background:var(--ink);border-radius:1px }
  .statusbar .batt::before { content:"";position:absolute;right:-3px;top:3.5px;width:2px;height:5px;background:var(--ink);border-radius:0 1px 1px 0 }

  /* ----- 스크롤 가능한 화면 컨테이너 ----- */
  .views { position: absolute; inset: 0; }

  .view {
    position: absolute; inset: 0;
    overflow-y: auto; overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding: calc(var(--safe-top) + 58px) 20px calc(118px + var(--safe-bottom));
    opacity: 0; visibility: hidden; transform: translateY(8px) scale(0.992);
    transition: opacity var(--t-page) var(--ease-soft),
                transform var(--t-page) var(--ease-out),
                visibility var(--t-page);
    scrollbar-width: none;
  }
  .view::-webkit-scrollbar { display: none; }
  .view.active { opacity: 1; visibility: visible; transform: none; }

  /* 발견 화면은 패딩 다르게(풀 카드 스택) */
  #view-discover { padding: calc(var(--safe-top) + 50px) 16px calc(118px + var(--safe-bottom)); }

  /* ============================================================
     공통 컴포넌트
     ============================================================ */

  /* 화면 헤더(눈에 잘 띄는 큰 인사) */
  .page-eyebrow {
    font-size: 12.5px; font-weight: 700; letter-spacing: .14em;
    color: var(--accent); text-transform: uppercase;
    margin-bottom: 7px;
  }
  .page-title {
    font-size: 26px; font-weight: 800; letter-spacing: -0.02em;
    line-height: 1.3; color: var(--ink);
  }
  .page-sub { font-size: 14.5px; color: var(--ink-soft); margin-top: 8px; line-height: 1.6; }

  .section-label {
    display: flex; align-items: baseline; gap: 8px;
    font-size: 15px; font-weight: 800; color: var(--ink);
    margin: 26px 2px 14px;
  }
  .section-label .accent { color: var(--accent); }
  .section-label .count {
    font-size: 12.5px; font-weight: 700; color: var(--ink-mute);
    margin-left: auto;
  }

  /* 말랑한 둥근 칩 */
  .chip {
    display: inline-flex; align-items: center; gap: 5px;
    height: 30px; padding: 0 13px;
    border-radius: 999px;
    font-size: 12.5px; font-weight: 700;
    background: var(--accent-bg); color: var(--accent);
    border: 1.4px solid transparent;
    cursor: pointer; user-select: none;
    transition: transform .14s var(--ease-back), background .2s, color .2s, border-color .2s;
    white-space: nowrap;
  }
  .chip:active { transform: scale(0.93); }
  .chip.theme-chip { background: var(--t-chip); color: var(--t-ink); }

  /* 필터 칩(서랍) */
  .filter-chip {
    height: 36px; padding: 0 16px; border-radius: 999px;
    font-size: 13.5px; font-weight: 700;
    background: rgba(255,255,255,0.7); color: var(--ink-soft);
    border: 1.4px solid var(--line-2);
    cursor: pointer; transition: all .2s var(--ease-soft);
    white-space: nowrap;
  }
  .filter-chip:active { transform: scale(0.95); }
  .filter-chip.on {
    background: var(--accent); color: #fff; border-color: var(--accent);
    box-shadow: 0 6px 16px -6px rgba(139,111,214,0.6);
  }

  /* ============================================================
     홈 화면
     ============================================================ */

  /* 빠른 포착 바 */
  .quick-capture {
    margin-top: 22px;
    display: flex; align-items: center; gap: 12px;
    background: var(--paper);
    border: 1.6px solid var(--line-2);
    border-radius: 20px;
    padding: 16px 18px;
    cursor: pointer;
    box-shadow: 0 10px 28px -16px rgba(110,80,180,0.4);
    transition: transform .18s var(--ease-back), box-shadow .25s, border-color .25s;
  }
  .quick-capture:active { transform: scale(0.985); border-color: var(--accent-soft); }
  .quick-capture .qc-icon {
    flex: none; width: 40px; height: 40px; border-radius: 13px;
    background: linear-gradient(135deg, #efeafe, #fbeaf1);
    display: flex; align-items: center; justify-content: center;
    color: var(--accent);
  }
  .quick-capture .qc-text { flex: 1; min-width: 0; }
  .quick-capture .qc-text b { display: block; font-size: 14.5px; font-weight: 700; color: var(--ink); }
  .quick-capture .qc-text span { display: block; font-size: 12.5px; color: var(--ink-mute); margin-top: 2px; }
  .quick-capture .qc-pen { flex: none; color: var(--accent-soft); }

  /* 오늘 다시 보는 문장 — 큰 재발견 카드 */
  .rediscover {
    position: relative;
    margin-top: 16px;
    border-radius: 26px;
    padding: 26px 24px 22px;
    background: var(--t-bg);
    border: 1.6px solid var(--t-edge);
    overflow: hidden;
    cursor: pointer;
    box-shadow: 0 20px 44px -22px var(--t-edge);
    transition: transform .2s var(--ease-back);
  }
  .rediscover:active { transform: scale(0.985); }
  .rediscover::before {
    content: ""; position: absolute; right: -40px; top: -50px;
    width: 180px; height: 180px; border-radius: 50%;
    background: radial-gradient(circle, var(--t-edge), transparent 68%);
    opacity: .5; pointer-events: none;
  }
  .rediscover .rd-badge {
    position: relative; display: inline-flex; align-items: center; gap: 6px;
    font-size: 11.5px; font-weight: 800; letter-spacing: .04em;
    color: var(--t-ink);
    background: rgba(255,255,255,0.65);
    border-radius: 999px; padding: 6px 12px; margin-bottom: 18px;
  }
  .rediscover .rd-quote {
    position: relative;
    font-size: 21px; font-weight: 700; line-height: 1.55;
    letter-spacing: -0.01em; color: var(--ink);
    white-space: pre-line;
  }
  .rediscover .rd-meta {
    position: relative; margin-top: 18px;
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--t-ink); font-weight: 600;
  }
  .rediscover .rd-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: currentColor; opacity: .5; }
  .rediscover .rd-meta .yr { color: var(--ink-mute); font-weight: 600; }

  /* 최근 담은 문장 미니 리스트 */
  .mini-list { display: flex; flex-direction: column; gap: 10px; }
  .mini-card {
    display: flex; align-items: center; gap: 14px;
    background: var(--paper);
    border: 1.4px solid var(--line);
    border-radius: 18px; padding: 14px 16px;
    cursor: pointer;
    transition: transform .16s var(--ease-back), box-shadow .2s;
  }
  .mini-card:active { transform: scale(0.98); box-shadow: 0 8px 20px -10px rgba(110,80,180,0.3); }
  .mini-card .swatch {
    flex: none; width: 8px; align-self: stretch; min-height: 38px;
    border-radius: 999px; background: var(--t-edge);
  }
  .mini-card .mc-body { flex: 1; min-width: 0; }
  .mini-card .mc-text {
    font-size: 14.5px; font-weight: 600; line-height: 1.45; color: var(--ink);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .mini-card .mc-meta { font-size: 12px; color: var(--ink-mute); margin-top: 5px; font-weight: 600; }
  .mini-card .mc-arrow { flex: none; color: var(--ink-mute); opacity: .6; }

  .empty-hint {
    text-align: center; color: var(--ink-mute);
    font-size: 13.5px; padding: 28px 16px; line-height: 1.7;
  }

  /* ============================================================
     발견 화면 — 큰 문장 카드 세로 스택
     ============================================================ */
  .discover-head { padding: 4px 6px 4px; margin-bottom: 4px; }

  .feed { display: flex; flex-direction: column; gap: 18px; padding-top: 14px; }

  .feed-card {
    position: relative;
    border-radius: 28px;
    padding: 34px 26px 24px;
    background: var(--t-bg);
    border: 1.8px solid var(--t-edge);
    overflow: hidden;
    box-shadow: 0 24px 50px -26px var(--t-edge);
    min-height: 320px;
    display: flex; flex-direction: column;
    cursor: pointer;
    transition: transform .2s var(--ease-back);
  }
  .feed-card:active { transform: scale(0.99); }
  .feed-card::before {
    content: ""; position: absolute; left: -50px; bottom: -60px;
    width: 200px; height: 200px; border-radius: 50%;
    background: radial-gradient(circle, var(--t-edge), transparent 68%);
    opacity: .45; pointer-events: none;
  }
  .feed-card .fc-theme {
    position: relative; align-self: flex-start;
    font-size: 11.5px; font-weight: 800; letter-spacing: .05em;
    color: var(--t-ink);
    background: rgba(255,255,255,0.62);
    border-radius: 999px; padding: 6px 13px;
  }
  .feed-card .fc-quote {
    position: relative; flex: 1;
    display: flex; align-items: center;
    margin: 22px 0;
  }
  .feed-card .fc-quote q {
    font-size: 24px; font-weight: 700; line-height: 1.6;
    letter-spacing: -0.015em; color: var(--ink);
    white-space: pre-line; quotes: none;
  }
  .feed-card .fc-quote q::before, .feed-card .fc-quote q::after { content: ""; }
  .feed-card .fc-foot {
    position: relative;
    display: flex; align-items: flex-end; justify-content: space-between; gap: 14px;
  }
  .feed-card .fc-meta { min-width: 0; }
  .feed-card .fc-author { font-size: 15.5px; font-weight: 800; color: var(--ink); }
  .feed-card .fc-source {
    font-size: 13px; color: var(--t-ink); font-weight: 600; margin-top: 4px;
    display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
  }
  .feed-card .fc-source .yr { color: var(--ink-mute); }
  .feed-card .fc-source .dot { width: 3px; height: 3px; border-radius: 50%; background: currentColor; opacity: .45; }

  /* 저장(하트) 버튼 */
  .heart-btn {
    flex: none; width: 50px; height: 50px; border-radius: 16px;
    background: rgba(255,255,255,0.7);
    border: 1.5px solid var(--t-edge);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--t-ink);
    transition: transform .2s var(--ease-back), background .25s;
  }
  .heart-btn:active { transform: scale(0.86); }
  .heart-btn svg { width: 24px; height: 24px; transition: transform .3s var(--ease-back); }
  .heart-btn.saved {
    background: var(--t-ink);
    border-color: var(--t-ink);
    color: #fff;
  }
  .heart-btn.saved svg { animation: heartPop .42s var(--ease-back); }
  @keyframes heartPop { 0%{transform:scale(1)} 35%{transform:scale(1.35)} 100%{transform:scale(1)} }

  /* 발견 진행 도트 */
  .feed-progress {
    position: sticky; bottom: 6px;
    display: flex; justify-content: center; gap: 6px;
    margin-top: 6px; pointer-events: none;
  }

  /* ============================================================
     서랍 화면
     ============================================================ */
  .search-bar {
    margin-top: 20px;
    display: flex; align-items: center; gap: 11px;
    background: var(--paper);
    border: 1.6px solid var(--line-2);
    border-radius: 16px; padding: 13px 16px;
    box-shadow: 0 8px 22px -16px rgba(110,80,180,0.4);
  }
  .search-bar svg { flex: none; color: var(--ink-mute); }
  .search-bar input {
    flex: 1; border: none; outline: none; background: transparent;
    font-family: inherit; font-size: 15px; color: var(--ink);
  }
  .search-bar input::placeholder { color: var(--ink-mute); }

  .filter-row {
    display: flex; gap: 9px; margin-top: 16px;
    overflow-x: auto; padding-bottom: 2px; scrollbar-width: none;
    margin-left: -2px; padding-left: 2px;
  }
  .filter-row::-webkit-scrollbar { display: none; }

  /* 서랍 그리드(2열 메이슨리 느낌) */
  .drawer-grid {
    margin-top: 18px;
    columns: 2; column-gap: 12px;
  }
  .drawer-card {
    break-inside: avoid; margin-bottom: 12px;
    border-radius: 20px; padding: 16px 16px 14px;
    background: var(--t-bg);
    border: 1.5px solid var(--t-edge);
    box-shadow: 0 14px 30px -20px var(--t-edge);
    cursor: pointer;
    transition: transform .18s var(--ease-back);
    -webkit-column-break-inside: avoid;
  }
  .drawer-card:active { transform: scale(0.97); }
  .drawer-card .dc-theme {
    display: inline-block; font-size: 10.5px; font-weight: 800; letter-spacing: .04em;
    color: var(--t-ink); background: rgba(255,255,255,0.6);
    border-radius: 999px; padding: 4px 10px; margin-bottom: 11px;
  }
  .drawer-card .dc-text {
    font-size: 15px; font-weight: 700; line-height: 1.5; color: var(--ink);
    white-space: pre-line;
    display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden;
  }
  .drawer-card .dc-author { font-size: 12px; color: var(--t-ink); font-weight: 700; margin-top: 12px; }
  .drawer-card .dc-source { font-size: 11px; color: var(--ink-mute); margin-top: 2px; font-weight: 600; }

  .drawer-empty {
    text-align: center; padding: 60px 24px; color: var(--ink-mute);
  }
  .drawer-empty .de-emoji {

  }
  .drawer-empty b { display: block; font-size: 16px; color: var(--ink); font-weight: 800; margin-bottom: 8px; }
  .drawer-empty span { font-size: 13.5px; line-height: 1.7; }

  /* ============================================================
     하단 탭바 + FAB
     ============================================================ */
  .tabbar {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 30;
    height: calc(78px + var(--safe-bottom));
    padding-bottom: var(--safe-bottom);
    background: rgba(255, 252, 250, 0.82);
    backdrop-filter: blur(22px) saturate(1.4);
    -webkit-backdrop-filter: blur(22px) saturate(1.4);
    border-top: 1.4px solid var(--line);
    display: flex; align-items: flex-start; justify-content: space-around;
    padding-top: 9px;
  }
  .tab {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    background: none; border: none; cursor: pointer;
    color: var(--ink-mute); font-family: inherit;
    padding: 4px 0; position: relative;
    transition: color .25s;
  }
  .tab svg { width: 25px; height: 25px; transition: transform .25s var(--ease-back); }
  .tab span { font-size: 11px; font-weight: 700; letter-spacing: .01em; }
  .tab.on { color: var(--accent); }
  .tab.on svg { transform: translateY(-1px) scale(1.06); }
  /* FAB 자리 비우기(가운데 탭은 투명 자리만) */
  .tab.spacer { pointer-events: none; visibility: hidden; }

  .fab {
    position: absolute; left: 50%; bottom: calc(40px + var(--safe-bottom));
    transform: translateX(-50%);
    z-index: 32;
    width: 62px; height: 62px; border-radius: 50%;
    background: linear-gradient(140deg, #9a7fe0, #c98fd0);
    border: 3.5px solid var(--paper);
    display: flex; align-items: center; justify-content: center;
    color: #fff; cursor: pointer;
    box-shadow: 0 12px 26px -8px rgba(150,110,210,0.7), 0 4px 10px -4px rgba(150,110,210,0.5);
    transition: transform .22s var(--ease-back), box-shadow .25s;
  }
  .fab:active { transform: translateX(-50%) scale(0.9); }
  .fab svg { width: 30px; height: 30px; }
  .fab .ring {
    position: absolute; inset: -3.5px; border-radius: 50%;
    border: 2px solid #c98fd0; opacity: 0;
  }
  .fab.pulse .ring { animation: fabPulse .6s var(--ease-out); }
  @keyframes fabPulse { 0%{opacity:.6;transform:scale(1)} 100%{opacity:0;transform:scale(1.45)} }

  /* ============================================================
     포착 시트 (바텀시트 모달)
     ============================================================ */
  .scrim {
    position: absolute; inset: 0; z-index: 50;
    background: rgba(45, 36, 70, 0);
    backdrop-filter: blur(0px);
    visibility: hidden;
    transition: background var(--t-sheet) var(--ease-soft),
                backdrop-filter var(--t-sheet) var(--ease-soft),
                visibility var(--t-sheet);
  }
  .scrim.open {
    background: rgba(45, 36, 70, 0.34);
    backdrop-filter: blur(3px);
    visibility: visible;
  }

  .sheet {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 51;
    background: var(--paper);
    border-radius: 30px 30px 0 0;
    padding: 12px 22px calc(28px + var(--safe-bottom));
    transform: translateY(105%);
    transition: transform var(--t-sheet) var(--ease-out);
    max-height: 90%;
    overflow-y: auto; scrollbar-width: none;
    box-shadow: 0 -20px 60px -20px rgba(70,46,120,0.4);
  }
  .sheet::-webkit-scrollbar { display: none; }
  .sheet.open { transform: translateY(0); }

  .sheet-grip {
    width: 42px; height: 5px; border-radius: 999px;
    background: var(--line-2); margin: 4px auto 16px;
  }
  .sheet-title {
    font-size: 20px; font-weight: 800; color: var(--ink);
    display: flex; align-items: center; gap: 9px;
  }
  .sheet-title .st-ico { color: var(--accent); display: inline-flex; }
  .sheet-sub { font-size: 13px; color: var(--ink-soft); margin-top: 6px; }

  .field { margin-top: 20px; }
  .field-label {
    font-size: 12.5px; font-weight: 800; color: var(--ink-soft);
    margin-bottom: 9px; display: flex; align-items: center; gap: 6px;
    letter-spacing: .01em;
  }
  .field-label .opt { font-weight: 600; color: var(--ink-mute); }

  textarea.capture-text {
    width: 100%; min-height: 132px; resize: none;
    border: 1.8px solid var(--line-2); border-radius: 18px;
    padding: 16px 17px; font-family: inherit; font-size: 17px;
    line-height: 1.6; color: var(--ink); background: var(--paper-2);
    outline: none; word-break: keep-all;
    transition: border-color .22s, background .22s, box-shadow .22s;
  }
  textarea.capture-text:focus {
    border-color: var(--accent-soft); background: var(--paper);
    box-shadow: 0 0 0 4px rgba(139,111,214,0.12);
  }
  textarea.capture-text::placeholder { color: var(--ink-mute); }

  .source-input {
    width: 100%; height: 50px;
    border: 1.8px solid var(--line-2); border-radius: 15px;
    padding: 0 15px; font-family: inherit; font-size: 15px;
    color: var(--ink); background: var(--paper-2); outline: none;
    transition: border-color .22s, background .22s, box-shadow .22s;
  }
  .source-input:focus {
    border-color: var(--accent-soft); background: var(--paper);
    box-shadow: 0 0 0 4px rgba(139,111,214,0.12);
  }
  .source-input::placeholder { color: var(--ink-mute); }
  /* 출처 자동 인식 느낌 안내 */
  .auto-detect {
    margin-top: 9px; font-size: 11.5px; color: var(--accent);
    display: flex; align-items: center; gap: 6px; font-weight: 600;
  }
  .auto-detect .blink { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: blink 1.4s infinite; }
  @keyframes blink { 0%,100%{opacity:.3} 50%{opacity:1} }

  /* 태그 칩 입력 영역 */
  .tag-input-wrap {
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    border: 1.8px solid var(--line-2); border-radius: 15px;
    padding: 10px 12px; background: var(--paper-2);
    min-height: 50px;
    transition: border-color .22s, box-shadow .22s;
  }
  .tag-input-wrap.focus { border-color: var(--accent-soft); box-shadow: 0 0 0 4px rgba(139,111,214,0.12); background: var(--paper); }
  .tag-pill {
    display: inline-flex; align-items: center; gap: 5px;
    height: 28px; padding: 0 6px 0 11px; border-radius: 999px;
    background: var(--accent-bg); color: var(--accent);
    font-size: 12.5px; font-weight: 700;
    animation: pillIn .26s var(--ease-back);
  }
  @keyframes pillIn { from{transform:scale(.7);opacity:0} to{transform:scale(1);opacity:1} }
  .tag-pill button {
    border: none; background: rgba(139,111,214,0.16); color: var(--accent);
    width: 17px; height: 17px; border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 12px;
    line-height: 1; padding: 0;
  }
  .tag-input-wrap input {
    flex: 1; min-width: 70px; border: none; outline: none; background: transparent;
    font-family: inherit; font-size: 14px; color: var(--ink); height: 28px;
  }
  .tag-input-wrap input::placeholder { color: var(--ink-mute); }
  /* 추천 태그 */
  .tag-suggest { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
  .tag-suggest .sug {
    font-size: 12px; font-weight: 700; color: var(--ink-soft);
    background: rgba(255,255,255,0.7); border: 1.3px dashed var(--line-2);
    border-radius: 999px; padding: 5px 11px; cursor: pointer;
    transition: all .18s;
  }
  .tag-suggest .sug:active { transform: scale(0.94); }

  .submit-btn {
    width: 100%; height: 56px; margin-top: 26px;
    border: none; border-radius: 18px;
    background: linear-gradient(135deg, #9a7fe0, #c98fd0);
    color: #fff; font-family: inherit; font-size: 16.5px; font-weight: 800;
    cursor: pointer; letter-spacing: .01em;
    box-shadow: 0 14px 30px -12px rgba(150,110,210,0.65);
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: transform .18s var(--ease-back), opacity .2s;
  }
  .submit-btn:active { transform: scale(0.97); }
  .submit-btn:disabled { opacity: .45; box-shadow: none; }

  /* ============================================================
     문장 상세 (전체화면 시트)
     ============================================================ */
  .detail {
    position: absolute; inset: 0; z-index: 55;
    background: var(--t-bg, #f7f2fb);
    overflow-y: auto; scrollbar-width: none;
    transform: translateX(100%);
    transition: transform var(--t-sheet) var(--ease-out);
    padding: calc(var(--safe-top) + 16px) 0 calc(40px + var(--safe-bottom));
  }
  .detail::-webkit-scrollbar { display: none; }
  .detail.open { transform: translateX(0); }
  .detail::before {
    content: ""; position: absolute; left: -60px; top: -40px;
    width: 240px; height: 240px; border-radius: 50%;
    background: radial-gradient(circle, var(--t-edge), transparent 66%);
    opacity: .5; pointer-events: none;
  }
  .detail::after {
    content: ""; position: absolute; right: -70px; bottom: 120px;
    width: 220px; height: 220px; border-radius: 50%;
    background: radial-gradient(circle, var(--t-edge), transparent 68%);
    opacity: .35; pointer-events: none;
  }

  .detail-bar {
    position: relative; z-index: 2;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 18px; margin-bottom: 12px;
  }
  .icon-btn {
    width: 44px; height: 44px; border-radius: 14px;
    background: rgba(255,255,255,0.7); border: 1.4px solid var(--t-edge);
    display: flex; align-items: center; justify-content: center;
    color: var(--t-ink); cursor: pointer;
    transition: transform .18s var(--ease-back);
  }
  .icon-btn:active { transform: scale(0.9); }
  .detail-bar .d-theme {
    font-size: 12px; font-weight: 800; color: var(--t-ink);
    background: rgba(255,255,255,0.62); border-radius: 999px; padding: 7px 15px;
  }

  .detail-body { position: relative; z-index: 2; padding: 0 26px; }
  .detail-quote {
    font-size: 28px; font-weight: 800; line-height: 1.62;
    letter-spacing: -0.02em; color: var(--ink);
    white-space: pre-line; margin: 38px 0 28px;
  }
  .detail-quote .qmark { color: var(--t-edge); font-size: 40px; line-height: 0; vertical-align: -6px; margin-right: 2px; }
  .detail-meta-card {
    background: rgba(255,255,255,0.62);
    border: 1.4px solid var(--t-edge);
    border-radius: 20px; padding: 18px 20px;
    display: flex; align-items: center; gap: 14px;
  }
  .detail-meta-card .avatar {
    flex: none; width: 48px; height: 48px; border-radius: 16px;
    background: var(--t-chip); color: var(--t-ink);
    display: flex; align-items: center; justify-content: center;
    font-size: 19px; font-weight: 800;
  }
  .detail-meta-card .dm-info b { display: block; font-size: 16px; font-weight: 800; color: var(--ink); }
  .detail-meta-card .dm-info span { display: block; font-size: 13px; color: var(--t-ink); margin-top: 3px; font-weight: 600; }

  .detail-keywords { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 18px; }

  /* AI 유사 추천 */
  .ai-block { margin-top: 32px; }
  .ai-head {
    display: flex; align-items: center; gap: 9px; margin-bottom: 14px;
    font-size: 15px; font-weight: 800; color: var(--ink);
  }
  .ai-head .ai-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10.5px; font-weight: 800; letter-spacing: .04em;
    color: #fff; background: linear-gradient(135deg, #9a7fe0, #c98fd0);
    border-radius: 999px; padding: 4px 9px;
  }
  .sim-card {
    display: flex; align-items: stretch; gap: 14px;
    background: rgba(255,255,255,0.66);
    border: 1.4px solid var(--line-2);
    border-radius: 18px; padding: 15px 16px; margin-bottom: 11px;
    cursor: pointer;
    transition: transform .16s var(--ease-back), box-shadow .2s;
  }
  .sim-card:active { transform: scale(0.98); box-shadow: 0 10px 24px -12px rgba(110,80,180,0.35); }
  .sim-card .sim-swatch { flex: none; width: 6px; border-radius: 999px; }
  .sim-card .sim-body { flex: 1; min-width: 0; }
  .sim-card .sim-text {
    font-size: 14px; font-weight: 600; line-height: 1.5; color: var(--ink);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    white-space: pre-line;
  }
  .sim-card .sim-meta { font-size: 11.5px; color: var(--ink-mute); margin-top: 6px; font-weight: 700; }
  .sim-card .sim-arrow { flex: none; align-self: center; color: var(--ink-mute); }

  /* 상세 하단 액션 (저장·공유) */
  .detail-actions {
    position: relative; z-index: 2;
    display: flex; gap: 12px; padding: 0 26px; margin-top: 32px;
  }
  .act-btn {
    flex: 1; height: 54px; border-radius: 17px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    font-family: inherit; font-size: 15px; font-weight: 800; cursor: pointer;
    transition: transform .16s var(--ease-back);
  }
  .act-btn:active { transform: scale(0.96); }
  .act-save {
    background: var(--t-ink); color: #fff; border: none;
    box-shadow: 0 12px 26px -12px var(--t-edge);
  }
  .act-save.is-saved { background: rgba(255,255,255,0.7); color: var(--t-ink); border: 1.6px solid var(--t-edge); box-shadow: none; }
  .act-share {
    flex: 0 0 54px; background: rgba(255,255,255,0.7);
    color: var(--t-ink); border: 1.6px solid var(--t-edge);
  }

  /* ============================================================
     토스트
     ============================================================ */
  .toast-wrap {
    position: absolute; left: 0; right: 0; bottom: calc(102px + var(--safe-bottom));
    z-index: 60; display: flex; justify-content: center; pointer-events: none;
  }
  .toast {
    display: flex; align-items: center; gap: 10px;
    background: rgba(47, 42, 61, 0.94);
    backdrop-filter: blur(10px);
    color: #fff; font-size: 14px; font-weight: 700;
    padding: 13px 20px; border-radius: 16px;
    box-shadow: 0 16px 34px -12px rgba(40,30,70,0.6);
    transform: translateY(24px) scale(0.92); opacity: 0;
    transition: transform .4s var(--ease-back), opacity .3s;
    max-width: 88%;
  }
  .toast.show { transform: translateY(0) scale(1); opacity: 1; }
  .toast .t-ico {
    flex: none; width: 24px; height: 24px; border-radius: 50%;
    background: linear-gradient(135deg, #9a7fe0, #c98fd0);
    display: flex; align-items: center; justify-content: center;
  }
  .toast .t-ico svg { width: 15px; height: 15px; }

  /* 등장 스태거 애니메이션 헬퍼 */
  .stagger > * { opacity: 0; transform: translateY(12px); }
  .view.active .stagger > * { animation: rise .5s var(--ease-out) forwards; }
  .view.active .stagger > *:nth-child(1){animation-delay:.04s}
  .view.active .stagger > *:nth-child(2){animation-delay:.10s}
  .view.active .stagger > *:nth-child(3){animation-delay:.16s}
  .view.active .stagger > *:nth-child(4){animation-delay:.22s}
  .view.active .stagger > *:nth-child(5){animation-delay:.28s}
  .view.active .stagger > *:nth-child(6){animation-delay:.34s}
  @keyframes rise { to { opacity: 1; transform: none; } }
</style>
</head>

      <!-- ===== 문장 상세 ===== -->
      <div class="detail" id="detail"></div>

      <div class="toast-wrap"><div class="toast" id="toast"></div></div>

    </div><!-- /screen -->
  </div><!-- /device -->

<script>
/* ============================================================
   데이터 — 시드 10개
   ============================================================ */
const SEED = [
  {id:1,text:"죽는 날까지 하늘을 우러러\n한 점 부끄럼이 없기를",author:"윤동주",work:"하늘과 바람과 별과 시",year:"1948",theme:"성찰",keywords:["부끄러움","양심","바람"]},
  {id:2,text:"나 보기가 역겨워 가실 때에는\n말없이 고이 보내 드리오리다",author:"김소월",work:"진달래꽃",year:"1925",theme:"이별",keywords:["이별","체념","헌신"]},
  {id:3,text:"우리는 만날 때에 떠날 것을 염려하는 것과 같이,\n떠날 때에 다시 만날 것을 믿습니다",author:"한용운",work:"님의 침묵",year:"1926",theme:"이별",keywords:["만남","이별","믿음"]},
  {id:4,text:"다시 천고의 뒤에\n백마 타고 오는 초인이 있어",author:"이육사",work:"광야",year:"1945",theme:"의지",keywords:["초인","미래","희생"]},
  {id:5,text:"박제가 되어 버린 천재를 아시오?",author:"이상",work:"날개",year:"1936",theme:"자의식",keywords:["천재","권태","근대"]},
  {id:6,text:"계절이 지나가는 하늘에는\n가을로 가득 차 있습니다",author:"윤동주",work:"하늘과 바람과 별과 시",year:"1948",theme:"자연",keywords:["가을","하늘","그리움"]},
  {id:7,text:"하루라도 책을 읽지 않으면\n입안에 가시가 돋는다",author:"안중근",work:"유묵",year:"1910",theme:"배움",keywords:["독서","수양","단련"]},
  {id:8,text:"천 리 길도\n한 걸음에서 시작된다",author:"노자",work:"도덕경",year:"고전",theme:"배움",keywords:["시작","한걸음","축적"]},
  {id:9,text:"문장은 끝내기 위해서가 아니라,\n멈추는 법을 배우기 위해 쓴다",author:"새김 편집부",work:"쉼표의 자리",year:"2024",theme:"쓰기",keywords:["문장","멈춤","여백"]},
  {id:10,text:"모든 책은 첫 문장에서 한 번,\n마지막 문장에서 다시 태어난다",author:"새김 편집부",work:"첫 문장의 무게",year:"2025",theme:"쓰기",keywords:["첫문장","끝문장","탄생"]}
];

/* 테마 라벨 정규화(키워드 조합 등은 무시하고 단일 테마만) */
function themeAttr(theme){ return theme; }

/* ============================================================
   상태 — localStorage 기반 서랍
   ============================================================ */
const LS_KEY = "sentence-lab-v4-drawer";
let drawer = loadDrawer();
let savedIds = new Set(drawer.filter(d=>d.origin==="발견").map(d=>d.seedId));

function loadDrawer(){
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(raw){ const arr = JSON.parse(raw); if(Array.isArray(arr) && arr.length) return arr; }
  } catch(e){}
  /* 처음엔 샘플 3개로 시작 (발견 시드 중 2개 저장 + 직접 포착 1개) */
  const seed1 = SEED.find(s=>s.id===8);   // 천 리 길도 (배움)
  const seed2 = SEED.find(s=>s.id===6);   // 계절이 지나가는 (자연)
  const sample = [
    { uid:"sample-own", origin:"직접",
      text:"오늘 읽은 문장 하나가\n하루의 결을 바꾼다",
      author:"나의 기록", work:"2026년 여름", year:"2026",
      theme:"쓰기", keywords:["일상","기록","오늘"], savedAt: Date.now()-3600_000 },
    { uid:"sample-2", origin:"발견", seedId:seed2.id,
      text:seed2.text, author:seed2.author, work:seed2.work, year:seed2.year,
      theme:seed2.theme, keywords:seed2.keywords, savedAt: Date.now()-7200_000 },
    { uid:"sample-1", origin:"발견", seedId:seed1.id,
      text:seed1.text, author:seed1.author, work:seed1.work, year:seed1.year,
      theme:seed1.theme, keywords:seed1.keywords, savedAt: Date.now()-10800_000 },
  ];
  return sample;
}
function saveDrawer(){
  try { localStorage.setItem(LS_KEY, JSON.stringify(drawer)); } catch(e){}
}

/* ============================================================
   유틸
   ============================================================ */
const $ = (s,el=document)=>el.querySelector(s);
const $$ = (s,el=document)=>[...el.querySelectorAll(s)];
const esc = (t)=> (t==null?"":String(t)).replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));

const HEART_PATH = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M19 5.5c-1.6-1.6-4.3-1.6-6 0L12 6.5l-1-1c-1.7-1.6-4.4-1.6-6 0s-1.6 4.3 0 6L12 18l7-6.5c1.6-1.7 1.6-4.4 0-6Z"/></svg>';
const HEART_FILL = '<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1" stroke-linejoin="round"><path d="M19 5.5c-1.6-1.6-4.3-1.6-6 0L12 6.5l-1-1c-1.7-1.6-4.4-1.6-6 0s-1.6 4.3 0 6L12 18l7-6.5c1.6-1.7 1.6-4.4 0-6Z"/></svg>';

/* 발견 시드를 서랍 항목 객체로 변환 */
function seedToEntry(s){
  return { uid:"seed-"+s.id, origin:"발견", seedId:s.id,
    text:s.text, author:s.author, work:s.work, year:s.year,
    theme:s.theme, keywords:s.keywords, savedAt:Date.now() };
}

/* ============================================================
   날짜·인사
   ============================================================ */
function initGreeting(){
  const now = new Date();
  const h = now.getHours();
  let greet = "좋은 하루예요";
  if(h<6) greet = "고요한 새벽이에요"; else if(h<11) greet="좋은 아침이에요";
  else if(h<14) greet="나른한 점심이에요"; else if(h<18) greet="따뜻한 오후예요";
  else if(h<22) greet="포근한 저녁이에요"; else greet="늦은 밤이에요";
  $("#home-eyebrow").textContent = greet;
  const days = ["일","월","화","수","목","금","토"];
  $("#home-date").textContent =
    `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${days[now.getDay()]})`;
  /* 가짜 시계도 현재 시각으로 */
  $("#clock").textContent = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
}

/* ============================================================
   홈 렌더
   ============================================================ */
function renderHome(){
  /* 오늘 다시 보는 문장 — 날짜 기반 결정적 선택(매일 바뀌는 느낌) */
  const seedDay = new Date().getDate() % SEED.length;
  const rd = SEED[seedDay];
  const card = $("#rediscoverCard");
  card.setAttribute("data-theme", themeAttr(rd.theme));
  card.innerHTML = `
    <div class="rd-badge">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.7 9.7 0 0 0-6.7 2.9L3 8"/><path d="M3 4v4h4"/></svg>
      다시 만난 문장
    </div>
    <div class="rd-quote">${esc(rd.text)}</div>
    <div class="rd-meta">
      <span>${esc(rd.author)}</span><span class="dot"></span>
      <span>${esc(rd.work)}</span><span class="dot"></span>
      <span class="yr">${esc(rd.year)}</span>
    </div>`;
  card.onclick = ()=> openDetail(seedToEntry(rd));

  /* 최근 담은 문장 미니 리스트 (최신 3개) */
  const recent = [...drawer].sort((a,b)=>b.savedAt-a.savedAt).slice(0,3);
  $("#recentCount").textContent = drawer.length ? `총 ${drawer.length}개` : "";
  const list = $("#recentList");
  if(!recent.length){
    list.innerHTML = `<div class="empty-hint">아직 담은 문장이 없어요.<br>마음에 드는 한 줄을 포착해보세요.</div>`;
    return;
  }
  list.innerHTML = recent.map(e=>`
    <div class="mini-card" data-theme="${themeAttr(e.theme)}" data-uid="${e.uid}">
      <span class="swatch"></span>
      <div class="mc-body">
        <div class="mc-text">${esc(e.text.replace(/\n/g,' '))}</div>
        <div class="mc-meta">${esc(e.author)} · ${esc(e.work)}</div>
      </div>
      <span class="mc-arrow"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></span>
    </div>`).join("");
  $$(".mini-card", list).forEach(el=>{
    el.onclick = ()=>{
      const e = drawer.find(d=>d.uid===el.dataset.uid);
      if(e) openDetail(e);
    };
  });
}

/* ============================================================
   발견 피드 렌더
   ============================================================ */
function renderFeed(){
  const feed = $("#feed");
  feed.innerHTML = SEED.map(s=>{
    const saved = savedIds.has(s.id);
    return `
    <article class="feed-card" data-theme="${themeAttr(s.theme)}" data-id="${s.id}">
      <span class="fc-theme">${esc(s.theme)}</span>
      <div class="fc-quote"><q>${esc(s.text)}</q></div>
      <div class="fc-foot">
        <div class="fc-meta">
          <div class="fc-author">${esc(s.author)}</div>
          <div class="fc-source">
            <span>${esc(s.work)}</span><span class="dot"></span><span class="yr">${esc(s.year)}</span>
          </div>
        </div>
        <button class="heart-btn ${saved?'saved':''}" data-heart="${s.id}" aria-label="저장">
          ${saved?HEART_FILL:HEART_PATH}
        </button>
      </div>
    </article>`;
  }).join("");

  /* 카드 탭 → 상세 / 하트 → 저장 */
  $$(".feed-card", feed).forEach(card=>{
    const id = +card.dataset.id;
    const s = SEED.find(x=>x.id===id);
    card.onclick = (ev)=>{
      if(ev.target.closest(".heart-btn")) return;
      openDetail(seedToEntry(s));
    };
    const heart = $(".heart-btn", card);
    heart.onclick = (ev)=>{ ev.stopPropagation(); toggleSave(s, heart); };
  });

  /* 진행 도트 */
  const prog = $("#feedProgress");
  prog.innerHTML = SEED.map((_,i)=>`<span class="pdot" data-i="${i}"></span>`).join("");
  $$(".pdot", prog).forEach((d,i)=>{
    Object.assign(d.style,{width:'6px',height:'6px',borderRadius:'50%',
      background:'rgba(120,95,180,0.28)',transition:'all .3s'});
    if(i===0){ d.style.width='18px'; d.style.background='var(--accent)'; }
  });
}

/* 발견 카드 스크롤에 따라 진행 도트 갱신 */
function bindFeedScroll(){
  const view = $("#view-discover");
  view.addEventListener("scroll", ()=>{
    const cards = $$(".feed-card", view);
    const mid = view.scrollTop + view.clientHeight*0.42;
    let active = 0;
    cards.forEach((c,i)=>{ if(c.offsetTop <= mid) active = i; });
    $$(".pdot").forEach((d,i)=>{
      const on = i===active;
      d.style.width = on ? '18px' : '6px';
      d.style.background = on ? 'var(--accent)' : 'rgba(120,95,180,0.28)';
    });
  }, {passive:true});
}

/* ============================================================
   저장 토글 (발견 → 서랍)
   ============================================================ */
function toggleSave(seed, heartEl){
  if(savedIds.has(seed.id)){
    /* 저장 해제 */
    savedIds.delete(seed.id);
    drawer = drawer.filter(d=>!(d.origin==="발견" && d.seedId===seed.id));
    if(heartEl){ heartEl.classList.remove("saved"); heartEl.innerHTML = HEART_PATH; }
    showToast("서랍에서 뺐어요", "minus");
  } else {
    /* 저장 */
    savedIds.add(seed.id);
    drawer.unshift(seedToEntry(seed));
    if(heartEl){ heartEl.classList.add("saved"); heartEl.innerHTML = HEART_FILL; }
    showToast("서랍에 담았어요", "heart");
    pulseTab("drawer");
  }
  saveDrawer();
  renderHome();
  renderDrawer();
  syncDetailSaveState(seed.id);
}

/* 상세화면이 같은 문장을 보고 있으면 저장 버튼 상태 동기화 */
function syncDetailSaveState(seedId){
  const det = $("#detail");
  if(!det.classList.contains("open")) return;
  if(det.dataset.seedId != seedId) return;
  const btn = $(".act-save", det);
  if(!btn) return;
  const saved = savedIds.has(+seedId);
  btn.classList.toggle("is-saved", saved);
  btn.querySelector(".lbl").textContent = saved ? "저장됨" : "서랍에 담기";
  btn.querySelector(".ico").innerHTML = saved ? HEART_FILL : HEART_PATH;
}

/* ============================================================
   서랍 렌더 (검색·필터 반영)
   ============================================================ */
let activeFilter = "전체";
function renderDrawer(){
  const q = ($("#searchInput")?.value || "").trim().toLowerCase();
  const grid = $("#drawerGrid");

  let items = [...drawer].sort((a,b)=>b.savedAt-a.savedAt);
  if(activeFilter!=="전체") items = items.filter(e=>e.origin===activeFilter);
  if(q){
    items = items.filter(e=>
      e.text.toLowerCase().includes(q) ||
      e.author.toLowerCase().includes(q) ||
      (e.work||"").toLowerCase().includes(q) ||
      (e.keywords||[]).some(k=>k.toLowerCase().includes(q))
    );
  }

  if(!items.length){
    grid.style.columns = "auto";
    grid.innerHTML = `
      <div class="drawer-empty">
        <div class="de-emoji">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h18v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/><path d="M3 7l2-4h14l2 4"/><path d="M10 12h4"/></svg>
        </div>
        <b>${q||activeFilter!=="전체" ? "찾는 문장이 없어요" : "서랍이 비어 있어요"}</b>
        <span>${q||activeFilter!=="전체" ? "다른 검색어나 태그로 찾아보세요" : "발견에서 ♥ 하거나 ＋로 포착해보세요"}</span>
      </div>`;
    return;
  }
  grid.style.columns = "2";
  grid.innerHTML = items.map(e=>`
    <div class="drawer-card" data-theme="${themeAttr(e.theme)}" data-uid="${e.uid}">
      <span class="dc-theme">${esc(e.origin==="직접"?"직접":e.theme)}</span>
      <div class="dc-text">${esc(e.text)}</div>
      <div class="dc-author">${esc(e.author)}</div>
      <div class="dc-source">${esc(e.work)} · ${esc(e.year)}</div>
    </div>`).join("");
  $$(".drawer-card", grid).forEach(el=>{
    el.onclick = ()=>{
      const e = drawer.find(d=>d.uid===el.dataset.uid);
      if(e) openDetail(e);
    };
  });
}

/* ============================================================
   문장 상세
   ============================================================ */
function findSimilar(entry){
  /* 같은 theme 우선, 자기 자신 제외. theme 일치가 부족하면 키워드 겹침으로 보완 */
  const pool = SEED.filter(s=> !(entry.seedId && s.id===entry.seedId) );
  const sameTheme = pool.filter(s=>s.theme===entry.theme);
  let picks = [...sameTheme];
  if(picks.length<2){
    const kw = new Set(entry.keywords||[]);
    const byKw = pool.filter(s=> s.theme!==entry.theme && s.keywords.some(k=>kw.has(k)));
    picks = picks.concat(byKw);
  }
  if(picks.length<2){
    /* 그래도 부족하면 아무거나 채움 */
    picks = picks.concat(pool.filter(s=>!picks.includes(s)));
  }
  return picks.slice(0,2);
}

function openDetail(entry){
  const det = $("#detail");
  det.setAttribute("data-theme", themeAttr(entry.theme));
  det.dataset.seedId = entry.seedId || "";
  const saved = entry.seedId ? savedIds.has(entry.seedId) : false;
  const initial = (entry.author||"?").trim().charAt(0);
  const sims = findSimilar(entry);

  det.innerHTML = `
    <div class="detail-bar">
      <button class="icon-btn" id="detailBack" aria-label="닫기">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <span class="d-theme">${esc(entry.theme)}</span>
    </div>

    <div class="detail-body">
      <div class="detail-quote"><span class="qmark">&ldquo;</span>${esc(entry.text)}</div>

      <div class="detail-meta-card">
        <div class="avatar">${esc(initial)}</div>
        <div class="dm-info">
          <b>${esc(entry.author)}</b>
          <span>${esc(entry.work)} · ${esc(entry.year)}</span>
        </div>
      </div>

      <div class="detail-keywords">
        ${(entry.keywords||[]).map(k=>`<span class="chip theme-chip">#${esc(k)}</span>`).join("")}
      </div>

      <div class="ai-block">
        <div class="ai-head">
          <span class="ai-badge">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M18.4 5.6l-2.1 2.1M7.7 16.3l-2.1 2.1"/></svg>
            AI 추천
          </span>
          결이 닮은 문장
        </div>
        ${sims.map(s=>`
          <div class="sim-card" data-sim="${s.id}" data-theme="${themeAttr(s.theme)}">
            <span class="sim-swatch" style="background:var(--t-edge)"></span>
            <div class="sim-body">
              <div class="sim-text">${esc(s.text)}</div>
              <div class="sim-meta">${esc(s.author)} · ${esc(s.theme)}</div>
            </div>
            <span class="sim-arrow"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></span>
          </div>`).join("")}
      </div>
    </div>

    <div class="detail-actions">
      <button class="act-btn act-save ${saved?'is-saved':''}" id="detailSave">
        <span class="ico">${saved?HEART_FILL:HEART_PATH}</span>
        <span class="lbl">${saved?'저장됨':'서랍에 담기'}</span>
      </button>
      <button class="act-btn act-share" id="detailShare" aria-label="공유">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v7a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7"/><path d="M16 6l-4-4-4 4"/><path d="M12 2v13"/></svg>
      </button>
    </div>`;

  /* 하트 사이즈 통일 */
  $$(".act-save .ico svg", det).forEach(s=>{ s.style.width='21px'; s.style.height='21px'; });

  /* 이벤트 */
  $("#detailBack", det).onclick = closeDetail;
  $("#detailSave", det).onclick = ()=>{
    const s = SEED.find(x=>x.id===entry.seedId);
    if(s){
      toggleSave(s, null);
    } else {
      /* 직접 포착 항목 — 이미 서랍에 있으므로 저장됨 표시만 */
      showToast("이미 서랍에 있어요", "heart");
    }
  };
  $("#detailShare", det).onclick = ()=> showToast("공유 링크를 복사했어요", "share");
  $$(".sim-card", det).forEach(el=>{
    el.onclick = ()=>{
      const s = SEED.find(x=>x.id===+el.dataset.sim);
      if(s){
        /* 현재 상세를 닫고 다음 상세로 전환(부드럽게) */
        det.scrollTop = 0;
        openDetail(seedToEntry(s));
        det.style.transform = "translateX(0)";
      }
    };
  });

  /* 직접 포착 항목은 항상 '저장됨' 표시 */
  if(!entry.seedId){
    const btn = $("#detailSave", det);
    btn.classList.add("is-saved");
    btn.querySelector(".lbl").textContent = "저장됨";
    btn.querySelector(".ico").innerHTML = HEART_FILL;
    $$(".act-save .ico svg", det).forEach(s=>{ s.style.width='21px'; s.style.height='21px'; });
  }

  det.classList.add("open");
  det.scrollTop = 0;
}
function closeDetail(){ $("#detail").classList.remove("open"); }

/* ============================================================
   탭 전환
   ============================================================ */
function switchTab(name){
  $$(".tab[data-tab]").forEach(t=> t.classList.toggle("on", t.dataset.tab===name));
  const map = { home:"view-home", discover:"view-discover", drawer:"view-drawer" };
  $$(".view").forEach(v=> v.classList.toggle("active", v.id===map[name]));
  /* 화면 진입 시 스크롤 맨 위로 */
  const v = $("#"+map[name]); if(v) v.scrollTop = 0;
  if(name==="drawer") renderDrawer();
  if(name==="home") renderHome();
}
$$(".tab[data-tab]").forEach(t=> t.onclick = ()=> switchTab(t.dataset.tab));

/* 탭 펄스(저장 시 서랍 탭에 미세 피드백) */
function pulseTab(name){
  const t = $(`.tab[data-tab="${name}"]`);
  if(!t) return;
  t.style.transition = "transform .3s var(--ease-back)";
  t.style.transform = "scale(1.16)";
  setTimeout(()=> t.style.transform = "", 300);
}

/* ============================================================
   포착 시트 로직
   ============================================================ */
let capTags = [];
const scrim = $("#scrim");
const sheet = $("#captureSheet");

function openSheet(){
  scrim.classList.add("open");
  sheet.classList.add("open");
  setTimeout(()=> $("#capText").focus(), 320);
}
function closeSheet(){
  scrim.classList.remove("open");
  sheet.classList.remove("open");
  $("#capText").blur();
}
$("#fab").onclick = ()=>{ pulseFab(); openSheet(); };
$("#quickCapture").onclick = openSheet;
$("#quickCapture").onkeydown = (e)=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); openSheet(); } };
scrim.onclick = closeSheet;

function pulseFab(){
  const f = $("#fab");
  f.classList.remove("pulse"); void f.offsetWidth; f.classList.add("pulse");
}

/* 태그 입력 */
const tagWrap = $("#tagWrap");
const tagInput = $("#tagInput");
function renderTags(){
  $$(".tag-pill", tagWrap).forEach(el=>el.remove());
  capTags.forEach((t,i)=>{
    const pill = document.createElement("span");
    pill.className = "tag-pill";
    pill.innerHTML = `#${esc(t)} <button data-i="${i}" aria-label="삭제">&times;</button>`;
    pill.querySelector("button").onclick = ()=>{ capTags.splice(i,1); renderTags(); checkSubmit(); };
    tagWrap.insertBefore(pill, tagInput);
  });
}
function addTag(raw){
  let t = raw.replace(/^#/,"").trim();
  if(!t || capTags.includes(t) || capTags.length>=6) return;
  capTags.push(t); renderTags();
}
tagInput.addEventListener("keydown",(e)=>{
  if(e.key==="Enter" || e.key===","){
    e.preventDefault();
    if(tagInput.value.trim()){ addTag(tagInput.value); tagInput.value=""; checkSubmit(); }
  } else if(e.key==="Backspace" && !tagInput.value && capTags.length){
    capTags.pop(); renderTags();
  }
});
tagInput.addEventListener("focus",()=>tagWrap.classList.add("focus"));
tagInput.addEventListener("blur",()=>tagWrap.classList.remove("focus"));
$$("#tagSuggest .sug").forEach(s=>{
  s.onclick = ()=>{ addTag(s.textContent); checkSubmit(); };
});

/* 담기 버튼 활성화 체크 */
const capText = $("#capText");
const submitBtn = $("#submitBtn");
function checkSubmit(){ submitBtn.disabled = !capText.value.trim(); }
capText.addEventListener("input", checkSubmit);

/* 담기 실행 */
submitBtn.onclick = ()=>{
  const text = capText.value.trim();
  if(!text) return;
  const src = $("#capSource").value.trim();
  /* 출처 자동 인식 흉내: "저자, 책" 또는 URL 분해 */
  let author = "나의 기록", work = "직접 포착", year = String(new Date().getFullYear());
  if(src){
    if(/^https?:\/\//i.test(src)){
      work = src.replace(/^https?:\/\//,"").split("/")[0]; author = "웹에서";
    } else {
      const parts = src.split(/[,·]/).map(x=>x.trim()).filter(Boolean);
      if(parts.length>=2){ author = parts[0]; work = parts.slice(1).join(" · "); }
      else { author = parts[0]; work = "직접 포착"; }
    }
  }
  const entry = {
    uid:"own-"+Date.now(), origin:"직접",
    text, author, work, year,
    theme:"직접", keywords: capTags.length?capTags.slice():["직접포착"],
    savedAt: Date.now()
  };
  drawer.unshift(entry);
  saveDrawer();

  /* 리셋 */
  capText.value=""; $("#capSource").value=""; capTags=[]; renderTags(); checkSubmit();
  closeSheet();
  showToast("서랍에 담았어요", "heart");
  renderHome();
  renderDrawer();
  pulseTab("drawer");
};

/* ============================================================
   토스트
   ============================================================ */
let toastTimer = null;
function showToast(msg, kind="heart"){
  const t = $("#toast");
  const icons = {
    heart: HEART_FILL,
    minus: '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round"><path d="M5 12h14"/></svg>',
    share: '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12l2 2 4-4"/></svg>',
  };
  t.innerHTML = `<span class="t-ico">${icons[kind]||icons.heart}</span>${esc(msg)}`;
  $$(".t-ico svg", t).forEach(s=>{ s.style.width='14px'; s.style.height='14px'; });
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.classList.remove("show"), 1900);
}

/* ============================================================
   초기화
   ============================================================ */
initGreeting();
renderHome();
renderFeed();
renderDrawer();
bindFeedScroll();

/* 검색·필터 바인딩 */
$("#searchInput").addEventListener("input", renderDrawer);
$$("#filterRow .filter-chip").forEach(c=>{
  c.onclick = ()=>{
    $$("#filterRow .filter-chip").forEach(x=>x.classList.remove("on"));
    c.classList.add("on");
    activeFilter = c.dataset.filter;
    renderDrawer();
  };
});

/* ESC로 시트/상세 닫기(데스크톱 편의) */
document.addEventListener("keydown",(e)=>{
  if(e.key==="Escape"){
    if($("#detail").classList.contains("open")) closeDetail();
    else if(sheet.classList.contains("open")) closeSheet();
  }
});
</script>
</body>
</html>
