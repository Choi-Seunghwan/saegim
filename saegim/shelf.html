<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>새김 · 서가 (컬렉션 갤러리)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css" />
<style>
  /* ===== 따뜻한 종이 토큰 (home/curator와 동일) ===== */
  :root{
    --bg:#ebe3d4; --paper:#f5efe2; --surface:#fffdf7; --ink:#2a241d;
    --ink-2:#6f665a; --ink-3:#a89e8d; --line:#e4dac6; --line-2:#efe7d6;
    --accent:#3a5a4a; --accent-2:#a8754a; --gold:#b08738;
    --font:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,system-ui,"Apple SD Gothic Neo",sans-serif;
    --serif:Georgia,"Times New Roman",serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.6;
    display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
  ::selection{background:var(--accent);color:#fff}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

  /* ===== 폰 프레임 ===== */
  .phone{position:relative;width:390px;height:844px;max-height:94vh;background:var(--paper);border-radius:46px;
    border:9px solid #1c1812;box-shadow:0 30px 70px rgba(28,20,12,.4);overflow:hidden}
  @media(max-width:460px){ body{padding:0} .phone{width:100vw;height:100vh;max-height:none;border-radius:0;border:0} }
  .app{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;padding-bottom:84px;scroll-behavior:smooth}
  .app::-webkit-scrollbar{width:0}

  /* ===== 헤더 ===== */
  .top{position:sticky;top:0;z-index:20;background:rgba(245,239,226,.86);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);padding:16px 20px 12px}
  .top-row{display:flex;align-items:flex-end;justify-content:space-between}
  .htitle{font-size:1.42rem;font-weight:800;letter-spacing:-.02em;line-height:1}
  .htitle .sub{display:block;font-size:.72rem;font-weight:600;color:var(--ink-3);margin-top:5px;letter-spacing:0}
  .top-ico{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--ink-2);background:var(--surface);border:1px solid var(--line)}
  .search{margin-top:13px;display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line);
    border-radius:13px;padding:10px 14px;color:var(--ink-3);font-size:.88rem}

  /* ===== 구독한 발행처 ===== */
  .pubrow{display:flex;gap:16px;overflow-x:auto;padding:16px 20px 4px}
  .pubrow::-webkit-scrollbar{height:0}
  .pub{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0;width:60px}
  .pub .pav{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:800;font-size:1.15rem;font-family:var(--serif);position:relative;border:2px solid var(--paper);box-shadow:0 0 0 2px var(--accent)}
  .pub .pav .vchk{position:absolute;right:-3px;bottom:-3px;width:18px;height:18px;border-radius:50%;background:var(--accent);
    border:2px solid var(--paper);display:flex;align-items:center;justify-content:center}
  .pub .pav .vchk svg{width:10px;height:10px;color:#fff}
  .pub .pn{font-size:.68rem;font-weight:700;color:var(--ink-2);white-space:nowrap;max-width:62px;overflow:hidden;text-overflow:ellipsis}
  .pub.add .pav{background:var(--surface);border:1.5px dashed var(--ink-3);box-shadow:none;color:var(--ink-3)}

  /* ===== 히어로 — 에디터 픽 ===== */
  .hero{margin:14px 20px 0;border-radius:20px;overflow:hidden;color:#f3eee2;padding:22px 22px 20px;position:relative;
    box-shadow:0 14px 30px rgba(40,55,40,.26);cursor:pointer}
  .hero::after{content:"";position:absolute;inset:0;background-image:radial-gradient(circle at 82% 14%,rgba(255,255,255,.1),transparent 44%);pointer-events:none}
  .hero .tag{font-size:.64rem;font-weight:700;letter-spacing:.16em;opacity:.78;text-transform:uppercase;display:flex;align-items:center;gap:6px}
  .hero .htt{font-size:1.34rem;font-weight:800;margin-top:11px;letter-spacing:-.01em;word-break:keep-all}
  .hero .hq{font-size:.96rem;font-weight:500;line-height:1.55;margin-top:9px;opacity:.92;word-break:keep-all}
  .hero .hmeta{margin-top:14px;font-size:.76rem;opacity:.82;display:flex;align-items:center;gap:5px}

  /* ===== 무드 칩 + 정렬 ===== */
  .barrow{position:sticky;top:67px;z-index:15;background:rgba(245,239,226,.93);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);padding-bottom:10px;margin-top:22px}
  .seclabel{display:flex;align-items:baseline;justify-content:space-between;padding:14px 20px 11px}
  .seclabel .t{font-size:1.06rem;font-weight:800;letter-spacing:-.01em}
  .sort{display:flex;gap:3px;background:var(--line-2);border:1px solid var(--line);border-radius:9px;padding:2px}
  .sort button{font-size:.74rem;font-weight:700;color:var(--ink-3);padding:5px 11px;border-radius:7px}
  .sort button.on{background:var(--surface);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .chips{display:flex;gap:8px;overflow-x:auto;padding:0 20px}
  .chips::-webkit-scrollbar{height:0}
  .chip{flex-shrink:0;padding:7px 14px;border-radius:999px;border:1px solid var(--line);background:var(--surface);
    font-size:.84rem;font-weight:700;color:var(--ink-2);transition:all .14s}
  .chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}

  /* ===== 컬렉션 그리드 (메이슨리) ===== */
  .grid{column-count:2;column-gap:13px;padding:16px 20px 8px}
  .gcard{break-inside:avoid;width:100%;margin-bottom:13px;border-radius:18px;overflow:hidden;color:#fff;
    padding:16px;display:flex;flex-direction:column;gap:14px;position:relative;box-shadow:0 9px 20px rgba(40,30,18,.2);
    cursor:pointer;transition:transform .14s}
  .gcard:active{transform:scale(.97)}
  .gcard::after{content:"";position:absolute;inset:0;background:linear-gradient(160deg,rgba(255,255,255,.15),transparent 55%)}
  .gcard .gq{font-size:.96rem;font-weight:600;line-height:1.5;word-break:keep-all;position:relative;z-index:1;opacity:.96}
  .gcard .gfoot{position:relative;z-index:1}
  .gcard .gmood{font-size:.62rem;font-weight:700;letter-spacing:.04em;opacity:.75;text-transform:uppercase}
  .gcard .gt{font-size:1.02rem;font-weight:800;letter-spacing:-.01em;line-height:1.3;margin-top:3px}
  .gcard .gm{font-size:.71rem;opacity:.84;margin-top:6px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
  .gcard .gby{display:inline-flex;align-items:center;gap:3px}
  .gcard .gby .vchk{width:11px;height:11px}
  .gcard .dot{opacity:.5}

  .empty{color:var(--ink-3);font-size:.86rem;text-align:center;padding:40px 0}
  .foot{text-align:center;padding:24px 20px 10px;color:var(--ink-3);font-size:.7rem;line-height:1.7}

  /* ===== 탭바 ===== */
  .tabbar{position:absolute;left:0;right:0;bottom:0;height:72px;background:rgba(245,239,226,.92);backdrop-filter:blur(14px);
    border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-around;padding:0 14px 14px;z-index:30}
  .tab{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--ink-3);font-size:.64rem;font-weight:700;flex:1}
  .tab.on{color:var(--accent)}
  .tab svg{width:23px;height:23px}
  .fab{width:50px;height:50px;border-radius:16px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 18px rgba(58,90,74,.4);transform:translateY(-8px);flex-shrink:0}

  /* ===== 보드 상세 시트 (curator와 동일 패턴) ===== */
  .mask{position:absolute;inset:0;background:rgba(28,20,12,.42);opacity:0;pointer-events:none;transition:opacity .26s;z-index:40}
  .mask.show{opacity:1;pointer-events:auto}
  .sheet{position:absolute;left:0;right:0;bottom:0;max-height:88%;background:var(--paper);border-radius:24px 24px 0 0;
    transform:translateY(102%);transition:transform .3s cubic-bezier(.3,.8,.4,1);z-index:50;display:flex;flex-direction:column;
    box-shadow:0 -14px 40px rgba(0,0,0,.26)}
  .sheet.show{transform:translateY(0)}
  .sheet-h{padding:12px 18px 10px;position:relative;flex-shrink:0}
  .grip{width:38px;height:4px;border-radius:3px;background:var(--ink-3);opacity:.5;margin:0 auto 6px}
  .sheet-close{position:absolute;right:14px;top:12px;width:32px;height:32px;border-radius:50%;background:var(--surface);
    border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--ink-2)}
  .sheet-cap{height:96px;border-radius:16px;margin:0 18px;padding:16px;color:#fff;display:flex;flex-direction:column;justify-content:flex-end;
    position:relative;overflow:hidden}
  .sheet-cap .st{font-size:1.18rem;font-weight:800;letter-spacing:-.01em;position:relative;z-index:1}
  .sheet-cap .sm{font-size:.74rem;opacity:.9;position:relative;z-index:1;margin-top:3px;display:flex;align-items:center;gap:5px}
  .sheet-cap .sm .vchk{width:12px;height:12px}
  .sheet-desc{padding:13px 20px 4px;font-size:.86rem;color:var(--ink-2);word-break:keep-all}
  .sheet-body{overflow-y:auto;padding-bottom:18px}
  .sheet-body::-webkit-scrollbar{width:0}
  .sheet-quotes{padding:8px 18px;display:flex;flex-direction:column;gap:10px}
  .sq{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:14px 15px;display:flex;gap:12px;align-items:flex-start}
  .sq .sqq{flex:1;font-size:.92rem;line-height:1.5;font-weight:500;word-break:keep-all}
  .sq .sqby{font-size:.72rem;color:var(--ink-3);margin-top:6px;font-weight:600}
  .carve{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;
    color:var(--ink-3);flex-shrink:0;transition:all .16s}
  .carve:hover{border-color:var(--accent);color:var(--accent)}
  .carve.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .sheet-follow{margin:8px 18px 0;padding:13px;border-radius:12px;background:var(--accent);color:#fff;font-weight:800;font-size:.9rem;text-align:center}
  .sheet-follow.on{background:transparent;color:var(--accent);border:1px solid var(--accent)}

  /* ===== 토스트 ===== */
  .toast{position:absolute;left:50%;bottom:92px;transform:translateX(-50%) translateY(14px);background:var(--ink);color:#f5efe2;
    padding:11px 20px;border-radius:11px;font-size:.83rem;font-weight:500;opacity:0;pointer-events:none;transition:all .25s;z-index:60;white-space:nowrap;box-shadow:0 10px 26px rgba(0,0,0,.3)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
  <div class="phone">
    <div class="app" id="app">
      <!-- 헤더 -->
      <div class="top">
        <div class="top-row">
          <div class="htitle">서가<span class="sub">테마와 무드로 엮인 문장 컬렉션</span></div>
          <div class="top-ico" data-act="필터를 열어요" title="필터">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M6 12h12M10 18h4"/></svg>
          </div>
        </div>
        <div class="search" data-act="컬렉션·문장·테마를 검색해요">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          컬렉션 · 문장 · 테마 검색
        </div>
      </div>

      <!-- 구독한 발행처 -->
      <div class="pubrow" id="pubrow"></div>

      <!-- 에디터 픽 히어로 -->
      <div class="hero" id="hero"></div>

      <!-- 무드 칩 + 정렬 -->
      <div class="barrow">
        <div class="seclabel">
          <div class="t">컬렉션 둘러보기</div>
          <div class="sort" id="sort">
            <button class="on" data-sort="pop">인기순</button>
            <button data-sort="new">최신순</button>
          </div>
        </div>
        <div class="chips" id="chips"></div>
      </div>

      <!-- 컬렉션 그리드 -->
      <div class="grid" id="grid"></div>

      <div class="foot">새김 · 서가(컬렉션 갤러리) 프로토타입<br/>콘텐츠 중심 — 사람이 아니라 문장 묶음을 탐색</div>
    </div>

    <!-- 탭바 (서가 활성) -->
    <div class="tabbar">
      <button class="tab" data-t="홈"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>홈</button>
      <button class="tab" data-t="발견"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m15 9-2 5-4 1 2-5z"/></svg>발견</button>
      <button class="fab" data-t="포착"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button>
      <button class="tab on" data-t="서가"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>서가</button>
      <button class="tab" data-t="나"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>나</button>
    </div>

    <!-- 보드 상세 시트 -->
    <div class="mask" id="mask"></div>
    <div class="sheet" id="sheet">
      <div class="sheet-h">
        <div class="grip"></div>
        <button class="sheet-close" id="sheetClose"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
      </div>
      <div class="sheet-cap" id="sheetCap"></div>
      <div class="sheet-body">
        <div class="sheet-desc" id="sheetDesc"></div>
        <div class="sheet-quotes" id="sheetQuotes"></div>
        <button class="sheet-follow" id="sheetFollow">＋ 이 컬렉션 팔로우</button>
      </div>
    </div>

    <div class="toast" id="toast"></div>
  </div>

<script>
/* ===== 데이터 ===== */
// 무드: [이름, 칩 안 쓰는 색은 생략] — 그리드 카드 그라데이션은 컬렉션별 grad 사용
const MOODS = ["전체","밤","위로","이별","시작","고독","사랑","성장","비"];

// 구독한 발행처 (공식·인증 계정만 — 사람 소셜이 아니라 '발행처' 구독)
const PUBS = [
  { nm:"에디터 픽", c:"#3a5a4a" },
  { nm:"윤동주", c:"#3c4670" },
  { nm:"새김 편집부", c:"#a8754a" }
];

// 컬렉션 — 서가의 주인공. pub=발행처, official=인증 여부, saves=새긴 수, days=올라온 지(최신순용)
const COLLECTIONS = [
  { t:"위로가 필요한 밤", mood:"위로", n:16, saves:1800, days:1, pub:"에디터 픽", official:true,
    grad:"linear-gradient(155deg,#3a5a4a,#26392e)",
    desc:"하루를 버틴 당신에게. 잠들기 전 가만히 곁에 두는 문장들.",
    q:[ ["오늘 하루도, 애썼다.","무월"], ["가장 어두운 밤도 끝이 나고 해는 떠오른다.","빅토르 위고"], ["괜찮아, 천천히 와도 돼.","무월"] ] },
  { t:"다시 시작하려는 너에게", mood:"시작", n:11, saves:2100, days:3, pub:"에디터 픽", official:true,
    grad:"linear-gradient(155deg,#7d6320,#574516)",
    desc:"무너진 자리에서 다시 일어서려는 사람에게 건네는 한 줄.",
    q:[ ["천 리 길도 한 걸음에서 시작된다.","노자 · 도덕경"], ["다시 시작하기에 늦은 때란 없다.","무월"] ] },
  { t:"윤동주의 별", mood:"밤", n:8, saves:3200, days:6, pub:"윤동주", official:true,
    grad:"linear-gradient(155deg,#2f3a63,#1d2342)",
    desc:"별을 노래하던 시인의 문장. 공식 인증 계정이 직접 엮었습니다.",
    q:[ ["죽는 날까지 하늘을 우러러 한 점 부끄럼이 없기를","윤동주 · 서시"], ["계절이 지나가는 하늘에는 가을로 가득 차 있습니다","윤동주 · 별 헤는 밤"] ] },
  { t:"새벽 세 시의 메모", mood:"밤", n:20, saves:1200, days:2, pub:"무월", official:false,
    grad:"linear-gradient(155deg,#3c4670,#262d4f)",
    desc:"잠 못 드는 새벽, 머리맡에 떠오른 문장들. 가장 솔직해지는 시간.",
    q:[ ["밤은 생각보다 많은 것을 견디게 한다.","무월"], ["잠들지 못한 밤이 나를 키웠다.","무월"] ] },
  { t:"비 오는 날의 문장", mood:"비", n:12, saves:980, days:5, pub:"무월", official:false,
    grad:"linear-gradient(155deg,#516066,#333d42)",
    desc:"창에 빗방울이 맺히는 날 꺼내 읽는 한 줄.",
    q:[ ["비는 시끄럽지 않게 세상을 적신다.","무월"], ["빗소리는 가장 오래된 자장가다.","무월"] ] },
  { t:"이별 후에 남는 말", mood:"이별", n:13, saves:870, days:8, pub:"해도지", official:false,
    grad:"linear-gradient(155deg,#7a4a5e,#532f3d)",
    desc:"떠난 자리에 남겨진 말들. 아물어가는 마음의 기록.",
    q:[ ["잘 지내냐는 말에, 잘 지냈다고 답하지 못했다.","무월"], ["오래 보면, 오래 남는다.","무월"] ] },
  { t:"혼자라는 감각", mood:"고독", n:9, saves:640, days:4, pub:"해도지", official:false,
    grad:"linear-gradient(155deg,#5a5550,#363330)",
    desc:"외로움과 고독은 다르다. 혼자 있는 시간을 단단하게.",
    q:[ ["고독은 혼자 있는 능력이고, 외로움은 혼자 있는 고통이다.","무월"], ["혼자 걷는 길에서야 보이는 풍경이 있다.","무월"] ] },
  { t:"사랑한다는 말 대신", mood:"사랑", n:10, saves:1100, days:7, pub:"한낮", official:false,
    grad:"linear-gradient(155deg,#9a4f50,#6b3536)",
    desc:"입 밖으로 꺼내지 못한 마음을 대신하는 문장들.",
    q:[ ["끝까지 읽어줘서, 고마워요.","무월"], ["곁에 있다는 건, 가장 긴 고백이다.","무월"] ] },
  { t:"오래 곱씹은 한 줄", mood:"성장", n:7, saves:420, days:11, pub:"한낮", official:false,
    grad:"linear-gradient(155deg,#4f6b33,#34481f)",
    desc:"빨리 지나치기 아까워 오래 곁에 두고 곱씹은 문장.",
    q:[ ["읽는 일은 빨라질 수 있어도, 이해하는 일은 제 속도를 고집한다.","무월"], ["좋은 문장은 두 번 읽힌다 — 눈으로 한 번, 마음으로 한 번.","무월"] ] },
  { t:"잠들기 전 마지막 줄", mood:"밤", n:15, saves:1500, days:9, pub:"새김 편집부", official:true,
    grad:"linear-gradient(155deg,#473a52,#2c2435)",
    desc:"하루를 덮기 전, 마지막으로 마음에 새기고 싶은 문장.",
    q:[ ["내일은 내일의 해가 뜬다.","고전 속담"], ["잘 자라는 말은, 잘 살라는 말과 닮았다.","무월"] ] }
];

/* ===== 렌더 ===== */
const $ = s => document.querySelector(s);
const fmt = n => n>=1000 ? (n/1000).toFixed(1).replace(/\.0$/,'')+"천" : ""+n;
const vchk = '<svg class="vchk" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';
const vchkW = '<svg class="vchk" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';

let curMood = "전체";
let curSort = "pop";

// 구독한 발행처
$("#pubrow").innerHTML = PUBS.map((p,i)=>`
  <button class="pub" data-pub="${i}">
    <div class="pav" style="background:${p.c}">${p.nm[0]}<span class="vchk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span></div>
    <div class="pn">${p.nm}</div>
  </button>`).join("") +
  `<button class="pub add" data-act="발행처를 더 찾아봐요"><div class="pav">＋</div><div class="pn">더보기</div></button>`;

// 무드 칩
$("#chips").innerHTML = MOODS.map(m=>`<button class="chip ${m==='전체'?'on':''}" data-mood="${m}">${m}</button>`).join("");

// 히어로 — '에디터 픽' 발행처 컬렉션 중 가장 인기 있는 것 (라벨과 일치시킴)
const heroC = COLLECTIONS.filter(c=>c.pub==="에디터 픽").sort((a,b)=>b.saves-a.saves)[0];
$("#hero").style.background = heroC.grad;
$("#hero").dataset.idx = COLLECTIONS.indexOf(heroC);
$("#hero").innerHTML = `
  <div class="tag">✦ 에디터 픽 · 오늘의 컬렉션</div>
  <div class="htt">${heroC.t}</div>
  <div class="hq">${heroC.q[0][0]}</div>
  <div class="hmeta">문장 ${heroC.n}편 · ♡ ${fmt(heroC.saves)} · ${heroC.pub}${heroC.official?vchkW:""}</div>`;

// 그리드 렌더
function renderGrid(){
  let list = COLLECTIONS.slice();
  if(curMood!=="전체") list = list.filter(c=>c.mood===curMood);
  list.sort((a,b)=> curSort==="pop" ? b.saves-a.saves : a.days-b.days);
  const g = $("#grid");
  if(!list.length){ g.innerHTML = `<div class="empty">‘${curMood}’ 무드의 컬렉션이 아직 없어요</div>`; return; }
  g.innerHTML = list.map(c=>{
    const idx = COLLECTIONS.indexOf(c);
    return `<button class="gcard" style="background:${c.grad}" data-idx="${idx}">
      <div class="gq">${c.q[0][0]}</div>
      <div class="gfoot">
        <div class="gmood">${c.mood}</div>
        <div class="gt">${c.t}</div>
        <div class="gm">문장 ${c.n} <span class="dot">·</span> ♡ ${fmt(c.saves)} <span class="dot">·</span>
          <span class="gby">${c.pub}${c.official?vchk:""}</span></div>
      </div>
    </button>`;
  }).join("");
}
renderGrid();

/* ===== 인터랙션 ===== */
let tt;
function toast(m){ const e=$("#toast"); e.textContent=m; e.classList.add("show"); clearTimeout(tt); tt=setTimeout(()=>e.classList.remove("show"),1900); }

// 무드 칩
$("#chips").addEventListener("click", e=>{
  const b=e.target.closest("[data-mood]"); if(!b)return;
  curMood=b.dataset.mood;
  document.querySelectorAll("#chips .chip").forEach(x=>x.classList.toggle("on",x===b));
  renderGrid();
});
// 정렬
$("#sort").addEventListener("click", e=>{
  const b=e.target.closest("[data-sort]"); if(!b)return;
  curSort=b.dataset.sort;
  document.querySelectorAll("#sort button").forEach(x=>x.classList.toggle("on",x===b));
  renderGrid();
});
// 발행처
$("#pubrow").addEventListener("click", e=>{
  const b=e.target.closest("[data-pub]"); if(!b)return;
  toast(`${PUBS[+b.dataset.pub].nm}의 컬렉션을 모아 봐요`);
});

/* ===== 보드 상세 시트 ===== */
let followed=false;
function openSheet(i){
  const c=COLLECTIONS[i];
  $("#sheetCap").style.background=c.grad;
  $("#sheetCap").innerHTML=`<div class="st">${c.t}</div><div class="sm">${c.pub}${c.official?vchkW:""} <span style="opacity:.6">·</span> 문장 ${c.n}편 · ♡ ${fmt(c.saves)}</div>`;
  $("#sheetDesc").textContent=c.desc;
  $("#sheetQuotes").innerHTML=c.q.map(([q,by])=>`
    <div class="sq">
      <div><div class="sqq">${q}</div><div class="sqby">${by}</div></div>
      <button class="carve" data-sqcarve title="새기기">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
      </button>
    </div>`).join("");
  followed=false;
  $("#sheetFollow").classList.remove("on");
  $("#sheetFollow").textContent="＋ 이 컬렉션 팔로우";
  $("#mask").classList.add("show");
  $("#sheet").classList.add("show");
}
function closeSheet(){ $("#mask").classList.remove("show"); $("#sheet").classList.remove("show"); }
$("#grid").addEventListener("click", e=>{ const b=e.target.closest("[data-idx]"); if(b) openSheet(+b.dataset.idx); });
$("#hero").addEventListener("click", ()=> openSheet(+$("#hero").dataset.idx));
$("#mask").addEventListener("click", closeSheet);
$("#sheetClose").addEventListener("click", closeSheet);
$("#sheetFollow").addEventListener("click", ()=>{
  followed=!followed;
  $("#sheetFollow").classList.toggle("on",followed);
  $("#sheetFollow").textContent=followed?"✓ 팔로우중":"＋ 이 컬렉션 팔로우";
  toast(followed?"컬렉션을 팔로우했어요":"팔로우를 해제했어요");
});
$("#sheetQuotes").addEventListener("click", e=>{
  const b=e.target.closest("[data-sqcarve]"); if(!b)return;
  const on=b.classList.toggle("on");
  b.querySelector("svg").setAttribute("fill", on?"currentColor":"none");
  toast(on?"새겼어요 · 내 서랍에 담았어요":"서랍에서 뺐어요");
});

// 일반 안내(act)
document.addEventListener("click", e=>{ const b=e.target.closest("[data-act]"); if(b) toast(b.dataset.act); });
// 하단 탭
document.querySelectorAll(".tab,.fab").forEach(t=>t.addEventListener("click", ()=>{
  if(t.dataset.t!=="서가") toast(`데모는 서가 화면에 집중했어요 — ‘${t.dataset.t}’은 다음에`);
}));
</script>
</body>
</html>
