<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>새김 · 홈 (큐레이션 탐색)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css" />
<style>
  /* ===== 따뜻한 종이 토큰 ===== */
  :root{
    --bg:#ebe3d4;            /* 데스크톱 바깥 배경 */
    --paper:#f5efe2;         /* 앱 종이 배경 */
    --surface:#fffdf7;       /* 카드 표면 */
    --ink:#2a241d;           /* 잉크 */
    --ink-2:#6f665a;         /* 보조 */
    --ink-3:#a89e8d;         /* 약한 */
    --line:#e4dac6;          /* 경계 */
    --accent:#3a5a4a;        /* 딥그린 */
    --accent-2:#a8754a;      /* 세피아 */
    --gold:#b08738;
    --font:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,system-ui,"Apple SD Gothic Neo",sans-serif;
    --serif:Georgia,"Times New Roman",serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.6;
    display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
  ::selection{background:var(--accent);color:#fff}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

  /* ===== 폰 프레임 ===== */
  .phone{position:relative;width:390px;height:844px;max-height:94vh;background:var(--paper);border-radius:46px;
    border:9px solid #1c1812;box-shadow:0 30px 70px rgba(28,20,12,.4);overflow:hidden}
  @media(max-width:460px){
    body{padding:0}
    .phone{width:100vw;height:100vh;max-height:none;border-radius:0;border:0}
  }
  .app{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;padding-bottom:84px;scroll-behavior:smooth}
  .app::-webkit-scrollbar{width:0}

  /* ===== 헤더 ===== */
  .top{position:sticky;top:0;z-index:20;background:rgba(245,239,226,.86);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);padding:16px 20px 12px}
  .top-row{display:flex;align-items:center;justify-content:space-between}
  .logo{display:flex;flex-direction:column;line-height:1}
  .logo .ko{font-size:1.4rem;font-weight:800;letter-spacing:-.02em}
  .logo .en{font-size:.54rem;font-weight:700;letter-spacing:.36em;color:var(--ink-3);margin-top:3px}
  .top-ico{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--ink-2);background:var(--surface);border:1px solid var(--line)}
  .search{margin-top:13px;display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line);
    border-radius:13px;padding:10px 14px;color:var(--ink-3);font-size:.88rem}

  /* ===== 섹션 공통 ===== */
  section{margin-top:26px}
  .sec-head{display:flex;align-items:baseline;justify-content:space-between;padding:0 20px;margin-bottom:13px}
  .sec-title{font-size:1.06rem;font-weight:800;letter-spacing:-.01em}
  .sec-title .sub{display:block;font-size:.74rem;font-weight:500;color:var(--ink-3);margin-top:3px;letter-spacing:0}
  .more{font-size:.76rem;font-weight:600;color:var(--accent);white-space:nowrap}
  .rail{display:flex;gap:13px;overflow-x:auto;padding:2px 20px 6px;scroll-snap-type:x proximity}
  .rail::-webkit-scrollbar{height:0}
  .rail>*{scroll-snap-align:start;flex-shrink:0}

  /* ===== 히어로 — 오늘의 문장 ===== */
  .hero{margin:18px 20px 0;border-radius:20px;overflow:hidden;background:
    linear-gradient(150deg,#34503f,#28412f);color:#f3eee2;padding:24px 22px 20px;position:relative;box-shadow:0 14px 30px rgba(40,55,40,.28)}
  .hero::after{content:"";position:absolute;inset:0;background-image:radial-gradient(circle at 80% 12%,rgba(255,255,255,.08),transparent 42%);pointer-events:none}
  .hero .tag{font-size:.66rem;font-weight:700;letter-spacing:.18em;opacity:.7;text-transform:uppercase}
  .hero .q{font-size:1.42rem;line-height:1.5;font-weight:600;margin-top:14px;white-space:pre-line;word-break:keep-all;letter-spacing:-.01em}
  .hero .by{margin-top:16px;font-size:.84rem;opacity:.82}
  .hero .by b{font-weight:700}
  .hero-act{margin-top:18px;display:flex;gap:9px}
  .hero-btn{flex:1;text-align:center;padding:11px;border-radius:11px;font-size:.85rem;font-weight:700;background:rgba(255,255,255,.16);color:#fff;backdrop-filter:blur(4px);transition:background .16s}
  .hero-btn:hover{background:rgba(255,255,255,.26)}
  .hero-btn.solid{background:#f3eee2;color:#2c4534}
  .hero-btn.solid:hover{background:#fff}

  /* ===== 테마 타일 ===== */
  .theme{width:104px;height:74px;border-radius:14px;display:flex;align-items:flex-end;padding:11px;font-weight:700;font-size:.92rem;
    position:relative;overflow:hidden;border:1px solid rgba(0,0,0,.04)}
  .theme span{position:relative;z-index:1}
  .theme::before{content:"";position:absolute;inset:0;opacity:.9}

  /* ===== 작가 카드 ===== */
  .author{width:150px;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px 14px;text-align:center}
  .ava{width:54px;height:54px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:800;font-size:1.2rem;font-family:var(--serif)}
  .author .nm{font-size:.96rem;font-weight:800}
  .author .role{font-size:.7rem;color:var(--accent);font-weight:700;margin-top:2px}
  .author .fol{font-size:.72rem;color:var(--ink-3);margin-top:7px}
  .sub-btn{margin-top:11px;width:100%;padding:8px;border-radius:9px;font-size:.8rem;font-weight:700;
    background:var(--accent);color:#fff;transition:all .16s;border:1px solid var(--accent)}
  .sub-btn.on{background:transparent;color:var(--accent)}

  /* ===== 컬렉션 카드 ===== */
  .coll{width:194px;height:150px;border-radius:18px;padding:18px;color:#fff;display:flex;flex-direction:column;justify-content:space-between;
    position:relative;overflow:hidden;box-shadow:0 10px 22px rgba(40,30,18,.2)}
  .coll::after{content:"";position:absolute;inset:0;background:linear-gradient(160deg,rgba(255,255,255,.14),transparent 55%)}
  .coll .ct{font-size:1.08rem;font-weight:800;line-height:1.35;letter-spacing:-.01em;word-break:keep-all;position:relative;z-index:1}
  .coll .cmeta{font-size:.72rem;opacity:.86;position:relative;z-index:1}
  .coll .cmeta b{font-weight:700}

  /* ===== 카피라이터 카드 ===== */
  .copy{width:230px;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:17px}
  .copy .cl{font-size:1.02rem;font-weight:600;line-height:1.5;letter-spacing:-.01em;word-break:keep-all;min-height:62px}
  .copy .crow{display:flex;align-items:center;gap:9px;margin-top:13px;padding-top:13px;border-top:1px solid var(--line)}
  .copy .ca{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:.82rem;font-family:var(--serif);flex-shrink:0}
  .copy .cn{font-size:.82rem;font-weight:700;flex:1}
  .copy .cn small{display:block;font-size:.68rem;color:var(--ink-3);font-weight:500}
  .mini-sub{font-size:.74rem;font-weight:700;color:var(--accent);padding:6px 11px;border:1px solid var(--accent);border-radius:8px}
  .mini-sub.on{color:var(--ink-3);border-color:var(--line)}

  /* ===== 신간 책 카드 ===== */
  .book{width:150px}
  .book .cover{width:150px;height:200px;border-radius:5px 11px 11px 5px;padding:18px 16px;color:#fff;display:flex;flex-direction:column;
    box-shadow:0 12px 24px rgba(40,30,18,.26);position:relative;overflow:hidden;border-left:4px solid rgba(0,0,0,.18)}
  .book .cover::after{content:"";position:absolute;inset:0;background:linear-gradient(120deg,rgba(255,255,255,.12),transparent 50%)}
  .book .ex{font-size:.86rem;font-weight:600;line-height:1.5;word-break:keep-all;position:relative;z-index:1}
  .book .bt{margin-top:auto;font-size:.72rem;opacity:.85;position:relative;z-index:1}
  .book .bttl{font-size:.84rem;font-weight:800;margin-top:9px;letter-spacing:-.01em}
  .book .bau{font-size:.72rem;color:var(--ink-3);margin-top:1px}

  /* ===== 당신을 위한 (세로) ===== */
  .foryou{padding:0 20px;display:flex;flex-direction:column;gap:11px}
  .fy{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:17px 18px;display:flex;gap:14px;align-items:flex-start}
  .fy .fq{flex:1;font-size:.98rem;line-height:1.55;font-weight:500;word-break:keep-all}
  .fy .fa{font-size:.76rem;color:var(--ink-3);margin-top:8px}
  .fy .carve{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--ink-3);flex-shrink:0;transition:all .16s}
  .fy .carve:hover{border-color:var(--accent);color:var(--accent)}
  .fy .carve.on{background:var(--accent);color:#fff;border-color:var(--accent)}

  /* ===== 탭바 ===== */
  .tabbar{position:absolute;left:0;right:0;bottom:0;height:72px;background:rgba(245,239,226,.92);backdrop-filter:blur(14px);
    border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-around;padding:0 14px 14px;z-index:30}
  .tab{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--ink-3);font-size:.64rem;font-weight:700;flex:1}
  .tab.on{color:var(--accent)}
  .tab svg{width:23px;height:23px}
  .fab{width:50px;height:50px;border-radius:16px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 18px rgba(58,90,74,.4);transform:translateY(-8px);flex-shrink:0}

  /* ===== 토스트 ===== */
  .toast{position:absolute;left:50%;bottom:92px;transform:translateX(-50%) translateY(14px);background:var(--ink);color:#f5efe2;
    padding:11px 20px;border-radius:11px;font-size:.83rem;font-weight:500;opacity:0;pointer-events:none;transition:all .25s;z-index:40;white-space:nowrap;box-shadow:0 10px 26px rgba(0,0,0,.3)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .foot{text-align:center;padding:30px 20px 10px;color:var(--ink-3);font-size:.7rem}
</style>
</head>
<body>
  <div class="phone">
    <div class="app" id="app">
      <!-- 헤더 -->
      <div class="top">
        <div class="top-row">
          <div class="logo"><span class="ko">새김</span><span class="en">SAEGIM</span></div>
          <div class="top-ico">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
          </div>
        </div>
        <div class="search">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          문장 · 작가 · 테마 검색
        </div>
      </div>

      <!-- 히어로: 오늘의 문장 -->
      <div class="hero" id="hero"></div>

      <!-- 테마로 둘러보기 -->
      <section>
        <div class="sec-head"><div class="sec-title">테마로 둘러보기<span class="sub">지금 마음에 닿는 결을 골라요</span></div></div>
        <div class="rail" id="themes"></div>
      </section>

      <!-- 지금 뜨는 작가 -->
      <section>
        <div class="sec-head"><div class="sec-title">지금 뜨는 작가<span class="sub">구독하면 발견에 그들의 문장이 흘러요</span></div><span class="more">전체 ›</span></div>
        <div class="rail" id="authors"></div>
      </section>

      <!-- 큐레이터 컬렉션 -->
      <section>
        <div class="sec-head"><div class="sec-title">큐레이터 컬렉션<span class="sub">새김 편집부가 엮은 문장 묶음</span></div><span class="more">전체 ›</span></div>
        <div class="rail" id="colls"></div>
      </section>

      <!-- 이주의 카피라이터 -->
      <section>
        <div class="sec-head"><div class="sec-title">이주의 카피라이터<span class="sub">한 줄로 마음을 옮기는 사람들</span></div><span class="more">전체 ›</span></div>
        <div class="rail" id="copys"></div>
      </section>

      <!-- 신간 속 문장 -->
      <section>
        <div class="sec-head"><div class="sec-title">신간 속 문장<span class="sub">새로 나온 책에서 건진 한 문장</span></div><span class="more">전체 ›</span></div>
        <div class="rail" id="books"></div>
      </section>

      <!-- 당신을 위한 문장 -->
      <section>
        <div class="sec-head"><div class="sec-title">당신을 위한 문장<span class="sub">새긴 문장과 결이 닮은 추천</span></div></div>
        <div class="foryou" id="foryou"></div>
      </section>

      <div class="foot">새김 · 홈(큐레이션 탐색) 프로토타입 — 깊은 큐레이션 플랫폼 방향</div>
    </div>

    <!-- 탭바 -->
    <div class="tabbar">
      <button class="tab on" data-t="홈">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>홈</button>
      <button class="tab" data-t="발견">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m15 9-2 5-4 1 2-5z"/></svg>발견</button>
      <button class="fab" data-t="포착">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button>
      <button class="tab" data-t="작가">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>서가</button>
      <button class="tab" data-t="나">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>나</button>
    </div>

    <div class="toast" id="toast"></div>
  </div>

<script>
/* ===== 데이터 ===== */
// 오늘의 문장
const TODAY = { text:"문장은 끝내기 위해서가 아니라,\n멈추는 법을 배우기 위해 쓴다", author:"새김 편집부", work:"쉼표의 자리" };

// 테마 (따뜻한 종이 위 차분한 색)
const THEMES = [
  ["위로","#cfe0d4","#2e5340"], ["이별","#e2d3da","#7a4a5e"], ["시작","#e8ddbe","#7d6320"],
  ["밤","#cfd4e6","#3c4670"], ["용기","#ead2b6","#925f2e"], ["고독","#d6dadc","#465256"],
  ["사랑","#ecd2d0","#9a4f50"], ["성장","#d6e2c8","#4f6b33"]
];

// 작가
const AUTHORS = [
  { nm:"윤동주", role:"시인", fol:"12.4천", c:"#3a5a4a", on:true },
  { nm:"김소월", role:"시인", fol:"9.8천", c:"#7a4a5e", on:false },
  { nm:"한용운", role:"시인 · 승려", fol:"7.1천", c:"#3c4670", on:false },
  { nm:"이육사", role:"시인 · 독립운동가", fol:"6.3천", c:"#925f2e", on:false },
  { nm:"이상", role:"소설가 · 시인", fol:"5.5천", c:"#465256", on:false },
  { nm:"새김 편집부", role:"큐레이터", fol:"8.9천", c:"#a8754a", on:true }
];

// 컬렉션
const COLLS = [
  { t:"비 오는 날의 문장", n:12, cu:"새김 편집부", c:"linear-gradient(150deg,#3c4670,#2b3350)" },
  { t:"출근길에 새기는 한 줄", n:9, cu:"카피라이터 정현", c:"linear-gradient(150deg,#925f2e,#6e4420)" },
  { t:"잠들기 전 마지막 문장", n:15, cu:"에세이스트 무월", c:"linear-gradient(150deg,#465256,#2f3a3d)" },
  { t:"첫 문장 수집", n:10, cu:"새김 편집부", c:"linear-gradient(150deg,#3a5a4a,#274034)" }
];

// 카피라이터
const COPYS = [
  { cl:"“잘 지냈냐는 말에, 잘 지냈다고 답하지 못했다.”", nm:"정현", sub:"카피라이터", c:"#925f2e", on:false },
  { cl:"“오래 보면, 오래 남는다.”", nm:"무월", sub:"에세이스트", c:"#465256", on:false },
  { cl:"“끝까지 읽어줘서, 고맙습니다.”", nm:"정현", sub:"카피라이터", c:"#7a4a5e", on:false }
];

// 신간 속 문장
const BOOKS = [
  { ex:"“여백은 비어 있는 것이 아니라, 아직 말해지지 않은 것이다.”", ttl:"고요를 읽는 법", au:"새김 편집부", c:"linear-gradient(160deg,#3a5a4a,#26392e)" },
  { ex:"“모든 책은 첫 문장에서 한 번, 마지막 문장에서 다시 태어난다.”", ttl:"첫 문장의 무게", au:"새김 편집부", c:"linear-gradient(160deg,#7a4a5e,#532f3d)" },
  { ex:"“읽는 일은 빨라질 수 있어도, 이해하는 일은 제 속도를 고집한다.”", ttl:"종이의 결", au:"새김 편집부", c:"linear-gradient(160deg,#925f2e,#5f3d1c)" }
];

// 당신을 위한
const FORYOU = [
  { q:"죽는 날까지 하늘을 우러러\n한 점 부끄럼이 없기를", a:"윤동주 · 하늘과 바람과 별과 시" },
  { q:"천 리 길도\n한 걸음에서 시작된다", a:"노자 · 도덕경" },
  { q:"계절이 지나가는 하늘에는\n가을로 가득 차 있습니다", a:"윤동주 · 하늘과 바람과 별과 시" }
];

/* ===== 렌더 ===== */
const $ = s => document.querySelector(s);

// 히어로
$("#hero").innerHTML = `
  <div class="tag">오늘의 문장</div>
  <div class="q">${TODAY.text}</div>
  <div class="by"><b>${TODAY.author}</b> · ${TODAY.work}</div>
  <div class="hero-act">
    <button class="hero-btn solid" data-act="새겼어요 · 서랍에 담았어요">＋ 새기기</button>
    <button class="hero-btn" data-act="발견 탭으로 이어집니다">이어서 보기</button>
  </div>`;

// 테마
$("#themes").innerHTML = THEMES.map(([n,bg,fg]) =>
  `<button class="theme" data-act="‘${n}’ 테마를 둘러봐요" style="color:${fg}">
     <span>${n}</span><i style="position:absolute;inset:0;background:${bg}"></i></button>`
).join("");

// 작가
$("#authors").innerHTML = AUTHORS.map((a,i) => `
  <div class="author">
    <div class="ava" style="background:${a.c}">${a.nm[0]}</div>
    <div class="nm">${a.nm}</div>
    <div class="role">${a.role}</div>
    <div class="fol">구독 ${a.fol}</div>
    <button class="sub-btn ${a.on?'on':''}" data-sub="${i}">${a.on?'구독중':'구독'}</button>
  </div>`).join("");

// 컬렉션
$("#colls").innerHTML = COLLS.map(c => `
  <div class="coll" style="background:${c.c}" data-act="‘${c.t}’ 컬렉션을 열어요">
    <div class="ct">${c.t}</div>
    <div class="cmeta">문장 <b>${c.n}</b>편 · ${c.cu}</div>
  </div>`).join("");

// 카피라이터
$("#copys").innerHTML = COPYS.map((c,i) => `
  <div class="copy">
    <div class="cl">${c.cl}</div>
    <div class="crow">
      <div class="ca" style="background:${c.c}">${c.nm[0]}</div>
      <div class="cn">${c.nm}<small>${c.sub}</small></div>
      <button class="mini-sub ${c.on?'on':''}" data-csub="${i}">${c.on?'구독중':'구독'}</button>
    </div>
  </div>`).join("");

// 신간
$("#books").innerHTML = BOOKS.map(b => `
  <div class="book" data-act="‘${b.ttl}’ 속 문장을 봐요">
    <div class="cover" style="background:${b.c}">
      <div class="ex">${b.ex}</div>
      <div class="bt">발췌</div>
    </div>
    <div class="bttl">${b.ttl}</div>
    <div class="bau">${b.au}</div>
  </div>`).join("");

// 당신을 위한
$("#foryou").innerHTML = FORYOU.map(f => `
  <div class="fy">
    <div><div class="fq">${f.q.replace(/\n/g,'<br>')}</div><div class="fa">${f.a}</div></div>
    <button class="carve" data-carve title="새기기">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
    </button>
  </div>`).join("");

/* ===== 인터랙션 ===== */
let tt;
function toast(m){ const e=$("#toast"); e.textContent=m; e.classList.add("show"); clearTimeout(tt); tt=setTimeout(()=>e.classList.remove("show"),1900); }

// 작가 구독 토글
$("#authors").addEventListener("click", e => {
  const b=e.target.closest("[data-sub]"); if(!b)return;
  const a=AUTHORS[+b.dataset.sub]; a.on=!a.on;
  b.classList.toggle("on",a.on); b.textContent=a.on?'구독중':'구독';
  toast(a.on?`${a.nm} 작가를 구독했어요`:`구독을 해제했어요`);
});
// 카피라이터 구독
$("#copys").addEventListener("click", e => {
  const b=e.target.closest("[data-csub]"); if(!b)return;
  const c=COPYS[+b.dataset.csub]; c.on=!c.on;
  b.classList.toggle("on",c.on); b.textContent=c.on?'구독중':'구독';
  toast(c.on?`${c.nm} 님을 구독했어요`:`구독을 해제했어요`);
});
// 새기기(당신을 위한)
$("#foryou").addEventListener("click", e => {
  const b=e.target.closest("[data-carve]"); if(!b)return;
  b.classList.toggle("on");
  toast(b.classList.contains("on")?"새겼어요 · 서랍에 담았어요":"서랍에서 뺐어요");
});
// 일반 탭(act) — 토스트로 안내
document.addEventListener("click", e => {
  const b=e.target.closest("[data-act]"); if(!b)return;
  toast(b.dataset.act);
});
// 하단 탭
document.querySelectorAll(".tab,.fab").forEach(t => t.addEventListener("click", () => {
  const name=t.dataset.t;
  if(t.classList.contains("tab")){
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));
    t.classList.add("on");
  }
  if(name!=="홈") toast(`데모는 홈 화면에 집중했어요 — ‘${name}’은 다음에`);
}));
</script>
</body>
</html>
