<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>새김 · 큐레이터 페이지</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css" />
<style>
  /* ===== 따뜻한 종이 토큰 (home.html과 동일) ===== */
  :root{
    --bg:#ebe3d4; --paper:#f5efe2; --surface:#fffdf7; --ink:#2a241d;
    --ink-2:#6f665a; --ink-3:#a89e8d; --line:#e4dac6; --line-2:#efe7d6;
    --accent:#3a5a4a; --accent-2:#a8754a; --gold:#b08738;
    --font:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,system-ui,"Apple SD Gothic Neo",sans-serif;
    --serif:Georgia,"Times New Roman",serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.6;
    display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
  ::selection{background:var(--accent);color:#fff}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

  /* ===== 폰 프레임 ===== */
  .phone{position:relative;width:390px;height:844px;max-height:94vh;background:var(--paper);border-radius:46px;
    border:9px solid #1c1812;box-shadow:0 30px 70px rgba(28,20,12,.4);overflow:hidden}
  @media(max-width:460px){ body{padding:0} .phone{width:100vw;height:100vh;max-height:none;border-radius:0;border:0} }
  .app{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;padding-bottom:84px;scroll-behavior:smooth}
  .app::-webkit-scrollbar{width:0}

  /* ===== 헤더 ===== */
  .top{position:sticky;top:0;z-index:20;background:rgba(245,239,226,.86);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);padding:14px 16px;display:flex;align-items:center;gap:12px}
  .top .ico{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    color:var(--ink-2);background:var(--surface);border:1px solid var(--line);flex-shrink:0}
  .top .htitle{flex:1;font-size:1rem;font-weight:800;letter-spacing:-.01em;opacity:0;transition:opacity .2s;
    display:flex;align-items:center;gap:5px}
  .top .htitle.show{opacity:1}
  .top .htitle .vchk{width:16px;height:16px}

  /* ===== 프로필 ===== */
  .profile{padding:20px 20px 6px}
  .pf-top{display:flex;align-items:center;gap:18px}
  .avatar{width:78px;height:78px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;
    color:#f3eee2;font-family:var(--serif);font-weight:800;font-size:2rem;
    background:linear-gradient(150deg,#46586a,#2c3744);box-shadow:0 8px 18px rgba(40,40,55,.28)}
  .pf-stats{flex:1;display:flex;justify-content:space-around;text-align:center}
  .pf-stats button{display:flex;flex-direction:column;gap:1px;padding:4px 6px;border-radius:10px;transition:background .14s}
  .pf-stats button:hover{background:var(--line-2)}
  .pf-stats .n{font-size:1.12rem;font-weight:800;letter-spacing:-.02em}
  .pf-stats .l{font-size:.68rem;color:var(--ink-3);font-weight:600}

  .pf-name{display:flex;align-items:center;gap:7px;margin-top:16px;font-size:1.32rem;font-weight:800;letter-spacing:-.02em}
  .badge{width:21px;height:21px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .badge svg{width:13px;height:13px;color:#fff}
  .pf-handle{font-size:.8rem;color:var(--ink-3);font-weight:600;margin-top:3px}
  .pf-handle b{color:var(--accent-2);font-weight:700}
  .pf-bio{font-size:.92rem;color:var(--ink-2);margin-top:12px;word-break:keep-all;line-height:1.62;max-width:320px}

  .pf-tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px}
  .tagchip{font-size:.78rem;font-weight:700;color:var(--ink-2);background:var(--line-2);border:1px solid var(--line);
    padding:5px 11px;border-radius:999px}
  .tagchip b{color:var(--accent-2);font-weight:800;margin-right:1px}

  .pf-act{display:flex;gap:9px;margin-top:18px}
  .sub-btn{flex:1;padding:12px;border-radius:12px;font-size:.92rem;font-weight:800;background:var(--accent);color:#fff;
    border:1px solid var(--accent);transition:all .16s}
  .sub-btn.on{background:transparent;color:var(--accent)}
  .icon-btn{width:46px;border-radius:12px;border:1px solid var(--line);background:var(--surface);
    display:flex;align-items:center;justify-content:center;color:var(--ink-2);flex-shrink:0}

  /* ===== 세그먼트 ===== */
  .seg{position:sticky;top:67px;z-index:15;display:flex;background:rgba(245,239,226,.92);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);margin-top:18px;padding:0 12px}
  .seg button{flex:1;padding:13px 4px 11px;font-size:.86rem;font-weight:700;color:var(--ink-3);position:relative}
  .seg button.on{color:var(--ink)}
  .seg button.on::after{content:"";position:absolute;left:50%;bottom:-1px;transform:translateX(-50%);
    width:34px;height:2.5px;border-radius:3px;background:var(--accent)}
  .seg .cnt{font-size:.72rem;color:var(--ink-3);font-weight:600;margin-left:3px}

  /* ===== 세그 패널 ===== */
  .panel{padding:18px 20px 8px}
  .panel[hidden]{display:none}

  /* 컬렉션(보드) 그리드 */
  .boards{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  .board{text-align:left;height:158px;border-radius:18px;padding:16px;color:#fff;display:flex;flex-direction:column;
    justify-content:space-between;position:relative;overflow:hidden;box-shadow:0 10px 22px rgba(40,30,18,.22);transition:transform .14s}
  .board:active{transform:scale(.97)}
  .board::after{content:"";position:absolute;inset:0;background:linear-gradient(160deg,rgba(255,255,255,.16),transparent 55%)}
  .board .bd-q{font-size:.92rem;font-weight:600;line-height:1.5;word-break:keep-all;position:relative;z-index:1;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;opacity:.95}
  .board .bd-foot{position:relative;z-index:1}
  .board .bd-t{font-size:.96rem;font-weight:800;letter-spacing:-.01em;line-height:1.3}
  .board .bd-n{font-size:.72rem;opacity:.82;margin-top:3px}

  /* 새긴 문장 리스트 */
  .saved{display:flex;flex-direction:column;gap:11px}
  .sv{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px 17px;display:flex;gap:13px;align-items:flex-start}
  .sv .sv-q{flex:1;font-size:.96rem;line-height:1.55;font-weight:500;word-break:keep-all}
  .sv .sv-by{font-size:.75rem;color:var(--ink-3);margin-top:8px;font-weight:600}
  .carve{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;
    color:var(--ink-3);flex-shrink:0;transition:all .16s}
  .carve:hover{border-color:var(--accent);color:var(--accent)}
  .carve.on{background:var(--accent);color:#fff;border-color:var(--accent)}

  /* 발행 그리드 */
  .pubs{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  .pub{border-radius:16px;padding:17px 16px;min-height:128px;display:flex;flex-direction:column;justify-content:space-between;
    color:#f3eee2;position:relative;overflow:hidden;box-shadow:0 8px 18px rgba(40,55,40,.2);text-align:left}
  .pub::after{content:"";position:absolute;inset:0;background:linear-gradient(150deg,rgba(255,255,255,.14),transparent 55%)}
  .pub .pq{font-size:.95rem;font-weight:600;line-height:1.5;word-break:keep-all;position:relative;z-index:1}
  .pub .pby{font-size:.7rem;opacity:.8;position:relative;z-index:1;margin-top:10px}

  .empty{color:var(--ink-3);font-size:.86rem;text-align:center;padding:30px 0}

  /* ===== 비슷한 큐레이터 ===== */
  .similar{margin-top:14px}
  .sec-head{padding:0 20px;margin-bottom:12px}
  .sec-title{font-size:1.02rem;font-weight:800;letter-spacing:-.01em}
  .sec-title .sub{display:block;font-size:.74rem;font-weight:500;color:var(--ink-3);margin-top:3px}
  .rail{display:flex;gap:12px;overflow-x:auto;padding:2px 20px 6px}
  .rail::-webkit-scrollbar{height:0}
  .rail>*{flex-shrink:0}
  .sim{width:148px;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:15px 13px;text-align:center}
  .sim .sav{width:50px;height:50px;border-radius:50%;margin:0 auto 9px;display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:800;font-size:1.1rem;font-family:var(--serif)}
  .sim .snm{font-size:.92rem;font-weight:800;display:flex;align-items:center;justify-content:center;gap:4px}
  .sim .snm .vchk{width:14px;height:14px;color:var(--accent)}
  .sim .ssub{font-size:.7rem;color:var(--ink-3);margin-top:2px}
  .sim .scol{font-size:.68rem;color:var(--ink-3);margin-top:6px}
  .sim .mini-sub{margin-top:10px;width:100%;padding:7px;border-radius:9px;font-size:.78rem;font-weight:700;
    background:var(--accent);color:#fff;border:1px solid var(--accent);transition:all .16s}
  .sim .mini-sub.on{background:transparent;color:var(--accent)}

  .foot{text-align:center;padding:26px 20px 10px;color:var(--ink-3);font-size:.7rem;line-height:1.7}

  /* ===== 탭바 ===== */
  .tabbar{position:absolute;left:0;right:0;bottom:0;height:72px;background:rgba(245,239,226,.92);backdrop-filter:blur(14px);
    border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-around;padding:0 14px 14px;z-index:30}
  .tab{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--ink-3);font-size:.64rem;font-weight:700;flex:1}
  .tab.on{color:var(--accent)}
  .tab svg{width:23px;height:23px}
  .fab{width:50px;height:50px;border-radius:16px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 18px rgba(58,90,74,.4);transform:translateY(-8px);flex-shrink:0}

  /* ===== 보드 상세 시트 ===== */
  .mask{position:absolute;inset:0;background:rgba(28,20,12,.42);opacity:0;pointer-events:none;transition:opacity .26s;z-index:40}
  .mask.show{opacity:1;pointer-events:auto}
  .sheet{position:absolute;left:0;right:0;bottom:0;max-height:88%;background:var(--paper);border-radius:24px 24px 0 0;
    transform:translateY(102%);transition:transform .3s cubic-bezier(.3,.8,.4,1);z-index:50;display:flex;flex-direction:column;
    box-shadow:0 -14px 40px rgba(0,0,0,.26)}
  .sheet.show{transform:translateY(0)}
  .sheet-h{padding:12px 18px 10px;position:relative;flex-shrink:0}
  .grip{width:38px;height:4px;border-radius:3px;background:var(--ink-3);opacity:.5;margin:0 auto 6px}
  .sheet-close{position:absolute;right:14px;top:12px;width:32px;height:32px;border-radius:50%;background:var(--surface);
    border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--ink-2)}
  .sheet-cap{height:84px;border-radius:16px;margin:0 18px;padding:16px;color:#fff;display:flex;flex-direction:column;justify-content:flex-end;
    position:relative;overflow:hidden}
  .sheet-cap .st{font-size:1.16rem;font-weight:800;letter-spacing:-.01em;position:relative;z-index:1}
  .sheet-cap .sm{font-size:.74rem;opacity:.88;position:relative;z-index:1;margin-top:2px}
  .sheet-desc{padding:13px 20px 4px;font-size:.86rem;color:var(--ink-2);word-break:keep-all}
  .sheet-body{overflow-y:auto;padding-bottom:18px}
  .sheet-body::-webkit-scrollbar{width:0}
  .sheet-quotes{padding:8px 18px;display:flex;flex-direction:column;gap:10px}
  .sq{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:14px 15px;display:flex;gap:12px;align-items:flex-start}
  .sq .sqq{flex:1;font-size:.92rem;line-height:1.5;font-weight:500;word-break:keep-all}
  .sq .sqby{font-size:.72rem;color:var(--ink-3);margin-top:6px;font-weight:600}
  .sheet-follow{margin:8px 18px 0;padding:13px;border-radius:12px;background:var(--accent);color:#fff;font-weight:800;font-size:.9rem;text-align:center}
  .sheet-follow.on{background:transparent;color:var(--accent);border:1px solid var(--accent)}

  /* ===== 토스트 ===== */
  .toast{position:absolute;left:50%;bottom:92px;transform:translateX(-50%) translateY(14px);background:var(--ink);color:#f5efe2;
    padding:11px 20px;border-radius:11px;font-size:.83rem;font-weight:500;opacity:0;pointer-events:none;transition:all .25s;z-index:60;white-space:nowrap;box-shadow:0 10px 26px rgba(0,0,0,.3)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
  <div class="phone">
    <div class="app" id="app">
      <!-- 헤더 -->
      <div class="top">
        <button class="ico" data-act="서가로 돌아가요" title="뒤로">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <div class="htitle" id="htitle">무월
          <svg class="vchk" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
        </div>
        <button class="ico" data-act="큐레이터 페이지를 공유해요" title="공유">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.6 13.5 6.8 4M15.4 6.5 8.6 10.5"/></svg>
        </button>
      </div>

      <!-- 프로필 -->
      <div class="profile">
        <div class="pf-top">
          <div class="avatar">霧</div>
          <div class="pf-stats">
            <button data-go="board"><span class="n">8</span><span class="l">컬렉션</span></button>
            <button data-go="saved"><span class="n">326</span><span class="l">새김</span></button>
            <button data-act="구독자 2,418명"><span class="n">2.4천</span><span class="l">구독자</span></button>
          </div>
        </div>
        <div class="pf-name">무월
          <span class="badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>
        </div>
        <div class="pf-handle">@muwol · 인증 큐레이터 <b>· 에세이스트</b></div>
        <div class="pf-bio">흐린 날의 문장을 줍습니다. 위로가 필요한 밤, 곁에 두고 싶은 한 줄을 골라 엮어요.</div>
        <div class="pf-tags" id="tags"></div>
        <div class="pf-act">
          <button class="sub-btn" id="subBtn">구독</button>
          <button class="icon-btn" data-act="알림을 받아요" title="알림">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
          </button>
        </div>
      </div>

      <!-- 세그먼트 -->
      <div class="seg" id="seg">
        <button class="on" data-seg="board">컬렉션<span class="cnt">8</span></button>
        <button data-seg="saved">새긴 문장<span class="cnt">326</span></button>
        <button data-seg="pub">발행<span class="cnt">24</span></button>
      </div>

      <!-- 패널: 컬렉션 -->
      <div class="panel" id="p-board"><div class="boards" id="boards"></div></div>
      <!-- 패널: 새긴 문장 -->
      <div class="panel" id="p-saved" hidden><div class="saved" id="savedList"></div></div>
      <!-- 패널: 발행 -->
      <div class="panel" id="p-pub" hidden><div class="pubs" id="pubs"></div></div>

      <!-- 비슷한 큐레이터 -->
      <section class="similar">
        <div class="sec-head"><div class="sec-title">비슷한 큐레이터<span class="sub">결이 닮은 사람의 안목을 더 구독해요</span></div></div>
        <div class="rail" id="similar"></div>
      </section>

      <div class="foot">새김 · 큐레이터 페이지 프로토타입<br/>누구나 큐레이터 — 직업이 아니라 컬렉션·취향으로</div>
    </div>

    <!-- 탭바 (서가 활성) -->
    <div class="tabbar">
      <button class="tab" data-t="홈"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>홈</button>
      <button class="tab" data-t="발견"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m15 9-2 5-4 1 2-5z"/></svg>발견</button>
      <button class="fab" data-t="포착"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button>
      <button class="tab on" data-t="서가"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>서가</button>
      <button class="tab" data-t="나"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>나</button>
    </div>

    <!-- 보드 상세 시트 -->
    <div class="mask" id="mask"></div>
    <div class="sheet" id="sheet">
      <div class="sheet-h">
        <div class="grip"></div>
        <button class="sheet-close" id="sheetClose"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
      </div>
      <div class="sheet-cap" id="sheetCap"></div>
      <div class="sheet-body">
        <div class="sheet-desc" id="sheetDesc"></div>
        <div class="sheet-quotes" id="sheetQuotes"></div>
        <button class="sheet-follow" id="sheetFollow">＋ 이 컬렉션 팔로우</button>
      </div>
    </div>

    <div class="toast" id="toast"></div>
  </div>

<script>
/* ===== 데이터 ===== */
const TAGS = ["밤","위로","고독","성장","비"];

// 컬렉션(보드) — 대표 그라데이션 + 보드별 문장(상세 시트용)
const BOARDS = [
  { t:"새벽 세 시의 메모", n:20, c:"linear-gradient(150deg,#3c4670,#262d4f)",
    desc:"잠 못 드는 새벽, 머리맡에 떠오른 문장들. 가장 솔직해지는 시간의 기록.",
    q:[ ["가장 어두운 밤도 끝이 나고, 해는 떠오른다.","빅토르 위고"],
        ["밤은 생각보다 많은 것을 견디게 한다.","무월"],
        ["잠들지 못한 밤이 나를 키웠다.","무월"],
        ["어둠은 빛을 가리지 못한다, 잠시 미룰 뿐.","고전 잠언"] ] },
  { t:"비 오는 날의 문장", n:12, c:"linear-gradient(150deg,#516066,#333d42)",
    desc:"창에 빗방울이 맺히는 날 꺼내 읽는 한 줄. 젖어도 괜찮은 마음에 대하여.",
    q:[ ["비는 시끄럽지 않게 세상을 적신다.","무월"],
        ["우산이 없는 날엔, 함께 젖어줄 사람이 필요하다.","무월"],
        ["빗소리는 가장 오래된 자장가다.","무월"] ] },
  { t:"잠들기 전 마지막 줄", n:15, c:"linear-gradient(150deg,#473a52,#2c2435)",
    desc:"하루를 덮기 전, 마지막으로 마음에 새기고 싶은 문장.",
    q:[ ["오늘 하루도, 애썼다.","무월"],
        ["내일은 내일의 해가 뜬다.","고전 속담"],
        ["잘 자라는 말은, 잘 살라는 말과 닮았다.","무월"] ] },
  { t:"혼자라는 감각", n:9, c:"linear-gradient(150deg,#5a5550,#363330)",
    desc:"외로움과 고독은 다르다. 혼자 있는 시간을 단단하게 만드는 문장들.",
    q:[ ["고독은 혼자 있는 능력이고, 외로움은 혼자 있는 고통이다.","무월"],
        ["나는 천천히 가는 사람이지만, 뒤로 가지는 않는다.","에이브러햄 링컨"],
        ["혼자 걷는 길에서야 보이는 풍경이 있다.","무월"] ] },
  { t:"다시 시작하려는 너에게", n:11, c:"linear-gradient(150deg,#3a5a4a,#274034)",
    desc:"무너진 자리에서 다시 일어서려는 사람에게 건네는 한 줄.",
    q:[ ["천 리 길도 한 걸음에서 시작된다.","노자 · 도덕경"],
        ["넘어지는 것은 실패가 아니다, 멈추는 것이 실패다.","고전 잠언"],
        ["다시 시작하기에 늦은 때란 없다.","무월"] ] },
  { t:"오래 곱씹은 한 줄", n:7, c:"linear-gradient(150deg,#925f2e,#5f3d1c)",
    desc:"빨리 읽고 지나치기 아까워, 오래 곁에 두고 곱씹은 문장.",
    q:[ ["읽는 일은 빨라질 수 있어도, 이해하는 일은 제 속도를 고집한다.","무월"],
        ["좋은 문장은 두 번 읽힌다 — 눈으로 한 번, 마음으로 한 번.","무월"] ] }
];

// 새긴 문장(소장) — 다른 출처의 문장을 무월이 새김
const SAVED = [
  ["죽는 날까지 하늘을 우러러 한 점 부끄럼이 없기를","윤동주 · 서시"],
  ["천 리 길도 한 걸음에서 시작된다","노자 · 도덕경"],
  ["가장 어두운 밤도 끝이 나고 해는 떠오른다","빅토르 위고 · 레 미제라블"],
  ["나는 천천히 가는 사람이지만 뒤로 가지는 않는다","에이브러햄 링컨"],
  ["오늘 할 수 있는 일에 전념하라","아이작 뉴턴"]
];

// 발행(직접 만든 카드)
const PUBS = [
  { q:"흐린 날은, 마음이 쉬어가라는 신호일지도.", c:"linear-gradient(150deg,#46586a,#2c3744)" },
  { q:"오래 보면, 오래 남는다.", c:"linear-gradient(150deg,#3a5a4a,#274034)" },
  { q:"잘 지내냐는 안부에, 잘 지낸다 답하지 못한 밤.", c:"linear-gradient(150deg,#7a4a5e,#4f2f3d)" },
  { q:"끝까지 읽어줘서, 고마워요.", c:"linear-gradient(150deg,#925f2e,#5f3d1c)" }
];

// 비슷한 큐레이터 — 인증(✓) 섞임
const SIMILAR = [
  { nm:"정현", sub:"카피라이터", col:"한 줄의 위로 · 41", c:"#925f2e", v:true,  on:false },
  { nm:"새김 편집부", sub:"공식 큐레이션", col:"에디터 픽 · 88", c:"#3a5a4a", v:true, on:true },
  { nm:"해도지", sub:"문장 수집가", col:"바다와 문장 · 17", c:"#46586a", v:false, on:false },
  { nm:"한낮", sub:"독서기록", col:"밑줄 그은 문장 · 23", c:"#5a5550", v:false, on:false }
];

/* ===== 렌더 ===== */
const $ = s => document.querySelector(s);
const vchk = '<svg class="vchk" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';

// 취향 태그
$("#tags").innerHTML = TAGS.map(t=>`<span class="tagchip"><b>#</b>${t}</span>`).join("");

// 컬렉션
$("#boards").innerHTML = BOARDS.map((b,i)=>`
  <button class="board" style="background:${b.c}" data-board="${i}">
    <div class="bd-q">${b.q[0][0]}</div>
    <div class="bd-foot"><div class="bd-t">${b.t}</div><div class="bd-n">문장 ${b.n}편</div></div>
  </button>`).join("");

// 새긴 문장
$("#savedList").innerHTML = SAVED.map(([q,by])=>`
  <div class="sv">
    <div><div class="sv-q">${q}</div><div class="sv-by">${by}</div></div>
    <button class="carve on" data-carve title="새김 해제">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
    </button>
  </div>`).join("");

// 발행
$("#pubs").innerHTML = PUBS.map(p=>`
  <button class="pub" style="background:${p.c}" data-act="발행한 카드를 열어요">
    <div class="pq">${p.q}</div><div class="pby">무월 · 직접 씀</div>
  </button>`).join("");

// 비슷한 큐레이터
$("#similar").innerHTML = SIMILAR.map((s,i)=>`
  <div class="sim">
    <div class="sav" style="background:${s.c}">${s.nm[0]}</div>
    <div class="snm">${s.nm}${s.v?vchk:""}</div>
    <div class="ssub">${s.sub}</div>
    <div class="scol">${s.col}</div>
    <button class="mini-sub ${s.on?'on':''}" data-sim="${i}">${s.on?'구독중':'구독'}</button>
  </div>`).join("");

/* ===== 인터랙션 ===== */
let tt;
function toast(m){ const e=$("#toast"); e.textContent=m; e.classList.add("show"); clearTimeout(tt); tt=setTimeout(()=>e.classList.remove("show"),1900); }

// 스크롤 시 헤더에 이름 노출
$("#app").addEventListener("scroll", e=>{
  $("#htitle").classList.toggle("show", e.target.scrollTop>150);
}, {passive:true});

// 구독 토글
$("#subBtn").addEventListener("click", ()=>{
  const b=$("#subBtn"); const on=b.classList.toggle("on");
  b.textContent=on?"구독중":"구독";
  toast(on?"무월 큐레이터를 구독했어요":"구독을 해제했어요");
});

// 세그먼트 전환
function seg(name){
  document.querySelectorAll("#seg button").forEach(x=>x.classList.toggle("on",x.dataset.seg===name));
  $("#p-board").hidden = name!=="board";
  $("#p-saved").hidden = name!=="saved";
  $("#p-pub").hidden   = name!=="pub";
}
$("#seg").addEventListener("click", e=>{ const b=e.target.closest("[data-seg]"); if(b) seg(b.dataset.seg); });
// 프로필 통계 → 해당 세그로
document.querySelectorAll("[data-go]").forEach(b=>b.addEventListener("click",()=>{
  seg(b.dataset.go);
  $("#seg").scrollIntoView({behavior:"smooth",block:"start"});
}));

// 새긴 문장 토글
$("#savedList").addEventListener("click", e=>{
  const b=e.target.closest("[data-carve]"); if(!b)return;
  const on=b.classList.toggle("on");
  b.querySelector("svg").setAttribute("fill", on?"currentColor":"none");
  b.querySelector("svg").setAttribute("stroke", on?"none":"currentColor");
  toast(on?"새겼어요 · 내 서랍에 담았어요":"서랍에서 뺐어요");
});

// 비슷한 큐레이터 구독
$("#similar").addEventListener("click", e=>{
  const b=e.target.closest("[data-sim]"); if(!b)return;
  const s=SIMILAR[+b.dataset.sim]; s.on=!s.on;
  b.classList.toggle("on",s.on); b.textContent=s.on?"구독중":"구독";
  toast(s.on?`${s.nm} 님을 구독했어요`:"구독을 해제했어요");
});

/* ===== 보드 상세 시트 ===== */
let followed=false;
function openSheet(i){
  const b=BOARDS[i];
  $("#sheetCap").style.background=b.c;
  $("#sheetCap").innerHTML=`<div class="st">${b.t}</div><div class="sm">무월 · 문장 ${b.n}편</div>`;
  $("#sheetDesc").textContent=b.desc;
  $("#sheetQuotes").innerHTML=b.q.map(([q,by])=>`
    <div class="sq">
      <div><div class="sqq">${q}</div><div class="sqby">${by}</div></div>
      <button class="carve" data-sqcarve title="새기기">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
      </button>
    </div>`).join("");
  followed=false;
  $("#sheetFollow").classList.remove("on");
  $("#sheetFollow").textContent="＋ 이 컬렉션 팔로우";
  $("#mask").classList.add("show");
  $("#sheet").classList.add("show");
}
function closeSheet(){ $("#mask").classList.remove("show"); $("#sheet").classList.remove("show"); }
$("#boards").addEventListener("click", e=>{ const b=e.target.closest("[data-board]"); if(b) openSheet(+b.dataset.board); });
$("#mask").addEventListener("click", closeSheet);
$("#sheetClose").addEventListener("click", closeSheet);
$("#sheetFollow").addEventListener("click", ()=>{
  followed=!followed;
  $("#sheetFollow").classList.toggle("on",followed);
  $("#sheetFollow").textContent=followed?"✓ 팔로우중":"＋ 이 컬렉션 팔로우";
  toast(followed?"컬렉션을 팔로우했어요":"팔로우를 해제했어요");
});
$("#sheetQuotes").addEventListener("click", e=>{
  const b=e.target.closest("[data-sqcarve]"); if(!b)return;
  const on=b.classList.toggle("on");
  b.querySelector("svg").setAttribute("fill", on?"currentColor":"none");
  toast(on?"새겼어요 · 내 서랍에 담았어요":"서랍에서 뺐어요");
});

// 일반 안내(act)
document.addEventListener("click", e=>{ const b=e.target.closest("[data-act]"); if(b) toast(b.dataset.act); });
// 하단 탭
document.querySelectorAll(".tab,.fab").forEach(t=>t.addEventListener("click", ()=>{
  if(t.dataset.t!=="서가") toast(`데모는 큐레이터 페이지에 집중했어요 — ‘${t.dataset.t}’은 다음에`);
}));
</script>
</body>
</html>
