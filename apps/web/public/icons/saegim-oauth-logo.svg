<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">새김 OAuth 로고</title>
  <desc id="desc">잉크 차콜 배경 위에 문장 카드와 새김 표식을 올린 OAuth 브랜딩용 로고</desc>
  <defs>
    <linearGradient id="ink" x1="70" y1="34" x2="442" y2="486" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4A4550"/>
      <stop offset=".54" stop-color="#38323F"/>
      <stop offset="1" stop-color="#27222E"/>
    </linearGradient>
    <linearGradient id="paper" x1="166" y1="104" x2="344" y2="408" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset=".58" stop-color="#F7F6F8"/>
      <stop offset="1" stop-color="#ECEBEE"/>
    </linearGradient>
    <filter id="cardShadow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#0B0810" flood-opacity=".34"/>
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#0B0810" flood-opacity=".2"/>
    </filter>
    <filter id="markShadow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#0B0810" flood-opacity=".18"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="108" fill="url(#ink)"/>
  <path d="M100 1h312c55 0 99 44 99 99v312c0 55-44 99-99 99H100C45 511 1 467 1 412V100C1 45 45 1 100 1Z" fill="none" stroke="#F6F5F6" stroke-opacity=".1" stroke-width="2"/>

  <g filter="url(#cardShadow)">
    <rect x="131" y="121" width="242" height="306" rx="54" fill="#24202A" opacity=".24" transform="rotate(-6 252 274)"/>
    <rect x="151" y="92" width="242" height="306" rx="54" fill="#F2F1F4" opacity=".9" transform="rotate(7 272 245)"/>
    <rect x="139" y="103" width="250" height="320" rx="58" fill="url(#paper)" stroke="#FFFFFF" stroke-opacity=".5" stroke-width="5"/>
  </g>

  <g fill="#38323F">
    <rect x="187" y="181" width="150" height="21" rx="10.5"/>
    <rect x="187" y="223" width="105" height="21" rx="10.5" opacity=".74"/>
    <rect x="187" y="265" width="140" height="21" rx="10.5" opacity=".32"/>
  </g>

  <g filter="url(#markShadow)">
    <circle cx="326" cy="338" r="52" fill="#38323F"/>
    <text x="326" y="356" text-anchor="middle" font-family="Gowun Dodum, Apple SD Gothic Neo, Pretendard, sans-serif" font-size="58" font-weight="700" fill="#F8F7F9">새</text>
  </g>

  <rect x="185" y="337" width="112" height="12" rx="6" fill="#353039"/>
  <rect x="185" y="363" width="74" height="12" rx="6" fill="#38323F" opacity=".34"/>
</svg>
