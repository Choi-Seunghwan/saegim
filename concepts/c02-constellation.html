<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
<title>문장의 밤하늘 · Sentence Lab</title>
<!-- 한글 친화 모던 산세리프 (실패 시 system-ui로 폴백) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css" />
<style>
  /* =========================================================
     디자인 토큰 — 짙은 남색 우주 + 별빛 금/은
     ========================================================= */
  :root{
    --space-0:#03040b;        /* 가장 깊은 검정-남색 */
    --space-1:#070a18;        /* 밤하늘 베이스 */
    --space-2:#0c1330;        /* 라디얼 중심부 남색 */
    --space-3:#16204a;        /* 성운 옅은 빛 */

    --ink:#eef1fb;            /* 본문 별빛 화이트 */
    --ink-2:#aeb6d6;          /* 보조 텍스트 (옅은 청회색) */
    --ink-3:#6f7aa0;          /* 약한 텍스트 */
    --line:rgba(180,196,255,.12);   /* 얇은 경계선 */

    --gold:#f4d99b;           /* 별빛 금 */
    --gold-soft:#e9c98a;      /* 따뜻한 금 (포인트) */
    --silver:#cdd7f5;         /* 별빛 은 */

    --panel-bg:rgba(10,15,36,.72);  /* 패널 유리 표면 */
    --panel-line:rgba(168,186,255,.16);

    --font:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,system-ui,"Segoe UI",Roboto,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    --serif:"Pretendard Variable",Pretendard,system-ui,sans-serif;

    --ease-out:cubic-bezier(.16,1,.3,1);     /* 우아한 감속 */
    --ease-soft:cubic-bezier(.4,0,.2,1);
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:var(--font);
    background:var(--space-0);
    color:var(--ink);
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    word-break:keep-all;
    overscroll-behavior:none;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  ::selection{background:rgba(244,217,155,.28);color:#fff}

  /* =========================================================
     무대 — 풀스크린 밤하늘
     ========================================================= */
  #stage{
    position:fixed;inset:0;
    /* 라디얼 그라데이션: 중심 남색 → 가장자리 검정 */
    background:
      radial-gradient(140% 110% at 50% 42%,
        var(--space-3) 0%,
        var(--space-2) 22%,
        var(--space-1) 52%,
        var(--space-0) 100%);
    cursor:grab;
    touch-action:none;            /* 터치 제스처 직접 처리 */
    overflow:hidden;
  }
  #stage.grabbing{cursor:grabbing}
  /* 미세한 성운 번짐 — 캔버스 위 한 겹의 빛 */
  #stage::before{
    content:"";position:absolute;inset:-10%;pointer-events:none;
    background:
      radial-gradient(40% 38% at 24% 30%, rgba(86,108,200,.10), transparent 70%),
      radial-gradient(46% 40% at 78% 66%, rgba(150,120,200,.08), transparent 70%),
      radial-gradient(30% 30% at 60% 18%, rgba(110,150,220,.07), transparent 70%);
    mix-blend-mode:screen;
    opacity:.9;
    transition:transform .4s var(--ease-soft);
  }
  /* 화면 가장자리를 살짝 어둡게 (비네트) — 깊이감 */
  #stage::after{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(120% 100% at 50% 50%, transparent 58%, rgba(2,3,9,.55) 100%);
  }

  canvas{position:absolute;inset:0;display:block}
  #c-bg{z-index:1}      /* 배경 별가루 + 성운 */
  #c-main{z-index:2}    /* 별자리 선 + 별 */

  /* =========================================================
     좌상단 브랜드 + 범례
     ========================================================= */
  .hud{position:fixed;z-index:20;pointer-events:none}
  .hud > *{pointer-events:auto}

  #brand{
    top:26px;left:30px;
    opacity:0;transform:translateY(-6px);
    animation:hud-in 1s var(--ease-out) .5s forwards;
  }
  #brand .ko{
    font-size:1.28rem;font-weight:800;letter-spacing:-.02em;
    color:var(--ink);
    display:flex;align-items:center;gap:9px;
  }
  #brand .dot{
    width:7px;height:7px;border-radius:50%;
    background:var(--gold);
    box-shadow:0 0 10px 2px rgba(244,217,155,.7);
    animation:brand-pulse 3.4s ease-in-out infinite;
  }
  #brand .en{
    font-size:.58rem;font-weight:600;letter-spacing:.36em;
    color:var(--ink-3);margin-top:5px;text-transform:uppercase;
    padding-left:16px;
  }
  #brand .tag{
    font-size:.72rem;color:var(--ink-2);margin-top:13px;
    max-width:230px;line-height:1.55;font-weight:400;
    padding-left:16px;
  }
  #brand .tag b{color:var(--silver);font-weight:600}

  /* 범례 */
  #legend{
    top:150px;left:30px;
    opacity:0;transform:translateY(-6px);
    animation:hud-in 1s var(--ease-out) .8s forwards;
  }
  #legend .lg-title{
    font-size:.6rem;font-weight:700;letter-spacing:.24em;
    color:var(--ink-3);text-transform:uppercase;margin-bottom:11px;
    padding-left:16px;
  }
  #legend ul{list-style:none;display:flex;flex-direction:column;gap:1px}
  #legend li{
    display:flex;align-items:center;gap:9px;
    font-size:.78rem;color:var(--ink-2);
    padding:5px 12px 5px 16px;border-radius:8px;
    cursor:pointer;transition:background .2s, color .2s;
    user-select:none;
  }
  #legend li:hover{background:rgba(180,196,255,.07);color:var(--ink)}
  #legend li.active{background:rgba(244,217,155,.10);color:var(--ink)}
  #legend li .swatch{
    width:9px;height:9px;border-radius:50%;flex-shrink:0;
    box-shadow:0 0 8px 1px currentColor;
    transition:transform .2s var(--ease-out);
  }
  #legend li:hover .swatch{transform:scale(1.35)}
  #legend li .cnt{
    margin-left:auto;font-size:.66rem;color:var(--ink-3);
    font-variant-numeric:tabular-nums;
  }

  /* =========================================================
     우하단 줌 컨트롤
     ========================================================= */
  #zoomctl{
    position:fixed;z-index:20;right:30px;bottom:30px;
    display:flex;flex-direction:column;gap:8px;align-items:center;
    opacity:0;transform:translateY(8px);
    animation:hud-in 1s var(--ease-out) .9s forwards;
  }
  .zbtn{
    width:44px;height:44px;border-radius:13px;
    background:var(--panel-bg);
    border:1px solid var(--panel-line);
    -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
    color:var(--ink-2);
    display:flex;align-items:center;justify-content:center;
    font-size:1.2rem;line-height:1;
    transition:transform .2s var(--ease-out), color .2s, border-color .2s, background .2s;
  }
  .zbtn:hover{color:var(--ink);border-color:rgba(244,217,155,.4);background:rgba(20,28,60,.8);transform:translateY(-1px)}
  .zbtn:active{transform:translateY(0) scale(.94)}
  .zbtn svg{width:18px;height:18px}
  .zlevel{
    font-size:.62rem;color:var(--ink-3);font-variant-numeric:tabular-nums;
    letter-spacing:.05em;user-select:none;
    padding:2px 0;
  }

  /* 안내 힌트 (하단 중앙) */
  #hint{
    position:fixed;z-index:18;left:50%;bottom:30px;transform:translateX(-50%);
    font-size:.72rem;color:var(--ink-3);
    display:flex;gap:18px;align-items:center;
    background:rgba(8,12,30,.5);
    -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
    padding:9px 18px;border-radius:999px;border:1px solid var(--line);
    opacity:0;animation:hud-in 1.2s var(--ease-out) 1.4s forwards;
    pointer-events:none;
    transition:opacity .5s;
  }
  #hint kbd{
    font-family:inherit;font-size:.66rem;color:var(--ink-2);
    background:rgba(180,196,255,.1);border:1px solid var(--line);
    border-radius:5px;padding:1px 6px;margin:0 2px;
  }
  #hint .sep{width:1px;height:11px;background:var(--line)}

  /* =========================================================
     별 hover 미리보기 툴팁
     ========================================================= */
  #tip{
    position:fixed;z-index:25;pointer-events:none;
    max-width:280px;
    background:var(--panel-bg);
    border:1px solid var(--panel-line);
    -webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);
    border-radius:13px;
    padding:13px 16px;
    box-shadow:0 14px 40px rgba(0,0,0,.5);
    opacity:0;transform:translateY(4px) scale(.97);
    transition:opacity .18s var(--ease-soft), transform .18s var(--ease-out);
    will-change:transform,opacity;
  }
  #tip.show{opacity:1;transform:translateY(0) scale(1)}
  #tip .t-text{
    font-size:.92rem;color:var(--ink);line-height:1.5;font-weight:500;
    white-space:pre-line;
  }
  #tip .t-meta{
    font-size:.68rem;color:var(--gold-soft);margin-top:7px;
    letter-spacing:.02em;
  }
  #tip .t-meta .work{color:var(--ink-3)}

  /* =========================================================
     문장 패널 (별 클릭 시)
     ========================================================= */
  #panel{
    position:fixed;z-index:30;
    top:50%;right:42px;transform:translateY(-50%) translateX(40px);
    width:min(440px, calc(100vw - 56px));
    max-height:calc(100vh - 64px);
    background:linear-gradient(160deg, rgba(16,22,52,.86), rgba(8,12,30,.9));
    border:1px solid var(--panel-line);
    -webkit-backdrop-filter:blur(24px) saturate(120%);backdrop-filter:blur(24px) saturate(120%);
    border-radius:22px;
    box-shadow:0 30px 80px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.06);
    padding:38px 38px 34px;
    opacity:0;visibility:hidden;
    pointer-events:none;
    transition:opacity .5s var(--ease-soft),
               transform .6s var(--ease-out),
               visibility .5s;
    overflow-y:auto;
    overscroll-behavior:contain;
  }
  #panel.open{
    opacity:1;visibility:visible;pointer-events:auto;
    transform:translateY(-50%) translateX(0);
  }
  /* 패널 상단 — theme 라벨 + 닫기 */
  #panel .p-top{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:24px;
  }
  #panel .p-theme{
    display:inline-flex;align-items:center;gap:8px;
    font-size:.68rem;font-weight:700;letter-spacing:.16em;
    text-transform:uppercase;
  }
  #panel .p-theme .swatch{
    width:8px;height:8px;border-radius:50%;
    box-shadow:0 0 9px 1px currentColor;
  }
  #panel .p-close{
    width:34px;height:34px;border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    color:var(--ink-3);border:1px solid transparent;
    transition:color .2s, background .2s, border-color .2s, transform .2s;
  }
  #panel .p-close:hover{color:var(--ink);background:rgba(180,196,255,.08);border-color:var(--line)}
  #panel .p-close:active{transform:scale(.92)}
  #panel .p-close svg{width:16px;height:16px}

  /* 문장 본문 */
  #panel .p-quote{
    font-size:1.62rem;font-weight:600;line-height:1.56;
    letter-spacing:-.015em;color:var(--ink);
    white-space:pre-line;
    position:relative;
    /* 글자별 등장 준비 */
  }
  #panel .p-quote .mark{
    color:var(--gold);font-size:2.2rem;line-height:0;
    opacity:.55;margin-right:2px;vertical-align:-.1em;
  }
  /* 한 줄(논리행)을 부드럽게 띄우는 래퍼 */
  #panel .p-line{
    display:block;
    opacity:0;transform:translateY(10px);
    transition:opacity .6s var(--ease-out), transform .6s var(--ease-out);
  }
  #panel.open .p-line{opacity:1;transform:none}

  /* 구분선 */
  #panel .p-rule{
    height:1px;margin:28px 0 22px;
    background:linear-gradient(90deg, transparent, var(--line) 18%, var(--line) 82%, transparent);
  }
  /* 메타 정보 */
  #panel .p-meta{display:flex;flex-direction:column;gap:13px}
  #panel .p-row{display:flex;align-items:baseline;gap:14px;font-size:.9rem}
  #panel .p-row .k{
    font-size:.64rem;font-weight:700;letter-spacing:.2em;
    color:var(--ink-3);text-transform:uppercase;
    width:58px;flex-shrink:0;
  }
  #panel .p-row .v{color:var(--ink-2)}
  #panel .p-row .v b{color:var(--ink);font-weight:600}

  /* 키워드 칩 */
  #panel .p-keys{display:flex;flex-wrap:wrap;gap:8px;margin-top:2px}
  #panel .chip{
    font-size:.74rem;color:var(--silver);
    padding:5px 12px;border-radius:999px;
    background:rgba(180,196,255,.07);
    border:1px solid var(--line);
    transition:background .2s, border-color .2s, color .2s, transform .2s;
    cursor:default;
  }
  #panel .chip::before{content:"#";opacity:.5;margin-right:1px}
  #panel .chip:hover{background:rgba(244,217,155,.1);border-color:rgba(244,217,155,.3);color:var(--gold)}

  /* 'theme 성단 보기' 버튼 */
  #panel .p-action{
    margin-top:26px;width:100%;
    padding:13px 18px;border-radius:13px;
    background:rgba(244,217,155,.1);
    border:1px solid rgba(244,217,155,.28);
    color:var(--gold);font-size:.86rem;font-weight:600;
    letter-spacing:.01em;
    display:flex;align-items:center;justify-content:center;gap:9px;
    transition:background .22s, border-color .22s, transform .15s, box-shadow .22s;
  }
  #panel .p-action:hover{
    background:rgba(244,217,155,.16);border-color:rgba(244,217,155,.5);
    box-shadow:0 6px 22px rgba(244,217,155,.12);
  }
  #panel .p-action:active{transform:scale(.985)}
  #panel .p-action svg{width:15px;height:15px}
  #panel .p-action.on{
    background:rgba(244,217,155,.22);color:#fff;border-color:rgba(244,217,155,.6);
  }

  /* =========================================================
     로딩/진입 안내 (별 흩어지는 동안)
     ========================================================= */
  #cluster-toast{
    position:fixed;z-index:22;left:50%;top:34px;transform:translateX(-50%) translateY(-12px);
    font-size:.78rem;color:var(--gold-soft);font-weight:600;letter-spacing:.04em;
    background:rgba(8,12,30,.6);
    -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
    padding:9px 20px;border-radius:999px;border:1px solid rgba(244,217,155,.22);
    opacity:0;pointer-events:none;
    transition:opacity .4s, transform .5s var(--ease-out);
  }
  #cluster-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* =========================================================
     반응형
     ========================================================= */
  @media (max-width:720px){
    #brand{top:18px;left:18px}
    #brand .tag{display:none}
    #legend{top:96px;left:18px}
    #legend li{padding:6px 10px 6px 16px;font-size:.74rem}
    #zoomctl{right:16px;bottom:20px}
    #hint{display:none}
    #panel{
      top:auto;bottom:0;right:0;left:0;
      width:100%;max-width:100%;
      transform:translateY(100%);
      border-radius:24px 24px 0 0;
      max-height:80vh;
      padding:28px 24px 30px;
    }
    #panel.open{transform:translateY(0)}
    #panel .p-quote{font-size:1.34rem}
  }
  @media (max-width:380px){
    #legend{display:none}
  }

  /* 모션 최소화 선호 */
  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001s !important;transition-duration:.12s !important}
  }

  /* =========================================================
     키프레임
     ========================================================= */
  @keyframes hud-in{to{opacity:1;transform:none}}
  @keyframes brand-pulse{
    0%,100%{box-shadow:0 0 10px 2px rgba(244,217,155,.7);opacity:1}
    50%{box-shadow:0 0 16px 4px rgba(244,217,155,.9);opacity:.85}
  }
</style>
</head>
<body>
  <!-- 밤하늘 무대 -->
  <div id="stage" role="application" aria-label="문장의 밤하늘 — 별자리 탐험">
    <canvas id="c-bg"></canvas>     <!-- 배경 별가루/성운 (시차) -->
    <canvas id="c-main"></canvas>   <!-- 별자리 선 + 문장 별 -->
  </div>

  <!-- 좌상단 브랜드 -->
  <div id="brand" class="hud">
    <div class="ko"><span class="dot"></span>문장의 밤하늘</div>
    <div class="en">Sentence Lab · Constellation</div>
    <div class="tag">의미가 가까운 문장은 서로 곁에 모입니다. 검색하지 말고, <b>탐험하세요.</b></div>
  </div>

  <!-- 범례 (theme 색 점) -->
  <nav id="legend" class="hud" aria-label="주제 범례">
    <div class="lg-title">주제 성단</div>
    <ul id="legend-list"></ul>
  </nav>

  <!-- 우하단 줌 컨트롤 -->
  <div id="zoomctl" class="hud">
    <button class="zbtn" id="zoom-in" aria-label="확대" title="확대">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="6" x2="12" y2="18"/><line x1="6" y1="12" x2="18" y2="12"/></svg>
    </button>
    <div class="zlevel" id="zoom-level">100%</div>
    <button class="zbtn" id="zoom-out" aria-label="축소" title="축소">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="12" x2="18" y2="12"/></svg>
    </button>
    <button class="zbtn" id="zoom-reset" aria-label="전체 보기" title="전체 보기">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9V5a2 2 0 0 1 2-2h4M21 9V5a2 2 0 0 0-2-2h-4M3 15v4a2 2 0 0 0 2 2h4M21 15v4a2 2 0 0 1-2 2h-4"/></svg>
    </button>
  </div>

  <!-- 하단 힌트 -->
  <div id="hint">
    <span><kbd>드래그</kbd> 별하늘 이동</span><span class="sep"></span>
    <span><kbd>휠</kbd> 확대/축소</span><span class="sep"></span>
    <span>별을 <kbd>클릭</kbd>해 문장 펼치기</span>
  </div>

  <!-- 진입 안내 토스트 -->
  <div id="cluster-toast"></div>

  <!-- hover 툴팁 -->
  <div id="tip" aria-hidden="true">
    <div class="t-text"></div>
    <div class="t-meta"></div>
  </div>

  <!-- 문장 패널 -->
  <aside id="panel" role="dialog" aria-modal="false" aria-label="문장 상세">
    <div class="p-top">
      <span class="p-theme"><span class="swatch"></span><span class="p-theme-name"></span></span>
      <button class="p-close" aria-label="닫기 (Esc)" title="닫기 (Esc)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
      </button>
    </div>
    <div class="p-quote"></div>
    <div class="p-rule"></div>
    <div class="p-meta">
      <div class="p-row"><span class="k">저자</span><span class="v p-author"></span></div>
      <div class="p-row"><span class="k">출처</span><span class="v p-work"></span></div>
      <div class="p-row"><span class="k">주제</span><span class="v p-themeword"></span></div>
      <div class="p-row" style="align-items:flex-start"><span class="k" style="padding-top:5px">키워드</span><span class="v p-keys"></span></div>
    </div>
    <button class="p-action" id="p-cluster-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2.2"/><circle cx="5" cy="6" r="1.4"/><circle cx="19" cy="7" r="1.4"/><circle cx="18" cy="17" r="1.4"/><circle cx="6" cy="18" r="1.4"/><path d="M12 12 5 6M12 12l7-5M12 12l6 5M12 12l-6 6"/></svg>
      <span class="p-action-label">같은 주제 성단 보기</span>
    </button>
  </aside>

<script>
/* =============================================================
   문장의 밤하늘 — 의미 별자리 (C02)
   - theme별 군집 배치 + keyword 공유 시 별자리 선
   - 캔버스 2겹(배경 별가루 / 별·선) + DOM 패널
   - 팬/줌/핀치, 부유·반짝임, 진입 흩뿌림, 시차
   ============================================================= */
(function(){
  'use strict';

  /* ---------- 0. 시드 데이터 (그대로 인라인) ---------- */
  const SEEDS = [
    {id:1,text:"죽는 날까지 하늘을 우러러\n한 점 부끄럼이 없기를",author:"윤동주",work:"하늘과 바람과 별과 시",year:"1948",theme:"성찰",keywords:["부끄러움","양심","바람"]},
    {id:2,text:"나 보기가 역겨워 가실 때에는\n말없이 고이 보내 드리오리다",author:"김소월",work:"진달래꽃",year:"1925",theme:"이별",keywords:["이별","체념","헌신"]},
    {id:3,text:"우리는 만날 때에 떠날 것을 염려하는 것과 같이,\n떠날 때에 다시 만날 것을 믿습니다",author:"한용운",work:"님의 침묵",year:"1926",theme:"이별",keywords:["만남","이별","믿음"]},
    {id:4,text:"다시 천고의 뒤에\n백마 타고 오는 초인이 있어",author:"이육사",work:"광야",year:"1945",theme:"의지",keywords:["초인","미래","희생"]},
    {id:5,text:"박제가 되어 버린 천재를 아시오?",author:"이상",work:"날개",year:"1936",theme:"자의식",keywords:["천재","권태","근대"]},
    {id:6,text:"계절이 지나가는 하늘에는\n가을로 가득 차 있습니다",author:"윤동주",work:"하늘과 바람과 별과 시",year:"1948",theme:"자연",keywords:["가을","하늘","그리움"]},
    {id:7,text:"하루라도 책을 읽지 않으면\n입안에 가시가 돋는다",author:"안중근",work:"유묵",year:"1910",theme:"배움",keywords:["독서","수양","단련"]},
    {id:8,text:"천 리 길도\n한 걸음에서 시작된다",author:"노자",work:"도덕경",year:"고전",theme:"배움",keywords:["시작","한걸음","축적"]},
    {id:9,text:"문장은 끝내기 위해서가 아니라,\n멈추는 법을 배우기 위해 쓴다",author:"새김 편집부",work:"쉼표의 자리",year:"2024",theme:"쓰기",keywords:["문장","멈춤","여백"]},
    {id:10,text:"모든 책은 첫 문장에서 한 번,\n마지막 문장에서 다시 태어난다",author:"새김 편집부",work:"첫 문장의 무게",year:"2025",theme:"쓰기",keywords:["첫문장","끝문장","탄생"]}
  ];

  /* ---------- 1. theme별 색·중심점 정의 ---------- */
  // theme마다 고유 색(별빛 계열)과 '월드 좌표' 중심점(성단의 핵)을 분산 배치
  const THEMES = {
    "성찰":  {color:"#9fc4ff", label:"성찰",   cx:-560, cy:-300},
    "이별":  {color:"#f0a8b8", label:"이별",   cx: 470, cy:-360},
    "의지":  {color:"#f4d99b", label:"의지",   cx: 700, cy: 120},
    "자의식":{color:"#c9a8f0", label:"자의식", cx:-720, cy: 220},
    "자연":  {color:"#9be8c8", label:"자연",   cx:-180, cy: 430},
    "배움":  {color:"#ffcaa0", label:"배움",   cx: 360, cy: 470},
    "쓰기":  {color:"#e8e2d0", label:"쓰기",   cx:  60, cy:-120}
  };

  /* ---------- 2. 결정적 난수 (재현 가능한 배치) ---------- */
  // mulberry32: 시드 기반 PRNG — 새로고침해도 같은 별자리
  function mulberry32(a){
    return function(){
      a|=0; a=(a+0x6D2B79F5)|0;
      let t=Math.imul(a^(a>>>15),1|a);
      t=(t+Math.imul(t^(t>>>7),61|t))^t;
      return ((t^(t>>>14))>>>0)/4294967296;
    };
  }
  const rnd = mulberry32(20240625);

  /* ---------- 3. 별(노드) 생성 + 군집 좌표 ---------- */
  const stars = SEEDS.map((s)=>{
    const th = THEMES[s.theme];
    // 성단 중심 주변에 각도+반지름 난수로 흩뿌림
    const ang = rnd()*Math.PI*2;
    const rad = 70 + rnd()*150;           // 핵에서의 거리
    return {
      ...s,
      color: th.color,
      // 최종 목표 좌표 (월드 공간, px)
      tx: th.cx + Math.cos(ang)*rad + (rnd()-.5)*60,
      ty: th.cy + Math.sin(ang)*rad + (rnd()-.5)*60,
      // 현재 좌표 (진입 애니메이션 동안 중앙→목표로 보간)
      x:0, y:0,
      baseR: 4.4 + rnd()*2.2,             // 별 기본 반지름
      // 부유(float) 위상
      fx: rnd()*Math.PI*2, fy: rnd()*Math.PI*2,
      fAmp: 5 + rnd()*7,                  // 부유 진폭
      fSpd: .22 + rnd()*.30,              // 부유 속도
      // 반짝임(twinkle) 위상
      tw: rnd()*Math.PI*2,
      twSpd: .8 + rnd()*1.4,
      // 렌더 시 상태값
      glow: 0,        // hover/선택 시 0→1
      drawX:0, drawY:0, drawR:0
    };
  });

  /* ---------- 4. 군집 완화(겹침 방지) ---------- */
  // 같은 성단 안에서 별이 너무 붙지 않도록 가벼운 반발 몇 회
  (function relax(){
    const MIN = 95;                       // 최소 간격
    for(let iter=0; iter<140; iter++){
      for(let i=0;i<stars.length;i++){
        for(let j=i+1;j<stars.length;j++){
          const a=stars[i], b=stars[j];
          let dx=b.tx-a.tx, dy=b.ty-a.ty;
          let d=Math.hypot(dx,dy)||.01;
          if(d<MIN){
            const push=(MIN-d)/d*0.5;
            dx*=push; dy*=push;
            a.tx-=dx; a.ty-=dy; b.tx+=dx; b.ty+=dy;
          }
        }
      }
    }
  })();

  /* ---------- 5. 별자리 선 (의미적 관계) ----------
     세 갈래의 '의미 근접'을 별자리 선으로 잇는다.
     - 'keyword'  : 같은 키워드를 공유 → 가장 또렷한 선 (RAG의 직접 매칭)
     - 'theme'    : 같은 성단(주제) 내부 → 은은한 성단 골격선
     - 'affinity' : 손으로 고른 교차-주제 공명(같은 시인/맞닿는 정서)
     시드 데이터는 그대로 두되, 그 위에서 관계만 파생한다. */
  const idIndex = {};                      // 문장 id → stars 배열 인덱스
  stars.forEach((s,i)=> idIndex[s.id]=i);

  // (a) 교차-주제 공명: id 쌍으로 선언 (의미가 통하는 문장끼리)
  const AFFINITY = [
    [1,6],   // 윤동주 — '하늘과 바람과 별과 시' 두 문장 (성찰↔자연)
    [2,3],   // 김소월 · 한용운 — 떠남과 다시 만남 (이별의 두 결)
    [3,1],   // 믿음과 양심 — 내면을 향한 시선
    [4,8],   // 광야의 초인 · 천 리 길 — 미래로 내딛는 한 걸음 (의지↔배움)
    [7,9],   // 독서로 단련 · 멈추는 법을 배우는 문장 (배움↔쓰기)
    [9,10],  // 새김 편집부 — 멈춤과 탄생, 첫·끝 문장 (쓰기의 짝별)
    [5,4]    // 박제된 천재 · 초인을 기다림 (자의식↔의지, 시대의 그늘)
  ];

  const links = [];
  const seen = new Set();                  // 중복 쌍 방지 (i<j 키)
  function addLink(i, j, kind, w, keys){
    if(i===j) return;
    const k = i<j ? i+'-'+j : j+'-'+i;
    if(seen.has(k)) return;                // 이미 더 강한 선이 있으면 통과
    seen.add(k);
    links.push({a:i, b:j, kind, w:w||1, keys:keys||[], phase:rnd()*Math.PI*2});
  }

  // 1순위: 키워드 공유 (가장 또렷) — 먼저 등록해 우선권 부여
  for(let i=0;i<stars.length;i++){
    for(let j=i+1;j<stars.length;j++){
      const shared = stars[i].keywords.filter(k=>stars[j].keywords.includes(k));
      if(shared.length>0) addLink(i,j,'keyword',shared.length,shared);
    }
  }
  // 2순위: 교차-주제 공명 (중간 밝기)
  AFFINITY.forEach(([ia,ib])=>{
    if(idIndex[ia]!=null && idIndex[ib]!=null) addLink(idIndex[ia],idIndex[ib],'affinity',1);
  });
  // 3순위: 같은 성단 내부 골격 (가장 은은) — 같은 theme 별끼리 연결
  for(let i=0;i<stars.length;i++){
    for(let j=i+1;j<stars.length;j++){
      if(stars[i].theme===stars[j].theme) addLink(i,j,'theme',1);
    }
  }

  /* ---------- 6. 배경 별가루 ---------- */
  // 깊이(레이어)별로 시차 강도가 다른 작은 점들
  const DUST_N = 260;
  const dust = [];
  const drnd = mulberry32(7);
  for(let i=0;i<DUST_N;i++){
    const depth = drnd();                 // 0(먼)~1(가까운)
    dust.push({
      // 화면비 무관하게 넓게 분포 (월드 비례 좌표)
      px:(drnd()*2-1), py:(drnd()*2-1),
      depth,
      r: .5 + depth*1.4,
      base: .12 + depth*.5,
      tw: drnd()*Math.PI*2,
      twSpd:.5+drnd()*1.6,
      hue: drnd()<.18 ? "#f4d99b" : (drnd()<.3?"#cdd7f5":"#ffffff")
    });
  }

  /* ---------- 7. 캔버스/카메라 셋업 ---------- */
  const stage  = document.getElementById('stage');
  const cBg    = document.getElementById('c-bg');
  const cMain  = document.getElementById('c-main');
  const gBg    = cBg.getContext('2d');
  const g      = cMain.getContext('2d');

  let DPR = Math.min(window.devicePixelRatio||1, 2);
  let W=0, H=0;

  // 카메라: 월드→스크린 = (world - cam) * zoom + center
  const cam = {
    x:0, y:0, zoom:1,
    tx:0, ty:0, tzoom:1               // 부드러운 이동 목표
  };
  const MIN_ZOOM=0.45, MAX_ZOOM=3.2;

  function resize(){
    DPR = Math.min(window.devicePixelRatio||1, 2);
    W = stage.clientWidth; H = stage.clientHeight;
    [cBg,cMain].forEach(cv=>{
      cv.width = Math.floor(W*DPR);
      cv.height= Math.floor(H*DPR);
      cv.style.width=W+'px'; cv.style.height=H+'px';
    });
    gBg.setTransform(DPR,0,0,DPR,0,0);
    g.setTransform(DPR,0,0,DPR,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  // 월드→스크린 변환
  function toScreen(wx,wy){
    return {
      x:(wx-cam.x)*cam.zoom + W/2,
      y:(wy-cam.y)*cam.zoom + H/2
    };
  }
  // 스크린→월드 변환
  function toWorld(sx,sy){
    return {
      x:(sx-W/2)/cam.zoom + cam.x,
      y:(sy-H/2)/cam.zoom + cam.y
    };
  }

  /* ---------- 8. 진입 애니메이션 상태 ---------- */
  let introT = 0;                        // 0→1 진행도
  const INTRO_DUR = 2.0;                 // 초
  let started = performance.now();

  // 각 별의 진입 시작점(중앙 근처에서 살짝 흩어진 점)
  stars.forEach(s=>{
    const a=rnd()*Math.PI*2, r=rnd()*40;
    s.sx0 = Math.cos(a)*r;
    s.sy0 = Math.sin(a)*r;
    s.delay = rnd()*0.45;                // 별마다 약간씩 시차 등장
  });

  function easeOutQuint(t){ return 1-Math.pow(1-t,5); }
  function easeInOutCubic(t){ return t<.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }

  /* ---------- 9. 마우스/포인터 상태 ---------- */
  const pointer = {x:W/2, y:H/2, mx:0, my:0}; // mx/my: 중심 대비 정규화(-1~1) — 시차용
  let hoverStar = null;
  let selectedStar = null;
  let highlightTheme = null;             // 성단 하이라이트 중인 theme

  /* ---------- 10. 메인 렌더 루프 ---------- */
  let last = performance.now();
  function frame(now){
    const dt = Math.min((now-last)/1000, .05);
    last = now;
    const t = now/1000;

    // 진입 진행도
    const elapsed = (now-started)/1000;
    introT = Math.min(elapsed/INTRO_DUR, 1);

    // 카메라 부드럽게 추적 (지수 감속)
    const k = 1-Math.pow(0.0015, dt);    // dt 보정된 lerp 계수
    cam.x   += (cam.tx   - cam.x)*k;
    cam.y   += (cam.ty   - cam.y)*k;
    cam.zoom+= (cam.tzoom- cam.zoom)*k;

    // 시차: 포인터 위치를 부드럽게 추적
    pointer.mx += ((pointer.x/W*2-1) - pointer.mx)*0.06;
    pointer.my += ((pointer.y/H*2-1) - pointer.my)*0.06;

    drawBg(t);
    drawMain(t, dt);

    requestAnimationFrame(frame);
  }

  /* ---------- 10a. 배경 별가루 + 성운 ---------- */
  function drawBg(t){
    gBg.clearRect(0,0,W,H);
    const cx=W/2, cy=H/2;
    // 분포 스케일 (화면 대각선 기준으로 넓게)
    const spread = Math.max(W,H)*0.9;

    for(let i=0;i<dust.length;i++){
      const d = dust[i];
      // 시차: 깊은 별은 거의 안 움직이고, 가까운 별은 더 움직임
      const par = (4 + d.depth*26);
      const x = cx + d.px*spread
              - pointer.mx*par
              - (cam.x*0.04*d.depth);     // 팬에도 약하게 반응
      const y = cy + d.py*spread
              - pointer.my*par
              - (cam.y*0.04*d.depth);
      if(x<-20||x>W+20||y<-20||y>H+20) continue;

      const tw = 0.55 + 0.45*Math.sin(t*d.twSpd + d.tw);
      gBg.globalAlpha = d.base*tw;
      gBg.fillStyle = d.hue;
      gBg.beginPath();
      gBg.arc(x, y, d.r, 0, Math.PI*2);
      gBg.fill();
    }
    gBg.globalAlpha = 1;
  }

  /* ---------- 10b. 별자리 선 + 별 ---------- */
  function drawMain(t, dt){
    g.clearRect(0,0,W,H);

    // (1) 별 좌표 갱신 — 진입 보간 + 부유
    for(const s of stars){
      // 진입: 중앙 시작점 → 목표 좌표 (별마다 delay 만큼 늦게 출발)
      const p = Math.max(0, Math.min(1, (introT - s.delay) / (1 - s.delay + 0.0001)));
      const e = easeOutQuint(p);
      const baseX = s.sx0 + (s.tx - s.sx0)*e;
      const baseY = s.sy0 + (s.ty - s.sy0)*e;
      // 부유 (제자리 미세 이동) — 진입 끝난 만큼만 적용
      const floatK = e;
      s.x = baseX + Math.sin(t*s.fSpd + s.fx)*s.fAmp*floatK;
      s.y = baseY + Math.cos(t*s.fSpd*0.9 + s.fy)*s.fAmp*0.8*floatK;

      // glow 보간 (hover/선택 시 부드럽게)
      const wantGlow = (s===hoverStar||s===selectedStar) ? 1
                      : (highlightTheme && s.theme===highlightTheme ? 0.55 : 0);
      s.glow += (wantGlow - s.glow)*Math.min(1, dt*9);

      const sc = toScreen(s.x, s.y);
      s.drawX = sc.x; s.drawY = sc.y;
    }

    // (2) 별자리 선 (별 뒤에) — 세 갈래(키워드/공명/성단 골격)를 다르게
    if(introT >= 0.35){
      const lineProg = Math.min(1, (introT-0.35)/0.5);
      for(const ln of links){
        const a=stars[ln.a], b=stars[ln.b];

        // 두 끝점이 모두 하이라이트 theme이면 강조
        const inHL = highlightTheme &&
                     (a.theme===highlightTheme && b.theme===highlightTheme);
        const nearSel = selectedStar && (a===selectedStar||b===selectedStar);

        // 호흡하듯 미세하게 흐르는 밝기
        const breath = 0.5 + 0.5*Math.sin(t*0.6 + ln.phase);

        // 종류별 기본 톤 — 키워드가 가장 또렷, 성단 골격이 가장 은은
        let col, baseA, lw, dash=null;
        if(ln.kind==='keyword'){
          col="226,214,180"; baseA=0.085 + ln.w*0.045; lw=0.9 + ln.w*0.22;  // 따뜻한 금빛 은은
        } else if(ln.kind==='affinity'){
          col="170,190,240"; baseA=0.055; lw=0.75;                          // 청은빛 공명선
        } else { // theme 골격
          col="150,168,220"; baseA=0.032; lw=0.6; dash=[1.5, 5];            // 점선 같은 골격
        }
        let alpha = baseA * (0.55+0.45*breath) * lineProg;

        if(inHL){
          // 하이라이트 성단 내부 선은 금빛으로 또렷이
          col="244,217,155";
          alpha=(0.16 + (ln.kind==='keyword'?0.07:0.03))*(0.7+0.3*breath);
          lw=(ln.kind==='theme'?0.9:1.1)+ln.w*0.2; dash=null;
        } else if(nearSel){
          col="205,215,245"; alpha=Math.max(alpha,0.14); lw=Math.max(lw,1.0); dash=null;
        } else if(highlightTheme){
          alpha *= 0.28;                       // 하이라이트 외 선은 더 흐리게
        }

        g.save();
        if(dash) g.setLineDash(dash); else g.setLineDash([]);
        g.strokeStyle = `rgba(${col},${alpha.toFixed(3)})`;
        g.lineWidth = lw;
        g.beginPath();
        g.moveTo(a.drawX, a.drawY);
        // 살짝 휜 곡선으로 별자리 느낌 (중점을 수직으로 미세 변위)
        const mxp=(a.drawX+b.drawX)/2, myp=(a.drawY+b.drawY)/2;
        const ddx=b.drawX-a.drawX, ddy=b.drawY-a.drawY;
        const len=Math.hypot(ddx,ddy)||1;
        const bow = Math.sin(t*0.4+ln.phase)*6;
        g.quadraticCurveTo(mxp - ddy/len*bow, myp + ddx/len*bow, b.drawX, b.drawY);
        g.stroke();
        g.restore();
      }
    }

    // (3) 별 본체 (밝은 순서: 선택/hover 별을 마지막에)
    const order = stars.slice().sort((p,q)=> (p.glow - q.glow));
    for(const s of order){
      drawStar(s, t);
    }
  }

  /* 별 하나 그리기 — glow + core + 십자 광채 + 반짝임 */
  function drawStar(s, t){
    const dimmed = highlightTheme && s.theme!==highlightTheme;  // 하이라이트 외 별 흐리게
    const twinkle = 0.78 + 0.22*Math.sin(t*s.twSpd + s.tw);
    const sel = (s===selectedStar);

    // 반지름: 기본 * 줌 보정 약하게 + glow 확대
    let r = s.baseR * (0.85 + cam.zoom*0.15) * (1 + s.glow*0.55);
    if(sel) r *= 1.12;
    s.drawR = r;

    const x=s.drawX, y=s.drawY;
    let baseAlpha = dimmed ? 0.28 : 1;

    // --- 외곽 glow (라디얼) ---
    const glowR = r*(5 + s.glow*5);
    const gr = g.createRadialGradient(x,y,0, x,y,glowR);
    const gA = (0.16 + s.glow*0.42) * twinkle * baseAlpha;
    gr.addColorStop(0, hexA(s.color, Math.min(0.9, gA*1.6)));
    gr.addColorStop(0.35, hexA(s.color, gA*0.5));
    gr.addColorStop(1, hexA(s.color, 0));
    g.fillStyle = gr;
    g.beginPath(); g.arc(x,y,glowR,0,Math.PI*2); g.fill();

    // --- 십자 광채 (hover/선택/밝은 별) ---
    const spike = (s.glow*0.9 + (twinkle-0.78)/0.22*0.18);
    if(spike>0.04 && !dimmed){
      const sp = r*(3 + s.glow*7);
      const grad = g.createLinearGradient(x-sp,y, x+sp,y);
      g.save();
      g.globalAlpha = Math.min(0.8, spike)*baseAlpha;
      g.strokeStyle = hexA(s.color, 0.9);
      g.lineWidth = 0.8;
      g.beginPath(); g.moveTo(x-sp,y); g.lineTo(x+sp,y);
                     g.moveTo(x,y-sp); g.lineTo(x,y+sp); g.stroke();
      g.restore();
    }

    // --- core (밝은 중심) ---
    g.globalAlpha = baseAlpha;
    // 바깥 코어
    g.fillStyle = hexA(s.color, 0.95*twinkle);
    g.beginPath(); g.arc(x,y,r,0,Math.PI*2); g.fill();
    // 안쪽 흰 점 (별의 핵)
    g.fillStyle = `rgba(255,255,255,${(0.92*twinkle*baseAlpha).toFixed(3)})`;
    g.beginPath(); g.arc(x,y,r*0.42,0,Math.PI*2); g.fill();

    // 선택 별: 가는 링
    if(sel){
      g.globalAlpha = 0.5 + 0.3*Math.sin(t*2);
      g.strokeStyle = hexA(s.color, 0.8);
      g.lineWidth = 1.2;
      g.beginPath(); g.arc(x,y,r*2.4,0,Math.PI*2); g.stroke();
    }
    g.globalAlpha = 1;
  }

  // #rrggbb + alpha → rgba()
  function hexA(hex, a){
    const h = hex.replace('#','');
    const r=parseInt(h.substr(0,2),16), gg=parseInt(h.substr(2,2),16), b=parseInt(h.substr(4,2),16);
    return `rgba(${r},${gg},${b},${a})`;
  }

  /* ---------- 11. 히트 테스트 (별 찾기) ---------- */
  function hitTest(sx, sy){
    let best=null, bestD=Infinity;
    for(const s of stars){
      const dx=sx-s.drawX, dy=sy-s.drawY;
      const d = dx*dx+dy*dy;
      const hitR = Math.max(16, s.drawR*3.4);  // 넉넉한 클릭 반경
      if(d < hitR*hitR && d<bestD){ best=s; bestD=d; }
    }
    return best;
  }

  /* ---------- 12. 팬/줌/핀치 입력 ---------- */
  let dragging=false, moved=false;
  let lastPX=0, lastPY=0;
  const activePointers = new Map();      // 멀티터치 추적
  let pinchStartDist=0, pinchStartZoom=1, pinchMid={x:0,y:0};

  stage.addEventListener('pointerdown', (e)=>{
    stage.setPointerCapture(e.pointerId);
    activePointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
    if(activePointers.size===1){
      dragging=true; moved=false;
      lastPX=e.clientX; lastPY=e.clientY;
      stage.classList.add('grabbing');
    } else if(activePointers.size===2){
      // 핀치 시작
      const pts=[...activePointers.values()];
      pinchStartDist=Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y);
      pinchStartZoom=cam.tzoom;
      pinchMid={x:(pts[0].x+pts[1].x)/2, y:(pts[0].y+pts[1].y)/2};
    }
  });

  stage.addEventListener('pointermove', (e)=>{
    const rect = stage.getBoundingClientRect();
    pointer.x = e.clientX-rect.left;
    pointer.y = e.clientY-rect.top;

    if(activePointers.has(e.pointerId))
      activePointers.set(e.pointerId,{x:e.clientX,y:e.clientY});

    if(activePointers.size>=2){
      // 핀치 줌
      const pts=[...activePointers.values()];
      const dist=Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y);
      if(pinchStartDist>0){
        const ratio = dist/pinchStartDist;
        const mWorld = toWorld(pinchMid.x-rect.left, pinchMid.y-rect.top);
        cam.tzoom = clamp(pinchStartZoom*ratio, MIN_ZOOM, MAX_ZOOM);
        cam.zoom = cam.tzoom;
        // 핀치 중점 고정
        const mScreen = {x:pinchMid.x-rect.left, y:pinchMid.y-rect.top};
        cam.tx = mWorld.x - (mScreen.x-W/2)/cam.tzoom;
        cam.ty = mWorld.y - (mScreen.y-H/2)/cam.tzoom;
        cam.x=cam.tx; cam.y=cam.ty;
        updateZoomLabel();
      }
      moved=true;
      return;
    }

    if(dragging){
      const dx=e.clientX-lastPX, dy=e.clientY-lastPY;
      if(Math.abs(dx)+Math.abs(dy)>3) moved=true;
      lastPX=e.clientX; lastPY=e.clientY;
      // 스크린 이동량 → 월드 이동 (즉시 반영, 관성 없이 정확하게)
      cam.tx -= dx/cam.zoom; cam.ty -= dy/cam.zoom;
      cam.x = cam.tx; cam.y = cam.ty;
      hideTip();
    } else {
      // hover 처리
      handleHover(pointer.x, pointer.y, e.clientX, e.clientY);
    }
  });

  function endPointer(e){
    if(stage.hasPointerCapture && stage.hasPointerCapture(e.pointerId))
      stage.releasePointerCapture(e.pointerId);
    const wasTwo = activePointers.size>=2;
    activePointers.delete(e.pointerId);
    if(activePointers.size<2) pinchStartDist=0;
    if(activePointers.size===0){
      dragging=false;
      stage.classList.remove('grabbing');
      // 드래그가 아니면 클릭으로 간주
      if(!moved && !wasTwo){
        const rect=stage.getBoundingClientRect();
        const hit=hitTest(e.clientX-rect.left, e.clientY-rect.top);
        if(hit) selectStar(hit);
        else closePanel();
      }
    }
  }
  stage.addEventListener('pointerup', endPointer);
  stage.addEventListener('pointercancel', endPointer);

  // 휠 줌 (커서 고정)
  stage.addEventListener('wheel', (e)=>{
    e.preventDefault();
    const rect=stage.getBoundingClientRect();
    const sx=e.clientX-rect.left, sy=e.clientY-rect.top;
    const before = toWorld(sx,sy);
    const factor = Math.exp(-e.deltaY*0.0014);
    cam.tzoom = clamp(cam.tzoom*factor, MIN_ZOOM, MAX_ZOOM);
    cam.zoom = cam.tzoom;
    // 커서 아래 월드점이 그대로 있도록 카메라 보정
    cam.tx = before.x - (sx-W/2)/cam.tzoom;
    cam.ty = before.y - (sy-H/2)/cam.tzoom;
    cam.x=cam.tx; cam.y=cam.ty;
    updateZoomLabel();
    hideTip();
  }, {passive:false});

  function clamp(v,a,b){ return Math.max(a, Math.min(b,v)); }

  /* ---------- 13. hover 처리 + 툴팁 ---------- */
  const tip = document.getElementById('tip');
  const tipText = tip.querySelector('.t-text');
  const tipMeta = tip.querySelector('.t-meta');

  function handleHover(sx, sy, clientX, clientY){
    const hit = hitTest(sx, sy);
    if(hit !== hoverStar){
      hoverStar = hit;
      stage.style.cursor = hit ? 'pointer' : 'grab';
    }
    if(hit){
      // 미리보기: 문장 앞부분
      const firstLine = hit.text.split('\n')[0];
      const preview = firstLine.length>22 ? firstLine.slice(0,22)+'…' : firstLine
                      + (hit.text.includes('\n')?' …':'');
      tipText.textContent = preview;
      tipMeta.innerHTML = `${hit.author} <span class="work">· ${hit.work}</span>`;
      // 위치 (별 위쪽), 화면 밖으로 안 나가게 보정
      positionTip(clientX, clientY);
      tip.classList.add('show');
    } else {
      hideTip();
    }
  }
  function positionTip(cx, cy){
    // 먼저 보이게 한 뒤 크기 측정
    const tw = tip.offsetWidth||220, th=tip.offsetHeight||70;
    let x = cx + 16, y = cy - th - 14;
    if(x+tw > window.innerWidth-12) x = cx - tw - 16;
    if(y < 12) y = cy + 20;
    tip.style.left = x+'px';
    tip.style.top  = y+'px';
  }
  function hideTip(){ tip.classList.remove('show'); }

  /* ---------- 14. 별 선택 → 카메라 이동 + 패널 ---------- */
  const panel = document.getElementById('panel');

  function selectStar(s){
    selectedStar = s;
    highlightTheme = null;                // 새 선택 시 성단 하이라이트 해제
    document.getElementById('p-cluster-btn').classList.remove('on');
    hideTip(); hoverStar=null;

    // 카메라를 별로 부드럽게 이동 + 살짝 줌인
    // 패널이 오른쪽을 가리므로 별을 화면 중앙보다 왼쪽으로 오게 오프셋
    const isMobile = window.innerWidth<=720;
    const targetZoom = clamp(Math.max(cam.tzoom, 1.35), MIN_ZOOM, MAX_ZOOM);
    cam.tzoom = targetZoom;
    // 별을 두고 싶은 스크린 위치
    const wantSX = isMobile ? W*0.5 : W*0.36;
    const wantSY = isMobile ? H*0.34 : H*0.46;
    cam.tx = s.tx - (wantSX - W/2)/targetZoom;
    cam.ty = s.ty - (wantSY - H/2)/targetZoom;
    updateZoomLabel();

    fillPanel(s);
    openPanel();
  }

  function fillPanel(s){
    const th = THEMES[s.theme];
    // theme 라벨
    panel.querySelector('.p-theme').style.color = th.color;
    panel.querySelector('.p-theme .swatch').style.color = th.color;
    panel.querySelector('.p-theme-name').textContent = s.theme;

    // 본문 — 논리행마다 .p-line으로 감싸 순차 등장
    const qEl = panel.querySelector('.p-quote');
    const lines = s.text.split('\n');
    qEl.innerHTML = lines.map((ln,i)=>{
      const safe = escapeHtml(ln);
      const lead = i===0 ? '<span class="mark">“</span>' : '';
      return `<span class="p-line" style="transition-delay:${0.12+i*0.09}s">${lead}${safe}</span>`;
    }).join('');

    // 메타
    panel.querySelector('.p-author').innerHTML = `<b>${escapeHtml(s.author)}</b>`;
    panel.querySelector('.p-work').innerHTML =
      `<b>${escapeHtml(s.work)}</b> · ${escapeHtml(s.year)}`;
    panel.querySelector('.p-themeword').textContent = s.theme;

    // 키워드 칩
    panel.querySelector('.p-keys').innerHTML =
      s.keywords.map(k=>`<span class="chip">${escapeHtml(k)}</span>`).join('');

    // 성단 버튼 라벨
    panel.querySelector('.p-action-label').textContent =
      `'${s.theme}' 성단 보기`;
  }

  function openPanel(){
    panel.classList.add('open');
    panel.scrollTop = 0;
    // 힌트 페이드아웃
    const hint=document.getElementById('hint');
    if(hint) hint.style.opacity='0';
  }
  function closePanel(){
    panel.classList.remove('open');
    selectedStar = null;
    highlightTheme = null;
    document.getElementById('p-cluster-btn').classList.remove('on');
  }

  // 닫기 버튼
  panel.querySelector('.p-close').addEventListener('click', closePanel);

  // 'theme 성단 보기' 토글
  const clusterBtn = document.getElementById('p-cluster-btn');
  clusterBtn.addEventListener('click', ()=>{
    if(!selectedStar) return;
    const on = clusterBtn.classList.toggle('on');
    if(on){
      highlightTheme = selectedStar.theme;
      // 성단 전체가 보이도록 카메라를 성단 bounding box에 맞춤
      frameTheme(selectedStar.theme);
      // 범례에서도 활성 표시
      syncLegendActive(selectedStar.theme);
    } else {
      highlightTheme = null;
      syncLegendActive(null);
    }
  });

  // 성단(같은 theme 별들) 전체를 화면에 담도록 카메라 맞춤
  function frameTheme(theme){
    const members = stars.filter(s=>s.theme===theme);
    if(!members.length) return;
    let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    members.forEach(s=>{
      minX=Math.min(minX,s.tx); maxX=Math.max(maxX,s.tx);
      minY=Math.min(minY,s.ty); maxY=Math.max(maxY,s.ty);
    });
    const pad=180;
    const bw=(maxX-minX)+pad*2, bh=(maxY-minY)+pad*2;
    const isMobile=window.innerWidth<=720;
    // 패널이 가리는 영역 고려해 가용 폭 축소
    const availW = isMobile ? W : W*0.62;
    const availH = isMobile ? H*0.6 : H;
    const z = clamp(Math.min(availW/bw, availH/bh), MIN_ZOOM, 2.2);
    cam.tzoom = z;
    const cxw=(minX+maxX)/2, cyw=(minY+maxY)/2;
    const wantSX = isMobile ? W*0.5 : W*0.34;
    const wantSY = isMobile ? H*0.32 : H*0.5;
    cam.tx = cxw - (wantSX-W/2)/z;
    cam.ty = cyw - (wantSY-H/2)/z;
    updateZoomLabel();
  }

  /* ---------- 15. 범례 구축 + 상호작용 ---------- */
  const legendList = document.getElementById('legend-list');
  // theme별 별 개수
  const themeCount = {};
  stars.forEach(s=> themeCount[s.theme]=(themeCount[s.theme]||0)+1 );

  Object.keys(THEMES).forEach(name=>{
    const th=THEMES[name];
    const li=document.createElement('li');
    li.dataset.theme=name;
    li.innerHTML =
      `<span class="swatch" style="background:${th.color};color:${th.color}"></span>`+
      `<span>${name}</span>`+
      `<span class="cnt">${themeCount[name]||0}</span>`;
    // hover: 일시 하이라이트
    li.addEventListener('mouseenter', ()=>{ if(!li.classList.contains('active')) highlightTheme=name; });
    li.addEventListener('mouseleave', ()=>{
      if(!legendActive) highlightTheme=null;
    });
    // 클릭: 성단으로 카메라 이동 + 고정 하이라이트
    li.addEventListener('click', ()=>{
      const active = li.classList.contains('active');
      if(active){
        syncLegendActive(null);
        highlightTheme=null;
      } else {
        syncLegendActive(name);
        highlightTheme=name;
        frameTheme(name);
        closePanelKeepHighlight();
      }
    });
    legendList.appendChild(li);
  });

  let legendActive = null;
  function syncLegendActive(name){
    legendActive = name;
    [...legendList.children].forEach(li=>{
      li.classList.toggle('active', li.dataset.theme===name);
    });
    if(!name) highlightTheme = (selectedStar? null : null);
  }
  // 패널은 닫되 하이라이트는 유지 (범례 클릭 시)
  function closePanelKeepHighlight(){
    panel.classList.remove('open');
    selectedStar=null;
    clusterBtn.classList.remove('on');
  }

  /* ---------- 16. 줌 버튼 + 라벨 ---------- */
  const zoomLevelEl = document.getElementById('zoom-level');
  function updateZoomLabel(){
    zoomLevelEl.textContent = Math.round(cam.tzoom*100)+'%';
  }
  function zoomBy(factor){
    const before = toWorld(W/2, H/2);
    cam.tzoom = clamp(cam.tzoom*factor, MIN_ZOOM, MAX_ZOOM);
    // 화면 중심 고정
    cam.tx = before.x; cam.ty = before.y;
    updateZoomLabel();
  }
  document.getElementById('zoom-in').addEventListener('click', ()=>zoomBy(1.3));
  document.getElementById('zoom-out').addEventListener('click', ()=>zoomBy(1/1.3));
  document.getElementById('zoom-reset').addEventListener('click', ()=>{
    cam.tx=0; cam.ty=0; cam.tzoom=1;
    highlightTheme=null; syncLegendActive(null);
    updateZoomLabel();
  });

  /* ---------- 17. 키보드 접근성 ---------- */
  window.addEventListener('keydown', (e)=>{
    if(e.key==='Escape'){
      if(panel.classList.contains('open')) closePanel();
      else if(legendActive){ syncLegendActive(null); highlightTheme=null; }
      hideTip();
    }
    else if(e.key==='+'||e.key==='='){ zoomBy(1.3); }
    else if(e.key==='-'||e.key==='_'){ zoomBy(1/1.3); }
    else if(e.key==='0'){ document.getElementById('zoom-reset').click(); }
  });

  /* ---------- 18. 유틸 ---------- */
  function escapeHtml(str){
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  /* ---------- 19. 진입 토스트 (성단 안내) ---------- */
  const toastEl = document.getElementById('cluster-toast');
  function showToast(msg, dur){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(()=> toastEl.classList.remove('show'), dur||2600);
  }
  // 진입 후 가벼운 안내
  setTimeout(()=> showToast('7개의 주제가 7개의 성단을 이룹니다', 3400), 2200);

  /* ---------- 20. 초기 카메라(살짝 멀리서) → 제자리 ---------- */
  // 진입감: 처음엔 약간 축소된 상태에서 시작해 100%로 안착
  cam.zoom = 0.8; cam.tzoom = 1;
  cam.x = 0; cam.y = 0; cam.tx = 0; cam.ty = 0;
  updateZoomLabel();

  // 시작
  started = performance.now();
  last = performance.now();
  requestAnimationFrame(frame);

})();
</script>
</body>
</html>
