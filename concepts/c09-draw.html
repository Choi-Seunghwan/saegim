<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>오늘의 문장을 뽑다 · 문장 연구소</title>
<!-- 유일한 외부 의존: Pretendard 폰트 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css" />
<style>
  /* ============================================================
     오늘의 문장을 뽑다 (C09) — 문장 뽑기 / Draw
     운세·타로를 뽑듯 카드 한 장을 점지받는다.
     고르지 않기에 더 오래 남는, 우연이 건넨 한 문장.
     무드: 신비롭고 의식적인 카드덱.
     미드나잇 블루 / 딥레드 + 골드 디테일.
     ============================================================ */

  :root {
    /* 무대 — 미드나잇 블루의 깊이 (여러 겹의 어둠) */
    --void:        #07080f;   /* 가장 깊은 바닥 */
    --midnight:    #0d1024;   /* 미드나잇 블루 */
    --midnight-2:  #131734;   /* 한 단계 밝은 자정 */
    --deep-red:    #3a0e1c;   /* 딥레드 (그림자 쪽) */
    --deep-red-2:  #5a1426;   /* 딥레드 (빛 쪽) */

    /* 골드 — 의식의 금박 */
    --gold:        #d9b46a;   /* 기본 골드 */
    --gold-bright: #f3d99a;   /* 밝은 금광 */
    --gold-deep:   #a47c3c;   /* 그늘진 금 */
    --gold-rgb:    217, 180, 106;

    /* 카드 앞면 — 따뜻한 양피지 */
    --card-face:   #f5ecd8;   /* 양피지 바탕 */
    --card-face-2: #ece0c4;   /* 양피지 그늘 */
    --ink:         #241b12;   /* 본문 잉크 */
    --ink-soft:    #6a5a44;   /* 약한 잉크(출처) */
    --ink-faint:   #9c8a6e;   /* 더 옅은 회금색 */

    /* 카드 뒷면 — 자정의 남빛 */
    --back-1:      #161a3a;
    --back-2:      #0c0f24;
    --back-edge:   #2a2f5c;

    /* 텍스트(무대 위) */
    --on-dark:     #e8e2d4;   /* 어둠 위 밝은 글 */
    --on-dark-dim: #8d8aa3;   /* 어둠 위 흐린 글 */

    /* 모션 타이밍 — 뽑기의 호흡 */
    --ease-out:    cubic-bezier(0.16, 0.84, 0.30, 1);   /* 날아오는 듯 빠르게 풀림 */
    --ease-soft:   cubic-bezier(0.4, 0.0, 0.2, 1);
    --ease-flip:   cubic-bezier(0.50, 0.00, 0.20, 1);   /* 뒤집힘의 무게감 */
    --ease-back:   cubic-bezier(0.34, 1.46, 0.44, 1);   /* 살짝 튀는 안착 */
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0; padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: "Pretendard", system-ui, sans-serif;
    color: var(--on-dark);
    background: var(--void);
    overscroll-behavior: none;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    user-select: none;
  }

  /* ============================================================
     무대 — 중앙으로 빛이 모이는 어두운 제단
     여러 겹의 방사형 그라데이션으로 깊이를 만든다.
     ============================================================ */
  #stage {
    position: fixed;
    inset: 0;
    overflow: hidden;
    touch-action: none;            /* 스와이프 제스처 직접 처리 */
    background:
      /* 무대 상단의 신비로운 골드 후광 */
      radial-gradient(70% 48% at 50% 30%,
        rgba(var(--gold-rgb), 0.10) 0%,
        rgba(var(--gold-rgb), 0.03) 34%,
        transparent 62%),
      /* 딥레드가 한쪽 구석에서 번지는 온기 */
      radial-gradient(90% 80% at 84% 88%,
        var(--deep-red) 0%,
        transparent 52%),
      /* 자정의 본 바탕 */
      radial-gradient(130% 120% at 50% 38%,
        var(--midnight-2) 0%,
        var(--midnight) 40%,
        var(--void) 100%);
  }

  /* 무대 바닥의 별가루 — 아주 옅은 점들 (한 번 그리고 둠) */
  #starfield {
    position: absolute; inset: 0;
    pointer-events: none;
    opacity: 0.5;
    mix-blend-mode: screen;
  }

  /* 중앙 제단의 빛 웅덩이 — 카드가 모이는 자리 */
  #altar {
    position: absolute;
    left: 50%; top: 50%;
    width: min(560px, 92vw);
    height: min(560px, 92vw);
    transform: translate(-50%, -50%);
    pointer-events: none;
    background: radial-gradient(closest-side,
      rgba(var(--gold-rgb), 0.07) 0%,
      transparent 72%);
    filter: blur(2px);
    transition: opacity 1.2s var(--ease-soft);
  }

  /* 무대 비네팅 — 가장자리를 어둠으로 눌러 시선을 가운데로 */
  #vignette {
    position: absolute; inset: 0;
    pointer-events: none;
    background: radial-gradient(120% 120% at 50% 46%,
      transparent 52%,
      rgba(3, 3, 8, 0.55) 100%);
  }

  /* ============================================================
     상단 헤더 — 브랜드 + 운세풍 안내
     ============================================================ */
  .topbar {
    position: fixed;
    inset: 18px 22px auto 22px;
    z-index: 40;
    display: flex; align-items: center;
    pointer-events: none;
  }
  .topbar > * { pointer-events: auto; }

  .brand {
    display: flex; align-items: center; gap: 11px;
    user-select: none;
  }
  .brand .mark {
    width: 32px; height: 32px;
    border-radius: 9px;
    background: linear-gradient(150deg, var(--gold-bright), var(--gold-deep));
    color: #20140a;
    display: grid; place-items: center;
    font-weight: 800; font-size: 16px;
    box-shadow:
      0 4px 14px rgba(0,0,0,0.45),
      inset 0 1px 0 rgba(255,255,255,0.45);
    transform: rotate(-4deg);
  }
  .brand .txt { line-height: 1.14; }
  .brand .txt b {
    font-size: 14.5px; font-weight: 700;
    letter-spacing: -0.02em; color: var(--on-dark);
  }
  .brand .txt small {
    display: block; font-size: 10.5px;
    color: var(--on-dark-dim); margin-top: 2px;
    letter-spacing: 0.04em;
  }

  /* 우상단 — 간직한 문장 카운터 */
  .kept {
    margin-left: auto;
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--on-dark-dim);
    background: rgba(20, 22, 44, 0.55);
    backdrop-filter: blur(10px) saturate(1.1);
    -webkit-backdrop-filter: blur(10px) saturate(1.1);
    border: 1px solid rgba(var(--gold-rgb), 0.18);
    border-radius: 999px;
    padding: 7px 14px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.30);
    white-space: nowrap;
    transition: border-color 0.5s, color 0.5s;
  }
  .kept .star { color: var(--gold); font-size: 13px; line-height: 1; }
  .kept b { color: var(--gold-bright); font-weight: 700; font-variant-numeric: tabular-nums; }
  .kept.lit { border-color: rgba(var(--gold-rgb), 0.42); color: var(--gold-bright); }

  /* ============================================================
     안내 카피 — 무대 상단의 운세풍 문구
     상태에 따라 텍스트가 교체된다(JS).
     ============================================================ */
  .prompt {
    position: fixed;
    left: 50%; top: clamp(84px, 13vh, 124px);
    transform: translateX(-50%);
    z-index: 30;
    text-align: center;
    width: min(680px, 90vw);
    pointer-events: none;
    transition: opacity 0.7s var(--ease-soft), transform 0.7s var(--ease-soft);
  }
  .prompt .eyebrow {
    font-size: 11.5px; letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
    opacity: 0.92;
    /* 글자 사이 골드 라인 느낌 */
    text-indent: 0.42em;
  }
  .prompt .lead {
    font-size: clamp(19px, 3vw, 26px);
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--on-dark);
    word-break: keep-all;
    text-wrap: balance;
    line-height: 1.42;
  }
  .prompt .sub {
    margin-top: 9px;
    font-size: clamp(12.5px, 1.7vw, 14px);
    color: var(--on-dark-dim);
    letter-spacing: 0.01em;
    word-break: keep-all;
  }
  .prompt.hidden { opacity: 0; transform: translateX(-50%) translateY(-8px); }

  /* ============================================================
     카드 덱 — 부채꼴로 펼쳐진 뒷면 더미
     #deck 안에 .deckcard(뒷면)들이 절대배치로 부채꼴을 이룬다.
     ============================================================ */
  #deck {
    position: fixed;
    left: 50%; top: 50%;
    width: 0; height: 0;
    transform: translate(-50%, -50%);
    z-index: 20;
    cursor: pointer;
    /* 부채꼴 펼침의 회전 중심을 카드 아래쪽 먼 곳에 둔다 */
  }
  /* 덱 호버 시 미세하게 부풀어 오르는 기대감 (포인터 기기) */
  @media (hover: hover) {
    #deck:hover { z-index: 21; }
  }

  .deckcard {
    position: absolute;
    left: 0; top: 0;
    width: var(--cw);
    height: var(--ch);
    margin-left: calc(var(--cw) / -2);
    margin-top: calc(var(--ch) / -2);
    border-radius: 16px;
    /* 회전축을 카드 하단 바깥(부채살 손잡이)으로 */
    transform-origin: 50% 168%;
    /* 부채꼴 각도/리프트는 인라인 스타일로 주입 */
    transform:
      rotate(var(--ang, 0deg))
      translateY(var(--lift, 0px));
    transition: transform 0.55s var(--ease-out), box-shadow 0.4s;
    will-change: transform;
    backface-visibility: hidden;
  }

  /* 카드 뒷면 디자인 — 자정의 남빛 + 골드 문양 */
  .card-back {
    position: absolute; inset: 0;
    border-radius: 16px;
    background:
      /* 중앙에서 번지는 옅은 광 */
      radial-gradient(closest-side at 50% 42%,
        rgba(var(--gold-rgb), 0.13) 0%,
        transparent 70%),
      linear-gradient(155deg, var(--back-1) 0%, var(--back-2) 100%);
    border: 1px solid var(--back-edge);
    box-shadow:
      0 18px 42px rgba(0,0,0,0.55),
      inset 0 1px 0 rgba(255,255,255,0.06),
      inset 0 0 0 1px rgba(var(--gold-rgb), 0.05);
    overflow: hidden;
  }
  /* 뒷면 골드 테두리 프레임 (이중선) */
  .card-back::before {
    content: "";
    position: absolute; inset: 10px;
    border-radius: 10px;
    border: 1px solid rgba(var(--gold-rgb), 0.34);
    box-shadow: inset 0 0 0 3px rgba(var(--gold-rgb), 0.07);
    pointer-events: none;
  }
  /* 뒷면 중앙 문양 — 별/나침 형태의 SVG가 들어갈 자리 */
  .card-back .sigil {
    position: absolute; inset: 0;
    display: grid; place-items: center;
    pointer-events: none;
  }
  .card-back .sigil svg { width: 56%; height: auto; opacity: 0.92; }

  /* 덱 맨 위 카드(top)는 살짝 더 또렷하게 — 뽑을 대상임을 암시 */
  #deck.ready .deckcard.top .card-back { box-shadow:
      0 22px 50px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.10),
      0 0 0 1px rgba(var(--gold-rgb), 0.22),
      0 0 28px rgba(var(--gold-rgb), 0.12);
  }

  /* 셔플 상태 — 덱 클릭 비활성 */
  #deck.busy { cursor: default; pointer-events: none; }

  /* ============================================================
     뽑힌 카드 (히어로) — 중앙으로 날아와 3D flip
     #hero는 perspective 컨테이너, #flipper가 실제로 회전.
     ============================================================ */
  #hero {
    position: fixed;
    left: 50%; top: 50%;
    width: var(--cw);
    height: var(--ch);
    margin-left: calc(var(--cw) / -2);
    margin-top: calc(var(--ch) / -2);
    z-index: 35;
    perspective: 1600px;
    pointer-events: none;
    opacity: 0;
    /* 무대 진입 모션 — 아래 덱에서 위로 날아오는 경로 */
    transform: translateY(0) scale(1);
    will-change: transform, opacity;
  }
  #hero.shown { pointer-events: auto; }

  #flipper {
    position: absolute; inset: 0;
    transform-style: preserve-3d;
    transform: rotateY(180deg);   /* 시작은 뒷면이 보이도록 */
    will-change: transform;
  }

  /* 앞/뒷면 공통 */
  .face {
    position: absolute; inset: 0;
    border-radius: 18px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
  }

  /* 히어로 뒷면 — 덱과 같은 디자인 */
  .face.back {
    background:
      radial-gradient(closest-side at 50% 42%,
        rgba(var(--gold-rgb), 0.14) 0%, transparent 70%),
      linear-gradient(155deg, var(--back-1) 0%, var(--back-2) 100%);
    border: 1px solid var(--back-edge);
    box-shadow: 0 30px 70px rgba(0,0,0,0.6);
    transform: rotateY(0deg);
  }
  .face.back::before {
    content: "";
    position: absolute; inset: 12px;
    border-radius: 12px;
    border: 1px solid rgba(var(--gold-rgb), 0.36);
    box-shadow: inset 0 0 0 3px rgba(var(--gold-rgb), 0.08);
  }
  .face.back .sigil { position:absolute; inset:0; display:grid; place-items:center; }
  .face.back .sigil svg { width: 56%; opacity: 0.95; }

  /* 히어로 앞면 — 양피지 문장 카드 */
  .face.front {
    transform: rotateY(180deg);
    background:
      radial-gradient(120% 90% at 50% 8%,
        #fdf6e6 0%, var(--card-face) 46%, var(--card-face-2) 100%);
    border: 1px solid rgba(120, 96, 56, 0.30);
    box-shadow:
      0 30px 80px rgba(0,0,0,0.55),
      inset 0 1px 0 rgba(255,255,255,0.7);
    display: flex; flex-direction: column;
    padding: clamp(26px, 4.2vw, 40px);
  }
  /* 앞면 골드 안쪽 프레임 */
  .face.front::before {
    content: "";
    position: absolute; inset: 14px;
    border-radius: 11px;
    border: 1px solid rgba(var(--gold-rgb), 0.40);
    pointer-events: none;
  }
  /* 앞면 종이 결 — 아주 옅은 사선 질감 */
  .face.front::after {
    content: "";
    position: absolute; inset: 0;
    background-image: repeating-linear-gradient(122deg,
      rgba(120, 90, 50, 0.00) 0px,
      rgba(120, 90, 50, 0.022) 1px,
      rgba(120, 90, 50, 0.00) 3px);
    pointer-events: none; border-radius: 18px;
  }

  /* 앞면 상단 장식 — 작은 별표 + 테마 라벨 */
  .card-head {
    position: relative; z-index: 2;
    display: flex; align-items: center; gap: 10px;
    margin-bottom: auto;
    color: var(--gold-deep);
  }
  .card-head .star { font-size: 15px; color: var(--gold-deep); }
  .card-head .theme {
    font-size: 11px; letter-spacing: 0.26em;
    text-transform: uppercase; font-weight: 700;
    color: var(--ink-soft);
  }
  .card-head .no {
    margin-left: auto;
    font-size: 11px; letter-spacing: 0.12em;
    color: var(--ink-faint);
    font-variant-numeric: tabular-nums;
  }

  /* 문장 본문 — 카드의 주인공 */
  .card-quote {
    position: relative; z-index: 2;
    font-size: clamp(20px, 3.4vw, 31px);
    line-height: 1.5;
    letter-spacing: -0.025em;
    font-weight: 600;
    color: var(--ink);
    white-space: pre-line;          /* 시드의 \n 줄바꿈 유지 */
    word-break: keep-all;           /* 한글 어절 단위 줄바꿈 */
    text-wrap: balance;
    margin: 18px 0;
    flex: 0 0 auto;
    display: flex; align-items: center;
    flex-grow: 1;
  }
  .card-quote .qmark {
    /* 앞에 붙는 옅은 따옴표 장식 */
    color: rgba(var(--gold-rgb), 0.55);
  }

  /* 문장 출처 — 저자 · 작품 · 연도 */
  .card-meta {
    position: relative; z-index: 2;
    margin-top: auto;
    padding-top: 16px;
    border-top: 1px solid rgba(120, 96, 56, 0.22);
    display: flex; align-items: baseline;
    gap: 8px; flex-wrap: wrap;
  }
  .card-meta .author { font-size: 15px; font-weight: 700; color: var(--ink); letter-spacing: -0.01em; }
  .card-meta .work { font-size: 13px; color: var(--ink-soft); }
  .card-meta .work::before { content: "「"; color: var(--ink-faint); }
  .card-meta .work::after  { content: "」"; color: var(--ink-faint); }
  .card-meta .year { margin-left: auto; font-size: 12px; color: var(--ink-faint); font-variant-numeric: tabular-nums; letter-spacing: 0.04em; }

  /* 간직한 카드 표시 — 우상단 금박 씰 */
  .seal {
    position: absolute;
    top: 16px; right: 16px;
    z-index: 4;
    width: 40px; height: 40px;
    border-radius: 50%;
    display: grid; place-items: center;
    background: radial-gradient(closest-side, var(--gold-bright), var(--gold-deep));
    color: #3a2a10;
    box-shadow: 0 4px 12px rgba(120, 80, 20, 0.4), inset 0 1px 0 rgba(255,255,255,0.5);
    font-size: 18px;
    opacity: 0; transform: scale(0.4) rotate(-25deg);
    transition: opacity 0.4s var(--ease-back), transform 0.5s var(--ease-back);
    pointer-events: none;
  }
  .face.front.kept .seal { opacity: 1; transform: scale(1) rotate(-8deg); }

  /* 공개 순간의 반짝임 — 앞면 위를 스치는 빛줄기 */
  .shine {
    position: absolute; inset: 0;
    z-index: 3; pointer-events: none;
    border-radius: 18px; overflow: hidden;
    opacity: 0;
  }
  .shine::before {
    content: "";
    position: absolute;
    top: -60%; left: -40%;
    width: 50%; height: 220%;
    background: linear-gradient(105deg,
      transparent 0%,
      rgba(255,255,255,0.0) 30%,
      rgba(255, 250, 235, 0.65) 50%,
      rgba(255,255,255,0.0) 70%,
      transparent 100%);
    transform: rotate(8deg) translateX(0);
    filter: blur(2px);
  }
  .shine.sweep { opacity: 1; }
  .shine.sweep::before { animation: shineSweep 0.95s var(--ease-out) forwards; }
  @keyframes shineSweep {
    from { transform: rotate(8deg) translateX(-40px); }
    to   { transform: rotate(8deg) translateX(360px); }
  }

  /* 공개 순간 카드 둘레의 골드 광채 (한 번 번쩍) */
  .aura {
    position: absolute; inset: -2px;
    z-index: 0; border-radius: 20px;
    pointer-events: none; opacity: 0;
    box-shadow: 0 0 0 0 rgba(var(--gold-rgb), 0.0);
  }
  .aura.flare { animation: auraFlare 1.1s var(--ease-soft) forwards; }
  @keyframes auraFlare {
    0%   { opacity: 0; box-shadow: 0 0 0 0 rgba(var(--gold-rgb), 0.0); }
    35%  { opacity: 1; box-shadow: 0 0 38px 6px rgba(var(--gold-rgb), 0.42); }
    100% { opacity: 1; box-shadow: 0 0 22px 1px rgba(var(--gold-rgb), 0.16); }
  }

  /* 공개 순간 사방으로 흩어지는 금빛 입자 */
  #sparks {
    position: fixed;
    left: 50%; top: 50%;
    width: 0; height: 0;
    z-index: 36; pointer-events: none;
  }
  .spark {
    position: absolute;
    width: 6px; height: 6px;
    margin: -3px 0 0 -3px;
    border-radius: 50%;
    background: radial-gradient(closest-side, var(--gold-bright), rgba(var(--gold-rgb), 0));
    will-change: transform, opacity;
  }

  /* ============================================================

<script>
/* ============================================================
   시드 데이터 — 좋은 문장 10개 (인라인)
   ============================================================ */
const SENTENCES = [
  {id:1, text:"죽는 날까지 하늘을 우러러\n한 점 부끄럼이 없기를", author:"윤동주", work:"하늘과 바람과 별과 시", year:"1948", theme:"성찰",   keywords:["부끄러움","양심","바람"]},
  {id:2, text:"나 보기가 역겨워 가실 때에는\n말없이 고이 보내 드리오리다", author:"김소월", work:"진달래꽃", year:"1925", theme:"이별",   keywords:["이별","체념","헌신"]},
  {id:3, text:"우리는 만날 때에 떠날 것을 염려하는 것과 같이,\n떠날 때에 다시 만날 것을 믿습니다", author:"한용운", work:"님의 침묵", year:"1926", theme:"이별",   keywords:["만남","이별","믿음"]},
  {id:4, text:"다시 천고의 뒤에\n백마 타고 오는 초인이 있어", author:"이육사", work:"광야", year:"1945", theme:"의지",   keywords:["초인","미래","희생"]},
  {id:5, text:"박제가 되어 버린 천재를 아시오?", author:"이상", work:"날개", year:"1936", theme:"자의식", keywords:["천재","권태","근대"]},
  {id:6, text:"계절이 지나가는 하늘에는\n가을로 가득 차 있습니다", author:"윤동주", work:"하늘과 바람과 별과 시", year:"1948", theme:"자연",   keywords:["가을","하늘","그리움"]},
  {id:7, text:"하루라도 책을 읽지 않으면\n입안에 가시가 돋는다", author:"안중근", work:"유묵", year:"1910", theme:"배움",   keywords:["독서","수양","단련"]},
  {id:8, text:"천 리 길도\n한 걸음에서 시작된다", author:"노자", work:"도덕경", year:"고전", theme:"배움",   keywords:["시작","한걸음","축적"]},
  {id:9, text:"문장은 끝내기 위해서가 아니라,\n멈추는 법을 배우기 위해 쓴다", author:"새김 편집부", work:"쉼표의 자리", year:"2024", theme:"쓰기",   keywords:["문장","멈춤","여백"]},
  {id:10,text:"모든 책은 첫 문장에서 한 번,\n마지막 문장에서 다시 태어난다", author:"새김 편집부", work:"첫 문장의 무게", year:"2025", theme:"쓰기",   keywords:["첫문장","끝문장","탄생"]}
];

/* 운세풍 카피 — 뽑은 뒤 무대 상단에 뜨는 문구(랜덤) */
const FORTUNES = [
  "오늘 당신에게 온 문장",
  "우연이 골라준 한 줄",
  "지금 펼쳐진 문장",
  "당신 몫으로 남은 한 문장",
  "오늘의 자리에 놓인 말",
  "이 순간, 당신께 닿은 문장"
];

/* ============================================================
   DOM 참조
   ============================================================ */
const $ = (id) => document.getElementById(id);
const stage   = $('stage');
const deck    = $('deck');
const hero    = $('hero');
const flipper = $('flipper');
const heroFront = $('heroFront');
const altar   = $('altar');

const promptEl = $('prompt');
const eyebrow  = $('eyebrow');
const lead     = $('lead');
const subEl    = $('sub');

const cTheme  = $('cTheme');
const cNo     = $('cNo');
const cQuote  = $('cQuote');
const cAuthor = $('cAuthor');
const cWork   = $('cWork');
const cYear   = $('cYear');

const shine   = $('shine');
const aura    = $('aura');
const sparks  = $('sparks');

const actions = $('actions');
const redrawBtn = $('redraw');
const keepBtn   = $('keep');
const keepLabel = $('keepLabel');
const hintEl    = $('hint');

const keptChip  = $('kept');
const keptCountEl = $('keptCount');

/* ============================================================
   카드 뒷면 문양(SVG) — 별/나침 형태의 골드 시질
   덱과 히어로 뒷면 모두 같은 문양을 공유한다.
   ============================================================ */
const SIGIL_SVG = `
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <radialGradient id="sg" cx="50%" cy="46%" r="55%">
      <stop offset="0%"  stop-color="#f3d99a"/>
      <stop offset="60%" stop-color="#d9b46a"/>
      <stop offset="100%" stop-color="#a47c3c"/>
    </radialGradient>
  </defs>
  <g fill="none" stroke="url(#sg)" stroke-width="1.1">
    <circle cx="50" cy="50" r="34" opacity="0.55"/>
    <circle cx="50" cy="50" r="26" opacity="0.85"/>
  </g>
  <!-- 8방위 빛살 -->
  <g stroke="url(#sg)" stroke-width="0.9" opacity="0.7">
    <line x1="50" y1="6"  x2="50" y2="20"/>
    <line x1="50" y1="80" x2="50" y2="94"/>
    <line x1="6"  y1="50" x2="20" y2="50"/>
    <line x1="80" y1="50" x2="94" y2="50"/>
    <line x1="20" y1="20" x2="29" y2="29"/>
    <line x1="71" y1="71" x2="80" y2="80"/>
    <line x1="80" y1="20" x2="71" y2="29"/>
    <line x1="29" y1="71" x2="20" y2="80"/>
  </g>
  <!-- 중앙 4꼭짓별 -->
  <path d="M50 30 L54 46 L70 50 L54 54 L50 70 L46 54 L30 50 L46 46 Z"
        fill="url(#sg)" opacity="0.95"/>
  <circle cx="50" cy="50" r="2.2" fill="#fff6e2"/>
</svg>`;

$('heroSigil').innerHTML = SIGIL_SVG;

/* ============================================================
   상태
   ============================================================ */
let order = [];          // 셔플된 인덱스 순서(데크)
let drawPtr = 0;         // 다음에 뽑을 위치
let lastDrawnId = null;  // 직전에 뽑은 카드 id(연속 회피)
let keptIds = new Set(); // 간직한 카드 id
let currentCard = null;  // 현재 펼쳐진 카드
let isBusy = false;      // 모션 진행 중 잠금
const FAN = 9;           // 부채꼴로 보여줄 뒷면 카드 수
let deckCards = [];      // 덱 DOM 노드들(맨 뒤→맨 앞)

/* 결정적 셔플 — 같은 시드면 같은 순서(Fisher–Yates + LCG) */
function shuffled(arr, seed) {
  const a = arr.slice();
  let s = seed >>> 0;
  const rnd = () => { s = (s * 1664525 + 1013904223) >>> 0; return s / 4294967296; };
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rnd() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ============================================================
   별가루 배경 — 캔버스에 한 번 그린다
   ============================================================ */
function paintStars() {
  const cv = $('starfield');
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = window.innerWidth, h = window.innerHeight;
  cv.width = w * dpr; cv.height = h * dpr;
  cv.style.width = w + 'px'; cv.style.height = h + 'px';
  const ctx = cv.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, w, h);
  const n = Math.round((w * h) / 9000); // 밀도
  for (let i = 0; i < n; i++) {
    const x = Math.random() * w;
    const y = Math.random() * h;
    const r = Math.random() * 1.3 + 0.2;
    const a = Math.random() * 0.5 + 0.08;
    // 대부분은 차가운 별빛, 가끔 골드
    const gold = Math.random() < 0.18;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = gold
      ? `rgba(217,180,106,${a})`
      : `rgba(200,210,240,${a})`;
    ctx.fill();
  }
}

/* ============================================================
   덱 구성 — FAN장의 뒷면 카드를 부채꼴로 배치
   index 0이 맨 뒤, 마지막이 맨 위(top, 뽑을 카드).
   ============================================================ */
function buildDeck() {
  deck.innerHTML = '';
  deckCards = [];
  const total = FAN;
  // 부채꼴 전체 펼침 각(도). 화면이 좁으면 부채를 좁힌다.
  const spread = window.innerWidth < 560 ? 30 : 44;
  const step = spread / (total - 1);
  for (let i = 0; i < total; i++) {
    const card = document.createElement('div');
    card.className = 'deckcard';
    // 가운데를 0으로 두고 좌우 대칭 각도
    const ang = -spread / 2 + step * i;
    // 부채살 끝일수록 살짝 더 들려 올라오는 리프트
    const lift = -Math.cos((ang * Math.PI) / 180) * 6 - 2;
    card.style.setProperty('--ang', ang.toFixed(2) + 'deg');
    card.style.setProperty('--lift', lift.toFixed(1) + 'px');
    card.style.zIndex = i;
    if (i === total - 1) card.classList.add('top');
    const back = document.createElement('div');
    back.className = 'card-back';
    back.innerHTML = `<div class="sigil">${SIGIL_SVG}</div>`;
    card.appendChild(back);
    deck.appendChild(card);
    deckCards.push(card);
  }
}

/* 덱을 '닫힌 더미'로 모았다가(셔플 시작), 다시 부채꼴로 펼친다 */
function collapseDeck() {
  deckCards.forEach((c) => {
    c.style.setProperty('--ang', '0deg');
    c.style.setProperty('--lift', '0px');
  });
}
function fanDeck() {
  const total = deckCards.length;
  const spread = window.innerWidth < 560 ? 30 : 44;
  const step = spread / (total - 1);
  deckCards.forEach((c, i) => {
    const ang = -spread / 2 + step * i;
    const lift = -Math.cos((ang * Math.PI) / 180) * 6 - 2;
    c.style.setProperty('--ang', ang.toFixed(2) + 'deg');
    c.style.setProperty('--lift', lift.toFixed(1) + 'px');
  });
}

/* ============================================================
   다음 카드 선택 — 직전 카드와 같으면 회피
   ============================================================ */
function nextCard() {
  if (drawPtr >= order.length) {
    // 한 바퀴 다 돌면 재셔플(직전 카드는 첫 장에서 회피)
    order = shuffled(SENTENCES, (Math.random() * 1e9) | 0);
    if (order[0].id === lastDrawnId && order.length > 1) {
      [order[0], order[1]] = [order[1], order[0]];
    }
    drawPtr = 0;
  }
  let card = order[drawPtr];
  // 안전장치: 그래도 같은 카드면 한 칸 더
  if (card.id === lastDrawnId && drawPtr + 1 < order.length) {
    drawPtr++;
    card = order[drawPtr];
  }
  drawPtr++;
  lastDrawnId = card.id;
  return card;
}

/* ============================================================
   앞면 채우기
   ============================================================ */
function fillFront(c) {
  cTheme.textContent  = c.theme;
  cNo.textContent     = 'No.' + String(c.id).padStart(2, '0');
  // 본문 앞에 옅은 따옴표 장식을 붙인다
  cQuote.innerHTML = `<span class="qmark">“</span>` +
    c.text.replace(/</g, '&lt;') +
    `<span class="qmark">”</span>`;
  cAuthor.textContent = c.author;
  cWork.textContent   = c.work;
  cYear.textContent   = c.year;
  // 간직 상태 반영
  heroFront.classList.toggle('kept', keptIds.has(c.id));
  if (keptIds.has(c.id)) {
    keepBtn.classList.add('done'); keepLabel.textContent = '간직됨';
  } else {
    keepBtn.classList.remove('done'); keepLabel.textContent = '간직하기';
  }
}

/* ============================================================
   뽑기 시퀀스 — 덱에서 한 장이 솟아 중앙으로 날아와 flip
   1) 덱 맨 위 카드가 위로 솟구침
   2) 히어로(뒷면)가 그 자리에서 중앙으로 날아옴
   3) 골드 플레어 + 3D flip → 앞면 공개
   4) 빛줄기/입자 반짝임, 액션 표시
   ============================================================ */
function drawSequence() {
  if (isBusy) return;
  isBusy = true;
  deck.classList.add('busy');
  hideActions();

  const card = nextCard();
  currentCard = card;
  fillFront(card);

  // 안내 카피를 잠시 숨김
  promptEl.classList.add('hidden');
  altar.style.opacity = '0.4';

  // (1) 덱 맨 위 카드가 위로 솟구쳐 뽑히는 모션
  const topCard = deckCards[deckCards.length - 1];
  topCard.style.transition = 'transform 0.42s var(--ease-out), opacity 0.42s';
  topCard.style.setProperty('--lift', '-46px');
  topCard.style.opacity = '0';

  // (2) 히어로 준비 — 덱 위치에서 약간 아래/작게 시작
  flipper.style.transition = 'none';
  flipper.style.transform = 'rotateY(180deg)';   // 뒷면부터
  hero.style.transition = 'none';
  hero.style.transform = 'translateY(64px) scale(0.86) rotate(-3deg)';
  hero.style.opacity = '0';
  // 강제 리플로우로 시작 상태 확정
  void hero.offsetWidth;

  // 히어로가 중앙으로 날아오는 모션
  hero.style.transition = 'transform 0.6s var(--ease-out), opacity 0.4s ease-out';
  hero.style.opacity = '1';
  hero.style.transform = 'translateY(0) scale(1) rotate(0deg)';
  hero.classList.add('shown');

  // (3) 도착 직후 3D flip — 무게감 있는 회전
  const FLIP_AT = 560;   // 날아오는 시간과 맞물리게
  setTimeout(() => {
    flipper.style.transition = 'transform 0.92s var(--ease-flip)';
    flipper.style.transform = 'rotateY(0deg)';
    // 뒤집힘 중반에 골드 플레어 점화
    aura.classList.remove('flare'); void aura.offsetWidth; aura.classList.add('flare');
  }, FLIP_AT);

  // (4) flip 거의 끝날 즈음 반짝임 + 입자 + 액션/카피
  const REVEAL_AT = FLIP_AT + 620;
  setTimeout(() => {
    // 빛줄기 스윕
    shine.classList.remove('sweep'); void shine.offsetWidth; shine.classList.add('sweep');
    burstSparks();
    // 운세풍 카피로 교체 후 다시 표시
    setFortuneCopy(card);
    promptEl.classList.remove('hidden');
    altar.style.opacity = '1';
    showActions();
  }, REVEAL_AT);

  // 시퀀스 종료 → 덱 복구(다음 뽑기 대비)
  setTimeout(() => {
    // 뽑혀 사라진 top 카드를 원위치로 되돌리고 덱 재구성(부채꼴 유지)
    topCard.style.transition = 'none';
    rebuildDeckSilently();
    deck.classList.remove('busy');
    isBusy = false;
  }, REVEAL_AT + 250);
}

/* 덱을 조용히 재구성(트랜지션 없이) — 뽑은 뒤 더미 회복 */
function rebuildDeckSilently() {
  buildDeck();
  // 한 프레임 뒤 ready 클래스로 top 강조 복귀
  requestAnimationFrame(() => deck.classList.add('ready'));
}

/* 운세풍 카피 세팅 — 랜덤 문구 + 저자 한 줄 */
function setFortuneCopy(card) {
  const f = FORTUNES[(Math.random() * FORTUNES.length) | 0];
  eyebrow.textContent = '✦  ' + (card.keywords[0] || '문장') + '  ✦';
  lead.textContent = f;
  subEl.textContent = card.author + ' · ' + card.work;
}

/* 안내 카피를 '뽑기 전' 상태로 되돌림 */
function setIdleCopy() {
  eyebrow.textContent = '오늘의 한 문장';
  lead.textContent = '덱을 두드려 오늘의 문장을 뽑으세요';
  subEl.textContent = '고르지 않기에, 더 오래 남습니다';
}

/* ============================================================
   공개 입자 — 카드 둘레에서 금빛 가루가 흩어진다
   ============================================================ */
function burstSparks() {
  const N = 22;
  const rect = hero.getBoundingClientRect();
  // #sparks 원점(화면 중앙) 대비 카드 중심 오프셋
  const cx = rect.left + rect.width / 2 - window.innerWidth / 2;
  const cy = rect.top + rect.height / 2 - window.innerHeight / 2;
  for (let i = 0; i < N; i++) {
    const s = document.createElement('div');
    s.className = 'spark';
    const ang = (Math.PI * 2 * i) / N + Math.random() * 0.5;
    const dist = 90 + Math.random() * 140;
    const dx = Math.cos(ang) * dist;
    const dy = Math.sin(ang) * dist - 30; // 살짝 위로 떠오르는 경향
    const size = 3 + Math.random() * 5;
    s.style.width = s.style.height = size + 'px';
    s.style.left = cx + 'px';
    s.style.top = cy + 'px';
    s.style.transform = 'translate(0,0) scale(1)';
    s.style.opacity = '1';
    s.style.transition = `transform ${0.7 + Math.random() * 0.5}s var(--ease-out), opacity 0.9s ease-out`;
    sparks.appendChild(s);
    // 다음 프레임에 목표 위치로
    requestAnimationFrame(() => {
      s.style.transform = `translate(${dx}px, ${dy}px) scale(0.2)`;
      s.style.opacity = '0';
    });
    setTimeout(() => s.remove(), 1500);
  }
}

/* ============================================================
   셔플 시퀀스 — 카드들이 흩어졌다 다시 모인 뒤 새 카드
   1) 현재 히어로 퇴장
   2) 덱이 더미로 모임 → 카드들이 무작위로 흩날렸다 복귀(반복)
   3) 부채꼴로 다시 펼쳐짐 → 새 카드 자동 뽑기
   ============================================================ */
function shuffleSequence() {
  if (isBusy) return;
  isBusy = true;
  deck.classList.add('busy');
  hideActions();
  deck.classList.remove('ready');

  // (1) 히어로 퇴장 — 위로 흩어지듯 사라짐
  if (hero.classList.contains('shown')) {
    hero.style.transition = 'transform 0.4s var(--ease-soft), opacity 0.4s';
    hero.style.transform = 'translateY(-40px) scale(0.9) rotate(4deg)';
    hero.style.opacity = '0';
    setTimeout(() => hero.classList.remove('shown'), 380);
  }

  // 안내 카피 셔플 메시지
  promptEl.classList.add('hidden');
  showHint('카드를 섞는 중…');

  // (2) 덱 흩날림 — 모았다가 무작위 산개 → 복귀를 두 번 반복
  collapseDeck();

  const scatter = () => {
    deckCards.forEach((c) => {
      const tx = (Math.random() - 0.5) * 240;
      const ty = (Math.random() - 0.5) * 180;
      const rot = (Math.random() - 0.5) * 80;
      c.style.transition = 'transform 0.34s var(--ease-out)';
      c.style.transform = `translate(${tx}px, ${ty}px) rotate(${rot}deg)`;
    });
  };
  const gather = () => {
    deckCards.forEach((c) => {
      c.style.transition = 'transform 0.34s var(--ease-out)';
      c.style.transform = 'translate(0,0) rotate(0deg)';
    });
  };

  // 안무: 산개 → 모임 → 산개 → 모임 → 부채꼴
  setTimeout(scatter, 60);
  setTimeout(gather,  440);
  setTimeout(scatter, 760);
  setTimeout(gather,  1140);
  setTimeout(() => {
    // 인라인 transform 제거하고 CSS 변수 기반 부채꼴로 복귀
    deckCards.forEach((c) => {
      c.style.transition = 'transform 0.5s var(--ease-back)';
      c.style.transform = '';   // CSS의 rotate(var(--ang)) translateY(var(--lift))로 복귀
    });
    fanDeck();
  }, 1480);

  // (3) 새 카드 자동 뽑기
  setTimeout(() => {
    hideHint();
    buildDeck();               // 깨끗한 덱으로 재구성
    deck.classList.add('ready');
    deck.classList.remove('busy');
    isBusy = false;
    drawSequence();            // 곧바로 새 문장 한 장
  }, 2050);
}

/* ============================================================
   간직하기 — 현재 카드 저장 표시(씰 + 카운터)
   ============================================================ */
function toggleKeep() {
  if (!currentCard) return;
  const id = currentCard.id;
  if (keptIds.has(id)) {
    keptIds.delete(id);
    heroFront.classList.remove('kept');
    keepBtn.classList.remove('done');
    keepLabel.textContent = '간직하기';
  } else {
    keptIds.add(id);
    heroFront.classList.add('kept');
    keepBtn.classList.add('done');
    keepLabel.textContent = '간직됨';
    // 간직 순간 작은 입자 한 줌
    miniSparkleAtSeal();
  }
  updateKeptChip();
}

function updateKeptChip() {
  keptCountEl.textContent = keptIds.size;
  keptChip.classList.toggle('lit', keptIds.size > 0);
}

/* 씰 위에서 터지는 작은 반짝임 */
function miniSparkleAtSeal() {
  const rect = hero.getBoundingClientRect();
  const cx = rect.right - 26 - window.innerWidth / 2;
  const cy = rect.top + 30 - window.innerHeight / 2;
  for (let i = 0; i < 8; i++) {
    const s = document.createElement('div');
    s.className = 'spark';
    const ang = (Math.PI * 2 * i) / 8;
    const dist = 26 + Math.random() * 26;
    s.style.left = cx + 'px';
    s.style.top = cy + 'px';
    s.style.transition = 'transform 0.6s var(--ease-out), opacity 0.7s';
    sparks.appendChild(s);
    requestAnimationFrame(() => {
      s.style.transform = `translate(${Math.cos(ang)*dist}px, ${Math.sin(ang)*dist}px) scale(0.2)`;
      s.style.opacity = '0';
    });
    setTimeout(() => s.remove(), 800);
  }
}

/* ============================================================
   액션/힌트 표시 토글
   ============================================================ */
function showActions() { actions.classList.add('shown'); }
function hideActions() { actions.classList.remove('shown'); }
function showHint(t)   { hintEl.textContent = t; hintEl.classList.add('shown'); }
function hideHint()    { hintEl.classList.remove('shown'); }

/* ============================================================
   스와이프 감지 — 덱 위에서 위로 밀면 뽑기
   ============================================================ */
let touchStartY = null, touchStartX = null, touchMoved = false;
function onTouchStart(e) {
  if (isBusy) return;
  const t = e.touches ? e.touches[0] : e;
  touchStartY = t.clientY; touchStartX = t.clientX; touchMoved = false;
}
function onTouchMove(e) {
  if (touchStartY === null) return;
  const t = e.touches ? e.touches[0] : e;
  if (Math.abs(t.clientY - touchStartY) > 8 || Math.abs(t.clientX - touchStartX) > 8) touchMoved = true;
}
function onTouchEnd(e) {
  if (touchStartY === null || isBusy) { touchStartY = null; return; }
  const t = e.changedTouches ? e.changedTouches[0] : e;
  const dy = t.clientY - touchStartY;
  // 위로 스와이프(또는 가벼운 탭)면 뽑기
  if (dy < -30 || !touchMoved) {
    // 덱 영역 근처에서만 반응
    drawSequence();
  }
  touchStartY = null;
}

/* ============================================================
   이벤트 바인딩
   ============================================================ */
// 덱 클릭/탭 → 뽑기
deck.addEventListener('click', () => { if (!isBusy) drawSequence(); });
// 스와이프(덱)
deck.addEventListener('touchstart', onTouchStart, { passive: true });
deck.addEventListener('touchmove',  onTouchMove,  { passive: true });
deck.addEventListener('touchend',   onTouchEnd,   { passive: true });

// 무대 빈 곳에서도 위로 스와이프하면 뽑기(아직 안 뽑았을 때)
stage.addEventListener('touchstart', onTouchStart, { passive: true });
stage.addEventListener('touchmove',  onTouchMove,  { passive: true });
stage.addEventListener('touchend', (e) => {
  if (isBusy) return;
  const t = e.changedTouches ? e.changedTouches[0] : e;
  if (touchStartY !== null && (t.clientY - touchStartY) < -40) drawSequence();
  touchStartY = null;
}, { passive: true });

// 버튼
redrawBtn.addEventListener('click', shuffleSequence);
keepBtn.addEventListener('click', toggleKeep);

// 키보드 — Space/Enter로 뽑기, R로 다시 뽑기, S로 간직
window.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault();
    if (!isBusy) drawSequence();
  } else if (e.key === 'r' || e.key === 'R') {
    if (currentCard && !isBusy) shuffleSequence();
  } else if (e.key === 's' || e.key === 'S') {
    if (currentCard && !isBusy) toggleKeep();
  }
});

// 리사이즈 — 별가루/덱 재구성(모션 중이 아닐 때만 덱 갱신)
let rsTimer = null;
window.addEventListener('resize', () => {
  paintStars();
  clearTimeout(rsTimer);
  rsTimer = setTimeout(() => {
    if (!isBusy && !hero.classList.contains('shown')) buildDeck();
    else if (!isBusy) fanDeck();
    if (!currentCard) deck.classList.add('ready');
  }, 180);
});

/* ============================================================
   초기화
   ============================================================ */
function init() {
  paintStars();
  order = shuffled(SENTENCES, (Date.now() & 0xffffff));
  drawPtr = 0;
  buildDeck();
  setIdleCopy();
  updateKeptChip();
  // 첫 진입 — 덱이 부드럽게 부채꼴로 펼쳐지며 등장
  collapseDeck();
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      deckCards.forEach((c) => { c.style.transition = 'transform 0.7s var(--ease-back)'; });
      fanDeck();
      setTimeout(() => deck.classList.add('ready'), 720);
    });
  });
}

init();
</script>
