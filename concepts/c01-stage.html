<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>문장 연구소 — 한 문장의 무대</title>
<!-- 폰트는 Pretendard 하나만 외부 의존 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css" />
<style>
  /* ===== 기본 리셋 ===== */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    /* 크림/오프화이트 잉크색 (글씨) */
    --ink: #f4efe6;
    --ink-soft: rgba(244, 239, 230, 0.62);
    --ink-faint: rgba(244, 239, 230, 0.34);
    --ink-ghost: rgba(244, 239, 230, 0.16);
    /* 진입/전환 이징 — 시네마틱하게 길고 부드럽게 */
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-soft: cubic-bezier(0.22, 0.61, 0.36, 1);
  }

  html { -webkit-text-size-adjust: 100%; }

  body {
    font-family: 'Pretendard', system-ui, sans-serif;
    color: var(--ink);
    background: #0a0a0c; /* 초기 깜빡임 방지용 기본 잉크블랙 */
    /* 배경색은 JS가 무대(섹션)에 따라 크로스페이드로 교체 */
    transition: background-color 1.1s var(--ease-soft);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* ===== 스크롤 컨테이너: 한 문장씩 스냅 ===== */
  .stage-scroll {
    height: 100vh;
    height: 100dvh; /* 모바일 주소창 대응 */
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    scroll-behavior: smooth;
    /* 스크롤바 숨김 (무대 몰입) */
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .stage-scroll::-webkit-scrollbar { display: none; }

  /* ===== 각 문장 무대: 100vh 풀스크린 ===== */
  .scene {
    position: relative;
    height: 100vh;
    height: 100dvh;
    scroll-snap-align: start;
    scroll-snap-stop: always;
    display: grid;
    place-items: center;
    padding: clamp(2.4rem, 6vw, 7rem);
    overflow: hidden;
  }

  /* 무대마다 은은한 비네팅(가장자리 어둠) — 깊이감 */
  .scene::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(
      ellipse 120% 95% at 50% 42%,
      transparent 38%,
      rgba(0, 0, 0, 0.30) 100%
    );
    opacity: 0;
    transition: opacity 1.4s var(--ease-soft);
  }
  .scene.is-active::after { opacity: 1; }

  /* ===== 문장 본문 (거대 타이포) ===== */
  .quote {
    max-width: 16em;
    text-align: center;
    z-index: 2;
  }

  .quote__line {
    display: block;
    font-size: clamp(2.2rem, 5.6vw, 5.5rem);
    line-height: 1.28;
    font-weight: 600;
    letter-spacing: -0.018em;
    word-break: keep-all; /* 한글 줄바꿈 자연스럽게 */
    /* 진입 전 상태: 아래에서 + 흐림 */
    opacity: 0;
    transform: translateY(38px);
    filter: blur(7px);
    transition:
      opacity 1.05s var(--ease-out),
      transform 1.15s var(--ease-out),
      filter 1.05s var(--ease-out);
  }
  /* 줄별 stagger — 변수로 지연 */
  .scene.is-active .quote__line {
    opacity: 1;
    transform: translateY(0);
    filter: blur(0);
    transition-delay: var(--line-delay, 0s);
  }
  /* 떠날 때(지나간 무대)는 살짝 흐려지고 들림 */
  .scene.is-past .quote__line {
    opacity: 0;
    transform: translateY(-26px);
    filter: blur(5px);
    transition-duration: 0.7s;
    transition-delay: 0s;
  }

  /* 앞에 붙는 작은 따옴표 장식 */
  .quote__mark {
    display: block;
    font-size: clamp(2.6rem, 5vw, 4.4rem);
    line-height: 0.4;
    color: var(--ink-ghost);
    margin-bottom: clamp(1.1rem, 2.4vw, 2.2rem);
    font-weight: 600;
    user-select: none;
    opacity: 0;
    transform: translateY(20px) scale(0.92);
    transition: opacity 1.1s var(--ease-out), transform 1.1s var(--ease-out);
  }
  .scene.is-active .quote__mark {
    opacity: 1;
    transform: translateY(0) scale(1);
    transition-delay: 0.05s;
  }

  /* ===== 저자 정보: 좌하단 구석, 아주 작게 ===== */
  .credit {
    position: absolute;
    left: clamp(1.6rem, 4vw, 3.4rem);
    bottom: clamp(1.6rem, 4vw, 3.2rem);
    z-index: 3;
    text-align: left;
    /* 저자 정보는 약간 늦게 등장 */
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 1s var(--ease-out), transform 1s var(--ease-out);
  }
  .scene.is-active .credit {
    opacity: 1;
    transform: translateY(0);
    transition-delay: 0.62s; /* 문장보다 늦게 */
  }
  .scene.is-past .credit {
    opacity: 0;
    transform: translateY(-10px);
    transition-duration: 0.55s;
    transition-delay: 0s;
  }

  .credit__author {
    font-size: clamp(0.92rem, 1.5vw, 1.06rem);
    font-weight: 600;
    letter-spacing: 0.01em;
    color: var(--ink);
  }
  .credit__meta {
    margin-top: 0.32em;
    font-size: clamp(0.72rem, 1.1vw, 0.82rem);
    font-weight: 400;
    color: var(--ink-soft);
    letter-spacing: 0.015em;
    display: flex;
    align-items: center;
    gap: 0.55em;
    flex-wrap: wrap;
  }
  .credit__sep {
    width: 3px; height: 3px;
    border-radius: 50%;
    background: var(--ink-faint);
    display: inline-block;
  }
  /* 테마 라벨 (작은 캡슐) */
  .credit__theme {
    margin-top: 0.85em;
    display: inline-flex;
    align-items: center;
    gap: 0.4em;
    font-size: clamp(0.64rem, 0.95vw, 0.72rem);
    letter-spacing: 0.16em;
    text-transform: none;
    color: var(--ink-faint);
    border: 1px solid var(--ink-ghost);
    padding: 0.34em 0.85em;
    border-radius: 100px;
  }

  /* ===== 저장(♥) 토글: 우하단 ===== */
  .save-btn {
    position: absolute;
    right: clamp(1.6rem, 4vw, 3.4rem);
    bottom: clamp(1.6rem, 4vw, 3.2rem);
    z-index: 4;
    width: clamp(44px, 5vw, 54px);
    height: clamp(44px, 5vw, 54px);
    border-radius: 50%;
    border: 1px solid var(--ink-ghost);
    background: rgba(244, 239, 230, 0.02);
    color: var(--ink-soft);
    cursor: pointer;
    display: grid;
    place-items: center;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    transition:
      opacity 1s var(--ease-out),
      transform 0.45s var(--ease-out),
      border-color 0.4s ease,
      background-color 0.4s ease,
      color 0.4s ease;
    opacity: 0;
    transform: translateY(16px);
  }
  .scene.is-active .save-btn {
    opacity: 1;
    transform: translateY(0);
    transition-delay: 0.72s;
  }
  .save-btn:hover {
    border-color: var(--ink-faint);
    color: var(--ink);
    transform: translateY(0) scale(1.06);
  }
  .save-btn:active { transform: translateY(0) scale(0.94); }
  .save-btn:focus-visible {
    outline: 2px solid var(--ink-faint);
    outline-offset: 4px;
  }
  .save-btn svg { width: 44%; height: 44%; display: block; overflow: visible; }
  .save-btn .heart-fill {
    fill: currentColor;
    opacity: 0;
    transform-origin: center;
    transform: scale(0.4);
    transition: opacity 0.35s ease, transform 0.45s var(--ease-out);
  }
  .save-btn .heart-stroke {
    fill: none;
    stroke: currentColor;
    stroke-width: 1.6;
    transition: opacity 0.3s ease;
  }
  /* 저장됨 상태 */
  .save-btn.is-saved {
    color: #ffd3d8;
    border-color: rgba(255, 211, 216, 0.4);
    background: rgba(255, 211, 216, 0.06);
  }
  .save-btn.is-saved .heart-fill {
    opacity: 1;
    transform: scale(1);
  }
  .save-btn.is-saved .heart-stroke { opacity: 0; }
  /* 클릭 시 톡 튀는 펄스 */
  .save-btn.is-pulse { animation: pulse 0.5s var(--ease-out); }
  @keyframes pulse {
    0% { transform: scale(1); }
    35% { transform: scale(1.22); }
    100% { transform: scale(1); }
  }

  /* ===== 상단 미니 브랜드 ===== */
  .brand {
    position: fixed;
    top: clamp(1.4rem, 3.2vw, 2.6rem);
    left: clamp(1.6rem, 4vw, 3.4rem);
    z-index: 50;
    display: flex;
    align-items: baseline;
    gap: 0.6em;
    pointer-events: none;
    mix-blend-mode: difference; /* 어떤 배경에서도 글씨 가독 */
    opacity: 0;
    animation: brandIn 1.4s var(--ease-out) 0.3s forwards;
  }
  @keyframes brandIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .brand__ko {
    font-size: clamp(0.86rem, 1.4vw, 1rem);
    font-weight: 600;
    letter-spacing: 0.02em;
    color: #ffffff;
  }
  .brand__en {
    font-size: clamp(0.6rem, 1vw, 0.7rem);
    font-weight: 400;
    letter-spacing: 0.2em;
    color: rgba(255, 255, 255, 0.55);
    text-transform: uppercase;
  }

  /* ===== 우측 세로 진행 도트 ===== */
  .dots {
    position: fixed;
    right: clamp(1.0rem, 2vw, 1.8rem);
    top: 50%;
    transform: translateY(-50%);
    z-index: 50;
    display: flex;
    flex-direction: column;
    gap: clamp(0.7rem, 1.4vh, 1.1rem);
    opacity: 0;
    animation: brandIn 1.4s var(--ease-out) 0.5s forwards;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    border: none;
    padding: 0;
    background: var(--ink-ghost);
    cursor: pointer;
    position: relative;
    transition: background-color 0.5s var(--ease-soft), transform 0.5s var(--ease-out);
  }
  .dot::before {
    /* 클릭 영역 확장(터치 친화) */
    content: "";
    position: absolute;
    inset: -8px;
  }
  .dot:hover { background: var(--ink-faint); transform: scale(1.25); }
  .dot:focus-visible {
    outline: 2px solid var(--ink-faint);
    outline-offset: 3px;
  }
  .dot.is-current {
    background: var(--ink);
    transform: scale(1.0);
  }
  /* 현재 도트엔 은은한 링 */
  .dot.is-current::after {
    content: "";
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    border: 1px solid var(--ink-faint);
    animation: ring 0.6s var(--ease-out);
  }
  @keyframes ring {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  /* 저장된 문장 도트는 작은 점 강조 */
  .dot.is-saved { background: #ffd3d8; }

  /* ===== 첫 화면 스크롤 힌트 ===== */
  .hint {
    position: fixed;
    left: 50%;
    bottom: clamp(2rem, 5vh, 3.4rem);
    transform: translateX(-50%);
    z-index: 40;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.7em;
    color: var(--ink-soft);
    font-size: clamp(0.72rem, 1.2vw, 0.82rem);
    letter-spacing: 0.08em;
    pointer-events: none;
    opacity: 0;
    animation: brandIn 1.6s var(--ease-out) 1.1s forwards;
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .hint.is-hidden {
    opacity: 0 !important;
    transform: translateX(-50%) translateY(12px);
  }
  .hint__arrow {
    width: 1px;
    height: 26px;
    background: linear-gradient(to bottom, transparent, var(--ink-soft));
    position: relative;
    animation: arrowPulse 2.2s var(--ease-soft) infinite;
  }
  .hint__arrow::after {
    content: "";
    position: absolute;
    left: 50%; bottom: 0;
    width: 6px; height: 6px;
    border-right: 1px solid var(--ink-soft);
    border-bottom: 1px solid var(--ink-soft);
    transform: translateX(-50%) rotate(45deg);
  }
  @keyframes arrowPulse {
    0%, 100% { opacity: 0.4; transform: translateY(0); }
    50%      { opacity: 1;   transform: translateY(5px); }
  }

  /* 토스트(저장 알림) */
  .toast {
    position: fixed;
    left: 50%;
    bottom: clamp(2rem, 6vh, 3.4rem);
    transform: translateX(-50%) translateY(20px);
    z-index: 60;
    background: rgba(20, 18, 16, 0.82);
    border: 1px solid var(--ink-ghost);
    color: var(--ink);
    font-size: 0.82rem;
    letter-spacing: 0.02em;
    padding: 0.7em 1.3em;
    border-radius: 100px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.45s var(--ease-out), transform 0.55s var(--ease-out);
  }
  .toast.is-show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* 접근성: 모션 줄이기 선호 시 */
  @media (prefers-reduced-motion: reduce) {
    * { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; }
    .quote__line, .quote__mark, .credit, .save-btn { opacity: 1 !important; transform: none !important; filter: none !important; }
  }

  /* 모바일: 브랜드/도트 위치·크기 조정 */
  @media (max-width: 560px) {
    .brand { left: 1.2rem; }
    .dots { right: 0.7rem; gap: 0.6rem; }
    .quote__line { line-height: 1.32; }
    .save-btn { right: 1.2rem; }
    .credit { left: 1.2rem; }
    /* 모바일에선 저장 버튼과 크레딧이 겹치지 않게 크레딧을 위로 살짝 */
    .credit { bottom: clamp(4.6rem, 14vw, 5.4rem); }
  }
</style>
</head>
<body>

  <!-- 상단 미니 브랜드 -->
  <header class="brand" aria-label="문장 연구소">
    <span class="brand__ko">문장 연구소</span>
    <span class="brand__en">Sentence&nbsp;Lab</span>
  </header>

  <!-- 우측 세로 진행 도트 (JS가 채움) -->
  <nav class="dots" id="dots" aria-label="문장 이동"></nav>

  <!-- 첫 화면 스크롤 힌트 -->
  <div class="hint" id="hint" aria-hidden="true">
    <span>스크롤하여 음미하기</span>
    <span class="hint__arrow"></span>
  </div>

  <!-- 저장 토스트 -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- 무대 스크롤 컨테이너 (JS가 섹션을 채움) -->
  <main class="stage-scroll" id="scroll" tabindex="0" aria-label="한 문장의 무대"></main>

<script>
/* =========================================================
   문장 연구소 — C01 "한 문장의 무대"
   풀스크린 타이포 스테이지. 한 화면에 단 하나의 문장.
   ========================================================= */

// ----- 시드 문장 10개 (인라인 데이터) -----
const SENTENCES = [
  {id:1, text:"죽는 날까지 하늘을 우러러\n한 점 부끄럼이 없기를", author:"윤동주", work:"하늘과 바람과 별과 시", year:"1948", theme:"성찰", keywords:["부끄러움","양심","바람"]},
  {id:2, text:"나 보기가 역겨워 가실 때에는\n말없이 고이 보내 드리오리다", author:"김소월", work:"진달래꽃", year:"1925", theme:"이별", keywords:["이별","체념","헌신"]},
  {id:3, text:"우리는 만날 때에 떠날 것을 염려하는 것과 같이,\n떠날 때에 다시 만날 것을 믿습니다", author:"한용운", work:"님의 침묵", year:"1926", theme:"이별", keywords:["만남","이별","믿음"]},
  {id:4, text:"다시 천고의 뒤에\n백마 타고 오는 초인이 있어", author:"이육사", work:"광야", year:"1945", theme:"의지", keywords:["초인","미래","희생"]},
  {id:5, text:"박제가 되어 버린 천재를 아시오?", author:"이상", work:"날개", year:"1936", theme:"자의식", keywords:["천재","권태","근대"]},
  {id:6, text:"계절이 지나가는 하늘에는\n가을로 가득 차 있습니다", author:"윤동주", work:"하늘과 바람과 별과 시", year:"1948", theme:"자연", keywords:["가을","하늘","그리움"]},
  {id:7, text:"하루라도 책을 읽지 않으면\n입안에 가시가 돋는다", author:"안중근", work:"유묵", year:"1910", theme:"배움", keywords:["독서","수양","단련"]},
  {id:8, text:"천 리 길도\n한 걸음에서 시작된다", author:"노자", work:"도덕경", year:"고전", theme:"배움", keywords:["시작","한걸음","축적"]},
  {id:9, text:"문장은 끝내기 위해서가 아니라,\n멈추는 법을 배우기 위해 쓴다", author:"새김 편집부", work:"쉼표의 자리", year:"2024", theme:"쓰기", keywords:["문장","멈춤","여백"]},
  {id:10, text:"모든 책은 첫 문장에서 한 번,\n마지막 문장에서 다시 태어난다", author:"새김 편집부", work:"첫 문장의 무게", year:"2025", theme:"쓰기", keywords:["첫문장","끝문장","탄생"]}
];

// ----- 무대별 '깊은' 무드 컬러 (다크 톤, 테마/분위기에 맞춰 선정) -----
// 배경은 두 톤의 미묘한 라디얼 그라데이션으로 깊이감을 준다.
const MOODS = [
  {bg:"#0d1017", glow:"#1b2233"}, // 1 성찰 — 잉크블랙 + 별빛 같은 청기
  {bg:"#250b13", glow:"#3d141f"}, // 2 이별(소월) — 진달래 버건디
  {bg:"#0b1322", glow:"#16243f"}, // 3 이별(만해) — 미드나잇 블루
  {bg:"#13160f", glow:"#23291a"}, // 4 의지 — 다크올리브/철
  {bg:"#121214", glow:"#1f1f23"}, // 5 자의식 — 차가운 차콜
  {bg:"#0c1610", glow:"#16271b"}, // 6 자연(가을) — 딥그린 숲
  {bg:"#19110b", glow:"#2a1d12"}, // 7 배움(독서) — 먹빛 딥브라운
  {bg:"#0d0d18", glow:"#171728"}, // 8 배움(노자) — 미드나잇 인디고
  {bg:"#091518", glow:"#102a2d"}, // 9 쓰기(멈춤) — 먹청 딥틸
  {bg:"#150f1c", glow:"#241632"}  // 10 쓰기(탄생) — 딥플럼
];

const scrollEl = document.getElementById('scroll');
const dotsEl   = document.getElementById('dots');
const hintEl   = document.getElementById('hint');
const toastEl  = document.getElementById('toast');

// 저장 상태 (메모리 내. 새로고침 시 초기화 — 단일 파일 데모)
const saved = new Set();

let scenes = [];
let dots = [];
let currentIndex = 0;
let hintDismissed = false;

// ----- HTML 이스케이프 (안전) -----
function esc(s) {
  return s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

// ----- 배경 무드 적용 (크로스페이드는 body transition이 처리) -----
function applyMood(i) {
  const m = MOODS[i] || MOODS[0];
  // 라디얼 글로우 + 베이스 컬러로 깊이감
  document.body.style.backgroundColor = m.bg;
  document.body.style.backgroundImage =
    `radial-gradient(ellipse 90% 70% at 50% 38%, ${m.glow} 0%, ${m.bg} 62%)`;
}

// ----- 하트 SVG 마크업 -----
function heartSVG() {
  return `
    <svg viewBox="0 0 24 22" aria-hidden="true">
      <path class="heart-stroke" d="M12 20.5C12 20.5 2.5 14.8 2.5 8.3C2.5 5.4 4.8 3.2 7.5 3.2C9.4 3.2 11 4.3 12 6C13 4.3 14.6 3.2 16.5 3.2C19.2 3.2 21.5 5.4 21.5 8.3C21.5 14.8 12 20.5 12 20.5Z"/>
      <path class="heart-fill"   d="M12 20.5C12 20.5 2.5 14.8 2.5 8.3C2.5 5.4 4.8 3.2 7.5 3.2C9.4 3.2 11 4.3 12 6C13 4.3 14.6 3.2 16.5 3.2C19.2 3.2 21.5 5.4 21.5 8.3C21.5 14.8 12 20.5 12 20.5Z"/>
    </svg>`;
}

// ----- 무대(섹션) 빌드 -----
function buildScenes() {
  const frag = document.createDocumentFragment();

  SENTENCES.forEach((s, i) => {
    const section = document.createElement('section');
    section.className = 'scene';
    section.dataset.index = i;
    section.setAttribute('aria-roledescription', '문장 무대');
    section.setAttribute('aria-label', `${i + 1}번째 문장, ${s.author}`);

    // 줄 단위로 분리해 stagger 페이드업
    const lines = s.text.split('\n');
    const linesHTML = lines.map((ln, li) =>
      `<span class="quote__line" style="--line-delay:${0.14 + li * 0.16}s">${esc(ln)}</span>`
    ).join('');

    // 키워드 → 테마 캡슐 텍스트
    const themeLabel = esc(s.theme);

    section.innerHTML = `
      <blockquote class="quote">
        <span class="quote__mark" aria-hidden="true">&ldquo;</span>
        ${linesHTML}
      </blockquote>

      <figcaption class="credit">
        <div class="credit__author">${esc(s.author)}</div>
        <div class="credit__meta">
          <span>${esc(s.work)}</span>
          <span class="credit__sep" aria-hidden="true"></span>
          <span>${esc(s.year)}</span>
        </div>
        <span class="credit__theme">${themeLabel}</span>
      </figcaption>

      <button class="save-btn" type="button"
              aria-pressed="false"
              aria-label="이 문장 저장하기">
        ${heartSVG()}
      </button>
    `;

    // 저장 토글 바인딩
    const btn = section.querySelector('.save-btn');
    btn.addEventListener('click', () => toggleSave(i, btn));

    frag.appendChild(section);
  });

  scrollEl.appendChild(frag);
  scenes = Array.from(scrollEl.querySelectorAll('.scene'));
}

// ----- 우측 진행 도트 빌드 -----
function buildDots() {
  const frag = document.createDocumentFragment();
  SENTENCES.forEach((s, i) => {
    const b = document.createElement('button');
    b.className = 'dot';
    b.type = 'button';
    b.setAttribute('aria-label', `${i + 1}번 문장으로 이동`);
    b.addEventListener('click', () => goTo(i));
    frag.appendChild(b);
  });
  dotsEl.appendChild(frag);
  dots = Array.from(dotsEl.querySelectorAll('.dot'));
}

// ----- 특정 무대로 점프 -----
function goTo(i) {
  if (i < 0 || i >= scenes.length) return;
  scenes[i].scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ----- 저장 토글 -----
function toggleSave(i, btn) {
  const isSaved = saved.has(i);
  if (isSaved) {
    saved.delete(i);
    btn.classList.remove('is-saved');
    btn.setAttribute('aria-pressed', 'false');
  } else {
    saved.add(i);
    btn.classList.add('is-saved');
    btn.setAttribute('aria-pressed', 'true');
    showToast('문장을 저장했어요');
  }
  // 펄스 재생 (재트리거)
  btn.classList.remove('is-pulse');
  void btn.offsetWidth; // 리플로우 강제
  btn.classList.add('is-pulse');

  // 도트에도 저장 표시 반영
  if (dots[i]) dots[i].classList.toggle('is-saved', saved.has(i));
}

// ----- 토스트 -----
let toastTimer = null;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('is-show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('is-show'), 1700);
}

// ----- 현재 무대 갱신 (도트/배경/상태) -----
function setActive(i) {
  if (i === currentIndex && scenes[i].classList.contains('is-active')) return;
  currentIndex = i;

  scenes.forEach((sc, idx) => {
    sc.classList.toggle('is-active', idx === i);
    // 지나간 무대는 is-past (떠날 때 흐려짐)
    sc.classList.toggle('is-past', idx < i);
    // 아직 안 온 무대는 past 해제
    if (idx > i) sc.classList.remove('is-past');
  });

  dots.forEach((d, idx) => d.classList.toggle('is-current', idx === i));
  applyMood(i);
}

// ----- IntersectionObserver: 화면 중앙에 들어온 무대를 활성화 -----
function observeScenes() {
  const io = new IntersectionObserver((entries) => {
    // 가장 많이 보이는 무대를 현재로
    let best = null;
    entries.forEach(e => {
      if (e.isIntersecting) {
        if (!best || e.intersectionRatio > best.intersectionRatio) best = e;
      }
    });
    if (best) {
      const idx = Number(best.target.dataset.index);
      setActive(idx);
    }
  }, {
    root: scrollEl,
    threshold: [0.4, 0.6, 0.75]
  });
  scenes.forEach(sc => io.observe(sc));
}

// ----- 첫 스크롤/이동 시 힌트 숨김 -----
function dismissHint() {
  if (hintDismissed) return;
  hintDismissed = true;
  hintEl.classList.add('is-hidden');
}

// ----- 키보드 접근성: 위/아래 화살표 이동 -----
function bindKeys() {
  window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowDown' || e.key === 'PageDown') {
      e.preventDefault();
      dismissHint();
      goTo(currentIndex + 1);
    } else if (e.key === 'ArrowUp' || e.key === 'PageUp') {
      e.preventDefault();
      dismissHint();
      goTo(currentIndex - 1);
    } else if (e.key === 'Home') {
      e.preventDefault();
      goTo(0);
    } else if (e.key === 'End') {
      e.preventDefault();
      goTo(scenes.length - 1);
    }
  });
}

// ----- 초기화 -----
function init() {
  buildScenes();
  buildDots();
  observeScenes();
  bindKeys();

  // 첫 무대 즉시 활성화 (진입 애니메이션 트리거)
  // 약간의 지연으로 폰트 로드 후 자연스럽게
  requestAnimationFrame(() => {
    requestAnimationFrame(() => setActive(0));
  });

  // 첫 스크롤 입력 시 힌트 사라짐
  scrollEl.addEventListener('scroll', dismissHint, { once: true, passive: true });
  scrollEl.addEventListener('wheel', dismissHint, { once: true, passive: true });
  scrollEl.addEventListener('touchstart', dismissHint, { once: true, passive: true });
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
</body>
</html>
