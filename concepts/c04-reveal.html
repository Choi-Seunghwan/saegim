<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>문장을 닦다 · 문장 연구소</title>
<!-- 유일한 외부 의존: Pretendard 폰트 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css" />
<style>
  /* ============================================================
     문장을 닦다 (C04) — 안개 걷어내기 리빌
     화면을 덮은 성에/안개를 손으로 문질러 그 자리의 문장을 꺼낸다.
     발견을 '행위'로 만드는, 촉각적이고 명상적인 의식.
     ============================================================ */

  :root {
    /* 안개 — 차가운 회백색 (위 레이어) */
    --frost-cool: 232, 236, 240;   /* 푸르스름한 성에 */
    --frost-warm: 244, 243, 239;   /* 미색 도는 성에 */

    /* 드러나는 문장 — 따뜻한 잉크 (아래 레이어 기본값, 테마가 덮어씀) */
    --ink:        #2a2520;   /* 본문 잉크 */
    --ink-soft:   #6c6258;   /* 약한 잉크(출처) */
    --ink-faint:  #a59b8e;   /* 더 옅은 회갈색 */
    --paper:      #f3ede2;   /* 종이 바탕(따뜻한 미색) */
    --accent:     #b06a44;   /* 포인트(테라코타) */

    /* 모션 타이밍 — 리빌의 호흡 */
    --ease-out:   cubic-bezier(0.22, 0.61, 0.36, 1);
    --ease-soft:  cubic-bezier(0.4, 0.0, 0.2, 1);
    --ease-back:  cubic-bezier(0.34, 1.42, 0.46, 1);

    /* 안개 위에 떠 있는 UI 칩 — 반투명 유리 */
    --glass:      rgba(255, 255, 255, 0.62);
    --glass-line: rgba(120, 120, 130, 0.20);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0; padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: "Pretendard", system-ui, sans-serif;
    color: var(--ink);
    background: #e9ecef;
    overscroll-behavior: none;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    /* 닦는 동안 커서를 직접 그리므로 기본 커서는 숨김 */
  }

  /* ============================================================
     무대 — 두 레이어를 겹친다
     #reveal(아래, DOM 문장) / #frost(위, canvas 안개)
     ============================================================ */
  #stage {
    position: fixed;
    inset: 0;
    overflow: hidden;
    touch-action: none;           /* 터치 제스처 직접 처리 */
    cursor: none;                  /* 커스텀 브러시 커서 사용 */
  }

  /* ---------- 아래 레이어: 오늘의 문장 ---------- */
  #reveal {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    /* 테마별 배경 그라데이션 — JS가 두 색 변수를 바꿔 끼움.
       두 레이어를 겹쳐 깊이감을 준다(은은한 빛 + 바탕). */
    background:
      radial-gradient(120% 90% at 50% 18%,
        var(--bg-glow, #fbf6ec) 0%,
        transparent 60%),
      linear-gradient(168deg,
        var(--bg-top, #f6efe2) 0%,
        var(--bg-bot, #efe6d6) 100%);
    transition: background 1.1s var(--ease-soft);
    overflow: hidden;
  }
  /* 바탕 위 아주 옅은 종이 결(사선) — 따뜻한 질감 */
  #reveal::after {
    content: "";
    position: absolute; inset: -10%;
    background-image:
      repeating-linear-gradient(118deg,
        rgba(120, 96, 64, 0.00) 0px,
        rgba(120, 96, 64, 0.022) 1px,
        rgba(120, 96, 64, 0.00) 3px);
    pointer-events: none;
    opacity: 0.9;
  }

  /* 문장 묶음(가운데) */
  .quote-wrap {
    position: relative;
    z-index: 1;
    width: min(860px, 90vw);
    padding: 0 24px;
    text-align: center;
    /* 공개 완료 시 살짝 또렷·차분해지는 미세 모션 */
    transform: translateY(0) scale(1);
    transition: transform 1s var(--ease-out);
  }
  #stage.revealed .quote-wrap { transform: translateY(-6px) scale(1.012); }

  /* 큰 문장 타이포 — 따뜻하고 깊게 */
  .quote {
    font-size: clamp(28px, 5.4vw, 58px);
    line-height: 1.46;
    letter-spacing: -0.028em;
    font-weight: 600;
    color: var(--q-ink, var(--ink));
    white-space: pre-line;        /* 시드의 \n 줄바꿈 유지 */
    word-break: keep-all;         /* 한글 어절 단위 줄바꿈 */
    text-wrap: balance;
    /* 안개에 가려 있을 때도 아래에서 살짝 비치도록 부드러운 음영 */
    text-shadow: 0 1px 0 rgba(255,255,255,0.25);
    margin: 0;
  }
  /* 앞쪽 큰 따옴표 장식(은은) */
  .quote-wrap .mark-q {
    display: block;
    font-size: clamp(40px, 7vw, 80px);
    line-height: 0.2;
    color: var(--accent);
    opacity: 0.30;
    margin-bottom: clamp(18px, 3vw, 34px);
    font-weight: 700;
    user-select: none;
  }

  /* 구분선 — 공개 후 가운데에서 좌우로 그어짐 */
  .rule {
    width: 0;
    height: 2px;
    background: var(--accent);
    margin: clamp(26px, 4vw, 40px) auto clamp(18px, 2.6vw, 26px);
    border-radius: 2px;
    opacity: 0;
    transition: width 0.9s var(--ease-out) 0.15s, opacity 0.6s ease 0.15s;
  }
  #stage.revealed .rule { width: clamp(46px, 6vw, 64px); opacity: 0.85; }

  /* 저자/출처 — 평소엔 살짝 흐릿, 공개되면 또렷해짐 */
  .meta {
    display: flex;
    align-items: baseline;
    justify-content: center;
    flex-wrap: wrap;
    gap: 6px 12px;
    font-size: clamp(13px, 1.5vw, 16px);
    color: var(--ink-soft);
    word-break: keep-all;
    opacity: 0.0;
    transform: translateY(8px);
    transition: opacity 0.8s var(--ease-out) 0.25s, transform 0.8s var(--ease-out) 0.25s;
  }
  #stage.revealed .meta { opacity: 1; transform: translateY(0); }
  .meta .author { font-weight: 700; color: var(--q-ink, var(--ink)); }
  .meta .work { font-style: normal; }
  .meta .work::before { content: "《"; color: var(--ink-faint); }
  .meta .work::after  { content: "》"; color: var(--ink-faint); }
  .meta .year { color: var(--ink-faint); font-variant-numeric: tabular-nums; }
  .meta .theme {
    font-size: 0.86em;
    color: var(--accent);
    border: 1px solid color-mix(in srgb, var(--accent) 36%, transparent);
    border-radius: 999px;
    padding: 2px 11px;
    margin-left: 2px;
  }

  /* 하단 키워드 — 아주 작게, 공개 후 살짝 늦게 */
  .kw {
    margin-top: clamp(18px, 2.6vw, 26px);
    display: flex; justify-content: center; flex-wrap: wrap; gap: 7px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.8s var(--ease-out) 0.4s, transform 0.8s var(--ease-out) 0.4s;
  }
  #stage.revealed .kw { opacity: 1; transform: translateY(0); }
  .kw span {
    font-size: clamp(10.5px, 1.2vw, 12px);
    color: var(--ink-soft);
    background: color-mix(in srgb, var(--accent) 9%, transparent);
    padding: 3px 10px;
    border-radius: 20px;
    word-break: keep-all;
  }

  /* ---------- 위 레이어: 성에 캔버스 ---------- */
  #frost {
    position: absolute;
    inset: 0;
    z-index: 5;
    display: block;
    /* 공개 완료 시 전체가 스르륵 사라짐 */
    opacity: 1;
    transition: opacity 1.15s var(--ease-soft);
  }
  #stage.revealed #frost { opacity: 0; pointer-events: none; }

  /* ---------- 닦기 진행 게이지(상단 가늘게) ---------- */
  .progress {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 2px;
    z-index: 60;
    background: transparent;
    pointer-events: none;
  }
  .progress .bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg,
      color-mix(in srgb, var(--accent) 70%, #ffffff),
      var(--accent));
    transition: width 0.18s linear, opacity 0.6s ease;
    box-shadow: 0 0 10px color-mix(in srgb, var(--accent) 55%, transparent);
  }
  #stage.revealed .progress .bar { opacity: 0; }

  /* ============================================================
     상단 바 — 브랜드 / 카운터
     ============================================================ */
  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 66px;
    display: flex;
    align-items: center;
    padding: 0 22px;
    pointer-events: none;
    z-index: 70;
  }
  .brand {
    pointer-events: auto;
    display: flex; align-items: center; gap: 11px;
    user-select: none;
  }
  .brand .mark {
    width: 30px; height: 30px;
    border-radius: 8px;
    background: var(--ink);
    color: #f4efe6;
    display: grid; place-items: center;
    font-weight: 700; font-size: 15px;
    box-shadow: 0 3px 9px rgba(40,30,22,0.20);
    transform: rotate(-4deg);
  }
  .brand .txt { line-height: 1.12; }
  .brand .txt b { font-size: 14.5px; font-weight: 700; letter-spacing: -0.02em; color: var(--ink); }
  .brand .txt small { display: block; font-size: 10.5px; color: var(--ink-soft); margin-top: 2px; letter-spacing: 0.02em; }

  /* 우상단 — 오늘 닦아낸 문장 카운터 */
  .counter {
    pointer-events: auto;
    margin-left: auto;
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--ink-soft);
    background: var(--glass);
    backdrop-filter: blur(9px) saturate(1.15);
    -webkit-backdrop-filter: blur(9px) saturate(1.15);
    border: 1px solid var(--glass-line);
    border-radius: 999px;
    padding: 7px 14px;
    box-shadow: 0 4px 14px rgba(40,40,50,0.07);
    user-select: none;
    white-space: nowrap;
  }
  .counter .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent);
  }
  .counter b {
    color: var(--ink); font-weight: 700;
    font-variant-numeric: tabular-nums;
    /* 카운트가 오를 때 살짝 튀어오름 */
    display: inline-block;
    transition: transform 0.4s var(--ease-back);
  }
  .counter b.bump { transform: translateY(-2px) scale(1.18); }

  /* ============================================================
     중앙 시작 힌트 — 닦기 시작하면 사라짐
     ============================================================ */
  .hint {
    position: fixed;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    z-index: 40;
    pointer-events: none;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
    opacity: 0;
    animation: hintIn 1.0s var(--ease-out) 0.45s forwards;
    text-align: center;
  }
  .hint.hide { opacity: 0 !important; transform: translate(-50%, -50%) scale(0.96); transition: all 0.55s var(--ease-out); }
  .hint .ring {
    width: 70px; height: 70px;
    border-radius: 50%;
    border: 1.5px dashed rgba(90, 95, 105, 0.45);
    display: grid; place-items: center;
    animation: ringPulse 2.6s ease-in-out infinite;
  }
  .hint .ring svg { width: 28px; height: 28px; color: rgba(80, 85, 95, 0.7); }
  .hint .label {
    font-size: 15px; letter-spacing: -0.01em;
    color: rgba(70, 75, 85, 0.82);
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    padding: 9px 18px; border-radius: 999px;
    word-break: keep-all;
  }
  @keyframes hintIn {
    from { opacity: 0; transform: translate(-50%, -50%) translateY(10px); }
    to   { opacity: 1; transform: translate(-50%, -50%) translateY(0); }
  }
  @keyframes ringPulse {
    0%, 100% { transform: scale(1);   border-color: rgba(90,95,105,0.40); }
    50%      { transform: scale(1.08); border-color: rgba(90,95,105,0.62); }
  }

  /* ============================================================
     커스텀 브러시 커서 — 손끝/닦는 면의 느낌
     ============================================================ */
  .cursor {
    position: fixed;
    top: 0; left: 0;
    z-index: 80;
    pointer-events: none;
    width: 1px; height: 1px;
    transform: translate(-50%, -50%);
    will-change: transform;
    opacity: 0;
    transition: opacity 0.35s ease;
  }
  .cursor.show { opacity: 1; }
  .cursor .ink {
    position: absolute;
    left: 50%; top: 50%;
    width: var(--cur, 84px); height: var(--cur, 84px);
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border: 1.5px solid rgba(70, 75, 85, 0.55);
    background: radial-gradient(circle at 50% 50%,
      rgba(255,255,255,0.12), transparent 70%);
    transition: width 0.2s var(--ease-out), height 0.2s var(--ease-out), border-color 0.2s;
  }
  /* 공개되면 커서를 손가락 점으로 차분히 */
  #stage.revealed ~ .cursor .ink { border-color: rgba(70,75,85,0.25); }
  .cursor .dot {
    position: absolute;
    left: 50%; top: 50%;
    width: 5px; height: 5px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: rgba(60, 65, 75, 0.65);
  }

  /* ============================================================
     "다음 문장" 버튼 — 공개 후 우아하게 등장
     ============================================================ */
  .next-wrap {
    position: fixed;
    left: 50%; bottom: clamp(28px, 5vh, 56px);
    transform: translateX(-50%) translateY(18px);
    z-index: 75;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.7s var(--ease-out) 0.55s, transform 0.7s var(--ease-back) 0.55s;
  }
  #stage.revealed ~ .next-wrap {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
    pointer-events: auto;
  }
  .next-btn {
    appearance: none;
    font-family: inherit;
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--ink);
    color: #f5efe5;
    font-size: 14.5px; font-weight: 600; letter-spacing: -0.01em;
    border: 0;
    padding: 14px 26px;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 10px 26px rgba(35,28,22,0.26), 0 2px 6px rgba(35,28,22,0.18);
    transition: transform 0.28s var(--ease-back), box-shadow 0.28s var(--ease-out), background 0.2s;
  }
  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 16px 34px rgba(35,28,22,0.32); }
  .next-btn:active { transform: translateY(0) scale(0.97); }
  .next-btn .ico {
    display: inline-grid; place-items: center;
    width: 18px; height: 18px;
    transition: transform 0.5s var(--ease-back);
  }
  .next-btn:hover .ico { transform: rotate(-180deg); }
  .next-btn .ico svg { width: 16px; height: 16px; display: block; }

  /* 공개 직후 안내 라벨(버튼 위) */
  .next-wrap .done-label {
    display: block;
    text-align: center;
    font-size: 11.5px; letter-spacing: 0.02em;
    color: var(--ink-soft);
    margin-bottom: 11px;
    opacity: 0.9;
  }

  /* ============================================================
     모바일 대응
     ============================================================ */
  @media (max-width: 600px) {
    .brand .txt small { display: none; }
    .counter { font-size: 11px; padding: 6px 11px; }
    .quote { font-size: clamp(24px, 7.4vw, 36px); line-height: 1.5; }
    .hint .label { font-size: 13.5px; }
    .next-btn { font-size: 13.5px; padding: 13px 22px; }
    .cursor .ink { --cur: 70px; }
  }
  /* 동작 최소화 선호 시 펄스/장식 정지 */
  @media (prefers-reduced-motion: reduce) {
    .hint, .hint .ring { animation: none; opacity: 1; }
    * { transition-duration: 0.001ms !important; }
  }
</style>
</head>
<body>

  <!-- 무대: 아래(문장) + 위(성에 캔버스) -->
  <div id="stage">
    <!-- 아래 레이어: 오늘의 문장 -->
    <div id="reveal">
      <div class="quote-wrap">
        <span class="mark-q" aria-hidden="true">“</span>
        <p class="quote" id="quote"></p>
        <div class="rule" aria-hidden="true"></div>
        <div class="meta" id="meta"></div>
        <div class="kw" id="kw"></div>
      </div>
    </div>

    <!-- 위 레이어: 성에 안개 -->
    <canvas id="frost"></canvas>

    <!-- 닦기 진행 게이지 -->
    <div class="progress"><div class="bar" id="progBar"></div></div>
  </div>

  <!-- 상단 바 -->
  <header class="topbar">
    <div class="brand" title="문장 연구소">
      <div class="mark">文</div>
      <div class="txt">
        <b>문장 연구소</b>
        <small>Sentence Lab · 문장을 닦다</small>
      </div>
    </div>
    <div class="counter" title="오늘 닦아낸 문장 수">
      <span class="dot" aria-hidden="true"></span>
      오늘 닦아낸 문장 <b id="countNum">0</b>
    </div>
  </header>

  <!-- 중앙 시작 힌트 -->
  <div class="hint" id="hint">
    <div class="ring">
      <!-- 손가락으로 문지르는 동그라미 아이콘 -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 11V6a2 2 0 0 1 4 0v5"></path>
        <path d="M13 7a2 2 0 0 1 4 0v6"></path>
        <path d="M5 13a2 2 0 0 1 4 0"></path>
        <path d="M5 13v2a6 6 0 0 0 6 6h1a6 6 0 0 0 6-6v-2"></path>
      </svg>
    </div>
    <span class="label">문질러서 문장을 꺼내 보세요</span>
  </div>

  <!-- 커스텀 브러시 커서 -->
  <div class="cursor" id="cursor" aria-hidden="true">
    <span class="ink"></span>
    <span class="dot"></span>
  </div>

  <!-- 다음 문장 버튼 -->
  <div class="next-wrap" id="nextWrap">
    <span class="done-label">문장이 드러났습니다</span>
    <button class="next-btn" id="nextBtn">
      다음 문장
      <span class="ico" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path>
          <path d="M21 3v5h-5"></path>
          <path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path>
          <path d="M3 21v-5h5"></path>
        </svg>
      </span>
    </button>
  </div>

<script>
/* ============================================================
   데이터 — 시드 문장 10개 (그대로 인라인)
   ============================================================ */
const SENTENCES = [
  {id:1,text:"죽는 날까지 하늘을 우러러\n한 점 부끄럼이 없기를",author:"윤동주",work:"하늘과 바람과 별과 시",year:"1948",theme:"성찰",keywords:["부끄러움","양심","바람"]},
  {id:2,text:"나 보기가 역겨워 가실 때에는\n말없이 고이 보내 드리오리다",author:"김소월",work:"진달래꽃",year:"1925",theme:"이별",keywords:["이별","체념","헌신"]},
  {id:3,text:"우리는 만날 때에 떠날 것을 염려하는 것과 같이,\n떠날 때에 다시 만날 것을 믿습니다",author:"한용운",work:"님의 침묵",year:"1926",theme:"이별",keywords:["만남","이별","믿음"]},

/* ------------------------------------------------------------
   테마별 팔레트 — 드러나는 문장의 '따뜻함'을 테마에 맞춰 조율.
   bgTop/bgBot: 바탕 그라데이션, glow: 위쪽 은은한 빛,
   qInk: 문장 잉크색, accent: 포인트(구분선/따옴표/키워드).
   안개의 차가운 회백색과 대비되도록 전체적으로 따뜻한 계열.
   ------------------------------------------------------------ */
const THEMES = {
  "성찰": { bgTop:"#f3efe6", bgBot:"#e7e0d2", glow:"#fcf8ef", qInk:"#2c2820", accent:"#9a7b4f" }, // 차분한 베이지·놋빛
  "이별": { bgTop:"#f4ebe6", bgBot:"#ecd9d2", glow:"#fdf3ee", qInk:"#3a2c28", accent:"#b06a5e" }, // 옅은 진달래·노을
  "의지": { bgTop:"#efe9e2", bgBot:"#ddd2c4", glow:"#faf4ea", qInk:"#2a2420", accent:"#a85a3a" }, // 황토·테라코타(비장)
  "자의식": { bgTop:"#edecee", bgBot:"#d8d6dc", glow:"#f7f6f8", qInk:"#262430", accent:"#6b6580" }, // 서늘한 회보라(근대)
  "자연": { bgTop:"#eef0e8", bgBot:"#dde4d3", glow:"#f7f9ef", qInk:"#2a2e25", accent:"#7e9159" }, // 가을 들·풀빛
  "배움": { bgTop:"#f1ede4", bgBot:"#e3dac8", glow:"#fbf6ec", qInk:"#2b2620", accent:"#9c7a45" }, // 묵향·미색(선비)
  "쓰기": { bgTop:"#eef0f1", bgBot:"#dde2e3", glow:"#f8fafa", qInk:"#262a2c", accent:"#4f7d72" }  // 잉크·세이지(편집)
};
const FALLBACK_THEME = { bgTop:"#f3ede2", bgBot:"#e9ddca", glow:"#fbf6ec", qInk:"#2a2520", accent:"#9a7250" };

/* ============================================================
   시드 난수 — 안개 노이즈/시작 문장의 재현성
   ============================================================ */
function mulberry32(seed){
  return function(){
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

/* ============================================================
   참조 / 상태
   ============================================================ */
const stage   = document.getElementById('stage');
const reveal  = document.getElementById('reveal');
const canvas  = document.getElementById('frost');
const ctx     = canvas.getContext('2d', { willReadFrequently: false });
const quoteEl = document.getElementById('quote');
const metaEl  = document.getElementById('meta');
const kwEl    = document.getElementById('kw');
const hintEl  = document.getElementById('hint');
const cursorEl= document.getElementById('cursor');
const cursorInk = cursorEl.querySelector('.ink');
const nextBtn = document.getElementById('nextBtn');
const progBar = document.getElementById('progBar');
const countNumEl = document.getElementById('countNum');

let DPR = Math.min(window.devicePixelRatio || 1, 2); // 성능 위해 2배까지만
let W = 0, H = 0;                  // CSS 픽셀 크기
let order = [];                    // 문장 등장 순서(셔플)
let orderIdx = 0;                  // 현재 문장 인덱스
let cleared = 0;                   // 오늘 닦아낸 문장 수
let revealed = false;              // 현재 문장 공개 완료 여부
let wiping = false;                // 포인터가 눌려 닦는 중
let started = false;               // 첫 닦기 시작했는지(힌트 숨김용)
let lastPt = null;                 // 직전 포인터 좌표(경로 보간)

/* 닦임 추적용 저해상도 격자 — 매 픽셀 검사 대신 셀 단위로 근사 */
const GRID_X = 64;                 // 가로 셀 수
let GRID_Y = 36;                   // 세로 셀 수(비율에 맞춰 갱신)
let gridCells = null;              // Uint8Array, 1=닦임
let gridTotal = 0;
let gridDone = 0;
const CLEAR_THRESHOLD = 0.58;      // 이 비율 넘으면 자동 전체 공개

/* 브러시 반경(CSS px) — 화면 크기에 따라 가변 */
let brushR = 52;

/* 안개 질감 패턴(오프스크린) — 한 번 만들어 재사용 */
let noisePattern = null;

/* ============================================================
   안개 질감 만들기 — 미세 노이즈 타일을 캔버스 패턴으로
   (회백색 위에 옅은 알갱이 + 밝고 어두운 얼룩으로 성에 느낌)
   ============================================================ */
function buildNoisePattern(){
  const N = 160;                   // 타일 한 변(px)
  const off = document.createElement('canvas');
  off.width = N; off.height = N;
  const octx = off.getContext('2d');
  const img = octx.createImageData(N, N);
  const d = img.data;
  const nr = mulberry32(98765);    // 노이즈 전용 시드(매번 동일 질감)
  for (let i = 0; i < d.length; i += 4) {
    // 회백색 근처에서 미세하게 흔들리는 밝기
    const base = 236;
    const v = base + (nr() * 30 - 15);   // 221~251
    d[i]   = v;            // R
    d[i+1] = v + 2;        // G (살짝 푸르게)
    d[i+2] = v + 6;        // B (성에의 차가운 기운)
    // 알파는 옅게 — 바탕 채움 위에 얹는 결
    d[i+3] = 26 + nr() * 26;          // 26~52
  }
  octx.putImageData(img, 0, 0);
  noisePattern = ctx.createPattern(off, 'repeat');
}

/* ============================================================
   캔버스 크기/격자 설정 (리사이즈 대응)
   ============================================================ */
function setupCanvas(){
  W = window.innerWidth;
  H = window.innerHeight;
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width  = Math.round(W * DPR);
  canvas.height = Math.round(H * DPR);
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);  // 이후 CSS px 좌표로 그림

  // 브러시 반경 — 화면 대각선 기준 적당히(작은 화면은 작게)
  brushR = Math.max(40, Math.min(72, Math.round(Math.min(W, H) * 0.085)));
  cursorEl.style.setProperty('--cur', (brushR * 1.5) + 'px');

  // 격자 비율 갱신
  GRID_Y = Math.max(18, Math.round(GRID_X * (H / W)));
  gridTotal = GRID_X * GRID_Y;
}

/* ============================================================
   안개 다시 칠하기 — 회백색 베이스 + 노이즈 결 + 빛 번짐
   ============================================================ */
function paintFrost(){
  ctx.globalCompositeOperation = 'source-over';
  ctx.clearRect(0, 0, W, H);

  // 1) 베이스: 차가운 회백 → 미색으로 흐르는 큰 그라데이션(불투명)
  const g = ctx.createLinearGradient(0, 0, W, H);
  g.addColorStop(0.0, `rgba(${getCSS('--frost-cool')}, 0.97)`);
  g.addColorStop(0.5, `rgba(243, 244, 246, 0.975)`);
  g.addColorStop(1.0, `rgba(${getCSS('--frost-warm')}, 0.965)`);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // 2) 빛 번짐 — 부드러운 밝은 얼룩 몇 개(성에에 빛이 스민 느낌)
  const blooms = [
    { x: W*0.26, y: H*0.30, r: Math.max(W,H)*0.42, a: 0.5 },
    { x: W*0.78, y: H*0.22, r: Math.max(W,H)*0.34, a: 0.38 },
    { x: W*0.62, y: H*0.82, r: Math.max(W,H)*0.46, a: 0.42 },
    { x: W*0.12, y: H*0.78, r: Math.max(W,H)*0.30, a: 0.30 }
  ];
  blooms.forEach(b => {
    const rg = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
    rg.addColorStop(0, `rgba(255,255,255,${b.a})`);
    rg.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = rg;
    ctx.fillRect(0, 0, W, H);
  });

  // 3) 살짝 어두운 가장자리(비네트) — 가운데로 시선 모으기
  const vg = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.25, W/2, H/2, Math.max(W,H)*0.72);
  vg.addColorStop(0, 'rgba(210, 214, 220, 0)');
  vg.addColorStop(1, 'rgba(198, 203, 211, 0.34)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);

  // 4) 노이즈 결 — 미세 알갱이로 성에 질감
  if (noisePattern) {
    ctx.fillStyle = noisePattern;
    ctx.fillRect(0, 0, W, H);
  }
}

/* CSS 변수(콤마 구분 rgb 숫자) 읽기 */
const _rootStyle = getComputedStyle(document.documentElement);
function getCSS(name){ return _rootStyle.getPropertyValue(name).trim(); }

/* ============================================================
   브러시로 닦기 — destination-out + 부드러운 원형
   ============================================================ */
function makeBrushGradient(x, y, r){
  // 가장자리가 부드럽게 사라지도록 alpha 그라데이션
  const rg = ctx.createRadialGradient(x, y, 0, x, y, r);
  rg.addColorStop(0.0, 'rgba(0,0,0,1)');
  rg.addColorStop(0.55, 'rgba(0,0,0,0.92)');
  rg.addColorStop(0.80, 'rgba(0,0,0,0.45)');
  rg.addColorStop(1.0, 'rgba(0,0,0,0)');
  return rg;
}

function stamp(x, y){
  ctx.globalCompositeOperation = 'destination-out';
  ctx.fillStyle = makeBrushGradient(x, y, brushR);
  ctx.beginPath();
  ctx.arc(x, y, brushR, 0, Math.PI * 2);
  ctx.fill();
  markCleared(x, y);
}

/* 두 점 사이를 촘촘히 찍어 빠른 이동에도 끊김 없게(경로 보간) */
function wipeLine(x0, y0, x1, y1){
  const dx = x1 - x0, dy = y1 - y0;
  const dist = Math.hypot(dx, dy);
  const step = Math.max(brushR * 0.32, 4);     // 간격을 반경보다 촘촘히
  const n = Math.max(1, Math.ceil(dist / step));
  for (let i = 1; i <= n; i++) {
    const t = i / n;
    stamp(x0 + dx * t, y0 + dy * t);
  }
}

/* ============================================================
   닦임 추적 — 브러시가 닿은 격자 셀 표시 → 진행률
   ============================================================ */
function resetGrid(){
  gridCells = new Uint8Array(gridTotal);
  gridDone = 0;
}
function markCleared(x, y){
  // 브러시 원이 덮는 셀 범위를 1로 표시(반경의 0.7배만 '확실히 닦임'으로 보수적 집계)
  const rr = brushR * 0.72;
  const cw = W / GRID_X, ch = H / GRID_Y;
  const cx0 = Math.max(0, Math.floor((x - rr) / cw));
  const cx1 = Math.min(GRID_X - 1, Math.floor((x + rr) / cw));
  const cy0 = Math.max(0, Math.floor((y - rr) / ch));
  const cy1 = Math.min(GRID_Y - 1, Math.floor((y + rr) / ch));
  for (let gy = cy0; gy <= cy1; gy++) {
    for (let gx = cx0; gx <= cx1; gx++) {
      // 셀 중심이 브러시 원 안인지 확인
      const ccx = (gx + 0.5) * cw;
      const ccy = (gy + 0.5) * ch;
      if ((ccx - x) ** 2 + (ccy - y) ** 2 <= rr * rr) {
        const idx = gy * GRID_X + gx;
        if (gridCells[idx] === 0) { gridCells[idx] = 1; gridDone++; }
      }
    }
  }
}
function clearedRatio(){ return gridDone / gridTotal; }

/* ============================================================
   문장 채우기 (DOM) + 테마 적용
   ============================================================ */
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function applyTheme(theme){
  const t = THEMES[theme] || FALLBACK_THEME;
  reveal.style.setProperty('--bg-top', t.bgTop);
  reveal.style.setProperty('--bg-bot', t.bgBot);
  reveal.style.setProperty('--bg-glow', t.glow);
  reveal.style.setProperty('--q-ink', t.qInk);
  reveal.style.setProperty('--accent', t.accent);
  // 진행 게이지 색도 테마 포인트를 따르도록 stage 레벨에도 반영
  stage.style.setProperty('--accent', t.accent);
}

function fillSentence(s){
  applyTheme(s.theme);
  quoteEl.textContent = s.text;          // \n 은 white-space:pre-line 으로 줄바꿈
  metaEl.innerHTML = `
    <span class="author">${esc(s.author)}</span>
    <span class="work">${esc(s.work)}</span>
    <span class="year">${esc(s.year)}</span>
    <span class="theme">${esc(s.theme)}</span>
  `;
  kwEl.innerHTML = s.keywords.map(k => `<span>#${esc(k)}</span>`).join('');
}

/* ============================================================
   공개 (완성) — 남은 안개 전체 페이드아웃 + 정보 또렷
   ============================================================ */
let revealTimer = null;
function doReveal(){
  if (revealed) return;
  revealed = true;
  wiping = false;
  stage.classList.add('revealed');         // CSS가 frost opacity→0, meta/kw/rule 등장
  progBar.style.width = '100%';

  // 카운터 증가 + 살짝 튀어오르는 피드백
  cleared += 1;
  countNumEl.textContent = cleared;
  countNumEl.classList.add('bump');
  setTimeout(() => countNumEl.classList.remove('bump'), 420);
}

/* 진행률 점검 — 닦을 때마다 호출 */
function checkProgress(){
  const r = clearedRatio();
  progBar.style.width = Math.min(100, (r / CLEAR_THRESHOLD) * 100).toFixed(1) + '%';
  if (!revealed && r >= CLEAR_THRESHOLD) {
    // 임계 도달: 살짝의 텀을 두고 '스르륵' 공개(닦던 손맛 여운)
    clearTimeout(revealTimer);
    revealTimer = setTimeout(doReveal, 90);
  }
}

/* ============================================================
   다음 문장 — 안개 다시 덮고 새 문장으로
   ============================================================ */
function nextSentence(){
  orderIdx = (orderIdx + 1) % order.length;
  loadSentence(order[orderIdx], true);
}

function loadSentence(s, animateBg){
  // 1) 공개 상태 해제
  revealed = false;
  started = false;
  lastPt = null;
  stage.classList.remove('revealed');

  // 2) 새 문장/테마 채움(배경은 transition으로 부드럽게 바뀜)
  fillSentence(s);

  // 3) 안개 다시 칠하고 격자 초기화
  paintFrost();
  resetGrid();
  progBar.style.width = '0%';

  // 4) 시작 힌트 복귀(다음 문장에선 잠깐 다시 보여줌)
  showHint();
}

/* ============================================================
   힌트 표시/숨김
   ============================================================ */
let hintHidden = false;
function hideHint(){
  if (hintHidden) return;
  hintHidden = true;
  hintEl.classList.add('hide');
}
function showHint(){
  // 다음 문장 전환 시 힌트를 다시 살림(첫 화면과 동일 연출)
  hintHidden = false;
  hintEl.classList.remove('hide');
  // 재생을 위해 애니메이션 리셋
  hintEl.style.animation = 'none';
  // reflow 강제 후 애니메이션 재부여
  void hintEl.offsetWidth;
  hintEl.style.animation = '';
}

/* ============================================================
   포인터 처리 — 마우스 + 터치 통합
   ============================================================ */
function pointerXY(e){
  if (e.touches && e.touches.length) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  if (e.changedTouches && e.changedTouches.length) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

/* 커서 위치 갱신(닦지 않을 때도 따라다님) */
function moveCursor(x, y){
  cursorEl.style.transform = `translate(${x}px, ${y}px)`;
}

function onDown(e){
  if (revealed) return;                    // 이미 공개됐으면 닦기 비활성
  if (e.touches && e.touches.length > 1) return; // 멀티터치 제외
  wiping = true;
  const p = pointerXY(e);
  lastPt = p;
  // 첫 입력에 점 하나 찍고 힌트 숨김
  stamp(p.x, p.y);
  checkProgress();
  if (!started) { started = true; hideHint(); }
  moveCursor(p.x, p.y);
  cursorEl.classList.add('show');
  // 누르는 동안 브러시 살짝 줄여 '눌린' 느낌
  cursorInk.style.borderColor = 'rgba(70,75,85,0.75)';
  e.preventDefault();
}

function onMove(e){
  const p = pointerXY(e);
  // 커서는 항상 따라다님(닦는 중이 아니어도)
  moveCursor(p.x, p.y);
  cursorEl.classList.add('show');
  if (!wiping || revealed) { lastPt = null; return; }
  if (lastPt) wipeLine(lastPt.x, lastPt.y, p.x, p.y);
  else stamp(p.x, p.y);
  lastPt = p;
  checkProgress();
  e.preventDefault();
}

function onUp(e){
  wiping = false;
  lastPt = null;
  cursorInk.style.borderColor = '';
}

/* 마우스가 화면을 벗어나면 커서 숨김 */
function onLeave(){ cursorEl.classList.remove('show'); }

/* ============================================================
   이벤트 바인딩
   ============================================================ */
function bindEvents(){
  // 마우스
  stage.addEventListener('mousedown', onDown);
  window.addEventListener('mousemove', onMove, { passive: false });
  window.addEventListener('mouseup', onUp);
  stage.addEventListener('mouseleave', onLeave);
  document.addEventListener('mouseenter', () => { /* 진입 시 표시는 move가 처리 */ });

  // 터치
  stage.addEventListener('touchstart', onDown, { passive: false });
  window.addEventListener('touchmove', onMove, { passive: false });
  window.addEventListener('touchend', onUp);
  window.addEventListener('touchcancel', onUp);

  // 다음 문장
  nextBtn.addEventListener('click', nextSentence);

  // 리사이즈 — 캔버스 다시 만들고 현재 진행 상태는 초기화(안개 새로 덮음).
  // 단, 이미 공개된 상태면 안개를 새로 덮지 않음(읽는 흐름 유지).
  let rT = null;
  window.addEventListener('resize', () => {
    clearTimeout(rT);
    rT = setTimeout(() => {
      setupCanvas();
      if (!revealed) {
        paintFrost();
        resetGrid();
        progBar.style.width = '0%';
      } else {
        // 공개 상태에선 안개를 비워 둠(투명 유지)
        ctx.clearRect(0, 0, W, H);
      }
    }, 200);
  });
}

/* ============================================================
   초기화
   ============================================================ */
function shuffle(arr, seed){
  // 시드 기반 Fisher–Yates — 새로고침해도 같은 순서(재현성)
  const a = arr.slice();
  const r = mulberry32(seed);
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(r() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function init(){
  setupCanvas();
  buildNoisePattern();

  // 등장 순서 셔플(오늘 날짜 느낌의 고정 시드)
  order = shuffle(SENTENCES, 20260626);
  orderIdx = 0;

  // 첫 문장 로드(배경 애니메이션 없이 즉시)
  fillSentence(order[0]);
  paintFrost();
  resetGrid();

  bindEvents();
}

init();
</script>
