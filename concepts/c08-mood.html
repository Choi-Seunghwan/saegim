<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>오늘의 기분으로 · 문장 연구소</title>
<!-- 유일한 외부 의존: Pretendard 폰트 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css" />
<style>
  /* ============================================================
     오늘의 기분으로 (C08) — Mood
     먼저 '지금의 색·기분'을 고른다. 그러면 그 색조에 어울리는
     문장이 우아하게 떠오른다. 감정이 발견의 '입구'가 되는 큐레이션.

     이 컨셉의 생명은 '컬러 트랜지션'이다.
     배경은 멀티컬러 메시(라디얼 혼합)가 천천히 일렁이고,
     무드를 바꾸면 모든 색이 0.9~1.1s ease 로 부드럽게 크로스페이드된다.
     ============================================================ */

  :root {
    /* ----- 모션 타이밍: 무드의 호흡 ----- */
    --t-color: 1.05s;                              /* 색 전환 시간 */
    --ease-color: cubic-bezier(0.45, 0.05, 0.25, 1); /* 색 전환 커브(부드럽게) */
    --ease-out:   cubic-bezier(0.22, 0.61, 0.36, 1); /* 등장 */
    --ease-soft:  cubic-bezier(0.4, 0.0, 0.2, 1);
    --ease-back:  cubic-bezier(0.34, 1.4, 0.5, 1);   /* 살짝 튕기는 등장 */

    /* ----- 현재 무드의 색 (JS가 매 전환마다 갈아끼움) -----
       메시 그라데이션을 구성하는 색 슬롯들. 초기값=그리움. */
    --c-bg:    #0e0b1c;   /* 가장 깊은 바탕(거의 검정에 가까운 색조) */
    --c-deep:  #1a1438;   /* 깊은 색 */
    --c-mid:   #3b2a6b;   /* 중간 색 */
    --c-glow:  #6b4ea8;   /* 빛나는 핵 */
    --c-spark: #b48ad6;   /* 가장 밝은 하이라이트 */
    --c-text:  #efe9ff;   /* 본문 글자 */
    --c-soft:  #c3b6e6;   /* 약한 글자(출처) */
    --c-accent:#d9b3ff;   /* 포인트 */
    --c-line:  rgba(220, 200, 255, 0.20); /* 선/테두리 */
    --c-chip:  rgba(255, 255, 255, 0.06); /* 칩 바탕 */
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: "Pretendard", system-ui, sans-serif;
    background: var(--c-bg);
    color: var(--c-text);
    overscroll-behavior: none;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    /* 바탕색조차 부드럽게 전환 */
    transition: background-color var(--t-color) var(--ease-color),
                color var(--t-color) var(--ease-color);
  }

  /* ============================================================
     배경 — 멀티컬러 메시 (천천히 일렁임)
     여러 라디얼 그라데이션을 겹쳐 '메시'처럼 보이게 하고,
     keyframes 로 위치를 아주 느리게 흐르게 한다.
     색은 모두 CSS 변수라 무드 전환 시 통째로 크로스페이드된다.
     ============================================================ */
  #mesh {
    position: fixed;
    inset: -12%;                  /* 가장자리 잘림 방지(여유롭게) */
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(38% 50% at 22% 28%, var(--c-glow)  0%, transparent 62%),
      radial-gradient(42% 48% at 80% 22%, var(--c-mid)   0%, transparent 60%),
      radial-gradient(50% 55% at 70% 82%, var(--c-deep)  0%, transparent 64%),
      radial-gradient(34% 40% at 30% 78%, var(--c-spark) 0%, transparent 58%),
      radial-gradient(60% 70% at 50% 50%, var(--c-mid)   0%, transparent 70%),
      var(--c-bg);
    /* 색 자체의 전환 + 느린 일렁임 */
    transition: background var(--t-color) var(--ease-color);
    animation: drift 26s ease-in-out infinite alternate;
    filter: saturate(1.04);
  }
  /* 두 번째 메시 레이어 — 다른 속도로 흘러 깊이감/일렁임을 더한다 */
  #mesh2 {
    position: fixed;
    inset: -18%;
    z-index: 0;
    pointer-events: none;
    opacity: 0.7;
    mix-blend-mode: screen;       /* 빛이 더해지듯 */
    background:
      radial-gradient(40% 46% at 65% 35%, var(--c-spark) 0%, transparent 60%),
      radial-gradient(46% 52% at 25% 60%, var(--c-glow)  0%, transparent 62%),
      radial-gradient(38% 44% at 85% 75%, var(--c-mid)   0%, transparent 60%);
    transition: background var(--t-color) var(--ease-color),
                opacity var(--t-color) var(--ease-color);
    animation: drift2 34s ease-in-out infinite alternate;
  }
  @keyframes drift {
    0%   { transform: translate3d(-2%, -1%, 0) scale(1.02) rotate(0deg); }
    50%  { transform: translate3d(2%,  2%, 0) scale(1.06) rotate(1.2deg); }
    100% { transform: translate3d(1%, -2%, 0) scale(1.03) rotate(-1deg); }
  }
  @keyframes drift2 {
    0%   { transform: translate3d(2%, 1%, 0) scale(1.05); }
    100% { transform: translate3d(-3%, -2%, 0) scale(1.1); }
  }

  /* 위에 얹는 미세한 입자/비네팅 — 색이 너무 매끈하지 않게, 글자는 또렷하게 */
  #grain {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background:
      radial-gradient(130% 120% at 50% 42%, transparent 52%, rgba(0,0,0,0.42) 100%);
    mix-blend-mode: multiply;
    opacity: 0.9;
  }

  /* ============================================================
     공통 레이아웃
     ============================================================ */
  #app {
    position: relative;
    z-index: 2;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
  }

  /* 상단 헤더 — 항상 떠 있는 얇은 바 */
  header {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px clamp(20px, 5vw, 56px) 6px;
    gap: 16px;
  }
  .brand {
    display: flex; align-items: baseline; gap: 10px;
    user-select: none;
  }
  .brand .mark {
    font-size: 13px; letter-spacing: 0.32em; font-weight: 700;
    color: var(--c-text);
    opacity: 0.92;
    transition: color var(--t-color) var(--ease-color);
  }
  .brand .sub {
    font-size: 11px; letter-spacing: 0.22em; font-weight: 500;
    color: var(--c-soft);
    opacity: 0.66;
    transition: color var(--t-color) var(--ease-color);
  }

  /* "다른 기분으로" 돌아가기 버튼 */
  .back-btn {
    appearance: none; border: 1px solid var(--c-line);
    background: var(--c-chip);
    color: var(--c-soft);
    font-family: inherit;
    font-size: 12.5px; letter-spacing: 0.06em; font-weight: 600;
    padding: 9px 16px; border-radius: 999px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: inline-flex; align-items: center; gap: 8px;
    opacity: 0;
    transform: translateY(-6px);
    pointer-events: none;
    transition: opacity 0.5s var(--ease-out),
                transform 0.5s var(--ease-out),
                color var(--t-color) var(--ease-color),
                border-color var(--t-color) var(--ease-color),
                background-color 0.3s ease;
  }
  .back-btn svg { width: 14px; height: 14px; display: block; }
  .back-btn:hover { color: var(--c-text); background: rgba(255,255,255,0.12); }
  /* 큐레이션 단계에서만 보이게 */
  body.stage-curation .back-btn {
    opacity: 1; transform: translateY(0); pointer-events: auto;
  }

  /* ============================================================
     1단계 — 입장: 무드 팔레트
     ============================================================ */
  #enter {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 clamp(20px, 5vw, 56px) 7vh;
    transition: opacity 0.6s var(--ease-soft);
  }
  /* 큐레이션으로 넘어가면 입장 화면은 사라짐 */
  body.stage-curation #enter {
    opacity: 0; pointer-events: none;
    position: absolute; inset: 0;
  }

  .enter-lead {
    text-align: center;
    margin-bottom: clamp(34px, 6vh, 64px);
    user-select: none;
  }
  .enter-lead .eyebrow {
    font-size: 12.5px; letter-spacing: 0.34em; font-weight: 600;
    color: var(--c-soft); opacity: 0.7;
    margin-bottom: 18px;
    transition: color var(--t-color) var(--ease-color);
  }
  .enter-lead h1 {
    margin: 0;
    font-size: clamp(26px, 4.4vw, 46px);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.28;
    word-break: keep-all;          /* 한글 줄바꿈 자연스럽게 */
    color: var(--c-text);
    transition: color var(--t-color) var(--ease-color);
  }
  .enter-lead h1 .accent {
    color: var(--c-accent);
    transition: color var(--t-color) var(--ease-color);
  }
  .enter-lead p {
    margin: 16px auto 0; max-width: 30em;
    font-size: clamp(13.5px, 1.6vw, 15.5px);
    line-height: 1.7; font-weight: 400;
    color: var(--c-soft); opacity: 0.82;
    word-break: keep-all;
    transition: color var(--t-color) var(--ease-color);
  }

  /* 팔레트 그리드 — 감정-색 8칸 */
  .palette {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: clamp(12px, 1.6vw, 20px);
    width: min(880px, 96vw);
  }
  .swatch {
    position: relative;
    aspect-ratio: 1 / 1.16;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.10);
    overflow: hidden;
    cursor: pointer;
    isolation: isolate;
    background: #111;
    transform: translateY(14px) scale(0.97);
    opacity: 0;
    /* 입장 시 순차 등장 (JS가 --i 로 지연) */
    animation: swatchIn 0.7s var(--ease-back) forwards;
    animation-delay: calc(var(--i, 0) * 0.06s + 0.1s);
    transition: transform 0.4s var(--ease-out),
                box-shadow 0.4s var(--ease-out),
                border-color 0.4s var(--ease-out);
    will-change: transform;
  }
  @keyframes swatchIn {
    to { transform: translateY(0) scale(1); opacity: 1; }
  }
  /* 각 스와치의 고유 무드색 메시(작은 일렁임) */
  .swatch .sw-mesh {
    position: absolute; inset: -20%;
    background:
      radial-gradient(50% 55% at 28% 30%, var(--s-glow) 0%, transparent 62%),
      radial-gradient(54% 60% at 78% 74%, var(--s-deep) 0%, transparent 64%),
      radial-gradient(60% 66% at 60% 40%, var(--s-mid)  0%, transparent 70%),
      var(--s-bg);
    z-index: -1;
    animation: drift 22s ease-in-out infinite alternate;
  }
  .swatch:hover, .swatch:focus-visible {
    transform: translateY(-6px) scale(1.03);
    box-shadow: 0 18px 50px -18px var(--s-glow);
    border-color: rgba(255,255,255,0.28);
    outline: none;
  }
  .swatch:active { transform: translateY(-2px) scale(1.01); }
  .swatch .sw-label {
    position: absolute; left: 16px; right: 16px; bottom: 14px;
    z-index: 1; user-select: none;
  }
  .swatch .sw-name {
    font-size: clamp(15px, 1.8vw, 19px); font-weight: 800;
    letter-spacing: -0.01em;
    color: #fff;
    text-shadow: 0 2px 16px rgba(0,0,0,0.55);
  }
  .swatch .sw-color {
    display: block;
    margin-top: 3px;
    font-size: 11px; letter-spacing: 0.16em; font-weight: 600;
    color: rgba(255,255,255,0.82);
    text-shadow: 0 1px 10px rgba(0,0,0,0.6);
  }
  /* 좌상단 작은 카운트 점 */
  .swatch .sw-count {
    position: absolute; top: 13px; left: 14px; z-index: 1;
    font-size: 10.5px; font-weight: 700; letter-spacing: 0.04em;
    color: rgba(255,255,255,0.9);
    background: rgba(0,0,0,0.28);
    backdrop-filter: blur(4px);
    padding: 3px 8px; border-radius: 999px;
    user-select: none;
  }

  /* ============================================================
     2단계 — 큐레이션: 떠오르는 문장들
     ============================================================ */
  #curation {
    position: absolute; inset: 0;
    z-index: 2;
    display: flex;
    flex-direction: column;
    padding: 0;
    opacity: 0; pointer-events: none;
    transition: opacity 0.6s var(--ease-soft);
  }
  body.stage-curation #curation {
    opacity: 1; pointer-events: auto;
    position: relative; flex: 1 1 auto;
  }

  /* 무드 헤드라인 영역 */
  .cur-head {
    flex: 0 0 auto;
    padding: clamp(8px, 2vh, 22px) clamp(20px, 5vw, 56px) 0;
    text-align: center;
    user-select: none;
  }
  .cur-head .cur-eyebrow {
    font-size: 11.5px; letter-spacing: 0.3em; font-weight: 600;
    color: var(--c-soft); opacity: 0.72;
    transition: color var(--t-color) var(--ease-color);
  }
  .cur-head .cur-mood {
    margin: 8px 0 4px;
    font-size: clamp(30px, 5vw, 54px); font-weight: 800;
    letter-spacing: -0.02em; line-height: 1.1;
    color: var(--c-text);
    transition: color var(--t-color) var(--ease-color);
  }
  .cur-head .cur-desc {
    margin: 0 auto; max-width: 30em;
    font-size: clamp(12.5px, 1.5vw, 14.5px); line-height: 1.6;
    color: var(--c-soft); opacity: 0.8;
    word-break: keep-all;
    transition: color var(--t-color) var(--ease-color);
  }

  /* 문장 카드 흐름 — 스크롤 가능한 컬럼/그리드 */
  .cur-scroll {
    flex: 1 1 auto;
    overflow-y: auto;
    overflow-x: hidden;
    padding: clamp(18px, 3vh, 34px) clamp(20px, 5vw, 56px) 90px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
    scrollbar-color: var(--c-line) transparent;
  }
  .cur-scroll::-webkit-scrollbar { width: 8px; }
  .cur-scroll::-webkit-scrollbar-thumb {
    background: var(--c-line); border-radius: 99px;
  }
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: clamp(16px, 1.8vw, 26px);
    max-width: 1080px; margin: 0 auto;
    align-items: start;
  }

  /* 문장 카드 — 무드 색조의 유리 카드 */
  .card {
    position: relative;
    border-radius: 22px;
    padding: clamp(26px, 3vw, 38px) clamp(24px, 2.8vw, 34px);
    border: 1px solid var(--c-line);
    background:
      linear-gradient(155deg,
        rgba(255,255,255,0.075) 0%,
        rgba(255,255,255,0.025) 60%,
        rgba(255,255,255,0.01) 100%);
    backdrop-filter: blur(12px) saturate(1.1);
    -webkit-backdrop-filter: blur(12px) saturate(1.1);
    cursor: pointer;
    overflow: hidden;
    /* 떠오르는 등장 */
    opacity: 0;
    transform: translateY(26px) scale(0.985);
    transition: transform 0.5s var(--ease-out),
                box-shadow 0.5s var(--ease-out),
                border-color 0.4s var(--ease-out),
                background-color 0.4s ease;
    will-change: transform, opacity;
  }
  .card.float-in {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
  /* 카드 안쪽 색 번짐 — 무드의 빛 */
  .card::before {
    content: "";
    position: absolute; inset: 0;
    background: radial-gradient(120% 90% at 14% 0%,
      var(--c-glow) 0%, transparent 52%);
    opacity: 0.16;
    transition: opacity 0.5s var(--ease-out), background var(--t-color) var(--ease-color);
    pointer-events: none;
  }
  .card:hover {
    transform: translateY(-6px) scale(1.012);
    border-color: var(--c-accent);
    box-shadow: 0 26px 60px -28px var(--c-glow);
  }
  .card:hover::before { opacity: 0.3; }
  .card:active { transform: translateY(-2px) scale(1.005); }

  .card .q-mark {
    font-size: 40px; line-height: 0.6; font-weight: 800;
    color: var(--c-accent);
    opacity: 0.5;
    display: block; height: 18px;
    transition: color var(--t-color) var(--ease-color);
  }
  .card .q-text {
    margin: 16px 0 0;
    font-size: clamp(17px, 1.9vw, 20.5px);
    line-height: 1.62; font-weight: 600;
    letter-spacing: -0.012em;
    color: var(--c-text);
    word-break: keep-all;          /* 한글 줄바꿈 */
    white-space: pre-line;         /* 시드의 \n 줄바꿈 유지 */
    transition: color var(--t-color) var(--ease-color);
  }
  .card .q-meta {
    margin-top: 20px;
    display: flex; align-items: center; gap: 9px;
    font-size: 12.5px; letter-spacing: 0.01em;
    color: var(--c-soft);
    transition: color var(--t-color) var(--ease-color);
  }
  .card .q-meta .author { font-weight: 700; color: var(--c-text); opacity: 0.92; }
  .card .q-meta .dot { opacity: 0.4; }
  .card .q-meta .work { opacity: 0.78; }
  .card .q-meta .year { opacity: 0.5; margin-left: auto; font-variant-numeric: tabular-nums; }

  /* '가까운 무드에서' 들여온 카드 표식 */
  .card .q-near {
    position: absolute; top: 16px; right: 16px;
    font-size: 10px; letter-spacing: 0.08em; font-weight: 600;
    color: var(--c-soft); opacity: 0.6;
    border: 1px solid var(--c-line);
    padding: 3px 8px; border-radius: 999px;
    background: rgba(255,255,255,0.04);
  }

  /* ============================================================
     하단 무드 셀렉터 — 큐레이션 중에도 색을 바꿀 수 있게
     ============================================================ */
  .mood-bar {
    position: fixed; left: 0; right: 0; bottom: 0;
    z-index: 5;
    display: flex; justify-content: center;
    padding: 0 16px 18px;
    pointer-events: none;
    opacity: 0; transform: translateY(14px);
    transition: opacity 0.5s var(--ease-out), transform 0.5s var(--ease-out);
  }
  body.stage-curation .mood-bar { opacity: 1; transform: translateY(0); }
  .mood-bar .track {
    pointer-events: auto;
    display: flex; align-items: center; gap: 8px;
    padding: 9px 12px;
    border-radius: 999px;
    border: 1px solid var(--c-line);
    background: rgba(20, 18, 30, 0.5);
    backdrop-filter: blur(14px) saturate(1.2);
    -webkit-backdrop-filter: blur(14px) saturate(1.2);
    max-width: 94vw; overflow-x: auto;
    scrollbar-width: none;
    transition: background-color var(--t-color) var(--ease-color),
                border-color var(--t-color) var(--ease-color);
  }
  .mood-bar .track::-webkit-scrollbar { display: none; }
  .mini {
    flex: 0 0 auto;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 7px 14px 7px 9px;
    border-radius: 999px;
    border: 1px solid transparent;
    background: transparent;
    cursor: pointer;
    font-family: inherit;
    color: var(--c-soft);
    font-size: 13px; font-weight: 600; letter-spacing: 0.01em;
    white-space: nowrap;
    transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
  }
  .mini .blob {
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--m-glow);
    box-shadow: 0 0 0 2px rgba(255,255,255,0.06), 0 0 12px -2px var(--m-glow);
    flex: 0 0 auto;
    transition: transform 0.3s var(--ease-back);
  }
  .mini:hover { color: var(--c-text); background: rgba(255,255,255,0.06); }
  .mini:hover .blob { transform: scale(1.18); }
  .mini.active {
    color: var(--c-text);
    background: rgba(255,255,255,0.10);
    border-color: var(--c-line);
  }
  .mini.active .blob { transform: scale(1.12); }

  /* ============================================================
     전문(全文) 보기 — 카드 클릭 시 모달
     ============================================================ */
  #modal {

  #modal .m-mood .mb {

  /* ============================================================
     반응형 — 모바일에서 깨지지 않게

  @media (max-width: 760px) {

  /* 모션 줄이기 선호 사용자 배려 */
  @media (prefers-reduced-motion: reduce) {

</style>
</head>
<body>
  <!-- 배경 메시 레이어들 -->
  <div id="mesh"></div>
  <div id="mesh2"></div>
  <div id="grain"></div>

  <div id="app">
    <!-- 상단 헤더 -->
    <header>
      <div class="brand">
        <span class="mark">문장 연구소</span>

      </div>
      <button class="back-btn" id="backBtn" aria-label="다른 기분으로 돌아가기">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
        다른 기분으로

    <!-- 1단계: 입장 — 무드 팔레트 -->
    <section id="enter">
      <div class="enter-lead">

        <p>고른 기분의 색으로 화면이 물들고,<br>그 색조에 어울리는 문장들이 천천히 떠오릅니다.</p>
      </div>

    <!-- 2단계: 큐레이션 — 떠오르는 문장 -->
    <section id="curation" aria-live="polite">
      <div class="cur-head">
        <div class="cur-eyebrow" id="curEyebrow">오늘의 기분</div>

      <div class="cur-scroll">

  <!-- 하단 무드 셀렉터 -->

  <div id="modal" role="dialog" aria-modal="true" aria-label="문장 전문">

      </button>
      <div class="m-mood" id="mMood"><span class="mb"></span><span id="mMoodName">그리움</span></div>
      <div class="m-q" id="mQ"></div>

        <span class="m-author" id="mAuthor"></span>
        <span class="m-work" id="mWork"></span>

<script>
/* ============================================================
   데이터 — 시드 문장 10개 (그대로 인라인)
   ============================================================ */
const SEEDS = [
  {id:1,text:"죽는 날까지 하늘을 우러러\n한 점 부끄럼이 없기를",author:"윤동주",work:"하늘과 바람과 별과 시",year:"1948",theme:"성찰",keywords:["부끄러움","양심","바람"]},
  {id:2,text:"나 보기가 역겨워 가실 때에는\n말없이 고이 보내 드리오리다",author:"김소월",work:"진달래꽃",year:"1925",theme:"이별",keywords:["이별","체념","헌신"]},
  {id:3,text:"우리는 만날 때에 떠날 것을 염려하는 것과 같이,\n떠날 때에 다시 만날 것을 믿습니다",author:"한용운",work:"님의 침묵",year:"1926",theme:"이별",keywords:["만남","이별","믿음"]},
  {id:4,text:"다시 천고의 뒤에\n백마 타고 오는 초인이 있어",author:"이육사",work:"광야",year:"1945",theme:"의지",keywords:["초인","미래","희생"]},
  {id:5,text:"박제가 되어 버린 천재를 아시오?",author:"이상",work:"날개",year:"1936",theme:"자의식",keywords:["천재","권태","근대"]},
  {id:6,text:"계절이 지나가는 하늘에는\n가을로 가득 차 있습니다",author:"윤동주",work:"하늘과 바람과 별과 시",year:"1948",theme:"자연",keywords:["가을","하늘","그리움"]},
  {id:7,text:"하루라도 책을 읽지 않으면\n입안에 가시가 돋는다",author:"안중근",work:"유묵",year:"1910",theme:"배움",keywords:["독서","수양","단련"]},
  {id:8,text:"천 리 길도\n한 걸음에서 시작된다",author:"노자",work:"도덕경",year:"고전",theme:"배움",keywords:["시작","한걸음","축적"]},
  {id:9,text:"문장은 끝내기 위해서가 아니라,\n멈추는 법을 배우기 위해 쓴다",author:"새김 편집부",work:"쉼표의 자리",year:"2024",theme:"쓰기",keywords:["문장","멈춤","여백"]},
  {id:10,text:"모든 책은 첫 문장에서 한 번,\n마지막 문장에서 다시 태어난다",author:"새김 편집부",work:"첫 문장의 무게",year:"2025",theme:"쓰기",keywords:["첫문장","끝문장","탄생"]}
];

/* ============================================================
   무드 정의 — 감정-색 6개
   각 무드는 고유 색조 팔레트(메시 슬롯)와,
   '핵심 theme' + '가까운(이웃) theme' 을 가진다.
   한 무드에 문장이 적으면 이웃 theme 에서 들여와 채운다.
   ============================================================ */
const MOODS = [
  {
    key:"longing", name:"그리움", colorName:"남보라 · INDIGO",
    desc:"닿지 못한 것을 향해 마음이 천천히 번지는, 푸른 저녁의 색.",
    core:["이별"], near:["자연"],
    pal:{ bg:"#0d0a1a", deep:"#1b1440", mid:"#3a2a72", glow:"#6f50b3", spark:"#b78fde",
          text:"#efe9ff", soft:"#c5b8ea", accent:"#d9b3ff", line:"rgba(220,200,255,0.20)" }
  },
  {
    key:"calm", name:"평온", colorName:"세이지 · SAGE",
    desc:"숨이 길어지는 색. 서두르지 않아도 되는, 잎이 마른 정원의 고요.",
    core:["자연"], near:["성찰"],
    pal:{ bg:"#0a1410", deep:"#143226", mid:"#2f6b52", glow:"#5aa888", spark:"#a8d8bf",
          text:"#eafff5", soft:"#bfe6d4", accent:"#9fe9c6", line:"rgba(200,255,230,0.18)" }
  },
  {
    key:"resolve", name:"결연", colorName:"짙은 적 · CRIMSON",
    desc:"물러서지 않겠다고 다짐할 때의 색. 어둠 속에서 더 또렷해지는 불씨.",
    core:["의지"], near:["배움"],
    pal:{ bg:"#170a0c", deep:"#3a1217", mid:"#76202b", glow:"#b53a47", spark:"#e88a8f",
          text:"#fff0ef", soft:"#eac3c2", accent:"#ff9d9d", line:"rgba(255,200,200,0.18)" }
  },
  {
    key:"reverie", name:"사색", colorName:"청록 · TEAL",
    desc:"멈춰서 자신을 들여다보는 색. 깊은 물밑처럼 차분하고 또렷한 자각.",
    core:["자의식","쓰기"], near:["성찰"],
    pal:{ bg:"#08151a", deep:"#0f3340", mid:"#1f6b7e", glow:"#3ea3b8", spark:"#8fd6e3",
          text:"#eafbff", soft:"#bfe4ec", accent:"#9fe2ef", line:"rgba(200,245,255,0.18)" }
  },
  {
    key:"stillness", name:"고요", colorName:"회청 · SLATE",
    desc:"부끄럼 없이 자신을 비추는 색. 새벽 하늘처럼 맑고 가라앉은 자기 성찰.",
    core:["성찰"], near:["자연","쓰기"],
    pal:{ bg:"#0b1018", deep:"#16202f", mid:"#33455f", glow:"#5d7398", spark:"#a7bcd9",
          text:"#eef3fb", soft:"#c3cfe0", accent:"#b8cdec", line:"rgba(210,225,245,0.18)" }
  },
  {
    key:"fullness", name:"충만", colorName:"황금 · GOLD",
    desc:"한 걸음씩 채워질 때의 색. 오래 쌓인 것에서 배어 나오는 따뜻한 빛.",
    core:["배움"], near:["쓰기"],
    pal:{ bg:"#1a1206", deep:"#3a2a0c", mid:"#7a5a18", glow:"#c79232", spark:"#f0cf7e",
          text:"#fff8ea", soft:"#ecd9b0", accent:"#ffd98a", line:"rgba(255,230,180,0.18)" }
  }
];

/* ============================================================
   무드별 문장 큐레이션
   - 핵심 theme 문장을 먼저, 그다음 이웃 theme 문장(표식과 함께)
   - 이웃 문장은 'near=true' 로 구분
   ============================================================ */
function curateFor(mood) {
  const seen = new Set();
  const list = [];
  // 1) 핵심 theme
  for (const t of mood.core) {
    for (const s of SEEDS) {
      if (s.theme === t && !seen.has(s.id)) { seen.add(s.id); list.push({ s, near:false }); }
    }
  }
  // 2) 이웃 theme (핵심이 적을 때 가까운 무드에서 들여옴)
  for (const t of mood.near) {
    for (const s of SEEDS) {
      if (s.theme === t && !seen.has(s.id)) { seen.add(s.id); list.push({ s, near:true }); }
    }
  }
  return list;
}

/* ============================================================
   색 적용 — 루트 CSS 변수를 무드 팔레트로 교체
   (transition 이 걸려 있어 자동으로 부드럽게 크로스페이드)
   ============================================================ */
function applyMoodColors(mood) {
  const r = document.documentElement.style;
  const p = mood.pal;
  r.setProperty("--c-bg",     p.bg);
  r.setProperty("--c-deep",   p.deep);
  r.setProperty("--c-mid",    p.mid);
  r.setProperty("--c-glow",   p.glow);
  r.setProperty("--c-spark",  p.spark);
  r.setProperty("--c-text",   p.text);
  r.setProperty("--c-soft",   p.soft);
  r.setProperty("--c-accent", p.accent);
  r.setProperty("--c-line",   p.line);
  // 모바일 브라우저 테마 컬러도 맞춰줌
  let meta = document.querySelector('meta[name="theme-color"]');
  if (!meta) { meta = document.createElement('meta'); meta.name = 'theme-color'; document.head.appendChild(meta); }
  meta.content = p.bg;
}

/* ============================================================
   DOM 빌드 — 팔레트(스와치) & 하단 미니 셀렉터
   ============================================================ */
const paletteEl = document.getElementById('palette');
const trackEl = document.getElementById('moodTrack');

MOODS.forEach((m, i) => {
  const count = curateFor(m).length;

  // --- 1단계 큰 스와치 ---
  const sw = document.createElement('button');
  sw.className = 'swatch';
  sw.style.setProperty('--i', i);
  // 스와치 자체 메시색
  sw.style.setProperty('--s-bg', m.pal.bg);
  sw.style.setProperty('--s-deep', m.pal.deep);
  sw.style.setProperty('--s-mid', m.pal.mid);
  sw.style.setProperty('--s-glow', m.pal.glow);
  sw.setAttribute('role', 'option');
  sw.setAttribute('aria-label', `${m.name} 기분 고르기`);
  sw.innerHTML = `
    <div class="sw-mesh"></div>
    <span class="sw-count">${count}편</span>
    <span class="sw-label">
      <span class="sw-name">${m.name}</span>
      <span class="sw-color">${m.colorName}</span>
    </span>`;
  sw.addEventListener('click', () => selectMood(m.key));
  // 호버만 해도 배경이 살짝 그 무드로 미리보기되게 (감각적 디테일)
  sw.addEventListener('pointerenter', () => { if (!isCuration) previewColors(m); });
  sw.addEventListener('pointerleave', () => { if (!isCuration) clearPreview(); });
  paletteEl.appendChild(sw);

  // --- 하단 미니 셀렉터 ---
  const mini = document.createElement('button');
  mini.className = 'mini';
  mini.dataset.key = m.key;
  mini.style.setProperty('--m-glow', m.pal.glow);
  mini.innerHTML = `<span class="blob"></span>${m.name}`;
  mini.addEventListener('click', () => selectMood(m.key));
  trackEl.appendChild(mini);
});

/* ============================================================
   미리보기 — 입장 화면에서 스와치에 호버하면
   배경을 그 무드색으로 살짝 당겨와 '예고'한다.
   (선택 전이므로 기본은 첫 무드색으로 복귀)
   ============================================================ */
let isCuration = false;
let currentKey = null;
const DEFAULT_PREVIEW = MOODS[0]; // 입장 기본 배경

function previewColors(mood) { applyMoodColors(mood); }
function clearPreview() { applyMoodColors(DEFAULT_PREVIEW); }

/* ============================================================
   무드 선택 → 큐레이션 단계로
   ============================================================ */
const body = document.body;
const cardsEl = document.getElementById('cards');
const curMoodEl = document.getElementById('curMood');
const curDescEl = document.getElementById('curDesc');
const curEyebrowEl = document.getElementById('curEyebrow');

function selectMood(key) {
  const mood = MOODS.find(m => m.key === key);
  if (!mood) return;
  currentKey = key;

  // 1) 색 전환 (부드러운 크로스페이드)
  applyMoodColors(mood);

  // 2) 헤드라인 갱신
  curMoodEl.textContent = mood.name;
  curDescEl.textContent = mood.desc;
  curEyebrowEl.textContent = `오늘의 기분 · ${mood.colorName.split(' · ')[0]}`;

  // 3) 미니 셀렉터 활성 표시
  document.querySelectorAll('.mini').forEach(b => {
    b.classList.toggle('active', b.dataset.key === key);
  });

  // 4) 단계 전환
  if (!isCuration) {
    isCuration = true;
    body.classList.add('stage-curation');
  }

  // 5) 카드 렌더 (크로스페이드: 기존 카드 먼저 사라지게 한 뒤 새로 채움)
  renderCards(mood);
}

/* ============================================================
   카드 렌더 — 떠오르는 문장들
   무드 전환 시 기존 카드를 페이드아웃 후 교체해 크로스페이드 느낌.
   ============================================================ */
let renderToken = 0;
function renderCards(mood) {
  const token = ++renderToken;     // 빠른 연속 전환 시 경쟁 방지
  const items = curateFor(mood);

  // 기존 카드가 있으면 먼저 사라지게
  const existing = Array.from(cardsEl.children);
  if (existing.length) {
    existing.forEach((c, i) => {
      c.classList.remove('float-in');
      c.style.transitionDelay = (i * 0.02) + 's';
    });
  }

  const buildDelay = existing.length ? 360 : 0; // 페이드아웃 시간 확보

  setTimeout(() => {
    if (token !== renderToken) return; // 더 최신 전환이 있으면 중단
    cardsEl.innerHTML = '';

    items.forEach(({ s, near }, idx) => {
      const card = document.createElement('article');
      card.className = 'card';
      const meta = `
        <div class="q-meta">
          <span class="author">${s.author}</span>
          <span class="dot">·</span>
          <span class="work">${s.work}</span>
          <span class="year">${s.year}</span>
        </div>`;
      const nearTag = near ? `<span class="q-near">가까운 기분에서</span>` : '';
      card.innerHTML = `
        ${nearTag}
        <span class="q-mark">&ldquo;</span>
        <p class="q-text">${s.text}</p>
        ${meta}`;
      card.addEventListener('click', () => openModal(s, mood));
      cardsEl.appendChild(card);

      // 순차적으로 떠오르게
      requestAnimationFrame(() => {
        setTimeout(() => {
          card.style.transitionDelay = (idx * 0.075) + 's';
          card.classList.add('float-in');
        }, 20);
      });
    });
  }, buildDelay);
}

/* ============================================================
   "다른 기분으로" — 입장 화면으로 복귀
   ============================================================ */
document.getElementById('backBtn').addEventListener('click', () => {
  isCuration = false;
  body.classList.remove('stage-curation');
  currentKey = null;
  document.querySelectorAll('.mini').forEach(b => b.classList.remove('active'));
  // 배경은 기본 미리보기색으로 부드럽게 복귀
  applyMoodColors(DEFAULT_PREVIEW);
  // 카드 비우기(전환 끝난 뒤)
  setTimeout(() => { if (!isCuration) cardsEl.innerHTML = ''; }, 600);
});

/* ============================================================
   전문 보기 모달
   ============================================================ */
const modal = document.getElementById('modal');
const mQ = document.getElementById('mQ');
const mAuthor = document.getElementById('mAuthor');
const mWork = document.getElementById('mWork');
const mYear = document.getElementById('mYear');
const mKeys = document.getElementById('mKeys');
const mMoodName = document.getElementById('mMoodName');

function openModal(s, mood) {
  mQ.textContent = s.text;
  mAuthor.textContent = s.author;
  mWork.textContent = '『' + s.work + '』';
  mYear.textContent = s.year;
  mMoodName.textContent = mood.name;
  mKeys.innerHTML = s.keywords.map(k => `<span class="key">#${k}</span>`).join('');
  modal.classList.add('open');
}
function closeModal() { modal.classList.remove('open'); }
modal.querySelectorAll('[data-close]').forEach(el => el.addEventListener('click', closeModal));
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* ============================================================
   초기 상태 — 입장 화면. 기본 배경색을 첫 무드로 세팅.
   ============================================================ */
applyMoodColors(DEFAULT_PREVIEW);
</script>
</body>
</html>
