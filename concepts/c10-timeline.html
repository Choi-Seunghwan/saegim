<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>문장의 연대기 · 문장 연구소</title>
<!-- 유일한 외부 의존: Pretendard 폰트 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css" />
<style>
  /* ============================================================
     문장의 연대기 (C10) — Timeline
     1910년대부터 오늘까지, 시간축을 거닐며 한국어 문장의 결이
     변해온 길을 따라간다. 가로 타임라인을 스크롤/드래그/휠로
     이동하면, 화면 중앙에 온 문장이 크게 떠오르고 양옆은 흐려진다.
     스크롤 위치(시간)에 따라 배경 톤이 세피아 → 맑은 현대로 바뀐다.
     무드: 시간 여행. 차분하고 사료적인 우아함.
     ============================================================ */

  :root {
    /* ---- 잉크/타이포 (시대 톤이 위에서 덮어씀) ---- */
    --ink:        #2b2620;   /* 본문 잉크 */
    --ink-soft:   #6a6055;   /* 약한 잉크(메타) */
    --ink-faint:  #9a8f7f;   /* 더 옅은 회갈색 */
    --accent:     #a8612f;   /* 포인트 — 따뜻한 적갈(앤티크) */

    /* ---- 배경: 시대별로 JS가 끼워 넣는 색 변수 ---- */
    --bg-top:     #e9dcc2;
    --bg-bot:     #d8c6a4;
    --bg-glow:    #f6ecd6;
    --paper-grain: 92, 74, 48;  /* 종이 결 색(rgb) */

    /* ---- 타임라인 축 ---- */
    --rail:       rgba(74, 60, 42, 0.28);   /* 가로 레일 */
    --tick:       rgba(74, 60, 42, 0.34);   /* 눈금 */
    --tick-faint: rgba(74, 60, 42, 0.16);   /* 잔눈금 */
    --node:       rgba(74, 60, 42, 0.55);   /* 노드 점 */

    /* ---- 모션 타이밍 — 시간 여행의 호흡 ---- */
    --ease-out:   cubic-bezier(0.16, 0.84, 0.30, 1);
    --ease-soft:  cubic-bezier(0.40, 0.00, 0.20, 1);
    --ease-back:  cubic-bezier(0.34, 1.30, 0.46, 1);

    /* ---- 유리 칩(상단 UI) ---- */
    --glass:      rgba(255, 253, 247, 0.50);
    --glass-line: rgba(90, 74, 50, 0.18);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0; padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;                  /* 자체 가로 이동만 사용 */
    font-family: "Pretendard", system-ui, sans-serif;
    color: var(--ink);
    background: #d8c6a4;
    overscroll-behavior: none;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* ============================================================
     무대 — 배경 / 트랙(스크롤) / 고정 오버레이가 겹쳐 있다
     ============================================================ */
  #stage {
    position: fixed;
    inset: 0;
    overflow: hidden;
    touch-action: pan-y;               /* 가로 제스처는 직접 처리 */
    cursor: grab;
  }
  #stage.dragging { cursor: grabbing; }

  /* ---------- 배경 레이어 — 시대 톤 그라데이션 ---------- */
  #bg {
    position: absolute;
    inset: 0;
    z-index: 0;
    /* 빛(위쪽 글로우) + 바탕(세로 그라데이션)을 겹쳐 깊이를 준다.
       세 색 변수는 JS가 시간 위치에 따라 보간해 매 프레임 바꿔 넣는다. */
    background:
      radial-gradient(135% 100% at 50% 8%,
        var(--bg-glow) 0%, transparent 58%),
      linear-gradient(176deg,
        var(--bg-top) 0%, var(--bg-bot) 100%);
  }
  /* 종이 결(아주 옅은 사선) — 과거일수록 또렷, 현재로 갈수록 옅어짐.
     불투명도는 JS가 --grain-opacity로 조절. */
  #bg::after {
    content: "";
    position: absolute; inset: -8%;
    background-image:
      repeating-linear-gradient(122deg,
        rgba(var(--paper-grain), 0) 0px,
        rgba(var(--paper-grain), 0.030) 1px,
        rgba(var(--paper-grain), 0) 3px),
      repeating-linear-gradient(34deg,
        rgba(var(--paper-grain), 0) 0px,
        rgba(var(--paper-grain), 0.018) 1px,
        rgba(var(--paper-grain), 0) 4px);
    opacity: var(--grain-opacity, 0.7);
    pointer-events: none;
    transition: opacity 0.6s var(--ease-soft);
    mix-blend-mode: multiply;
  }
  /* 비네트 — 과거일수록 짙게 모서리를 감싸 사료적 분위기 */
  #vignette {
    position: absolute; inset: 0; z-index: 1;
    pointer-events: none;
    background: radial-gradient(120% 120% at 50% 46%,
      transparent 52%, rgba(46, 34, 18, var(--vig, 0.20)) 100%);
    transition: background 0.6s var(--ease-soft);
  }

  /* ---------- 패럴랙스 배경 글자(연대) — 아주 큰 워터마크 ---------- */
  #parallax-year {
    position: absolute;
    z-index: 1;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -54%);
    font-size: clamp(180px, 34vw, 460px);
    font-weight: 800;
    letter-spacing: -0.04em;
    color: rgba(var(--paper-grain), 0.060);
    user-select: none;
    pointer-events: none;
    white-space: nowrap;
    transition: color 0.5s var(--ease-soft);
    will-change: transform, opacity;
  }

  /* ============================================================
     트랙 — 노드들이 연도 위치에 절대배치된 가로 띠
     JS가 transform: translateX 로 통째로 민다(중앙 정렬).
     ============================================================ */
  #track-clip {
    position: absolute;
    inset: 0;
    z-index: 2;
    overflow: hidden;
  }
  #track {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    will-change: transform;
  }

  /* ---------- 가로 레일(시간선) ---------- */
  #rail {
    position: absolute;
    top: 50%;
    left: 0;
    height: 2px;
    transform: translateY(-50%);
    background: linear-gradient(90deg,
      transparent 0, var(--rail) 3%, var(--rail) 97%, transparent 100%);
    z-index: 1;
  }

  /* ---------- 연도 눈금(10년 단위) ---------- */
  .tick {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;
    pointer-events: none;
  }
  .tick .line {
    position: absolute;
    left: 50%;
    top: -7px;
    width: 1px; height: 14px;
    transform: translateX(-50%);
    background: var(--tick);
  }
  .tick.minor .line { height: 8px; top: -4px; background: var(--tick-faint); }
  .tick .lbl {
    position: absolute;
    left: 50%;
    top: 16px;
    transform: translateX(-50%);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--ink-faint);
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }

  /* ---------- 시대 구간 라벨(레일 위 넓은 띠) ---------- */
  .era-band {
    position: absolute;
    top: calc(50% - 96px);
    transform: translateY(-50%);
    z-index: 1;
    text-align: center;
    pointer-events: none;
  }
  .era-band .era-name {
    font-size: clamp(13px, 1.4vw, 16px);
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--ink-soft);
    white-space: nowrap;
    word-break: keep-all;
  }
  .era-band .era-sub {
    margin-top: 3px;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-faint);
    white-space: nowrap;
  }
  .era-band .era-line {
    margin: 9px auto 0;
    width: 60%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--tick-faint) 30%, var(--tick-faint) 70%, transparent);
  }

  /* ============================================================
     노드 — 한 문장. 레일 위 점 + 그 위로 떠 있는 카드.
     중앙(active)일 때 크게 부각, 멀수록 작고 흐리게.
     ============================================================ */
  .node {
    position: absolute;
    top: 50%;
    z-index: 3;
    /* 좌우 위치는 인라인 left, 세로는 레일 중앙 기준 */
    transform: translate(-50%, -50%);
  }

  /* 레일 위 노드 점 */
  .node .dot {
    position: absolute;
    left: 50%;
    top: 0;
    transform: translate(-50%, -50%);
    width: 11px; height: 11px;
    border-radius: 50%;
    background: #5a4a32;          /* 잉크빛 노드 점(비활성) */
    box-shadow: 0 0 0 5px rgba(255,253,247,0.35);
    transition: transform 0.5s var(--ease-back), background 0.5s var(--ease-soft), box-shadow 0.5s;
  }
  .node .dot::after {            /* 점에서 카드로 잇는 가는 세로선 */
    content: "";
    position: absolute;
    left: 50%; bottom: 100%;
    width: 1px; height: 30px;
    transform: translateX(-50%);
    background: linear-gradient(180deg, transparent, var(--tick));
    opacity: 0;
    transition: opacity 0.5s var(--ease-soft);
  }
  .node.active .dot {
    width: 15px; height: 15px;
    background: var(--accent);
    box-shadow: 0 0 0 6px rgba(255,253,247,0.40), 0 0 22px 2px var(--accent-glow, rgba(168,97,47,0.35));
  }
  .node.active .dot::after { opacity: 0.7; }

  /* 문장 카드 — 점 위에 떠 있음 */
  .node .card {
    position: absolute;
    left: 50%;
    bottom: 42px;                    /* 점 위로 띄움 */
    transform: translateX(-50%);
    width: clamp(280px, 40vw, 560px);
    text-align: center;
    /* 중앙에서 멀어질수록 작아지고 흐려진다 — JS가 --p(거리 0~1)로 제어.
       scale/opacity/blur 를 거리 비례로 적용해 '포커스'를 만든다. */
    --p: 1;
    opacity: calc(1 - var(--p) * 0.78);
    filter: blur(calc(var(--p) * 3.2px));
    transform: translateX(-50%) translateY(calc(var(--p) * 14px)) scale(calc(1 - var(--p) * 0.34));
    transition:
      opacity 0.55s var(--ease-soft),
      filter 0.55s var(--ease-soft),
      transform 0.6s var(--ease-out);
    transform-origin: 50% 100%;
    pointer-events: none;
    will-change: transform, opacity, filter;
  }

  /* 연도 배지(카드 머리) */
  .card .year {
    display: inline-block;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    font-variant-numeric: tabular-nums;
    color: var(--accent);
    margin-bottom: 14px;
    padding: 3px 11px;
    border: 1px solid var(--accent);
    border-radius: 999px;
    background: rgba(255,253,247,0.30);
    opacity: 0.92;
  }

  /* 문장 본문 — 시대를 부각하는 큰 타이포 */
  .card .quote {
    font-size: clamp(20px, 2.5vw, 34px);
    line-height: 1.52;
    letter-spacing: -0.026em;
    font-weight: 600;
    color: var(--q-ink, var(--ink));
    white-space: pre-line;           /* 시드의 \n 줄바꿈 유지 */
    word-break: keep-all;            /* 한글 어절 단위 줄바꿈 */
    text-wrap: balance;
    margin: 0;
    text-shadow: 0 1px 0 rgba(255,255,255,0.20);
  }
  /* 활성 노드는 더 크고 또렷하게 */
  .node.active .card .quote {
    font-size: clamp(26px, 3.6vw, 50px);
  }

  /* 메타(저자·출처) */
  .card .meta {
    margin-top: 20px;
    font-size: clamp(12px, 1.1vw, 15px);
    color: var(--ink-soft);
    letter-spacing: 0.01em;
    word-break: keep-all;
  }
  .card .meta .author { font-weight: 700; color: var(--ink); }
  .card .meta .sep { margin: 0 8px; color: var(--ink-faint); }
  .card .meta .work { font-style: normal; }

  /* 키워드 칩 — 활성일 때만 부드럽게 등장 */
  .card .kw {
    margin-top: 18px;
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.6s var(--ease-soft) 0.15s, transform 0.6s var(--ease-out) 0.15s;
  }
  .node.active .card .kw { opacity: 1; transform: translateY(0); }
  .card .kw span {
    font-size: 11.5px;
    letter-spacing: 0.02em;
    color: var(--ink-soft);
    padding: 4px 10px;
    border-radius: 999px;
    border: 1px solid var(--glass-line);
    background: var(--glass);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }

  /* ============================================================
     고정 오버레이 UI (스크롤과 무관)
     ============================================================ */
  /* ---- 상단 브랜드/시대 표시 ---- */
  #topbar {
    position: absolute;
    z-index: 8;
    top: 26px; left: 0; right: 0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 0 clamp(20px, 4vw, 48px);
    pointer-events: none;
  }
  .brand {
    pointer-events: auto;
  }
  .brand .kr {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.01em;
    color: var(--ink);
  }
  .brand .en {
    margin-top: 2px;
    font-size: 11px;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }
  /* 우상단: 현재 시대/연도 큰 표시 */
  #era-readout {
    text-align: right;
    pointer-events: none;
  }
  #era-readout .now-year {
    font-size: clamp(34px, 5vw, 56px);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
    transition: color 0.5s var(--ease-soft);
  }
  #era-readout .now-era {
    margin-top: 6px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--ink-soft);
    word-break: keep-all;
    min-height: 1.2em;
  }

  /* ---- 현재 위치 인디케이터(중앙 세로 가이드) ---- */
  #playhead {
    position: absolute;
    z-index: 4;
    left: 50%;
    top: 0; bottom: 0;
    width: 0;
    transform: translateX(-50%);
    pointer-events: none;
  }
  #playhead::before {       /* 레일 위 작은 ▽ 표식 */
    content: "";
    position: absolute;
    left: 50%;
    top: calc(50% - 26px);
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
    border-top: 8px solid var(--accent);
    opacity: 0.85;
  }
  #playhead::after {        /* 중앙 아주 옅은 빛 기둥 */
    content: "";
    position: absolute;
    left: 50%;
    top: 12%; bottom: 12%;
    width: 220px;
    transform: translateX(-50%);
    background: radial-gradient(closest-side,
      rgba(255,250,238,0.16), transparent 72%);
  }

  /* ---- 하단: 시대 점프 버튼 + 진행 게이지 ---- */
  #bottombar {
    position: absolute;
    z-index: 8;
    left: 0; right: 0;
    bottom: 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    pointer-events: none;
  }
  #jumps {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 0 16px;
    pointer-events: auto;
  }
  .jump-btn {
    font-family: inherit;
    font-size: 12.5px;
    font-weight: 600;
    letter-spacing: 0.01em;
    color: var(--ink-soft);
    background: var(--glass);
    border: 1px solid var(--glass-line);
    border-radius: 999px;
    padding: 8px 15px;
    cursor: pointer;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    white-space: nowrap;
    word-break: keep-all;
    transition: color 0.25s, background 0.25s, border-color 0.25s, transform 0.25s var(--ease-back);
  }
  .jump-btn:hover { color: var(--ink); transform: translateY(-2px); }
  .jump-btn.active {
    color: #fff;
    background: var(--accent);
    border-color: var(--accent);
  }

  /* 하단 진행 게이지(전체 타임라인 중 현재 위치) */
  #gauge {
    position: relative;
    width: min(560px, 72vw);
    height: 3px;
    border-radius: 3px;
    background: var(--tick-faint);
    overflow: visible;
  }
  #gauge-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 0%;
    background: var(--accent);
    border-radius: 3px;
  }
  #gauge-knob {
    position: absolute;
    top: 50%;
    left: 0%;
    width: 11px; height: 11px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 4px rgba(255,253,247,0.5);
    transform: translate(-50%, -50%);
  }

  /* ---- 좌우 화살표 힌트 ---- */
  .edge-hint {
    position: absolute;
    z-index: 6;
    top: 50%;
    transform: translateY(-50%);
    font-size: 13px;
    letter-spacing: 0.04em;
    color: var(--ink-faint);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
    display: flex;
    align-items: center;
    gap: 6px;
    user-select: none;
  }
  .edge-hint.show { opacity: 0.7; }
  .edge-hint.left { left: clamp(16px, 3vw, 40px); }
  .edge-hint.right { right: clamp(16px, 3vw, 40px); }

  /* ---- 도입 안내(처음 한 번) ---- */
  #intro {
    position: absolute;
    z-index: 9;
    left: 50%;
    bottom: 96px;
    transform: translateX(-50%);
    font-size: 13px;
    letter-spacing: 0.02em;
    color: var(--ink-soft);
    background: var(--glass);
    border: 1px solid var(--glass-line);
    border-radius: 999px;
    padding: 9px 18px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    pointer-events: none;
    white-space: nowrap;
    transition: opacity 0.7s var(--ease-soft);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #intro.hide { opacity: 0; }
  #intro .pulse {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; transform: scale(0.85); }
    50% { opacity: 1; transform: scale(1.15); }
  }

  /* ============================================================
     반응형 — 모바일
     ============================================================ */
  @media (max-width: 720px) {
    .node .card { width: clamp(240px, 82vw, 420px); bottom: 38px; }
    .node.active .card .quote { font-size: clamp(22px, 6.6vw, 34px); }
    .card .quote { font-size: clamp(17px, 4.6vw, 24px); }
    #era-readout .now-year { font-size: clamp(28px, 9vw, 40px); }
    #parallax-year { font-size: clamp(150px, 52vw, 300px); }
    .era-band { top: calc(50% - 78px); }
    .era-band .era-name { font-size: 12px; }
    #topbar { top: 18px; padding: 0 18px; }
    #bottombar { bottom: 16px; gap: 10px; }
    .jump-btn { font-size: 11.5px; padding: 7px 12px; }
    .edge-hint { display: none; }
    #intro { bottom: 88px; font-size: 12px; white-space: normal; max-width: 84vw; text-align: center; }
  }
  @media (max-width: 380px) {
    #jumps { gap: 6px; }
    .jump-btn { font-size: 11px; padding: 6px 10px; }
  }

  /* 모션 최소화 선호 사용자 배려 */
  @media (prefers-reduced-motion: reduce) {
    * { transition-duration: 0.001ms !important; }
  }
</style>
</head>
<body>
  <div id="stage">
    <!-- 시대 톤 배경 -->
    <div id="bg"></div>
    <div id="vignette"></div>
    <!-- 패럴랙스 워터마크 연도(현재 구간 대표 연도) -->
    <div id="parallax-year">1948</div>

    <!-- 스크롤되는 트랙 -->
    <div id="track-clip">
      <div id="track">
        <div id="rail"></div>
        <!-- 눈금/시대밴드/노드는 JS가 채움 -->
      </div>
    </div>

    <!-- 중앙 현재 위치 인디케이터 -->
    <div id="playhead"></div>

    <!-- 좌우 힌트 -->
    <div class="edge-hint left" id="hintL">‹ 과거</div>
    <div class="edge-hint right" id="hintR">미래 ›</div>

    <!-- 상단 바 -->
    <div id="topbar">
      <div class="brand">
        <div class="kr">문장의 연대기</div>
        <div class="en">Chronicle of Sentences</div>
      </div>
      <div id="era-readout">

    <!-- 도입 안내 -->
    <div id="intro"><span class="pulse"></span>휠 · 드래그 · 화살표로 시간을 거니세요</div>
  </div>

<script>
/* ============================================================
   데이터 — 시드 문장 10개 (그대로 인라인)
   ============================================================ */
const SENTENCES = [
  {id:1,text:"죽는 날까지 하늘을 우러러\n한 점 부끄럼이 없기를",author:"윤동주",work:"하늘과 바람과 별과 시",year:"1948",theme:"성찰",keywords:["부끄러움","양심","바람"]},
  {id:2,text:"나 보기가 역겨워 가실 때에는\n말없이 고이 보내 드리오리다",author:"김소월",work:"진달래꽃",year:"1925",theme:"이별",keywords:["이별","체념","헌신"]},
  {id:3,text:"우리는 만날 때에 떠날 것을 염려하는 것과 같이,\n떠날 때에 다시 만날 것을 믿습니다",author:"한용운",work:"님의 침묵",year:"1926",theme:"이별",keywords:["만남","이별","믿음"]},
  {id:4,text:"다시 천고의 뒤에\n백마 타고 오는 초인이 있어",author:"이육사",work:"광야",year:"1945",theme:"의지",keywords:["초인","미래","희생"]},
  {id:5,text:"박제가 되어 버린 천재를 아시오?",author:"이상",work:"날개",year:"1936",theme:"자의식",keywords:["천재","권태","근대"]},
  {id:6,text:"계절이 지나가는 하늘에는\n가을로 가득 차 있습니다",author:"윤동주",work:"하늘과 바람과 별과 시",year:"1948",theme:"자연",keywords:["가을","하늘","그리움"]},
  {id:7,text:"하루라도 책을 읽지 않으면\n입안에 가시가 돋는다",author:"안중근",work:"유묵",year:"1910",theme:"배움",keywords:["독서","수양","단련"]},
  {id:8,text:"천 리 길도\n한 걸음에서 시작된다",author:"노자",work:"도덕경",year:"고전",theme:"배움",keywords:["시작","한걸음","축적"]},
  {id:9,text:"문장은 끝내기 위해서가 아니라,\n멈추는 법을 배우기 위해 쓴다",author:"새김 편집부",work:"쉼표의 자리",year:"2024",theme:"쓰기",keywords:["문장","멈춤","여백"]},
  {id:10,text:"모든 책은 첫 문장에서 한 번,\n마지막 문장에서 다시 태어난다",author:"새김 편집부",work:"첫 문장의 무게",year:"2025",theme:"쓰기",keywords:["첫문장","끝문장","탄생"]}
];

/* ============================================================
   시대 구간 정의 — 점프 버튼 & 배경 톤의 기준
   classic 구간은 타임라인 맨 앞에 별도 좌표로 둔다.
   ============================================================ */
const ERAS = [
  { key:"classic", label:"고전", sub:"Classic", from:null,  to:null,  jump:"고전" },
  { key:"e1910",   label:"개화·구국기", sub:"1900s–10s", from:1905, to:1919, jump:"1910s" },
  { key:"e1920",   label:"근대문학", sub:"1920s–30s", from:1920, to:1939, jump:"1920–30s" },
  { key:"e1940",   label:"저항·해방기", sub:"1940s", from:1940, to:1949, jump:"1940s" },
  { key:"e2020",   label:"동시대 출판", sub:"2020s", from:2020, to:2026, jump:"2020s" }
];

/* ============================================================
   배경 톤 키프레임 — 시간(정규화 0~1)에 따라 보간.
   과거(0): 짙은 세피아/바랜 종이.  현재(1): 맑고 밝은 미색.
   각 stop은 [pos, {top,bot,glow,grain,vig}] — 색은 [r,g,b].
   ============================================================ */
const TONE_STOPS = [
  // 고전(맨 왼쪽) — 가장 깊은 고동/누런 한지
  { pos:0.00, top:[214,190,150], bot:[176,146,104], glow:[230,210,168], grain:0.95, vig:0.30, accent:[150,86,40] },
  // 1910s — 바랜 세피아
  { pos:0.18, top:[224,202,166], bot:[192,164,122], glow:[238,220,180], grain:0.88, vig:0.26, accent:[158,90,42] },
  // 1920–30s 근대 — 누런 종이가 살짝 밝아짐
  { pos:0.42, top:[231,213,180], bot:[205,180,142], glow:[244,229,192], grain:0.78, vig:0.22, accent:[166,96,46] },
  // 1940s 저항·해방 — 미색으로 전환되는 길목
  { pos:0.60, top:[235,221,193], bot:[214,193,159], glow:[248,236,205], grain:0.66, vig:0.18, accent:[172,100,48] },
  // 중간(공백기) — 점점 맑게
  { pos:0.78, top:[239,231,212], bot:[221,206,179], glow:[250,242,222], grain:0.50, vig:0.13, accent:[176,104,52] },
  // 2020s 동시대 — 맑고 밝은 아이보리, 결도 옅게
  { pos:1.00, top:[245,242,233], bot:[228,221,206], glow:[253,250,243], grain:0.34, vig:0.08, accent:[182,110,58] }
];

/* ============================================================
   타임라인 좌표계
   - classic 구간을 맨 앞에 고정 폭으로 두고,
   - 그 뒤로 minYear~maxYear 를 픽셀로 매핑한다.
   ============================================================ */
const MIN_YEAR = 1910;        // 축 시작
const MAX_YEAR = 2026;        // 축 끝(여유)
let PX_PER_YEAR = 150;        // 1년당 픽셀(데스크탑 기본, 리사이즈 시 조정)
const CLASSIC_W = 360;        // 고전 구간 폭(px)
const PAD_LEFT  = 280;        // 트랙 좌측 진입 여백
const PAD_RIGHT = 280;        // 트랙 우측 여백

// 좌표 변환: 연도 → 트랙 내 x(px). classic은 별도 처리.
function yearToX(year) {
  return PAD_LEFT + CLASSIC_W + (year - MIN_YEAR) * PX_PER_YEAR;
}
const CLASSIC_X = PAD_LEFT + CLASSIC_W * 0.5;   // 고전 노드 x
function trackWidth() {
  return PAD_LEFT + CLASSIC_W + (MAX_YEAR - MIN_YEAR) * PX_PER_YEAR + PAD_RIGHT;
}

/* ============================================================
   상태
   ============================================================ */
const stage   = document.getElementById('stage');
const track   = document.getElementById('track');
const bg      = document.getElementById('bg');
const vig     = document.getElementById('vignette');
const pxYear  = document.getElementById('parallax-year');
const nowYearEl = document.getElementById('nowYear');
const nowEraEl  = document.getElementById('nowEra');
const gaugeFill = document.getElementById('gauge-fill');
const gaugeKnob = document.getElementById('gauge-knob');
const jumpsEl   = document.getElementById('jumps');
const introEl   = document.getElementById('intro');
const hintL = document.getElementById('hintL');
const hintR = document.getElementById('hintR');

let nodes = [];               // {data, el, x, x:연도좌표}
let scrollX = 0;              // 현재 스크롤 위치(트랙 x, '중앙에 오는 지점')
let targetX = 0;              // 목표 스크롤(부드러운 추적)
let minScroll = 0, maxScroll = 0;
let viewW = window.innerWidth, viewH = window.innerHeight;
let interacted = false;
let rafId = null;

/* ============================================================
   빌드 — 눈금/시대밴드/노드 DOM 생성
   ============================================================ */
function build() {
  // ----- 트랙 폭 -----
  track.style.width = trackWidth() + 'px';

  // ----- 연도 눈금 -----
  const frag = document.createDocumentFragment();
  for (let y = MIN_YEAR; y <= 2025; y += 5) {
    const major = (y % 10 === 0);
    const t = document.createElement('div');
    t.className = 'tick' + (major ? '' : ' minor');
    t.style.left = yearToX(y) + 'px';
    t.innerHTML = '<div class="line"></div>' + (major ? '<div class="lbl">' + y + '</div>' : '');
    frag.appendChild(t);
  }
  // 고전 구간 눈금(라벨만)
  const ct = document.createElement('div');
  ct.className = 'tick';
  ct.style.left = CLASSIC_X + 'px';
  ct.innerHTML = '<div class="line"></div><div class="lbl">고전</div>';
  frag.appendChild(ct);

  // ----- 시대 밴드 라벨 -----
  ERAS.forEach(era => {
    const band = document.createElement('div');
    band.className = 'era-band';
    let cx, w;
    if (era.key === 'classic') {
      cx = CLASSIC_X; w = CLASSIC_W;
    } else {
      const x1 = yearToX(era.from), x2 = yearToX(era.to);
      cx = (x1 + x2) / 2; w = Math.max(140, x2 - x1);
    }
    band.style.left = cx + 'px';
    band.style.width = w + 'px';
    band.style.transform = 'translate(-50%, -50%)';
    band.innerHTML =
      '<div class="era-name">' + era.label + '</div>' +
      '<div class="era-sub">' + era.sub + '</div>' +
      '<div class="era-line"></div>';
    frag.appendChild(band);
  });

  // ----- 노드(문장) -----
  // 같은 연도/좌표에 여러 문장이 겹치면 살짝 분산(±)시켜 점이 겹치지 않게.
  const byX = {};
  const prepared = SENTENCES.map(s => {
    let x;
    if (s.year === '고전') x = CLASSIC_X;
    else x = yearToX(parseInt(s.year, 10));
    return { data: s, baseX: x };
  });
  // 동일 x 그룹별 오프셋 부여
  const groups = {};
  prepared.forEach(p => {
    const k = Math.round(p.baseX);
    (groups[k] = groups[k] || []).push(p);
  });
  Object.values(groups).forEach(g => {
    if (g.length === 1) { g[0].x = g[0].baseX; return; }
    // 좌우로 분산
    const spread = 86;  // px
    const start = -((g.length - 1) / 2) * spread;
    g.forEach((p, i) => { p.x = p.baseX + start + i * spread; });
  });

  prepared.forEach(p => {
    const s = p.data;
    const el = document.createElement('div');
    el.className = 'node';
    el.style.left = p.x + 'px';
    el.dataset.x = p.x;

    const yearLabel = (s.year === '고전') ? '고전 · CLASSIC' : s.year;
    const kw = s.keywords.map(k => '<span>' + k + '</span>').join('');
    el.innerHTML =
      '<div class="card">' +
        '<span class="year">' + yearLabel + '</span>' +
        '<p class="quote">' + s.text + '</p>' +
        '<div class="meta"><span class="author">' + s.author + '</span>' +
          '<span class="sep">·</span><span class="work">' + s.work + '</span></div>' +
        '<div class="kw">' + kw + '</div>' +
      '</div>' +
      '<div class="dot"></div>';

    // 노드/점 클릭 시 그 지점으로 이동
    el.addEventListener('click', () => { goTo(p.x); markInteract(); });

    track.appendChild(el);
    nodes.push({ data: s, el, card: el.querySelector('.card'), x: p.x });
  });

  track.appendChild(frag);

  // ----- 점프 버튼 -----
  ERAS.forEach(era => {
    const b = document.createElement('button');
    b.className = 'jump-btn';
    b.textContent = era.jump;
    b.dataset.key = era.key;
    b.addEventListener('click', () => { jumpToEra(era); markInteract(); });
    jumpsEl.appendChild(b);
  });

  // ----- 스크롤 한계: 첫 노드 ~ 마지막 노드가 중앙에 올 수 있게 -----
  const xs = nodes.map(n => n.x).sort((a, b) => a - b);
  minScroll = xs[0];
  maxScroll = xs[xs.length - 1];

  // 시작 위치: 가장 과거(고전) 노드를 중앙에
  scrollX = targetX = minScroll;
}

/* ============================================================
   보간 유틸
   ============================================================ */
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function mixRGB(c1, c2, t) {
  return [
    Math.round(lerp(c1[0], c2[0], t)),
    Math.round(lerp(c1[1], c2[1], t)),
    Math.round(lerp(c1[2], c2[2], t))
  ];
}
function rgb(c) { return 'rgb(' + c[0] + ',' + c[1] + ',' + c[2] + ')'; }

// 정규화 진행도(0~1) → 톤 보간
function toneAt(p) {
  p = clamp(p, 0, 1);
  for (let i = 0; i < TONE_STOPS.length - 1; i++) {
    const a = TONE_STOPS[i], b = TONE_STOPS[i + 1];
    if (p >= a.pos && p <= b.pos) {
      const t = (p - a.pos) / (b.pos - a.pos || 1);
      return {
        top:  mixRGB(a.top, b.top, t),
        bot:  mixRGB(a.bot, b.bot, t),
        glow: mixRGB(a.glow, b.glow, t),
        grain: lerp(a.grain, b.grain, t),
        vig:  lerp(a.vig, b.vig, t),
        accent: mixRGB(a.accent, b.accent, t)
      };
    }
  }
  const last = TONE_STOPS[TONE_STOPS.length - 1];
  return { top:last.top, bot:last.bot, glow:last.glow, grain:last.grain, vig:last.vig, accent:last.accent };
}

// 현재 scrollX(트랙 x) → 정규화 진행도(0=가장 과거, 1=가장 미래)
function progressOf(x) {
  return clamp((x - minScroll) / (maxScroll - minScroll || 1), 0, 1);
}

// 현재 scrollX 가 가리키는 '연도'(워터마크/표시용)
function yearOf(x) {
  if (x < PAD_LEFT + CLASSIC_W) return '고전';
  const y = MIN_YEAR + (x - PAD_LEFT - CLASSIC_W) / PX_PER_YEAR;
  return Math.round(y);
}

// 현재 위치가 속한 시대
function eraOf(x) {
  if (x < PAD_LEFT + CLASSIC_W) return ERAS[0];
  const y = MIN_YEAR + (x - PAD_LEFT - CLASSIC_W) / PX_PER_YEAR;
  let best = ERAS[1];
  for (const era of ERAS) {
    if (era.from === null) continue;
    if (y >= era.from && y <= era.to) return era;
  }
  // 구간 사이(공백기)면 가장 가까운 시대 라벨로
  let nearest = ERAS[1], dist = Infinity;
  ERAS.forEach(e => {
    if (e.from === null) return;
    const c = (e.from + e.to) / 2;
    const d = Math.abs(c - y);
    if (d < dist) { dist = d; nearest = e; }
  });
  return nearest;
}

/* ============================================================
   렌더 — 매 프레임: 트랙 이동 + 배경 톤 + 노드 포커스 + UI
   ============================================================ */
let lastYearShown = null;
function render() {
  // 부드러운 추적(관성)
  scrollX += (targetX - scrollX) * 0.12;
  if (Math.abs(targetX - scrollX) < 0.4) scrollX = targetX;

  // ----- 트랙 이동: scrollX 지점을 화면 중앙(viewW/2)에 -----
  const tx = viewW / 2 - scrollX;
  track.style.transform = 'translate3d(' + tx + 'px,0,0)';

  // ----- 배경 톤 -----
  const prog = progressOf(scrollX);
  const tone = toneAt(prog);
  bg.style.setProperty('--bg-top', rgb(tone.top));
  bg.style.setProperty('--bg-bot', rgb(tone.bot));
  bg.style.setProperty('--bg-glow', rgb(tone.glow));
  bg.style.setProperty('--grain-opacity', tone.grain.toFixed(3));
  vig.style.setProperty('--vig', tone.vig.toFixed(3));
  // 포인트색도 시대에 맞춰 미세하게
  const accStr = rgb(tone.accent);
  document.documentElement.style.setProperty('--accent', accStr);
  document.documentElement.style.setProperty('--accent-glow',
    'rgba(' + tone.accent[0] + ',' + tone.accent[1] + ',' + tone.accent[2] + ',0.38)');

  // ----- 패럴랙스 워터마크 연도 -----
  // 트랙보다 느리게 움직여 깊이감(0.18배). 중앙 기준.
  const yNow = yearOf(scrollX);
  const yText = (yNow === '고전') ? '古' : String(yNow);
  if (yText !== lastYearShown) { pxYear.textContent = yText; lastYearShown = yText; }
  const par = (viewW / 2 - scrollX) * 0.18;
  pxYear.style.transform = 'translate(calc(-50% + ' + par + 'px), -54%)';
  pxYear.style.opacity = (yNow === '고전') ? 0.5 : 1;

  // ----- 노드 포커스: 화면 중앙(scrollX)과의 거리로 --p 계산 -----
  // 거리 0이면 active, 멀수록 흐려짐. 활성 노드 1개만 .active.
  let activeNode = null, activeDist = Infinity;
  for (const n of nodes) {
    const d = Math.abs(n.x - scrollX);
    if (d < activeDist) { activeDist = d; activeNode = n; }
    // 정규화 거리(화면 절반폭 기준). 0~1로 클램프.
    const norm = clamp(d / (viewW * 0.42), 0, 1);
    n.card.style.setProperty('--p', norm.toFixed(3));
  }
  // active 토글
  for (const n of nodes) {
    const on = (n === activeNode && activeDist < viewW * 0.18);
    if (on && !n.el.classList.contains('active')) n.el.classList.add('active');
    else if (!on && n.el.classList.contains('active')) n.el.classList.remove('active');
  }

  // ----- 상단 readout -----
  nowYearEl.textContent = (yNow === '고전') ? '古典' : yNow;
  nowYearEl.style.color = (prog < 0.5)
    ? 'rgba(60,44,24,0.92)' : 'rgba(48,42,32,0.95)';
  const era = eraOf(scrollX);
  if (nowEraEl.textContent !== era.label) nowEraEl.textContent = era.label;

  // 점프 버튼 active
  for (const b of jumpsEl.children) {
    b.classList.toggle('active', b.dataset.key === era.key);
  }

  // ----- 하단 게이지 -----
  const gp = (prog * 100).toFixed(2) + '%';
  gaugeFill.style.width = gp;
  gaugeKnob.style.left = gp;

  // ----- 가장자리 힌트(끝에 다다르면 숨김) -----
  hintL.classList.toggle('show', !interacted && scrollX > minScroll + 5);
  hintR.classList.toggle('show', !interacted && scrollX < maxScroll - 5);

  rafId = requestAnimationFrame(render);
}

/* ============================================================
   이동 제어
   ============================================================ */
function setTarget(x) {
  targetX = clamp(x, minScroll, maxScroll);
}
function goTo(x) {                 // 특정 트랙 x로
  setTarget(x);
}
function jumpToEra(era) {          // 시대 점프
  if (era.key === 'classic') { setTarget(CLASSIC_X); return; }
  // 해당 시대에 문장이 있으면 그 노드로, 없으면 구간 중앙으로
  const within = nodes.filter(n => {
    if (n.data.year === '고전') return false;
    const y = parseInt(n.data.year, 10);
    return y >= era.from && y <= era.to;
  });
  if (within.length) {
    // 시대 내 가장 이른 문장으로
    within.sort((a, b) => a.x - b.x);
    setTarget(within[0].x);
  } else {
    const cx = (yearToX(era.from) + yearToX(era.to)) / 2;
    setTarget(cx);
  }
}
function markInteract() {
  if (interacted) return;
  interacted = true;
  introEl.classList.add('hide');
}

/* ============================================================
   입력 — 휠 / 드래그 / 터치 / 키보드
   ============================================================ */
// 휠: 세로 휠도 가로 이동으로(트랙패드는 deltaX 우선)
stage.addEventListener('wheel', (e) => {
  e.preventDefault();
  const dx = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
  setTarget(targetX + dx * 1.1);
  markInteract();
}, { passive: false });

// 포인터 드래그(마우스/터치 공통)
let dragging = false, dragStartX = 0, dragStartScroll = 0, lastPx = 0, lastT = 0, vel = 0;
stage.addEventListener('pointerdown', (e) => {
  // 버튼/노드 클릭은 제외
  if (e.target.closest('.jump-btn')) return;
  dragging = true;
  stage.classList.add('dragging');
  dragStartX = e.clientX;
  dragStartScroll = scrollX;
  targetX = scrollX;             // 추적 끊고 즉시 잡기
  lastPx = e.clientX; lastT = performance.now(); vel = 0;
  stage.setPointerCapture(e.pointerId);
  markInteract();
});
stage.addEventListener('pointermove', (e) => {
  if (!dragging) return;
  const dx = e.clientX - dragStartX;
  scrollX = clamp(dragStartScroll - dx, minScroll, maxScroll);
  targetX = scrollX;
  // 속도 추정(관성용)
  const now = performance.now();
  const dt = now - lastT;
  if (dt > 0) vel = (lastPx - e.clientX) / dt;   // px/ms (이동 반대 방향)
  lastPx = e.clientX; lastT = now;
});
function endDrag(e) {
  if (!dragging) return;
  dragging = false;
  stage.classList.remove('dragging');
  // 관성: 속도에 비례한 추가 이동
  const fling = vel * 220;       // 감도
  setTarget(scrollX + fling);
  // 드래그가 거의 멈춤(클릭에 가까움)이면 가장 가까운 노드로 살짝 스냅
  if (Math.abs(fling) < 30) snapToNearest();
}
stage.addEventListener('pointerup', endDrag);
stage.addEventListener('pointercancel', endDrag);

// 가장 가까운 노드로 스냅(부드럽게 머물도록)
function snapToNearest() {
  let best = null, dist = Infinity;
  for (const n of nodes) {
    const d = Math.abs(n.x - targetX);
    if (d < dist) { dist = d; best = n; }
  }
  if (best && dist < viewW * 0.22) setTarget(best.x);
}

// 키보드: ← → 로 노드 단위 이동, Home/End
window.addEventListener('keydown', (e) => {
  const sorted = nodes.map(n => n.x).sort((a, b) => a - b);
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    e.preventDefault();
    const next = sorted.find(x => x > targetX + 1);
    if (next != null) setTarget(next);
    markInteract();
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault();
    const prev = [...sorted].reverse().find(x => x < targetX - 1);
    if (prev != null) setTarget(prev);
    markInteract();
  } else if (e.key === 'Home') {
    setTarget(minScroll); markInteract();
  } else if (e.key === 'End') {
    setTarget(maxScroll); markInteract();
  }
});

/* ============================================================
   리사이즈 — 폭/픽셀밀도 재계산 후 위치 보존
   ============================================================ */
function applyResponsiveScale() {
  viewW = window.innerWidth;
  viewH = window.innerHeight;
  // 화면이 좁으면 1년당 픽셀을 줄여 더 많이 보이게(모바일 대응)
  if (viewW < 560) PX_PER_YEAR = 92;
  else if (viewW < 900) PX_PER_YEAR = 118;
  else PX_PER_YEAR = 150;
}

let resizeRAF = null;
function onResize() {
  // 현재 보고 있던 '연도'를 기억
  const keepYear = yearOf(scrollX);
  applyResponsiveScale();
  rebuildPositions();
  // 좌표 재계산 후 같은 연도로 복귀
  let nx;
  if (keepYear === '고전') nx = CLASSIC_X;
  else nx = yearToX(keepYear);
  scrollX = targetX = clamp(nx, minScroll, maxScroll);
}

// 노드/눈금/밴드의 x좌표만 다시 계산(요소 재생성 없이)
function rebuildPositions() {
  track.style.width = trackWidth() + 'px';
  // 눈금
  track.querySelectorAll('.tick').forEach(t => {
    const lbl = t.querySelector('.lbl');
    if (lbl && lbl.textContent === '고전') { t.style.left = CLASSIC_X + 'px'; return; }
    if (lbl) { t.style.left = yearToX(parseInt(lbl.textContent, 10)) + 'px'; }
    else {
      // 잔눈금(라벨 없음): data로 보관해 두지 않았으니 위치만 근사 — 재생성이 안전
    }
  });
  // 잔눈금까지 정확히 맞추려면 전부 다시 그리는 게 깔끔하므로,
  // 눈금/밴드는 통째로 재생성한다.
  track.querySelectorAll('.tick, .era-band').forEach(el => el.remove());
  rebuildTicksAndBands();
  // 노드: 보관한 데이터로 x 재배치
  recomputeNodeX();
}

function rebuildTicksAndBands() {
  const frag = document.createDocumentFragment();
  for (let y = MIN_YEAR; y <= 2025; y += 5) {
    const major = (y % 10 === 0);
    const t = document.createElement('div');
    t.className = 'tick' + (major ? '' : ' minor');
    t.style.left = yearToX(y) + 'px';
    t.innerHTML = '<div class="line"></div>' + (major ? '<div class="lbl">' + y + '</div>' : '');
    frag.appendChild(t);
  }
  const ct = document.createElement('div');
  ct.className = 'tick';
  ct.style.left = CLASSIC_X + 'px';
  ct.innerHTML = '<div class="line"></div><div class="lbl">고전</div>';
  frag.appendChild(ct);
  ERAS.forEach(era => {
    const band = document.createElement('div');
    band.className = 'era-band';
    let cx, w;
    if (era.key === 'classic') { cx = CLASSIC_X; w = CLASSIC_W; }
    else {
      const x1 = yearToX(era.from), x2 = yearToX(era.to);
      cx = (x1 + x2) / 2; w = Math.max(140, x2 - x1);
    }
    band.style.left = cx + 'px';
    band.style.width = w + 'px';
    band.style.transform = 'translate(-50%, -50%)';
    band.innerHTML =
      '<div class="era-name">' + era.label + '</div>' +
      '<div class="era-sub">' + era.sub + '</div>' +
      '<div class="era-line"></div>';
    frag.appendChild(band);
  });
  track.appendChild(frag);
}

// 노드 x 재계산(분산 로직 동일)
function recomputeNodeX() {
  const prepared = nodes.map(n => {
    let x;
    if (n.data.year === '고전') x = CLASSIC_X;
    else x = yearToX(parseInt(n.data.year, 10));
    return { node: n, baseX: x };
  });
  const groups = {};
  prepared.forEach(p => {
    const k = Math.round(p.baseX);
    (groups[k] = groups[k] || []).push(p);
  });
  Object.values(groups).forEach(g => {
    if (g.length === 1) { g[0].x = g[0].baseX; return; }
    const spread = (viewW < 560) ? 64 : 86;
    const start = -((g.length - 1) / 2) * spread;
    g.forEach((p, i) => { p.x = p.baseX + start + i * spread; });
  });
  prepared.forEach(p => {
    p.node.x = p.x;
    p.node.el.style.left = p.x + 'px';
    p.node.el.dataset.x = p.x;
  });
  const xs = nodes.map(n => n.x).sort((a, b) => a - b);
  minScroll = xs[0];
  maxScroll = xs[xs.length - 1];
}

window.addEventListener('resize', () => {
  if (resizeRAF) cancelAnimationFrame(resizeRAF);
  resizeRAF = requestAnimationFrame(onResize);
});

/* ============================================================
   초기화
   ============================================================ */
function init() {
  applyResponsiveScale();
  build();
  render();

  // 도입 안내 자동 페이드(8초 후)
  setTimeout(() => { if (!interacted) introEl.classList.add('hide'); }, 8000);

  // 첫 진입 연출: 고전에서 1948(윤동주) 부근까지 살짝 흘러갔다 멈추는 미세한 '시간 여행' 인트로
  setTimeout(() => {
    if (interacted) return;
    const intro1948 = nodes.find(n => n.data.id === 1);
    if (intro1948) setTarget(intro1948.x);
  }, 900);
}

// DOM 준비 후 시작
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
</body>
